main:
  params: [args]
  steps:
    - init:
        assign:
          - project: ${default(map.get(args, "project"), sys.get_env("GOOGLE_CLOUD_PROJECT_ID"))}
          - region: ${default(map.get(args, "region"), "us-central1")}
          - warehouse: ${default(map.get(args, "warehouse"), "all")}
          - leadJob: ${default(map.get(args, "leadJob"), "lead-match-lead-embeddings")}
          - posJob: ${default(map.get(args, "posJob"), "lead-match-pos-embeddings")}
          - matchJob: ${default(map.get(args, "matchJob"), "lead-match-fuzzy-match")}
          - reportJob: ${default(map.get(args, "reportJob"), "lead-match-report")}
          - matchRunId: ${default(map.get(args, "matchRunId"), "")}
          - reportBucket: ${default(map.get(args, "reportBucket"), "lead-match-ctoteam")}

    - runLeadEmbeddings:
        call: googleapis.run.v2.projects.locations.jobs.run
        args:
          name: ${"projects/" + project + "/locations/" + region + "/jobs/" + leadJob}
          body:
            overrides:
              containerOverrides:
                - env:
                    - name: WAREHOUSE
                      value: ${warehouse}
                    - name: WAREHOUSE_SCOPE
                      value: ${warehouse}
                    - name: MATCH_RUN_ID
                      value: ${matchRunId}
        result: leadExecution

    - waitLeadEmbeddings:
        call: waitForRunJobExecution
        args:
          executionName: ${leadExecution.name}

    - runPosEmbeddings:
        call: googleapis.run.v2.projects.locations.jobs.run
        args:
          name: ${"projects/" + project + "/locations/" + region + "/jobs/" + posJob}
          body:
            overrides:
              containerOverrides:
                - env:
                    - name: WAREHOUSE
                      value: ${warehouse}
                    - name: WAREHOUSE_SCOPE
                      value: ${warehouse}
                    - name: MATCH_RUN_ID
                      value: ${matchRunId}
        result: posExecution

    - waitPosEmbeddings:
        call: waitForRunJobExecution
        args:
          executionName: ${posExecution.name}

    - runFuzzyMatch:
        call: googleapis.run.v2.projects.locations.jobs.run
        args:
          name: ${"projects/" + project + "/locations/" + region + "/jobs/" + matchJob}
          body:
            overrides:
              containerOverrides:
                - env:
                    - name: WAREHOUSE
                      value: ${warehouse}
                    - name: WAREHOUSE_SCOPE
                      value: ${warehouse}
                    - name: MATCH_RUN_ID
                      value: ${matchRunId}
        result: matchExecution

    - waitFuzzyMatch:
        call: waitForRunJobExecution
        args:
          executionName: ${matchExecution.name}

    - runReport:
        call: googleapis.run.v2.projects.locations.jobs.run
        args:
          name: ${"projects/" + project + "/locations/" + region + "/jobs/" + reportJob}
          body:
            overrides:
              containerOverrides:
                - env:
                    - name: WAREHOUSE
                      value: ${warehouse}
                    - name: WAREHOUSE_SCOPE
                      value: ${warehouse}
                    - name: MATCH_RUN_ID
                      value: ${matchRunId}
                    - name: REPORT_BUCKET
                      value: ${reportBucket}
        result: reportExecution

    - waitReport:
        call: waitForRunJobExecution
        args:
          executionName: ${reportExecution.name}

    - done:
        return:
          status: "success"
          warehouse: ${warehouse}
          matchRunId: ${matchRunId}
          leadExecution: ${leadExecution.name}
          posExecution: ${posExecution.name}
          matchExecution: ${matchExecution.name}
          reportExecution: ${reportExecution.name}

waitForRunJobExecution:
  params: [executionName]
  steps:
    - poll:
        call: googleapis.run.v2.projects.locations.jobs.executions.get
        args:
          name: ${executionName}
        result: execution
    - check:
        switch:
          - condition: ${len(default(map.get(execution, "conditions"), [])) > 0 and execution.conditions[0].type == "Completed"}
            next: validate
    - sleep:
        call: sys.sleep
        args:
          seconds: 15
        next: poll
    - validate:
        switch:
          - condition: ${execution.conditions[0].status == "True"}
            return: ${execution}
    - fail:
        raise: '${"Cloud Run Job execution failed: " + executionName}'
