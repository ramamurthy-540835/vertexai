main:
  params: [args]
  steps:
    - init:
        assign:
          - project: ${default(map.get(args, "project"), sys.get_env("GOOGLE_CLOUD_PROJECT_ID"))}
          - region: ${default(map.get(args, "region"), "us-central1")}
          - warehouse: ${default(map.get(args, "warehouse"), "all")}
          - leadJob: ${default(map.get(args, "leadJob"), "lead-match-lead-embeddings")}
          - posJob: ${default(map.get(args, "posJob"), "lead-match-pos-embeddings")}
          - matchJob: ${default(map.get(args, "matchJob"), "lead-match-fuzzy-match")}
          - indexJob: ${default(map.get(args, "indexJob"), "lead-match-ensure-indexes")}
          - reportJob: ${default(map.get(args, "reportJob"), "lead-match-report")}
          - matchRunId: ${default(map.get(args, "matchRunId"), "")}
          - reportBucket: ${default(map.get(args, "reportBucket"), "lead-match-ctoteam")}
          - reportPrefix: ${default(map.get(args, "reportPrefix"), "reports/lead_match/" + project + "/" + warehouse + "/" + matchRunId)}
          - leadResult: null
          - posResult: null

    - runEmbeddingJobs:
        parallel:
          shared: [leadResult, posResult]
          branches:
            - leadEmbeddings:
                steps:
                  - runLeadEmbeddings:
                      call: runCloudRunJob
                      args:
                        project: ${project}
                        region: ${region}
                        jobName: ${leadJob}
                        envVars:
                          - name: WAREHOUSE
                            value: ${warehouse}
                          - name: WAREHOUSE_SCOPE
                            value: ${warehouse}
                          - name: MATCH_RUN_ID
                            value: ${matchRunId}
                      result: leadResult
            - posEmbeddings:
                steps:
                  - runPosEmbeddings:
                      call: runCloudRunJob
                      args:
                        project: ${project}
                        region: ${region}
                        jobName: ${posJob}
                        envVars:
                          - name: WAREHOUSE
                            value: ${warehouse}
                          - name: WAREHOUSE_SCOPE
                            value: ${warehouse}
                          - name: MATCH_RUN_ID
                            value: ${matchRunId}
                      result: posResult

    - runEnsureIndexes:
        call: runCloudRunJob
        args:
          project: ${project}
          region: ${region}
          jobName: ${indexJob}
          envVars:
            - name: WAREHOUSE
              value: ${warehouse}
            - name: WAREHOUSE_SCOPE
              value: ${warehouse}
        result: indexResult

    - runFuzzyMatch:
        call: runCloudRunJob
        args:
          project: ${project}
          region: ${region}
          jobName: ${matchJob}
          envVars:
            - name: WAREHOUSE
              value: ${warehouse}
            - name: WAREHOUSE_SCOPE
              value: ${warehouse}
            - name: MATCH_RUN_ID
              value: ${matchRunId}
        result: matchResult

    - runReport:
        call: runCloudRunJob
        args:
          project: ${project}
          region: ${region}
          jobName: ${reportJob}
          envVars:
            - name: WAREHOUSE
              value: ${warehouse}
            - name: WAREHOUSE_SCOPE
              value: ${warehouse}
            - name: MATCH_RUN_ID
              value: ${matchRunId}
            - name: REPORT_BUCKET
              value: ${reportBucket}
            - name: REPORT_PREFIX
              value: ${reportPrefix}
        result: reportResult

    - done:
        return:
          status: "success"
          warehouse: ${warehouse}
          matchRunId: ${matchRunId}
          reportBucket: ${reportBucket}
          reportPrefix: ${reportPrefix}
          lead: ${leadResult}
          pos: ${posResult}
          indexes: ${indexResult}
          match: ${matchResult}
          report: ${reportResult}

runCloudRunJob:
  params: [project, region, jobName, envVars]
  steps:
    - init:
        assign:
          - startedAt: ${sys.now()}
    - logStart:
        call: sys.log
        args:
          severity: INFO
          text: ${"Starting Cloud Run Job " + jobName}
    - runJob:
        call: googleapis.run.v2.projects.locations.jobs.run
        args:
          name: ${"projects/" + project + "/locations/" + region + "/jobs/" + jobName}
          body:
            overrides:
              containerOverrides:
                - env: ${envVars}
        result: jobExecution
    - waitJob:
        call: waitForRunJobExecution
        args:
          executionName: ${jobExecution.name}
        result: jobResult
    - finish:
        assign:
          - completedAt: ${sys.now()}
    - logComplete:
        call: sys.log
        args:
          severity: INFO
          text: ${"Completed Cloud Run Job " + jobName + " execution " + jobExecution.name}
    - returnResult:
        return:
          job: ${jobName}
          executionName: ${jobExecution.name}
          startedAt: ${startedAt}
          completedAt: ${completedAt}
          durationSeconds: ${completedAt - startedAt}
          taskCount: ${default(map.get(jobResult, "taskCount"), 1)}
          succeededCount: ${default(map.get(jobResult, "succeededCount"), 0)}
          failedCount: ${default(map.get(jobResult, "failedCount"), 0)}
          cancelledCount: ${default(map.get(jobResult, "cancelledCount"), 0)}

waitForRunJobExecution:
  params: [executionName]
  steps:
    - poll:
        call: googleapis.run.v2.projects.locations.jobs.executions.get
        args:
          name: ${executionName}
        result: execution
    - checkCompletion:
        switch:
          - condition: ${execution.succeededCount != null AND execution.taskCount != null AND execution.succeededCount >= execution.taskCount}
            next: returnSuccess
          - condition: ${execution.status != null AND execution.status.succeededCount != null AND execution.spec != null AND execution.spec.taskCount != null AND execution.status.succeededCount >= execution.spec.taskCount}
            next: returnSuccess
          - condition: ${execution.failedCount != null AND execution.failedCount > 0}
            next: fail
          - condition: ${execution.status != null AND execution.status.failedCount != null AND execution.status.failedCount > 0}
            next: fail
          - condition: ${execution.cancelledCount != null AND execution.cancelledCount > 0}
            next: fail
          - condition: ${execution.status != null AND execution.status.cancelledCount != null AND execution.status.cancelledCount > 0}
            next: fail
    - sleep:
        call: sys.sleep
        args:
          seconds: 15
        next: poll
    - returnSuccess:
        return:
          executionName: ${executionName}
          execution: ${execution}
    - fail:
        raise: '${"Cloud Run Job execution failed: " + executionName + " execution=" + json.encode_to_string(execution)}'
