main:
  params: [args]
  steps:
    - init:
        assign:
          - project: ${default(map.get(args, "project"), sys.get_env("GOOGLE_CLOUD_PROJECT_ID"))}
          - region: ${default(map.get(args, "region"), "us-central1")}
          - warehouse: ${default(map.get(args, "warehouse"), "all")}
          - leadJob: ${default(map.get(args, "leadJob"), "lead-match-lead-embeddings")}
          - posJob: ${default(map.get(args, "posJob"), "lead-match-pos-embeddings")}
          - matchJob: ${default(map.get(args, "matchJob"), "lead-match-fuzzy-match")}
          - indexJob: ${default(map.get(args, "indexJob"), "lead-match-ensure-indexes")}
          - reportJob: ${default(map.get(args, "reportJob"), "lead-match-report")}
          - matchRunId: ${default(map.get(args, "matchRunId"), "")}
          - reportBucket: ${default(map.get(args, "reportBucket"), "lead-match-ctoteam")}
          - reportPrefix: ${default(map.get(args, "reportPrefix"), "reports/lead_match/" + project + "/" + warehouse + "/" + matchRunId)}
          - dryRun: ${default(map.get(args, "dryRun"), "false")}
          - leadEmbeddingLimit: ${default(map.get(args, "leadEmbeddingLimit"), "")}
          - posEmbeddingLimit: ${default(map.get(args, "posEmbeddingLimit"), "")}
          - matchLeadLimit: ${default(map.get(args, "matchLeadLimit"), "")}
          - leadResult: null
          - posResult: null

    - runEmbeddingJobs:
        parallel:
          shared: [leadResult, posResult]
          branches:
            - leadEmbeddings:
                steps:
                  - runLeadEmbeddings:
                      call: runCloudRunJob
                      args:
                        project: ${project}
                        region: ${region}
                        jobName: ${leadJob}
                        containerArgs: []
                        envVars:
                          - name: WAREHOUSE
                            value: ${warehouse}
                          - name: WAREHOUSE_SCOPE
                            value: ${warehouse}
                          - name: MATCH_RUN_ID
                            value: ${matchRunId}
                          - name: DRY_RUN
                            value: ${dryRun}
                          - name: LEAD_EMBEDDING_LIMIT
                            value: ${leadEmbeddingLimit}
                      result: leadResult
            - posEmbeddings:
                steps:
                  - runPosEmbeddings:
                      call: runCloudRunJob
                      args:
                        project: ${project}
                        region: ${region}
                        jobName: ${posJob}
                        containerArgs: []
                        envVars:
                          - name: WAREHOUSE
                            value: ${warehouse}
                          - name: WAREHOUSE_SCOPE
                            value: ${warehouse}
                          - name: MATCH_RUN_ID
                            value: ${matchRunId}
                          - name: DRY_RUN
                            value: ${dryRun}
                          - name: POS_EMBEDDING_LIMIT
                            value: ${posEmbeddingLimit}
                      result: posResult

    - runEnsureIndexes:
        call: runCloudRunJob
        args:
          project: ${project}
          region: ${region}
          jobName: ${indexJob}
          containerArgs:
            - ensure-indexes
          envVars:
            - name: WAREHOUSE
              value: ${warehouse}
            - name: WAREHOUSE_SCOPE
              value: ${warehouse}
            - name: DRY_RUN
              value: ${dryRun}
        result: indexResult

    - runFuzzyMatch:
        call: runCloudRunJob
        args:
          project: ${project}
          region: ${region}
          jobName: ${matchJob}
          containerArgs: []
          envVars:
            - name: WAREHOUSE
              value: ${warehouse}
            - name: WAREHOUSE_SCOPE
              value: ${warehouse}
            - name: MATCH_RUN_ID
              value: ${matchRunId}
            - name: DRY_RUN
              value: ${dryRun}
            - name: MATCH_LEAD_LIMIT
              value: ${matchLeadLimit}
        result: matchResult

    - runReport:
        call: runCloudRunJob
        args:
          project: ${project}
          region: ${region}
          jobName: ${reportJob}
          containerArgs: []
          envVars:
            - name: WAREHOUSE
              value: ${warehouse}
            - name: WAREHOUSE_SCOPE
              value: ${warehouse}
            - name: MATCH_RUN_ID
              value: ${matchRunId}
            - name: REPORT_BUCKET
              value: ${reportBucket}
            - name: REPORT_PREFIX
              value: ${reportPrefix}
            - name: DRY_RUN
              value: ${dryRun}
        result: reportResult

    - done:
        return:
          status: "success"
          warehouse: ${warehouse}
          matchRunId: ${matchRunId}
          reportBucket: ${reportBucket}
          reportPrefix: ${reportPrefix}
          dryRun: ${dryRun}
          leadEmbeddingLimit: ${leadEmbeddingLimit}
          posEmbeddingLimit: ${posEmbeddingLimit}
          matchLeadLimit: ${matchLeadLimit}
          lead: ${leadResult}
          pos: ${posResult}
          indexes: ${indexResult}
          match: ${matchResult}
          report: ${reportResult}

runCloudRunJob:
  params: [project, region, jobName, envVars, containerArgs]
  steps:
    - init:
        assign:
          - startedAt: ${sys.now()}
    - logStart:
        call: sys.log
        args:
          severity: INFO
          text: ${"Starting Cloud Run Job " + jobName}
    - runJob:
        try:
          call: googleapis.run.v2.projects.locations.jobs.run
          args:
            name: ${"projects/" + project + "/locations/" + region + "/jobs/" + jobName}
            body:
              overrides:
                containerOverrides:
                  - args: ${containerArgs}
                    env: ${envVars}
          result: jobExecution
        except:
          as: e
          steps:
            - failRunJobStart:
                raise: '${"Failed to start Cloud Run Job " + jobName + ": " + json.encode_to_string(e)}'
    - waitJob:
        call: waitForRunJobExecution
        args:
          executionName: ${jobExecution.name}
        result: jobResult
    - finish:
        assign:
          - completedAt: ${sys.now()}
    - logComplete:
        call: sys.log
        args:
          severity: INFO
          text: ${"Completed Cloud Run Job " + jobName + " execution " + jobExecution.name}
    - returnResult:
        return:
          job: ${jobName}
          executionName: ${jobExecution.name}
          startedAt: ${startedAt}
          completedAt: ${completedAt}
          durationSeconds: ${completedAt - startedAt}
          taskCount: ${default(map.get(jobResult, "taskCount"), 1)}
          succeededCount: ${default(map.get(jobResult, "succeededCount"), 0)}
          failedCount: ${default(map.get(jobResult, "failedCount"), 0)}
          cancelledCount: ${default(map.get(jobResult, "cancelledCount"), 0)}

waitForRunJobExecution:
  params: [executionName]
  steps:
    - initWait:
        assign:
          - pollStartedAt: ${sys.now()}
          - maxWaitSeconds: 3600
    - poll:
        call: googleapis.run.v2.projects.locations.jobs.executions.get
        args:
          name: ${executionName}
        result: execution
    - checkTimeout:
        switch:
          - condition: ${sys.now() - pollStartedAt > maxWaitSeconds}
            next: timeout
    - extractCounts:
        assign:
          - executionStatus: ${map.get(execution, "status")}
          - executionSpec: ${map.get(execution, "spec")}
          - taskCount: ${int(default(map.get(execution, "taskCount"), 1))}
          - succeededCount: ${int(default(map.get(execution, "succeededCount"), 0))}
          - failedCount: ${int(default(map.get(execution, "failedCount"), 0))}
          - cancelledCount: ${int(default(map.get(execution, "cancelledCount"), 0))}
    - extractNestedSpec:
        switch:
          - condition: ${executionSpec != null}
            steps:
              - applyNestedSpec:
                  assign:
                    - taskCount: ${int(default(map.get(executionSpec, "taskCount"), taskCount))}
    - extractNestedStatus:
        switch:
          - condition: ${executionStatus != null}
            steps:
              - applyNestedStatus:
                  assign:
                    - succeededCount: ${int(default(map.get(executionStatus, "succeededCount"), succeededCount))}
                    - failedCount: ${int(default(map.get(executionStatus, "failedCount"), failedCount))}
                    - cancelledCount: ${int(default(map.get(executionStatus, "cancelledCount"), cancelledCount))}
    - checkCompletion:
        switch:
          - condition: ${succeededCount >= taskCount}
            next: returnSuccess
          - condition: ${failedCount > 0}
            next: fail
          - condition: ${cancelledCount > 0}
            next: fail
    - sleep:
        call: sys.sleep
        args:
          seconds: 15
        next: poll
    - returnSuccess:
        return:
          executionName: ${executionName}
          execution: ${execution}
          taskCount: ${taskCount}
          succeededCount: ${succeededCount}
          failedCount: ${failedCount}
          cancelledCount: ${cancelledCount}
    - timeout:
        raise: '${"Timed out waiting for Cloud Run Job execution after " + json.encode_to_string(maxWaitSeconds) + " seconds: " + executionName + " last_execution=" + json.encode_to_string(execution)}'
    - fail:
        raise: '${"Cloud Run Job execution failed: " + executionName + " execution=" + json.encode_to_string(execution)}'
