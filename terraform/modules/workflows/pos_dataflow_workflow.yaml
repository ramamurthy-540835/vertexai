# pos_dataflow_workflow.yaml
# Triggered by Eventarc → Pub/Sub when a manifest.json lands in the
# configured manifests folder.
#
# All env-specific values come from config/workflow-config.json in
# the same bucket as the triggering event. This workflow YAML is
# identical across all environments (adt/qat/spt).
#
# Flow:
#   1. Decode the Pub/Sub event → get manifest path + bucket
#   2. Read env config from gs://<bucket>/config/workflow-config.json
#   3. Read manifest from GCS
#   4. Process its files in chunks (size from config) via Dataflow Flex Template
#   5. On full success: trigger downstream workflow (snow_sync_workflow)
#   6. Wait for it to complete (it triggers lead_match_workflow itself)
#   7. Move source files from incoming-files/ to processed/

main:
  params: [event]
  steps:
    # ── 1. Decode the Pub/Sub-wrapped GCS event ────────────────────────
    - init_event:
        assign:
          - project_id:      '${sys.get_env("GOOGLE_CLOUD_PROJECT_ID")}'
          - raw_b64:         '${event.data.message.data}'
          - raw_json:        '${text.decode(base64.decode(raw_b64))}'
          - gcs_event:       '${json.decode(raw_json)}'
          - bucket:          '${gcs_event.bucket}'
          - manifest_object: '${gcs_event.name}'

    # ── 2. Read env config from the same bucket ────────────────────────
    - read_config:
        call: googleapis.storage.v1.objects.get
        args:
          bucket: '${bucket}'
          object: '${text.url_encode("config/workflow-config.json")}'
          alt: media
        result: cfg

    - extract_config:
        assign:
          - environment:       '${cfg.environment}'
          - region:            '${cfg.region}'
          - chunk_size:        '${cfg.dataflow.chunk_size}'
          - template_path:     '${cfg.dataflow.template_path}'
          - sa_email:          '${cfg.dataflow.service_account}'
          - field_map_gcs:     '${cfg.dataflow.field_map_path}'
          - machine_type:      '${cfg.dataflow.machine_type}'
          - max_workers:       '${cfg.dataflow.max_workers}'
          - network:           '${cfg.dataflow.network}'
          - batch_size:        '${cfg.dataflow.batch_size}'
          - instance_conn:     '${cfg.database.instance_connection_name}'
          - db_name:           '${cfg.database.db_name}'
          - db_schema:         '${cfg.database.db_schema}'
          - db_table:          '${cfg.database.db_table}'
          - manifest_prefix:   '${cfg.manifest_prefix}'
          - incoming_prefix:   '${cfg.incoming_prefix}'
          - processed_prefix:  '${cfg.processed_prefix}'
          - next_workflow:     '${cfg.downstream.next_workflow}'
          - next_wf_location:  '${cfg.downstream.next_workflow_location}'
          - all_job_states:    []

    # ── 3. Defensive: ignore non-manifest uploads ──────────────────────
    - validate_manifest_path:
        switch:
          - condition: '${not(text.match_regex(manifest_object, "^" + manifest_prefix + ".*\\.json$"))}'
            return: '${"Skipped: " + manifest_object + " is not under " + manifest_prefix}'
        next: read_manifest

    # ── 4. Read the manifest from GCS ──────────────────────────────────
    - read_manifest:
        call: googleapis.storage.v1.objects.get
        args:
          bucket: '${bucket}'
          object: '${text.url_encode(manifest_object)}'
          alt: media
        result: manifest

    - extract_run_metadata:
        assign:
          - run_id:     '${default(map.get(manifest, "run_id"), manifest_object)}'
          - all_files:  '${manifest.files}'
          - file_count: '${len(all_files)}'
          - num_chunks: '${int((file_count + chunk_size - 1) / chunk_size)}'

    - log_run_start:
        call: sys.log
        args:
          severity: INFO
          text: '${"[" + environment + "] run " + run_id + ": " + string(file_count) + " files in " + string(num_chunks) + " chunks of " + string(chunk_size) + " (sa=" + sa_email + ")"}'

    # ── 5. Sequential outer loop: chunk_size files at a time ───────────
    - process_chunks:
        for:
          value: chunk_idx
          range: [0, '${num_chunks - 1}']
          steps:
            - compute_chunk_bounds:
                assign:
                  - start_idx:        '${chunk_idx * chunk_size}'
                  - end_idx:          '${if((chunk_idx + 1) * chunk_size > file_count, file_count, (chunk_idx + 1) * chunk_size)}'
                  - chunk_files:      []
                  - chunk_job_ids:    []
                  - chunk_job_states: []
                  - chunk_failed:     false

            - build_chunk_files:
                for:
                  value: i
                  range: ['${start_idx}', '${end_idx - 1}']
                  steps:
                    - append_file:
                        assign:
                          - chunk_files: '${list.concat(chunk_files, [all_files[i]])}'

            - log_chunk_start:
                call: sys.log
                args:
                  severity: INFO
                  text: '${"[" + environment + "] chunk " + string(chunk_idx) + "/" + string(num_chunks - 1) + " — launching " + string(len(chunk_files)) + " jobs"}'

            # ── 5a. Fan-out: launch up to chunk_size Dataflow jobs ──
            - launch_chunk_jobs:
                parallel:
                  shared: [chunk_job_ids]
                  for:
                    value: file_path
                    in: '${chunk_files}'
                    steps:
                      - launch_one:
                          call: googleapis.dataflow.v1b3.projects.locations.flexTemplates.launch
                          args:
                            projectId: '${project_id}'
                            location:  '${region}'
                            body:
                              launchParameter:
                                jobName: '${"pos-etl-" + run_id + "-c" + string(chunk_idx) + "-" + string(int(sys.now()))}'
                                containerSpecGcsPath: '${template_path}'
                                parameters:
                                  input_file:               '${file_path}'
                                  instance_connection_name: '${instance_conn}'
                                  db_name:                  '${db_name}'
                                  db_schema:                '${db_schema}'
                                  db_table:                 '${db_table}'
                                  field_map_path:           '${field_map_gcs}'
                                  batch_size:               '${batch_size}'
                                environment:
                                  serviceAccountEmail: '${sa_email}'
                                  network:             '${network}'
                                  maxWorkers:          '${string(max_workers)}'
                                  machineType:         '${machine_type}'
                          result: launch_resp
                      - record_id:
                          assign:
                            - chunk_job_ids: '${list.concat(chunk_job_ids, launch_resp.job.id)}'

            # ── 5b. Fan-in: poll every job in the chunk ──
            - wait_for_chunk:
                parallel:
                  shared: [chunk_job_states, all_job_states]
                  for:
                    value: jid
                    in: '${chunk_job_ids}'
                    steps:
                      - poll_one:
                          call: poll_dataflow_until_done
                          args:
                            project_id: '${project_id}'
                            region:     '${region}'
                            job_id:     '${jid}'
                          result: final_state
                      - record_state:
                          assign:
                            - chunk_job_states: '${list.concat(chunk_job_states, final_state)}'
                            - all_job_states:   '${list.concat(all_job_states, final_state)}'

            # ── 5c. Scan chunk results; set chunk_failed flag (no early exit) ──
            - check_chunk_results:
                for:
                  value: state
                  in: '${chunk_job_states}'
                  steps:
                    - guard:
                        switch:
                          - condition: '${state != "JOB_STATE_DONE"}'
                            assign:
                              - chunk_failed: true

            # ── 5d. After the for-loop: act on the flag ──
            - check_chunk_failure_flag:
                switch:
                  - condition: '${chunk_failed}'
                    next: abort_run

            - log_chunk_done:
                call: sys.log
                args:
                  severity: INFO
                  text: '${"[" + environment + "] chunk " + string(chunk_idx) + " — all jobs DONE"}'

    # ── 6. Trigger downstream workflow (snow_sync) ─────────────────────
    - trigger_downstream:
        steps:
          - build_payload:
              assign:
                - downstream_map:
                    pos_run_id:  '${run_id}'
                    pos_files:   '${all_files}'
                    upstream:    "pos_dataflow_workflow"
                    environment: '${environment}'
          - encode_argument:
              assign:
                - downstream_args: '${json.encode_to_string(downstream_map)}'
          - create_execution:
              call: googleapis.workflowexecutions.v1.projects.locations.workflows.executions.create
              args:
                parent: '${"projects/" + project_id + "/locations/" + next_wf_location + "/workflows/" + next_workflow}'
                body:
                  argument: '${downstream_args}'
              result: downstream_execution

    # ── 7. Wait for downstream to complete ─────────────────────────────
    - wait_for_downstream:
        call: googleapis.workflowexecutions.v1.projects.locations.workflows.executions.get
        args:
          name: '${downstream_execution.name}'
        result: downstream_result
        next: check_downstream_status

    - check_downstream_status:
        switch:
          - condition: '${downstream_result.state == "SUCCEEDED"}'
            next: move_files_to_processed
          - condition: '${downstream_result.state == "FAILED"}'
            raise: '${downstream_result.error}'
          - condition: true
            next: poll_delay

    - poll_delay:
        call: sys.sleep
        args:
          seconds: 15
        next: wait_for_downstream

    # ── 8. Move source files to processed/ (on full chain success) ─────
    - move_files_to_processed:
        parallel:
          for:
            value: file_path
            in: '${all_files}'
            steps:
              - parse_path:
                  assign:
                    - bucket_and_object: '${text.split(file_path, "gs://")[1]}'
                    - bucket_only:       '${text.split(bucket_and_object, "/")[0]}'
                    - object_only:       '${text.substring(bucket_and_object, len(bucket_only) + 1, len(bucket_and_object))}'
                    - dest_object:       '${text.replace_all(object_only, incoming_prefix, processed_prefix)}'
              - rewrite:
                  call: googleapis.storage.v1.objects.rewrite
                  args:
                    sourceBucket:      '${bucket_only}'
                    sourceObject:      '${text.url_encode(object_only)}'
                    destinationBucket: '${bucket_only}'
                    destinationObject: '${text.url_encode(dest_object)}'
              - delete_source:
                  call: googleapis.storage.v1.objects.delete
                  args:
                    bucket: '${bucket_only}'
                    object: '${text.url_encode(object_only)}'

    # ── 9. Terminal states ─────────────────────────────────────────────
    - abort_run:
        raise: '${"[" + environment + "] run " + run_id + " aborted: at least one Dataflow job did not reach JOB_STATE_DONE. states=" + json.encode_to_string(all_job_states)}'

    - done:
        return:
          status:                "success"
          environment:           '${environment}'
          run_id:                '${run_id}'
          file_count:            '${file_count}'
          downstream_execution:  '${downstream_execution.name}'


# ─────────────────────────────────────────────────────────────────────
# Subworkflow — poll one Dataflow job until terminal state
# ─────────────────────────────────────────────────────────────────────
poll_dataflow_until_done:
  params: [project_id, region, job_id]
  steps:
    - get_status:
        call: googleapis.dataflow.v1b3.projects.locations.jobs.get
        args:
          projectId: '${project_id}'
          location:  '${region}'
          jobId:     '${job_id}'
          view: "JOB_VIEW_SUMMARY"
        result: job
    - check_terminal:
        switch:
          - condition: '${job.currentState in ["JOB_STATE_DONE", "JOB_STATE_FAILED", "JOB_STATE_CANCELLED", "JOB_STATE_UPDATED", "JOB_STATE_DRAINED"]}'
            return: '${job.currentState}'
    - sleep_and_retry:
        call: sys.sleep
        args:
          seconds: 30
        next: get_status