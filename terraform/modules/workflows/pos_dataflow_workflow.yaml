# pos_dataflow_workflow.yaml
# Triggered by Eventarc → Pub/Sub when a manifest.json lands in the
# configured manifests folder.
#
# Flow:
#   1. Decode the Pub/Sub event → get manifest path + bucket
#   2. Read env config from gs://<bucket>/config/workflow-config.json
#   3. Validate manifest path matches expected prefix
#   4. Read the manifest from GCS
#   5. Launch Dataflow Flex Template jobs in parallel (bounded concurrency)
#      — successful files tracked separately from failed ones
#   6. After Dataflow: MOVE only successfully processed files to processed/
#   7. Raise error if any jobs failed (after moving successful files)
#   8. Trigger downstream snow_sync_workflow (optional, default: false)
#   9. Wait for downstream to complete
#  10. Done — workflow SUCCEEDED if downstream also succeeded, FAILED otherwise
#      (but files are already moved and data is already in DB by step 6)
#
# FIXES applied vs original:
#   - parse_path: removed all split/index logic. bucket is already known from
#     the Pub/Sub event so object_only is derived with a single text.substring.
#     This avoids list indexing entirely (unsupported in Cloud Workflows).
#   - move_files_to_processed: added shared: [bucket, incoming_prefix,
#     processed_prefix] so parallel branches can read those variables safely.

main:
  params: [event]
  steps:
    # ── 1. Decode the Pub/Sub-wrapped GCS event ────────────────────────
    - init_event:
        assign:
          - project_id: '${sys.get_env("GOOGLE_CLOUD_PROJECT_ID")}'
          - raw_b64: '${event.data.message.data}'
          - raw_json: '${text.decode(base64.decode(raw_b64))}'
          - gcs_event: '${json.decode(raw_json)}'
          - bucket: '${gcs_event.bucket}'
          - manifest_object: '${gcs_event.name}'
          - run_snow_sync: '${default(map.get(event, "run_snow_sync"), false)}'

    # ── 2. Read env config from the same bucket ────────────────────────
    - read_config:
        call: googleapis.storage.v1.objects.get
        args:
          bucket: '${bucket}'
          object: '${text.url_encode("config/workflow-config.json")}'
          alt: media
        result: cfg

    - extract_config:
        assign:
          - environment: '${cfg.environment}'
          - region: '${cfg.region}'
          - chunk_size: '${cfg.dataflow.chunk_size}'
          - template_path: '${cfg.dataflow.template_path}'
          - sa_email: '${cfg.dataflow.service_account}'
          - field_map_gcs: '${cfg.dataflow.field_map_path}'
          - machine_type: '${cfg.dataflow.machine_type}'
          - max_workers: '${cfg.dataflow.max_workers}'
          - subnetwork: '${cfg.dataflow.subnetwork}'
          - batch_size: '${cfg.dataflow.batch_size}'
          - instance_conn: '${cfg.database.instance_connection_name}'
          - db_name: '${cfg.database.db_name}'
          - db_user: '${cfg.database.db_user}'
          - db_schema: '${cfg.database.db_schema}'
          - db_table: '${cfg.database.db_table}'
          - manifest_prefix: '${cfg.manifest_prefix}'
          - incoming_prefix: '${cfg.incoming_prefix}'
          - processed_prefix: '${cfg.processed_prefix}'
          - next_workflow: '${cfg.downstream.next_workflow}'
          - next_wf_location: '${cfg.downstream.next_workflow_location}'
          - all_job_states: []
          - successful_files: []
          - failed_files: []
          - downstream_execution: null

    # ── 3. Defensive: ignore non-manifest uploads ──────────────────────
    - validate_manifest_path:
        switch:
          - condition: '${not(text.match_regex(manifest_object, "^" + manifest_prefix + ".*\\.json$"))}'
            return: '${"Skipped: " + manifest_object + " is not under " + manifest_prefix}'
        next: read_manifest

    # ── 4. Read the manifest from GCS ──────────────────────────────────
    - read_manifest:
        call: googleapis.storage.v1.objects.get
        args:
          bucket: '${bucket}'
          object: '${text.url_encode(manifest_object)}'
          alt: media
        result: manifest

    - extract_run_metadata:
        assign:
          - run_id: '${default(map.get(manifest, "run_id"), manifest_object)}'
          - all_files: '${manifest.files}'
          - file_count: '${len(all_files)}'
          - batch_id: '${uuid.generate()}'

    - log_run_start:
        call: sys.log
        args:
          severity: INFO
          text: '${"[" + environment + "] run " + run_id + ": " + string(file_count) + " files, max " + string(chunk_size) + " in parallel, run_snow_sync=" + string(run_snow_sync)}'

    # ── 5. Launch all Dataflow jobs in parallel with concurrency cap ───
    # Successful and failed files tracked separately.
    # Does NOT raise on individual job failure — collects all results first
    # so successful files can still be moved to processed/.
    - launch_all_jobs:
        parallel:
          shared: [all_job_states, successful_files, failed_files]
          concurrency_limit: '${chunk_size}'
          for:
            value: file_path
            in: '${all_files}'
            steps:
              - log_pre_launch:
                  call: sys.log
                  args:
                    severity: INFO
                    text: '${"[" + environment + "] launching: " + file_path}'

              - launch_one:
                  call: googleapis.dataflow.v1b3.projects.locations.flexTemplates.launch
                  args:
                    projectId: '${project_id}'
                    location: '${region}'
                    body:
                      launchParameter:
                        jobName: '${"pos-etl-" + run_id + "-" + string(int(sys.now() * 1000000))}'
                        containerSpecGcsPath: '${template_path}'
                        parameters:
                          input_file: '${file_path}'
                          instance_connection_name: '${instance_conn}'
                          db_name: '${db_name}'
                          db_schema: '${db_schema}'
                          db_table: '${db_table}'
                          db_user: '${db_user}'
                          field_map_path: '${field_map_gcs}'
                          batch_size: '${batch_size}'
                          batch_id: '${batch_id}'
                          manifest_run_id: '${run_id}'
                        environment:
                          serviceAccountEmail: '${sa_email}'
                          subnetwork: '${subnetwork}'
                          maxWorkers: '${string(max_workers)}'
                          machineType: '${machine_type}'
                          tempLocation: '${"gs://" + bucket + "/dataflow/temp"}'
                          stagingLocation: '${"gs://" + bucket + "/dataflow/staging"}'
                          ipConfiguration: WORKER_IP_PRIVATE
                          additionalExperiments:
                            - "enable_confidential_compute"
                  result: launch_resp

              - poll_until_done:
                  call: poll_dataflow_until_done
                  args:
                    project_id: '${project_id}'
                    region: '${region}'
                    job_id: '${launch_resp.job.id}'
                  result: final_state

              - record_state:
                  assign:
                    - all_job_states: '${list.concat(all_job_states, final_state)}'

              # Track success/failure per file — do NOT raise here
              # so other parallel jobs can still complete
              - classify_result:
                  switch:
                    - condition: '${final_state == "JOB_STATE_DONE"}'
                      assign:
                        - successful_files: '${list.concat(successful_files, [file_path])}'
                    - condition: true
                      steps:
                        - log_job_failure:
                            call: sys.log
                            args:
                              severity: ERROR
                              text: '${"[" + environment + "] FAILED: " + file_path + " ended in state " + final_state}'
                        - record_failure:
                            assign:
                              - failed_files: '${list.concat(failed_files, [file_path])}'

    - log_all_done:
        call: sys.log
        args:
          severity: INFO
          text: '${"[" + environment + "] Dataflow complete. succeeded=" + string(len(successful_files)) + " failed=" + string(len(failed_files))}'

    # ── 6. Move only successfully processed files to processed/ ────────
    # Files move as soon as Dataflow ingestion succeeds. Failed files
    # stay in incoming/ so they can be retried on the next run.
    - check_files_to_move:
        switch:
          - condition: '${len(successful_files) == 0}'
            next: check_for_failures
          - condition: true
            next: move_files_to_processed

    # FIX: added shared: [incoming_prefix, processed_prefix] so the parallel
    # branches can read those variables assigned in extract_config above.
    - move_files_to_processed:
        parallel:
          shared: [incoming_prefix, processed_prefix, bucket]
          for:
            value: file_path
            in: '${successful_files}'
            steps:
              # FIX: avoid all list indexing entirely — bucket is already known
              # from the event (step 1). Strip the "gs://<bucket>/" prefix with
              # text.substring + len() to get object_only directly, no split needed.
              - parse_path:
                  assign:
                    - gs_prefix:   '${"gs://" + bucket + "/"}'
                    - object_only: '${text.substring(file_path, len(gs_prefix), len(file_path))}'
                    - dest_object: '${text.replace_all(object_only, incoming_prefix, processed_prefix)}'
              - rewrite:
                  call: googleapis.storage.v1.objects.rewrite
                  args:
                    sourceBucket: '${bucket}'
                    sourceObject: '${text.url_encode(object_only)}'
                    destinationBucket: '${bucket}'
                    destinationObject: '${text.url_encode(dest_object)}'
              - delete_source:
                  call: googleapis.storage.v1.objects.delete
                  args:
                    bucket: '${bucket}'
                    object: '${text.url_encode(object_only)}'

    - log_files_moved:
        call: sys.log
        args:
          severity: INFO
          text: '${"[" + environment + "] " + string(len(successful_files)) + " file(s) moved to processed/. " + string(len(failed_files)) + " file(s) left in incoming/ for retry."}'

    # ── 7. Raise if any jobs failed (after moving successful files) ────
    - check_for_failures:
        switch:
          - condition: '${len(failed_files) > 0}'
            raise: '${"[" + environment + "] run " + run_id + " — " + string(len(failed_files)) + " job(s) failed: " + json.encode_to_string(failed_files)}'
          - condition: true
            next: check_run_snow_sync

    # ── 8. Check whether to trigger downstream snow_sync ──────────────
    - check_run_snow_sync:
        switch:
          - condition: '${run_snow_sync == true}'
            next: trigger_downstream
          - condition: true
            next: log_snow_sync_skipped

    - log_snow_sync_skipped:
        call: sys.log
        args:
          severity: INFO
          text: '${"[" + environment + "] snow_sync skipped (run_snow_sync=false)"}'
        next: done

    # ── 9. Trigger downstream workflow (snow_sync) ─────────────────────
    - trigger_downstream:
        steps:
          - build_payload:
              assign:
                - downstream_map:
                    pos_run_id: '${run_id}'
                    pos_files: '${successful_files}'
                    upstream: "pos_dataflow_workflow"
                    environment: '${environment}'
          - encode_argument:
              assign:
                - downstream_args: '${json.encode_to_string(downstream_map)}'
          - create_execution:
              call: googleapis.workflowexecutions.v1.projects.locations.workflows.executions.create
              args:
                parent: '${"projects/" + project_id + "/locations/" + next_wf_location + "/workflows/" + next_workflow}'
                body:
                  argument: '${downstream_args}'
              result: downstream_execution

    # ── 10. Wait for downstream to complete ────────────────────────────
    - wait_for_downstream:
        call: googleapis.workflowexecutions.v1.projects.locations.workflows.executions.get
        args:
          name: '${downstream_execution.name}'
        result: downstream_result
        next: check_downstream_status

    - check_downstream_status:
        switch:
          - condition: '${downstream_result.state == "SUCCEEDED"}'
            next: done
          - condition: '${downstream_result.state == "FAILED"}'
            raise: '${downstream_result.error}'
          - condition: true
            next: poll_delay

    - poll_delay:
        call: sys.sleep
        args:
          seconds: 15
        next: wait_for_downstream

    # ── 11. Success terminal ───────────────────────────────────────────
    - done:
        switch:
          - condition: '${run_snow_sync == true}'
            return:
              status: "success"
              environment: '${environment}'
              run_id: '${run_id}'
              file_count: '${file_count}'
              successful_files: '${len(successful_files)}'
              failed_files: '${len(failed_files)}'
              run_snow_sync: '${run_snow_sync}'
              downstream_execution: '${downstream_execution.name}'
          - condition: true
            return:
              status: "success"
              environment: '${environment}'
              run_id: '${run_id}'
              file_count: '${file_count}'
              successful_files: '${len(successful_files)}'
              failed_files: '${len(failed_files)}'
              run_snow_sync: '${run_snow_sync}'
              downstream_execution: "skipped"


# ─────────────────────────────────────────────────────────────────────
# Subworkflow — poll one Dataflow job until terminal state
# ─────────────────────────────────────────────────────────────────────
poll_dataflow_until_done:
  params: [project_id, region, job_id]
  steps:
    - get_status:
        call: googleapis.dataflow.v1b3.projects.locations.jobs.get
        args:
          projectId: '${project_id}'
          location: '${region}'
          jobId: '${job_id}'
          view: "JOB_VIEW_SUMMARY"
        result: job
    - check_terminal:
        switch:
          - condition: '${job.currentState in ["JOB_STATE_DONE", "JOB_STATE_FAILED", "JOB_STATE_CANCELLED", "JOB_STATE_UPDATED", "JOB_STATE_DRAINED"]}'
            return: '${job.currentState}'
    - sleep_and_retry:
        call: sys.sleep
        args:
          seconds: 30
        next: get_status