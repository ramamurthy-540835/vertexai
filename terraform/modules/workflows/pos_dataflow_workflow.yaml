# pos_dataflow_workflow.yaml — with checkpoint/resume support
#
# CHECKPOINT MODEL:
#   State stored at gs://<bucket>/state/<run_id>.json
#   { "stage": "dataflow_done" | "moved" | "snow_sync_done",
#     "successful_files": [...], "failed_files": [...], "batch_id": "..." }
#
# On every execution:
#   - Read state file (if exists) to determine where to resume
#   - Skip stages that are already complete
#   - Write/update state after each successful stage

main:
  params: [event]
  steps:
    # ── 1. Decode the Pub/Sub-wrapped GCS event ────────────────────────
    - init_event:
        assign:
          - project_id: '${sys.get_env("GOOGLE_CLOUD_PROJECT_ID")}'
          - raw_b64: '${event.data.message.data}'
          - raw_json: '${text.decode(base64.decode(raw_b64))}'
          - gcs_event: '${json.decode(raw_json)}'
          - bucket: '${gcs_event.bucket}'
          - manifest_object: '${gcs_event.name}'
          - run_snow_sync: '${default(map.get(event, "run_snow_sync"), true)}'

    # ── 2. Read env config from the same bucket ────────────────────────
    - read_config:
        call: googleapis.storage.v1.objects.get
        args:
          bucket: '${bucket}'
          object: '${text.url_encode("config/workflow-config.json")}'
          alt: media
        result: cfg

    - extract_config:
        assign:
          - environment: '${cfg.environment}'
          - region: '${cfg.region}'
          - chunk_size: '${cfg.dataflow.chunk_size}'
          - template_path: '${cfg.dataflow.template_path}'
          - sa_email: '${cfg.dataflow.service_account}'
          - field_map_gcs: '${cfg.dataflow.field_map_path}'
          - machine_type: '${cfg.dataflow.machine_type}'
          - max_workers: '${cfg.dataflow.max_workers}'
          - subnetwork: '${cfg.dataflow.subnetwork}'
          - batch_size: '${cfg.dataflow.batch_size}'
          - instance_conn: '${cfg.database.instance_connection_name}'
          - db_name: '${cfg.database.db_name}'
          - db_user: '${cfg.database.db_user}'
          - db_schema: '${cfg.database.db_schema}'
          - db_table: '${cfg.database.db_table}'
          - manifest_prefix: '${cfg.manifest_prefix}'
          - incoming_prefix: '${cfg.incoming_prefix}'
          - processed_prefix: '${cfg.processed_prefix}'
          - next_workflow: '${cfg.downstream.next_workflow}'
          - next_wf_location: '${cfg.downstream.next_workflow_location}'
          - successful_files: []
          - failed_files: []
          - downstream_execution: null
          - checkpoint_stage: "none"   # tracks where to resume from

    # ── 3. Defensive: ignore non-manifest uploads ──────────────────────
    - validate_manifest_path:
        switch:
          - condition: '${not(text.match_regex(manifest_object, "^" + manifest_prefix + ".*\\.json$"))}'
            return: '${"Skipped: " + manifest_object + " is not under " + manifest_prefix}'
        next: read_manifest

    # ── 4. Read the manifest from GCS ──────────────────────────────────
    - read_manifest:
        call: googleapis.storage.v1.objects.get
        args:
          bucket: '${bucket}'
          object: '${text.url_encode(manifest_object)}'
          alt: media
        result: manifest

    - extract_run_metadata:
        assign:
          - run_id: '${default(map.get(manifest, "run_id"), manifest_object)}'
          - all_files: '${manifest.files}'
          - file_count: '${len(all_files)}'
          - state_object: '${"state/" + run_id + ".json"}'

    # ── 4b. CHECKPOINT — read state file if it exists ──────────────────
    - try_read_state:
        try:
          call: googleapis.storage.v1.objects.get
          args:
            bucket: '${bucket}'
            object: '${text.url_encode(state_object)}'
            alt: media
          result: state
        except:
          as: e
          steps:
            - no_state_yet:
                assign:
                  - state: null
                  - batch_id: '${uuid.generate()}'

    - apply_checkpoint:
        switch:
          # State exists → resume from where we left off
          - condition: '${state != null}'
            steps:
              - load_checkpoint:
                  assign:
                    - checkpoint_stage: '${state.stage}'
                    - successful_files: '${default(map.get(state, "successful_files"), [])}'
                    - failed_files: '${default(map.get(state, "failed_files"), [])}'
                    - batch_id: '${default(map.get(state, "batch_id"), uuid.generate())}'
              - log_resume:
                  call: sys.log
                  args:
                    severity: INFO
                    text: '${"[" + environment + "] RESUMING run " + run_id + " from stage=" + checkpoint_stage + " (succeeded=" + string(len(successful_files)) + " failed=" + string(len(failed_files)) + ")"}'

    - log_run_start:
        call: sys.log
        args:
          severity: INFO
          text: '${"[" + environment + "] run " + run_id + ": " + string(file_count) + " files, stage=" + checkpoint_stage + ", run_snow_sync=" + string(run_snow_sync)}'

    # ── 5. ROUTE based on checkpoint stage ─────────────────────────────
    - route_by_checkpoint:
        switch:
          - condition: '${checkpoint_stage == "snow_sync_done"}'
            next: done
          - condition: '${checkpoint_stage == "moved"}'
            next: check_for_failures
          - condition: '${checkpoint_stage == "dataflow_done"}'
            next: check_files_to_move
          - condition: true
            next: launch_all_jobs

    # ── 6. Launch all Dataflow jobs in parallel ────────────────────────
    - launch_all_jobs:
        parallel:
          shared: [successful_files, failed_files]
          concurrency_limit: '${chunk_size}'
          for:
            value: file_path
            in: '${all_files}'
            steps:
              - log_pre_launch:
                  call: sys.log
                  args:
                    severity: INFO
                    text: '${"[" + environment + "] launching: " + file_path}'

              - launch_one:
                  call: googleapis.dataflow.v1b3.projects.locations.flexTemplates.launch
                  args:
                    projectId: '${project_id}'
                    location: '${region}'
                    body:
                      launchParameter:
                        jobName: '${"pos-etl-" + run_id + "-" + string(int(sys.now() * 1000000))}'
                        containerSpecGcsPath: '${template_path}'
                        parameters:
                          input_file: '${file_path}'
                          instance_connection_name: '${instance_conn}'
                          db_name: '${db_name}'
                          db_schema: '${db_schema}'
                          db_table: '${db_table}'
                          db_user: '${db_user}'
                          field_map_path: '${field_map_gcs}'
                          batch_size: '${batch_size}'
                          batch_id: '${batch_id}'
                          manifest_run_id: '${run_id}'
                        environment:
                          serviceAccountEmail: '${sa_email}'
                          subnetwork: '${subnetwork}'
                          maxWorkers: '${string(max_workers)}'
                          machineType: '${machine_type}'
                          tempLocation: '${"gs://" + bucket + "/dataflow/temp"}'
                          stagingLocation: '${"gs://" + bucket + "/dataflow/staging"}'
                          ipConfiguration: WORKER_IP_PRIVATE
                          additionalExperiments:
                            - "enable_confidential_compute"
                  result: launch_resp

              - poll_until_done:
                  call: poll_dataflow_until_done
                  args:
                    project_id: '${project_id}'
                    region: '${region}'
                    job_id: '${launch_resp.job.id}'
                  result: final_state

              - classify_result:
                  switch:
                    - condition: '${final_state == "JOB_STATE_DONE"}'
                      assign:
                        - successful_files: '${successful_files + [file_path]}'
                    - condition: true
                      steps:
                        - log_job_failure:
                            call: sys.log
                            args:
                              severity: ERROR
                              text: '${"[" + environment + "] FAILED: " + file_path + " ended in state " + final_state}'
                        - record_failure:
                            assign:
                              - failed_files: '${failed_files + [file_path]}'

    - log_all_done:
        call: sys.log
        args:
          severity: INFO
          text: '${"[" + environment + "] Dataflow complete. succeeded=" + string(len(successful_files)) + " failed=" + string(len(failed_files))}'

    # ── 6b. CHECKPOINT — save state after Dataflow ─────────────────────
    - save_checkpoint_dataflow:
        call: save_state
        args:
          bucket: '${bucket}'
          state_object: '${state_object}'
          stage: "dataflow_done"
          successful_files: '${successful_files}'
          failed_files: '${failed_files}'
          batch_id: '${batch_id}'

    # ── 7. Move only successfully processed files to processed/ ────────
    - check_files_to_move:
        switch:
          - condition: '${len(successful_files) == 0}'
            next: check_for_failures
          - condition: true
            next: move_files_to_processed

    - move_files_to_processed:
        parallel:
          shared: [incoming_prefix, processed_prefix, bucket]
          for:
            value: file_path
            in: '${successful_files}'
            steps:
              - parse_path:
                  assign:
                    - gs_prefix:   '${"gs://" + bucket + "/"}'
                    - object_only: '${text.substring(file_path, len(gs_prefix), len(file_path))}'
                    - dest_object: '${text.replace_all(object_only, incoming_prefix, processed_prefix)}'
              # Idempotent move: check if already at destination first
              - check_dest:
                  try:
                    call: googleapis.storage.v1.objects.get
                    args:
                      bucket: '${bucket}'
                      object: '${text.url_encode(dest_object)}'
                    result: dest_check
                  except:
                    as: e
                    steps:
                      - mark_not_at_dest:
                          assign:
                            - dest_check: null
              - conditional_move:
                  switch:
                    - condition: '${dest_check == null}'
                      steps:
                        - rewrite:
                            call: googleapis.storage.v1.objects.rewrite
                            args:
                              sourceBucket: '${bucket}'
                              sourceObject: '${text.url_encode(object_only)}'
                              destinationBucket: '${bucket}'
                              destinationObject: '${text.url_encode(dest_object)}'
                        - delete_source:
                            try:
                              call: googleapis.storage.v1.objects.delete
                              args:
                                bucket: '${bucket}'
                                object: '${text.url_encode(object_only)}'
                            except:
                              as: e
                              steps:
                                - log_already_deleted:
                                    call: sys.log
                                    args:
                                      severity: INFO
                                      text: '${"Source already deleted: " + object_only}'

    - log_files_moved:
        call: sys.log
        args:
          severity: INFO
          text: '${"[" + environment + "] " + string(len(successful_files)) + " file(s) moved to processed/."}'

    # ── 7b. CHECKPOINT — save state after move ─────────────────────────
    - save_checkpoint_moved:
        call: save_state
        args:
          bucket: '${bucket}'
          state_object: '${state_object}'
          stage: "moved"
          successful_files: '${successful_files}'
          failed_files: '${failed_files}'
          batch_id: '${batch_id}'

    # ── 8. Raise if any jobs failed ────────────────────────────────────
    - check_for_failures:
        switch:
          - condition: '${len(failed_files) > 0}'
            raise: '${"[" + environment + "] run " + run_id + " — " + string(len(failed_files)) + " job(s) failed: " + json.encode_to_string(failed_files)}'
          - condition: true
            next: check_run_snow_sync

    # ── 9. Check whether to trigger downstream snow_sync ──────────────
    - check_run_snow_sync:
        switch:
          - condition: '${run_snow_sync == true}'
            next: trigger_downstream
          - condition: true
            next: skip_snow_sync

    - skip_snow_sync:
        call: sys.log
        args:
          severity: INFO
          text: '${"[" + environment + "] snow_sync skipped (run_snow_sync=false)"}'
        next: save_checkpoint_snow_sync

    # ── 10. Trigger downstream workflow (snow_sync) ────────────────────
    - trigger_downstream:
        steps:
          - build_payload:
              assign:
                - downstream_map:
                    pos_run_id: '${run_id}'
                    pos_files: '${successful_files}'
                    upstream: "pos_dataflow_workflow"
                    environment: '${environment}'
          - encode_argument:
              assign:
                - downstream_args: '${json.encode_to_string(downstream_map)}'
          - create_execution:
              call: googleapis.workflowexecutions.v1.projects.locations.workflows.executions.create
              args:
                parent: '${"projects/" + project_id + "/locations/" + next_wf_location + "/workflows/" + next_workflow}'
                body:
                  argument: '${downstream_args}'
              result: downstream_execution

    # ── 11. Wait for downstream to complete ────────────────────────────
    - wait_for_downstream:
        call: googleapis.workflowexecutions.v1.projects.locations.workflows.executions.get
        args:
          name: '${downstream_execution.name}'
        result: downstream_result
        next: check_downstream_status

    - check_downstream_status:
        switch:
          - condition: '${downstream_result.state == "SUCCEEDED"}'
            next: save_checkpoint_snow_sync
          - condition: '${downstream_result.state == "FAILED"}'
            raise: '${downstream_result.error}'
          - condition: true
            next: poll_delay

    - poll_delay:
        call: sys.sleep
        args:
          seconds: 15
        next: wait_for_downstream

    # ── 11b. CHECKPOINT — save state after snow_sync ───────────────────
    - save_checkpoint_snow_sync:
        call: save_state
        args:
          bucket: '${bucket}'
          state_object: '${state_object}'
          stage: "snow_sync_done"
          successful_files: '${successful_files}'
          failed_files: '${failed_files}'
          batch_id: '${batch_id}'
        next: done

    # ── 12. Success terminal ───────────────────────────────────────────
    - done:
        return:
          status: "success"
          environment: '${environment}'
          run_id: '${run_id}'
          file_count: '${file_count}'
          successful_files: '${len(successful_files)}'
          failed_files: '${len(failed_files)}'
          run_snow_sync: '${run_snow_sync}'
          resumed_from_stage: '${checkpoint_stage}'


# ─────────────────────────────────────────────────────────────────────
# Subworkflow — save state to GCS
# ─────────────────────────────────────────────────────────────────────
save_state:
  params: [bucket, state_object, stage, successful_files, failed_files, batch_id]
  steps:
    - build_state:
        assign:
          - state_map:
              stage: '${stage}'
              successful_files: '${successful_files}'
              failed_files: '${failed_files}'
              batch_id: '${batch_id}'
              updated_at: '${time.format(sys.now())}'
    - write_state:
        call: googleapis.storage.v1.objects.insert
        args:
          bucket: '${bucket}'
          uploadType: "media"
          name: '${state_object}'
          body: '${state_map}'
    - log_checkpoint:
        call: sys.log
        args:
          severity: INFO
          text: '${"CHECKPOINT saved: stage=" + stage + " object=" + state_object}'

# ─────────────────────────────────────────────────────────────────────
# Subworkflow — poll one Dataflow job until terminal state
# ─────────────────────────────────────────────────────────────────────
poll_dataflow_until_done:
  params: [project_id, region, job_id]
  steps:
    - get_status:
        call: googleapis.dataflow.v1b3.projects.locations.jobs.get
        args:
          projectId: '${project_id}'
          location: '${region}'
          jobId: '${job_id}'
          view: "JOB_VIEW_SUMMARY"
        result: job
    - check_terminal:
        switch:
          - condition: '${job.currentState in ["JOB_STATE_DONE", "JOB_STATE_FAILED", "JOB_STATE_CANCELLED", "JOB_STATE_UPDATED", "JOB_STATE_DRAINED"]}'
            return: '${job.currentState}'
    - sleep_and_retry:
        call: sys.sleep
        args:
          seconds: 30
        next: get_status