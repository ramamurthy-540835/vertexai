main:
  params: [input]

  steps:
    - init:
        assign:
          - project_id: ${sys.get_env("GOOGLE_CLOUD_PROJECT_ID")}
          - job_location: us-central1
          - job_name: lead-match-job
          - job_name_par: lead-match-job-par
          - match_id: ${uuid.generate()}

    # Run lead + POS ingestion in parallel
    - load_data_parallel:
        parallel:
          branches:

            - load_leads_branch:
                steps:
                  - load_lead_from_cloud_sql:
                      call: googleapis.run.v1.namespaces.jobs.run
                      args:
                        name: ${"namespaces/" + project_id + "/jobs/" + job_name}
                        location: ${job_location}
                        body:
                          overrides:
                            containerOverrides:
                              args:
                                - run.py
                                - ingest_leads_from_cloud_sql
                        connector_params:
                          timeout: 72000
                          polling_policy:
                            initial_delay: 5
                            multiplier: 1.5
                            max_delay: 60
                          skip_polling: false

            - load_pos_branch:
                steps:
                  - load_pos_from_cloud_sql:
                      call: googleapis.run.v1.namespaces.jobs.run
                      args:
                        name: ${"namespaces/" + project_id + "/jobs/" + job_name}
                        location: ${job_location}
                        body:
                          overrides:
                            containerOverrides:
                              args:
                                - run.py
                                - ingest_pos_from_cloud_sql
                        connector_params:
                          timeout: 72000
                          polling_policy:
                            initial_delay: 5
                            multiplier: 1.5
                            max_delay: 60
                          skip_polling: false

    # Runs only after BOTH parallel branches complete
    - lead_matching:
        call: googleapis.run.v1.namespaces.jobs.run
        args:
          name: ${"namespaces/" + project_id + "/jobs/" + job_name}
          location: ${job_location}
          body:
            overrides:
              containerOverrides:
                args:
                  - run.py
                  - primary_matching
                env:
                  - name: MATCH_ID
                    value: ${match_id}
          connector_params:
            timeout: 72000
            polling_policy:
              initial_delay: 5
              multiplier: 1.5
              max_delay: 60
            skip_polling: false

    # Run ServiceNow update + DB update in parallel
    - update_parallel:
        parallel:
          branches:

            - update_servicenow_branch:
                steps:
                  - update_service_now:
                      call: googleapis.run.v1.namespaces.jobs.run
                      args:
                        name: ${"namespaces/" + project_id + "/jobs/" + job_name}
                        location: ${job_location}
                        body:
                          overrides:
                            containerOverrides:
                              args:
                                - run.py
                                - update_service_now
                        connector_params:
                          timeout: 72000
                          polling_policy:
                            initial_delay: 5
                            multiplier: 1.5
                            max_delay: 60
                          skip_polling: false

            - update_database_branch:
                steps:
                  - update_cloud_sql:
                      call: googleapis.run.v1.namespaces.jobs.run
                      args:
                        name: ${"namespaces/" + project_id + "/jobs/" + job_name}
                        location: ${job_location}
                        body:
                          overrides:
                            containerOverrides:
                              args:
                                - run.py
                                - update_database
                        connector_params:
                          timeout: 72000
                          polling_policy:
                            initial_delay: 5
                            multiplier: 1.5
                            max_delay: 60
                          skip_polling: false

    # Runs only after BOTH updates complete
    - temporary_file_deletion:
        call: googleapis.run.v1.namespaces.jobs.run
        args:
          name: ${"namespaces/" + project_id + "/jobs/" + job_name}
          location: ${job_location}
          body:
            overrides:
              containerOverrides:
                args:
                  - run.py
                  - temporary_file_deletion
                env:
                  - name: MATCH_ID
                    value: ${match_id}
          connector_params:
            timeout: 72000
            polling_policy:
              initial_delay: 5
              multiplier: 1.5
              max_delay: 60
            skip_polling: false

    - success:
        return:
          status: "success"
          match_id: ${match_id}