main:
  params: [args]

  steps:
    - log_raw_input:
        call: sys.log
        args:
          text: ${"[TEST] Raw args received = " + json.encode_to_string(args)}
          severity: INFO

    - check_format:
        switch:
          # Real GCS notification — raw JSON, has "bucket" directly in args
          - condition: ${"bucket" in args}
            next: handle_raw_gcs
          # Pub/Sub push envelope — has message.data base64 encoded
          - condition: ${"message" in args}
            next: handle_pubsub_envelope
        next: log_unknown_format

    - handle_raw_gcs:
        steps:
          - assign_raw:
              assign:
                - gcs_event: ${args}
          - next_step:
              next: log_file

    - handle_pubsub_envelope:
        steps:
          - decode:
              assign:
                - raw_data: ${args.message.data}
                - decoded_text: ${text.decode(base64.decode(raw_data))}
                - gcs_event: ${json.decode(decoded_text)}
          - next_step:
              next: log_file

    - log_file:
        call: sys.log
        args:
          text: ${"[TEST] File = gs://" + gcs_event.bucket + "/" + gcs_event.name}
          severity: INFO

    - success:
        return:
          status: "success"
          bucket: ${gcs_event.bucket}
          file: ${gcs_event.name}

    - log_unknown_format:
        steps:
          - warn:
              call: sys.log
              args:
                text: ${"[TEST] Unknown format = " + json.encode_to_string(args)}
                severity: WARNING
          - end:
              return:
                status: "unknown_format"