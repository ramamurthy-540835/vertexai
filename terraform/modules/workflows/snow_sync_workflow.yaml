main:
  params: [input]
  steps:
    - init:
        assign:
          - project_id: ${sys.get_env("GOOGLE_CLOUD_PROJECT_ID")}
          - job_location: us-central1
          - job_name: snow-sync-job
          - job_name_par: snow-sync-job-par
          - batch_id: ${default(map.get(input, "resume_batch_id"), uuid.generate())}
          - start_at: ${default(map.get(input, "start_at"), "leads_to_gcs")}
          - run_lead_match: ${default(map.get(input, "run_lead_match"), true)}

    - determine_start_point:
        switch:
          - condition: ${start_at == "leads_to_db"}
            next: load_lead_to_db
          - condition: true # Default / full rerun
            next: load_leads_from_snow_to_gcs

    - load_leads_from_snow_to_gcs:
        call: googleapis.run.v1.namespaces.jobs.run
        args:
          name: ${"namespaces/" + project_id + "/jobs/" + job_name}
          location: ${job_location}
          body:
            overrides:
              containerOverrides:
                env:
                  - name: BATCH_ID
                    value: ${batch_id}
                args:
                  - main.py
                  - snow_to_gcs_lead
          connector_params:
            timeout: 72000
            polling_policy:
              initial_delay: 5
              multiplier: 1.5
              max_delay: 60
            skip_polling: false
        next: load_lead_to_db

    - load_lead_to_db:
        call: googleapis.run.v1.namespaces.jobs.run
        args:
          name: ${"namespaces/" + project_id + "/jobs/" + job_name}
          location: ${job_location}
          body:
            overrides:
              containerOverrides:
                env:
                  - name: BATCH_ID
                    value: ${batch_id}
                args:
                  - main.py
                  - lead_to_db
          connector_params:
            timeout: 72000
            polling_policy:
              initial_delay: 5
              multiplier: 1.5
              max_delay: 60
            skip_polling: false
        next: check_run_lead_match

    - check_run_lead_match:
        switch:
          - condition: ${run_lead_match == true}
            next: trigger_lead_match_workflow
          - condition: true
            next: done

    - trigger_lead_match_workflow:
        steps:
          - build_map:
              assign:
                - lead_match_map:
                    batch_id: ${batch_id}
          - encode_argument:
              assign:
                - lead_match_args: ${json.encode_to_string(lead_match_map)}
          - create_execution:
              call: googleapis.workflowexecutions.v1.projects.locations.workflows.executions.create
              args:
                parent: ${"projects/" + project_id + "/locations/" + job_location + "/workflows/lead_match_workflow"}
                body:
                  argument: ${lead_match_args}
                connector_params:
                  skip_polling: true
              result: lead_match_execution

    - wait_for_lead_match:
        call: googleapis.workflowexecutions.v1.projects.locations.workflows.executions.get
        args:
          name: ${lead_match_execution.name}
        result: lead_match_result
        next: check_lead_match_status

    - check_lead_match_status:
        switch:
          - condition: ${lead_match_result.state == "SUCCEEDED"}
            next: done
          - condition: ${lead_match_result.state == "FAILED"}
            raise: ${lead_match_result.error}
          - condition: true
            next: poll_delay

    - poll_delay:
        call: sys.sleep
        args:
          seconds: 15
        next: wait_for_lead_match

    - done:
        switch:
          - condition: ${run_lead_match == true}
            return:
              status: "success"
              batch_id: ${batch_id}
              lead_match_execution: ${lead_match_execution.name}
          - condition: true
            return:
              status: "success"
              batch_id: ${batch_id}
              lead_match_execution: "skipped"