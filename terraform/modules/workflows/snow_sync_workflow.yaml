main:
  params: [input]
  steps:
    - init:
        assign:
          - project_id: ${sys.get_env("GOOGLE_CLOUD_PROJECT_ID")}
          - job_location: us-central1
          - job_name: snow-sync-job
          - job_name_par: snow-sync-job-par
          - batch_id: ${default(map.get(input, "resume_batch_id"), uuid.generate())}
          - start_at: ${default(map.get(input, "start_at"), "leads_to_gcs")}
          
    - determine_start_point:
        switch:
          - condition: ${start_at == "leads_to_db"}
            next: load_lead_to_db
          - condition: true # Default / full rerun
            next: load_leads_from_snow_to_gcs

    - load_leads_from_snow_to_gcs:
        call: googleapis.run.v1.namespaces.jobs.run
        args:
          name: ${"namespaces/" + project_id + "/jobs/" + job_name}
          location: ${job_location}
          body:
            overrides:
              containerOverrides:
                env:
                  - name: BATCH_ID
                    value: ${batch_id}
                args:
                  - main.py
                  - snow_to_gcs_lead
          connector_params:
            timeout: 72000
            polling_policy:
                initial_delay: 5              # Start polling after 5 seconds
                multiplier: 1.5               # Increase delay by 1.5x after each poll
                max_delay: 60                 # Max 60 seconds between polls
            skip_polling: false
  
    - load_lead_to_db:
        call: googleapis.run.v1.namespaces.jobs.run
        args:
          name: ${"namespaces/" + project_id + "/jobs/" + job_name}
          location: ${job_location}
          body:
            overrides:
              containerOverrides:
                env:
                  - name: BATCH_ID
                    value: ${batch_id}
                args:
                  - main.py
                  - lead_to_db
          connector_params:
            timeout: 72000
            polling_policy:
                initial_delay: 5              # Start polling after 5 seconds
                multiplier: 1.5               # Increase delay by 1.5x after each poll
                max_delay: 60                 # Max 60 seconds between polls
            skip_polling: false

    - trigger_lead_match_workflow:
        steps:
          - build_argument:
              assign:
                - lead_match_args: ${json.encode_to_string({"batch_id": batch_id})}
          - create_execution:
              call: googleapis.workflowexecutions.v1.projects.locations.workflows.executions.create
              args:
                parent: ${"projects/" + project_id + "/locations/" + job_location + "/workflows/lead_match_workflow"}
                body:
                  argument: ${lead_match_args}
              result: lead_match_execution
    
    - wait_for_lead_match:
        call: googleapis.workflowexecutions.v1.projects.locations.workflows.executions.get
        args:
          name: ${lead_match_execution.name}
        result: lead_match_result
        next: check_lead_match_status

    - check_lead_match_status:
        switch:
          - condition: ${lead_match_result.state == "SUCCEEDED"}
            next: done
          - condition: ${lead_match_result.state == "FAILED"}
            raise: ${lead_match_result.error}
          - condition: true # Still running
            next: poll_delay
    
    - poll_delay:
        call: sys.sleep
        args:
          seconds: 15
        next: wait_for_lead_match

    - done:
        return:
          status: "success"
          batch_id: ${batch_id}
          lead_match_execution: ${lead_match_execution.name}