[QUERY]
query_leads = SELECT lead.lead_id,lead.membership_number,lead.warehouse_number,
              lead.updated_date,lead.fiscal_year as fiscal_year_lead,lead.fiscal_period as fiscal_period_lead,
              account.business_name business_name,account.address_line_one,account.address_line_two,account.city,
              account.state,account.zip_code,account.phone,account.email,
              contact.first_name,contact.last_name FROM lead_mgmt_adt.lead lead
              join lead_mgmt_adt.account account on lead.account_id = account.account_id
              left join lead_mgmt_adt.contact contact on lead.lead_id = contact.lead_id
              where lead.lead_status = 'Open'
              and (COALESCE(account.business_name, '') <> ''  OR lead.membership_number IS NOT NULL
              OR COALESCE(account.address_line_one, '') <> '')
              and lead.fiscal_year

query_pos = SELECT transaction.pos_id,COALESCE(transaction.account_number,0) as account_number,transaction.membership_number,transaction.warehouse_number,
            transaction.business_name,transaction.address_line_one,transaction.address_line_two,
            transaction.city,transaction.state,transaction.zip_code,transaction.phone,transaction.first_name,
            transaction.last_name,email,transaction.updated_date,transaction.fiscal_year as fiscal_year_transaction,transaction.fiscal_period as fiscal_period_transaction,
            transaction.week as week from lead_mgmt_adt.transaction transaction
            left join lead_mgmt_adt.lead lead on transaction.lead_id = lead.lead_id
            WHERE (transaction.lead_id is null or lead.confidence_level!='High')
            and (COALESCE(transaction.business_name, '') <> ''  OR transaction.membership_number IS NOT NULL
            OR COALESCE(transaction.address_line_one, '') <> '')
            and transaction.fiscal_year

query_leads_insert_ids = SELECT a.lead_id
                   FROM lead_mgmt_adt.lead  a
                   LEFT JOIN lead_mgmt_adt.leads_embeddings b  ON CAST(a.lead_id  AS varchar) = b.lead_id
                   WHERE b.lead_id IS NULL
                   AND a.fiscal_year

query_pos_inserts_ids = SELECT a.pos_id
                        FROM lead_mgmt_adt.transaction a
                        LEFT JOIN lead_mgmt_adt.pos_embeddings b
                        ON a.pos_id = b.pos_id
                        WHERE b.pos_id IS NULL
                        AND a.fiscal_year

query_leads_update_ids = SELECT a.lead_id
                         FROM lead_mgmt_adt.lead  a
                         LEFT JOIN lead_mgmt_adt.leads_embeddings b  ON CAST(a.lead_id  AS varchar) = b.lead_id
                         INNER JOIN lead_mgmt_adt.account c ON c.account_id = a.account_id
                         LEFT JOIN lead_mgmt_adt.contact d ON d.lead_id = CAST(a.lead_id  AS varchar)
                         WHERE
                         (d.updated_date > b.updated_date OR c.updated_date > b.updated_date)
                         AND a.fiscal_year



query_fuzzy_wh = SELECT
                l.lead_id,
                s.pos_id,
                s.account_number,
                (1 - (l.combined_embedding <=> s.combined_embedding)) * 100 AS combined_field_score,
                (1 - (l.address_embedding <=> s.address_embedding)) * 100 AS full_address_score,
                (1 - (COALESCE(NULLIF(l.name_embedding <=> s.name_embedding, 'NaN'::float), 0))) * 100 AS business_name_score
                FROM
                lead_mgmt_adt.leads_embeddings l
               JOIN
                lead_mgmt_adt.pos_embeddings s
                ON (l.warehouse_number = s.warehouse_number)
                AND s.fiscal_year = :fiscal_year_sales
                AND (l.fiscal_year < s.fiscal_year OR
                     (l.fiscal_year = s.fiscal_year AND l.fiscal_period <= s.fiscal_period))
                WHERE
                l.lead_id IN :leads_id_batch
                AND (l.combined_embedding <=> s.combined_embedding) <= 0.2 AND l.warehouse_number is not null;

query_fuzzy_null_wh = SELECT
                    l.lead_id,
                    s.pos_id,
                    s.account_number,
                    (1 - (l.combined_embedding <=> s.combined_embedding)) * 100 AS combined_field_score,
                    (1 - (l.address_embedding <=> s.address_embedding)) * 100 AS full_address_score,
                    (1 - (COALESCE(NULLIF(l.name_embedding <=> s.name_embedding, 'NaN'::float), 0))) * 100 AS business_name_score
                    FROM
                    lead_mgmt_adt.leads_embeddings l
                   JOIN
                    lead_mgmt_adt.pos_embeddings s
                   on  s.fiscal_year = :fiscal_year_sales
                    AND (l.fiscal_year < s.fiscal_year OR
                         (l.fiscal_year = s.fiscal_year AND l.fiscal_period <= s.fiscal_period))
                    WHERE
                    l.lead_id IN :leads_id_batch
                    AND (l.combined_embedding <=> s.combined_embedding) <= 0.2 AND l.warehouse_number is null;

create_temp_table_transaction=
        DROP TABLE IF EXISTS lead_mgmt_adt.temp_transaction;
        CREATE TABLE  lead_mgmt_adt.temp_transaction (
        pos_id varchar(150) PRIMARY KEY,
        lead_id varchar(150),
        match_type varchar(100),
        match_score varchar(100),
        updated_date timestamp DEFAULT current_timestamp,
        updated_by VARCHAR(100)
        )

create_temp_table_lead=
       DROP TABLE IF EXISTS lead_mgmt_adt.temp_lead;
       CREATE TABLE  lead_mgmt_adt.temp_lead (
       lead_id varchar(150) PRIMARY KEY,
       account_number bigint,
       lead_status varchar(100),
       confidence_level varchar(100),
       updated_date timestamp DEFAULT current_timestamp,
       updated_by VARCHAR(100),
       closed_fiscal_period INTEGER,
       closed_fiscal_year INTEGER
       )


insert_query_transaction=
        INSERT INTO lead_mgmt_adt.transaction (
        pos_id,
        lead_id,
        match_type,
        match_score,
        updated_by,
        updated_date
    )
    SELECT
        pos_id,
        lead_id,
        match_type,
        match_score::double precision,
        updated_by,
        updated_date::timestamp without time zone
    FROM lead_mgmt_adt.temp_transaction
    ON CONFLICT (pos_id)
    DO UPDATE SET
        lead_id = EXCLUDED.lead_id,
        updated_date = EXCLUDED.updated_date,
        updated_by = EXCLUDED.updated_by,
        match_type = EXCLUDED.match_type,
        match_score = EXCLUDED.match_score
    WHERE lead_mgmt_adt.transaction.match_score IS NULL
       OR lead_mgmt_adt.transaction.match_score < EXCLUDED.match_score;


insert_query_lead =
        INSERT INTO lead_mgmt_adt.lead (
        lead_id,
        account_number,
        lead_status,
        confidence_level,
        updated_date,
        updated_by,
        closed_fiscal_period,
        closed_fiscal_year
    )
    SELECT
        lead_id,
        account_number,
        lead_status,
        confidence_level,
        updated_date::timestamp without time zone,
        updated_by,
        closed_fiscal_period,
        closed_fiscal_year
    FROM lead_mgmt_adt.temp_lead
    ON CONFLICT (lead_id)
    DO UPDATE SET
        account_number= EXCLUDED.account_number,
        lead_status = EXCLUDED.lead_status,
        confidence_level = EXCLUDED.confidence_level,
        updated_date = EXCLUDED.updated_date,
        updated_by = EXCLUDED.updated_by,
        closed_fiscal_period = CASE
            WHEN lead_mgmt_adt.lead.closed_fiscal_period IS NULL THEN EXCLUDED.closed_fiscal_period
            ELSE lead_mgmt_adt.lead.closed_fiscal_period
        END,
        closed_fiscal_year = CASE
            WHEN lead_mgmt_adt.lead.closed_fiscal_year IS NULL THEN EXCLUDED.closed_fiscal_year
            ELSE lead_mgmt_adt.lead.closed_fiscal_year
        END
    WHERE
        (
            CASE lead_mgmt_adt.lead.confidence_level
                WHEN 'Low' THEN 1
                WHEN 'Medium' THEN 2
                WHEN 'High' THEN 3
                ELSE 0
            END
            <
            CASE EXCLUDED.confidence_level
                WHEN 'Low' THEN 1
                WHEN 'Medium' THEN 2
                WHEN 'High' THEN 3
                ELSE 0
            END
        )
        OR lead_mgmt_adt.lead.lead_status = 'New';


update_match_audit_query = UPDATE lead_mgmt_adt.match_audit
                         SET match_count = :match_count,
                         no_match_count = :no_match_count,
                         stats = :stats,
                         status = :status,
                         end_date = :end_date
                         WHERE match_id = :match_id;

query_match_configuration = SELECT confidence_level, min_score, max_score FROM lead_mgmt_adt.match_configuration;

failed_status_query = INSERT INTO lead_mgmt_adt.match_audit (match_id, start_date, end_date, status, comments)
                      VALUES (:match_id, :start_date, :end_date, :status, :comments)
                      ON CONFLICT (match_id) DO UPDATE
                      SET end_date = EXCLUDED.end_date,
                      status = EXCLUDED.status,
                      comments = EXCLUDED.comments;

