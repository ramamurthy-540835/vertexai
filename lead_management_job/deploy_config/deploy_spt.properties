# Shared deploy parameters for SPT — read by lead-match and snow-sync.
# IMAGE_TAG is REQUIRED. Bump this value to promote a validated ADT build to SPT.
# This single line moves BOTH jobs (lead-match + snow-sync) together.
IMAGE_TAG=sha-c5ca9f5
# Infra tunables (override the workflow defaults if needed):
PARALLELISM=10
TASK_TIMEOUT=40h
MAX_RETRIES=0
MEMORY=8Gi
CPU=2
# Optional per-job entrypoint overrides:
LEAD_MATCH_COMMAND=python
LEAD_MATCH_ARGS=run.py,run_pipeline
SNOW_SYNC_COMMAND=python
SNOW_SYNC_ARGS=main.py,snow_to_db