# Shared deploy parameters for ADT — read by lead-match and snow-sync.
# IMAGE_TAG is supplied by the build for ADT, so it is NOT required here.
# Infra tunables (override the workflow defaults if needed):
PARALLELISM=10
TASK_TIMEOUT=40h
MAX_RETRIES=0
MEMORY=8Gi
CPU=2
# Optional per-job entrypoint overrides (defaults baked into the workflows):
LEAD_MATCH_COMMAND=python
LEAD_MATCH_ARGS=run.py,run_pipeline
SNOW_SYNC_COMMAND=python
SNOW_SYNC_ARGS=main.py,snow_to_db