[QUERY]
query_leads = SELECT lead.lead_id,lead.membership_number,lead.warehouse_number,
              lead.updated_date,lead.fiscal_year as fiscal_year_lead,lead.fiscal_period as fiscal_period_lead,
              account.business_name business_name,account.address_line_one,account.address_line_two,account.city,
              account.state,account.zip_code,account.phone,account.email,
              contact.first_name,contact.last_name FROM lead_mgmt_qat.lead lead
              join lead_mgmt_qat.account account on lead.account_id = account.account_id
              left join lead_mgmt_qat.contact contact on lead.lead_id = contact.lead_id
              where lead.lead_status IN ('Open','Closed - Match','Closed - Cold')
              and (COALESCE(account.business_name, '') <> ''  OR lead.membership_number IS NOT NULL
              OR COALESCE(account.address_line_one, '') <> '')
              and lead.fiscal_year

query_pos = SELECT transaction.pos_id,COALESCE(transaction.account_number,0) as account_number,transaction.membership_number,transaction.warehouse_number,
            transaction.business_name,transaction.address_line_one,transaction.address_line_two,
            transaction.city,transaction.state,transaction.zip_code,transaction.phone,transaction.first_name,
            transaction.last_name,email,transaction.updated_date,transaction.fiscal_year as fiscal_year_transaction,transaction.fiscal_period as fiscal_period_transaction,
            transaction.week as week from lead_mgmt_qat.transaction transaction
            left join lead_mgmt_qat.lead lead on transaction.lead_id = lead.lead_id
            WHERE (transaction.lead_id is null or lead.match_result!='Complete')
            and (COALESCE(transaction.business_name, '') <> ''  OR transaction.membership_number IS NOT NULL
            OR COALESCE(transaction.address_line_one, '') <> '')
            and transaction.fiscal_year

query_leads_insert_ids = SELECT a.lead_id
                   FROM lead_mgmt_qat.lead  a
                   LEFT JOIN lead_mgmt_qat.leads_embeddings b  ON CAST(a.lead_id  AS varchar) = b.lead_id
                   WHERE b.lead_id IS NULL
                   AND a.fiscal_year

query_pos_inserts_ids = SELECT a.pos_id
                        FROM lead_mgmt_qat.transaction a
                        LEFT JOIN lead_mgmt_qat.pos_embeddings b
                        ON a.pos_id = b.pos_id
                        WHERE b.pos_id IS NULL
                        AND a.fiscal_year

query_leads_update_ids = SELECT a.lead_id
                         FROM lead_mgmt_qat.lead  a
                         LEFT JOIN lead_mgmt_qat.leads_embeddings b  ON CAST(a.lead_id  AS varchar) = b.lead_id
                         INNER JOIN lead_mgmt_qat.account c ON c.account_id = a.account_id
                         LEFT JOIN lead_mgmt_qat.contact d ON d.lead_id = CAST(a.lead_id  AS varchar)
                         WHERE
                         (d.updated_date > b.updated_date OR c.updated_date > b.updated_date)
                         AND a.fiscal_year



query_fuzzy_wh = WITH lead_in_focus AS (
                SELECT 
                    lead_id,
                    combined_embedding,
                    address_embedding,
                    name_embedding,
                    warehouse_number,
                    fiscal_year,
                    fiscal_period,
                    business_name,
                    business_address
                FROM lead_mgmt_qat.leads_embeddings
                WHERE lead_id IN :leads_id_batch and warehouse_number is not null
            )
            SELECT 
                l.lead_id,
                s.pos_id,
                s.account_number,
                s.business_name_score,
                s.combined_field_score,
                s.full_address_score
                
            FROM 
                lead_in_focus l                               
                CROSS JOIN LATERAL (
                    SELECT 
                        s.pos_id,
                        s.account_number,
                        s.combined_embedding,
                        s.address_embedding,
                        s.name_embedding,
                        s.business_name,
                        s.business_address,
                        (1 - (s.combined_embedding <=> l.combined_embedding)) * 100              AS combined_field_score,
                (1 - (s.address_embedding  <=> l.address_embedding))  * 100              AS full_address_score,
                (1 - COALESCE(NULLIF(
                        s.name_embedding <=> l.name_embedding, 
                    'NaN'::float), 1))   * 100                                          AS business_name_score
                    FROM lead_mgmt_qat.pos_embeddings s
                    WHERE s.warehouse_number = l.warehouse_number
                    AND s.combined_embedding IS NOT NULL
                    AND (
                            s.fiscal_year > l.fiscal_year
                            OR (s.fiscal_year  = l.fiscal_year
                                AND s.fiscal_period >= l.fiscal_period)
                    )
                    ORDER BY s.combined_embedding <=> l.combined_embedding
                    LIMIT 20                                   
                ) s
                WHERE s.combined_field_score >= 80 order by combined_field_score desc;
query_fuzzy_null_wh = WITH lead_in_focus AS (
                        SELECT 
                            lead_id,
                            combined_embedding,
                            address_embedding,
                            name_embedding,
                            warehouse_number,
                            fiscal_year,
                            fiscal_period,
                            business_name,
                            business_address
                        FROM lead_mgmt_qat.leads_embeddings
                        WHERE lead_id IN :leads_id_batch and warehouse_number is null
                            )
                            SELECT 
                                l.lead_id,
                                s.pos_id,
                                s.account_number,
                                s.business_name_score,
                                s.combined_field_score,
                                s.full_address_score
                                
                                    FROM 
                                        lead_in_focus l                               
                                        CROSS JOIN LATERAL (
                                            SELECT 
                                                s.pos_id,
                                                s.account_number,
                                                s.combined_embedding,
                                                s.address_embedding,
                                                s.name_embedding,
                                                s.business_name,
                                                s.business_address,
                                                (1 - (s.combined_embedding <=> l.combined_embedding)) * 100              AS combined_field_score,
                                        (1 - (s.address_embedding  <=> l.address_embedding))  * 100              AS full_address_score,
                        (1 - COALESCE(NULLIF(
                                s.name_embedding <=> l.name_embedding, 
                            'NaN'::float), 1))   * 100                                          AS business_name_score
                            FROM lead_mgmt_qat.pos_embeddings s
                            WHERE s.combined_embedding IS NOT NULL
                            AND (
                                    s.fiscal_year > l.fiscal_year
                                    OR (s.fiscal_year  = l.fiscal_year
                                        AND s.fiscal_period >= l.fiscal_period)
                            )
                            ORDER BY s.combined_embedding <=> l.combined_embedding
                            LIMIT 20                                   
                        ) s
                        WHERE s.combined_field_score >= 80 order by combined_field_score desc;

create_temp_table_transaction=
        DROP TABLE IF EXISTS lead_mgmt_qat.temp_transaction;
        CREATE TABLE  lead_mgmt_qat.temp_transaction (
        pos_id varchar(150) PRIMARY KEY,
        lead_id varchar(150),
        match_type varchar(100),
        match_score varchar(100),
        nmi_flag Boolean,
        updated_date timestamp DEFAULT current_timestamp,
        updated_by VARCHAR(100)
        )

create_temp_table_lead=
       DROP TABLE IF EXISTS lead_mgmt_qat.temp_lead;
       CREATE TABLE  lead_mgmt_qat.temp_lead (
       lead_id varchar(150) PRIMARY KEY,
       account_number bigint,
       match_result varchar(100),
       updated_date timestamp DEFAULT current_timestamp,
       updated_by VARCHAR(100)
       )


insert_query_transaction=
        INSERT INTO lead_mgmt_qat.transaction (
        pos_id,
        lead_id,
        match_type,
        match_score,
        nmi_flag,
        updated_by,
        updated_date
    )
    SELECT
        pos_id,
        lead_id,
        match_type,
        match_score::double precision,
        nmi_flag,
        updated_by,
        updated_date::timestamp without time zone
    FROM lead_mgmt_qat.temp_transaction
    ON CONFLICT (pos_id)
    DO UPDATE SET
        lead_id = EXCLUDED.lead_id,
        updated_date = EXCLUDED.updated_date,
        updated_by = EXCLUDED.updated_by,
        match_type = EXCLUDED.match_type,
        match_score = EXCLUDED.match_score,
        nmi_flag = EXCLUDED.nmi_flag
    WHERE lead_mgmt_qat.transaction.match_score IS NULL
       OR lead_mgmt_qat.transaction.match_score < EXCLUDED.match_score;


insert_query_lead =
        INSERT INTO lead_mgmt_qat.lead (
        lead_id,
        account_number,
        match_result,
        updated_date,
        updated_by
    )
    SELECT
        lead_id,
        account_number,
                match_result,
,
        updated_date::timestamp without time zone,
        updated_by
    FROM lead_mgmt_qat.temp_lead
    ON CONFLICT (lead_id)
    DO UPDATE SET
        account_number= EXCLUDED.account_number,
        match_result = EXCLUDED.match_result,
        updated_date = EXCLUDED.updated_date,
        updated_by = EXCLUDED.updated_by
    WHERE
        (
            CASE lead_mgmt_qat.lead.match_result
                WHEN 'Potential' THEN 1
                WHEN 'Complete' THEN 2
                ELSE 0
            END
            <
            CASE EXCLUDED.match_result
                WHEN 'Potential' THEN 1
                WHEN 'Complete' THEN 2
                ELSE 0
            END
        )
        OR lead_mgmt_qat.lead.lead_status = 'Open';


update_match_audit_query = UPDATE lead_mgmt_qat.match_audit
                         SET match_count = :match_count,
                         no_match_count = :no_match_count,
                         stats = :stats,
                         status = :status,
                         end_date = :end_date
                         WHERE match_id = :match_id;

query_match_configuration = SELECT match_result, min_score, max_score FROM lead_mgmt_qat.match_configuration;

failed_status_query = INSERT INTO lead_mgmt_qat.match_audit (match_id, start_date, end_date, status, comments)
                      VALUES (:match_id, :start_date, :end_date, :status, :comments)
                      ON CONFLICT (match_id) DO UPDATE
                      SET end_date = EXCLUDED.end_date,
                      status = EXCLUDED.status,
                      comments = EXCLUDED.comments;

