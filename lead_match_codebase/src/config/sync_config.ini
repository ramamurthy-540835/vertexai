[QUERY]
query_leads = SELECT lead.lead_id,lead.membership_number,lead.warehouse_number,
              lead.updated_date,lead.load_date,account.business_name business_name,
              account.address_line_one,account.address_line_two,account.city,
              account.state,account.zip_code,account.phone,account.consumer_id,contact.first_name,
              contact.last_name, contact.email FROM lead_mgmt_dev.lead lead
              join lead_mgmt_dev.account account on lead.account_id = account.account_id
              left join lead_mgmt_dev.contact contact on account.account_id = contact.account_id
              where lead.lead_status not in ('Closed - No Match','Closed – Dead','Closed – Duplicate') and EXTRACT(YEAR FROM lead.load_date)

query_pos = SELECT order_number,transaction.membership_number,transaction.warehouse_number,
            transaction.business_name,transaction.address_line_one,transaction.address_line_two,
            transaction.city,transaction.state,transaction.zip_code,transaction.phone,transaction.first_name,
            transaction.last_name,email,transaction.updated_date,transaction.order_date
            from lead_mgmt_dev.transaction transaction
            left join lead_mgmt_dev.lead lead on transaction.lead_id = lead.lead_id
            WHERE (transaction.lead_id is null or lead.confidence_level!='High')
            and EXTRACT(YEAR FROM order_date )

query_leads_insert_ids = SELECT a.lead_id
                   FROM lead_mgmt_dev.lead  a
                   LEFT JOIN lead_mgmt_dev.leads_embeddings b  ON CAST(a.lead_id  AS varchar) = b.lead_id
                   WHERE b.lead_id IS NULL
                   AND EXTRACT(YEAR FROM a.load_date)

query_pos_inserts_ids = SELECT a.order_number
                        FROM lead_mgmt_dev.transaction a
                        LEFT JOIN lead_mgmt_dev.pos_embeddings b
                        ON a.order_number = b.order_number
                        WHERE b.order_number IS NULL
                        AND EXTRACT(YEAR FROM a.order_date)

query_leads_update_ids = SELECT a.lead_id
                         FROM lead_mgmt_dev.lead  a
                         LEFT JOIN lead_mgmt_dev.leads_embeddings b  ON CAST(a.lead_id  AS varchar) = b.lead_id
                         INNER JOIN lead_mgmt_dev.account c ON c.account_id = a.account_id
                         LEFT JOIN lead_mgmt_dev.contact d ON d.contact_id = a.contact_id
                         WHERE
                         (d.updated_date > b.updated_date OR c.updated_date > b.updated_date)
                         AND EXTRACT(YEAR FROM a.load_date)

query_leads_update = UPDATE lead_mgmt_dev.leads_embeddings SET combined_field = :combined_field,
                     combined_embedding = :combined_embedding,address_embedding = :address_embedding,
                     name_embedding = :name_embedding, updated_date = :updated_date,business_address = :business_address, business_name = :business_name WHERE lead_id = :lead_id;



query_fuzzy = SELECT
                l.lead_id,
                s.order_number,
                (1 - (l.combined_embedding <=> s.combined_embedding)) * 100 AS combined_field_score,
                (1 - (l.address_embedding <=> s.address_embedding)) * 100 AS full_address_score,
                case when l.business_name = '' or s.business_name = '' then 0 else
                (1 - (l.name_embedding <=> s.name_embedding)) * 100 END AS business_name_score,
                case when l.business_name = '' or s.business_name = '' then ((1 - (l.combined_embedding <=>
                s.combined_embedding)) * 100 + 4 * (1 - (l.address_embedding <=> s.address_embedding)) * 100) / 8 else
                ((1 - (l.combined_embedding <=> s.combined_embedding)) * 100
                + 4 * (1 - (l.address_embedding <=> s.address_embedding)) * 100
                + 3 * (1 - (l.name_embedding <=> s.name_embedding)) * 100) / 8 END AS similarity_score
            FROM lead_mgmt_dev.leads_embeddings l
            JOIN lead_mgmt_dev.pos_embeddings s
                ON (1 - (l.combined_embedding <=> s.combined_embedding)) * 100 > 80
            WHERE (l.warehouse_number = s.warehouse_number OR l.warehouse_number IS NULL)
            ORDER BY similarity_score DESC;



final_update_lead_query_high = UPDATE lead_mgmt_dev.lead
                          SET
                                lead_status = :lead_status,
                                confidence_level = :confidence_level,
                                updated_date = :updated_date,
                                updated_by = 'GCP',
                                closed_fiscal_period = CASE
                                                        WHEN closed_fiscal_period IS NULL THEN CAST(:closed_fiscal_period AS integer)
                                                        ELSE closed_fiscal_period
                                                      END,
                                closed_fiscal_year = CASE
                                                      WHEN closed_fiscal_year IS NULL THEN CAST(:closed_fiscal_year AS integer)
                                                      ELSE closed_fiscal_year
                                                    END
                          WHERE lead_id = :lead_id AND ((
                          CASE confidence_level
                          WHEN 'Low' THEN 1 WHEN 'Medium' THEN 2 WHEN 'High' THEN 3
                          ELSE 0 END < CASE :confidence_level
                          WHEN 'Low' THEN 1 WHEN 'Medium' THEN 2 WHEN 'High' THEN 3
                          ELSE 0 END) OR lead_status = 'New');

final_update_lead_query_normal = UPDATE lead_mgmt_dev.lead
                          SET lead_status = :lead_status,confidence_level = :confidence_level,
                          updated_date = :updated_date,updated_by = 'GCP'
                          WHERE lead_id = :lead_id AND ((
                          CASE confidence_level
                          WHEN 'Low' THEN 1 WHEN 'Medium' THEN 2 WHEN 'High' THEN 3
                          ELSE 0 END < CASE :confidence_level
                          WHEN 'Low' THEN 1 WHEN 'Medium' THEN 2 WHEN 'High' THEN 3
                          ELSE 0 END) OR lead_status = 'New');

final_update_pos_query = UPDATE lead_mgmt_dev.transaction
                         SET lead_id = :lead_id,updated_date = :updated_date,
                         updated_by = 'GCP',match_type = :match_type,match_score = :match_score
                         WHERE order_number = :order_number
                         and (match_score < :match_score or match_score is null);

update_match_audit_query = UPDATE lead_mgmt_dev.match_audit
                         SET match_count = :match_count,
                         no_match_count = :no_match_count,
                         stats = :stats,
                         status = :status,
                         end_date = :end_date
                         WHERE match_id = :match_id;

query_match_configuration = SELECT confidence_level, min_score, max_score FROM lead_mgmt_dev.match_configuration;

failed_status_query = INSERT INTO lead_mgmt_dev.match_audit (match_id, start_date, end_date, status, comments)
                      VALUES (:match_id, :start_date, :end_date, :status, :comments)
                      ON CONFLICT (match_id) DO UPDATE
                      SET end_date = EXCLUDED.end_date,
                      status = EXCLUDED.status,
                      comments = EXCLUDED.comments;


