output_bucket_name = leads_management_solution
temporary_folder = temporary_folder
output_folder= output_folder
leads_classified_file_name=leads_classified.csv

[database]
connection_string = p-601-lab-bc-leads-mgmt:us-central1:lead-mgmt-dev
database_name= postgres
schema_name= lead_mgmt_dev
insert_lead_table_name= leads_embeddings
insert_pos_table_name= pos_embeddings

[query]
query_leads = SELECT lead.lead_id,lead.membership_number,lead.warehouse_number,lead.updated_date,account.name business_name, account.address_line_one,account.address_line_two,account.city,account.state,account.zip_code,account.phone,contact.first_name,contact.last_name, contact.email FROM lead_mgmt_dev.lead lead join lead_mgmt_dev.account account on lead.account_id = account.account_id join lead_mgmt_dev.contact contact on lead.contact_id = contact.contact_id where EXTRACT(YEAR FROM lead.load_date)
query_pos = SELECT order_number,membership_number,warehouse_number,business_name,address_line_one,address_line_two,city,state,zip_code,phone,first_name,last_name,email,updated_date from lead_mgmt_dev.transaction WHERE lead_id is null and EXTRACT(YEAR FROM order_date )
query_leads_vector = SELECT * FROM lead_mgmt_dev.leads_embeddings
query_pos_vector = SELECT * FROM lead_mgmt_dev.pos_embeddings
query_leads_update = UPDATE lead_mgmt_dev.leads_embeddings SET combined_field = :combined_field, embedding = :embeddings, last_updated_date = :updated_date WHERE lead_id = :lead_id;
query_pos_update = UPDATE lead_mgmt_dev.pos_embeddings SET combined_field = :combined_field, embedding = :embeddings, last_updated_date = :updated_date WHERE order_number = :order_number;
query_fuzzy = SELECT l.lead_id,s.order_number,1-(l.embedding <=> s.embedding) AS similarity_score FROM lead_mgmt_dev.leads_embeddings l JOIN lead_mgmt_dev.pos_embeddings s ON 1-(l.embedding <=> s.embedding) > 0.9 and l.warehouse_number = s.warehouse_number ORDER BY similarity_score DESC;
final_update_lead_query = UPDATE lead_mgmt_dev.lead SET lead_status = :lead_status, confidence_level = :confidence_level, updated_date = :updated_date, updated_by = 'GCP' WHERE lead.lead_id = :lead_id;
final_update_pos_query = UPDATE lead_mgmt_dev.transaction SET lead_id = :lead_id, updated_date = :updated_date, updated_by = 'GCP' WHERE transaction.order_number = :order_number;