name: Generate Service Account Key for ServiceNow

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'qat'
        type: choice
        options:
          - adt
          - qat
          - spt

jobs:
  generate-sa-key:
    name: Generate SA Key for ServiceNow
    runs-on: cw-gcp-us-west1-np

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set environment variables
        run: |
          ENV="${{ github.event.inputs.environment }}"

          if [ "$ENV" == "adt" ]; then
            echo "PROJECT_ID=p-601-np-bcleadsmgmt-adt" >> $GITHUB_ENV
            echo "SA_EMAIL=gco-iam-svc-lead-mgmt-bc-adt@p-601-np-bcleadsmgmt-adt.iam.gserviceaccount.com" >> $GITHUB_ENV

          elif [ "$ENV" == "qat" ]; then
            echo "PROJECT_ID=p-601-np-bcleadsmgmt-qat" >> $GITHUB_ENV
            echo "SA_EMAIL=gco-iam-svc-lead-mgmt-bc-qat@p-601-np-bcleadsmgmt-qat.iam.gserviceaccount.com" >> $GITHUB_ENV

          elif [ "$ENV" == "spt" ]; then
            echo "PROJECT_ID=p-601-np-bcleadsmgmt-spt" >> $GITHUB_ENV
            echo "SA_EMAIL=gco-iam-svc-lead-mgmt-bc-spt@p-601-np-bcleadsmgmt-spt.iam.gserviceaccount.com" >> $GITHUB_ENV
          fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER_ID }}
          service_account: ${{ secrets.GCP_WORKLOAD_IDENTITY_SA_EMAIL }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Generate Service Account Key
        run: |
          gcloud iam service-accounts keys create sa-key.json \
            --iam-account=${{ env.SA_EMAIL }} \
            --project=${{ env.PROJECT_ID }}

          echo "✅ Key generated for ${{ env.SA_EMAIL }}"

      - name: Print Key in Job Summary
        run: |
          KEY_CONTENT=$(cat sa-key.json)

          echo "### ✅ Service Account Key for ServiceNow" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${{ github.event.inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "**Project:** ${{ env.PROJECT_ID }}" >> $GITHUB_STEP_SUMMARY
          echo "**Service Account:** ${{ env.SA_EMAIL }}" >> $GITHUB_STEP_SUMMARY
          echo "**Generated at:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> ⚠️ Share this key securely with the ServiceNow team. Do not store it in plain text." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`json" >> $GITHUB_STEP_SUMMARY
          echo "$KEY_CONTENT" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

      - name: Cleanup local key file
        if: always()
        run: |
          rm -f sa-key.json
          echo "✅ Local key file removed"