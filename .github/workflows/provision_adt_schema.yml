name: "provision_adt_schema"

on:
  push:
    branches:
      - "feature**"
    paths:
      - 'terraform/environments/adt/schema/**.tf'
      - 'postgres_resources/**.sql'
      - '.github/workflows/provision_adt_schema.yml'
  pull_request:
    branches:
      - "feature*"
    paths:
      - 'terraform/environments/adt/schema/**.tf'
      - 'postgres_resources/**.sql'
      - '.github/workflows/provision_adt_schema.yml'

jobs:
  run:
    name: "Provision schema"
    runs-on: cw-gcp-us-west1-np
    environment: ${{ github.event.pull_request.head.ref }}
    strategy:
      matrix:
        env: ['adt']

    permissions:
      id-token: write
      contents: read
      packages: write

    env:
      TF_VAR_gcp_workload_identity_sa_email: ${{ secrets.GCP_WORKLOAD_IDENTITY_SA_EMAIL }}
      TF_VAR_db_password: ${{ secrets.CLOUD_SQL_ADT_PASSWORD }}

    steps:
      - name: "Checkout code"
        uses: actions/checkout@v4

      - name: "Auth in GCP"
        id: "auth"
        uses: "google-github-actions/auth@v2"
        with:
          create_credentials_file: true
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER_ID }}
          service_account: ${{ secrets.GCP_WORKLOAD_IDENTITY_SA_EMAIL }}
          project_id: 'p-601-np-bcleadsmgmt-adt'

      - name: "Install additional utilities"
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip postgresql-client

          # Confirm psql is now available before moving on
          echo "psql version: $(psql --version)"

          if ! command -v node >/dev/null 2>&1; then
            echo "Installing Node.js..."
            curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
            sudo apt-get install -y nodejs
          else
            echo "Node.js already installed: $(node --version)"
          fi

      - name: "Download and setup Cloud SQL Proxy"
        run: |
          wget -q https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.8.0/cloud-sql-proxy.linux.amd64 \
            -O "$HOME/cloud-sql-proxy"
          chmod +x "$HOME/cloud-sql-proxy"

          "$HOME/cloud-sql-proxy" p-601-np-bcleadsmgmt-adt:us-central1:lead-mgmt-adt \
            --port 5432 \
            --private-ip \
            --auto-iam-authn &

          sleep 10

          PGPASSWORD="$(gcloud auth print-access-token)" psql "hostaddr=127.0.0.1 port=5432 dbname=lead-mgmt-db user=gco-iam-svc-cicd-mbr-bc-np@gcp-prj-cicd-core.iam sslmode=disable" --no-password -c '\conninfo'

          echo "Cloud SQL Proxy started successfully"

      - name: "Setup Terraform"
        uses: hashicorp/setup-terraform@v3

      - name: "Terraform Init"
        working-directory: ./terraform/environments/${{ matrix.env }}/schema
        run: terraform init

      - name: "Terraform Plan"
        working-directory: ./terraform/environments/${{ matrix.env }}/schema
        run: terraform plan -out=plan.tfplan -input=false -lock-timeout=10m

      - name: "Terraform Apply"
        working-directory: ./terraform/environments/${{ matrix.env }}/schema
        run: terraform apply -input=false -lock-timeout=10m plan.tfplan