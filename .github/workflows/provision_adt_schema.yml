name: "provision_adt_schema"

on:
  push:
    branches:
      - "feature**"
    paths:
      - 'terraform/environments/adt/schema/**.tf'
      - 'postgres_resources/**.sql'
      - '.github/workflows/provision_adt_schema.yml'
  pull_request:
    branches:
      - "feature*"
    paths:
      - 'terraform/environments/adt/schema/**.tf'
      - 'postgres_resources/**.sql'
      - '.github/workflows/provision_adt_schema.yml'

jobs:
  run:
    name: "Provision schema"
    runs-on: cw-gcp-us-west1-np
    environment: ${{ github.event.pull_request.head.ref }}
    strategy:
      matrix:
        env: ['adt']

    permissions:
      id-token: write
      contents: read
      packages: write

    env:
      TF_VAR_gcp_workload_identity_sa_email: ${{ secrets.GCP_WORKLOAD_IDENTITY_SA_EMAIL }}
      TF_VAR_db_password: ${{ secrets.CLOUD_SQL_ADT_PASSWORD }}

    steps:
      - name: "Checkout code"
        uses: actions/checkout@v4

      - name: "Auth in GCP"
        id: "auth"
        uses: "google-github-actions/auth@v2"
        with:
          create_credentials_file: true
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER_ID }}
          service_account: ${{ secrets.GCP_WORKLOAD_IDENTITY_SA_EMAIL }}
          project_id: 'p-601-np-bcleadsmgmt-adt'

      - name: "Install psql (no root)"
        run: |
          # Check if psql is already available
          if command -v psql >/dev/null 2>&1; then
            echo "psql already installed: $(psql --version)"
            exit 0
          fi

          echo "psql not found — installing via apt without sudo..."

          # Extract postgresql-client directly from the .deb into $HOME without root
          mkdir -p "$HOME/pg_client"

          # Download the .deb package directly
          apt-get download postgresql-client-common postgresql-client 2>/dev/null || true

          # Try extracting whatever .deb files were downloaded
          for deb in postgresql*.deb; do
            [ -f "$deb" ] && dpkg-deb -x "$deb" "$HOME/pg_client/" && echo "Extracted $deb"
          done

          # Find where psql landed and add it to PATH
          PSQL_BIN=$(find "$HOME/pg_client" -name "psql" -type f 2>/dev/null | head -1)

          if [ -n "$PSQL_BIN" ]; then
            chmod +x "$PSQL_BIN"
            PSQL_DIR=$(dirname "$PSQL_BIN")
            echo "$PSQL_DIR" >> "$GITHUB_PATH"
            export PATH="$PSQL_DIR:$PATH"
            echo "psql installed at $PSQL_BIN"
            psql --version
          else
            echo "❌ Could not extract psql binary. Checking what's available on this runner..."
            which psql || true
            find /usr -name "psql" 2>/dev/null || true
            find /opt -name "psql" 2>/dev/null || true
            exit 1
          fi

      - name: "Download and setup Cloud SQL Proxy"
        run: |
          wget -q https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.8.0/cloud-sql-proxy.linux.amd64 \
            -O "$HOME/cloud-sql-proxy"
          chmod +x "$HOME/cloud-sql-proxy"

          "$HOME/cloud-sql-proxy" p-601-np-bcleadsmgmt-adt:us-central1:lead-mgmt-adt \
            --port 5432 \
            --private-ip \
            --auto-iam-authn &

          sleep 10

          PGPASSWORD="$(gcloud auth print-access-token)" psql "hostaddr=127.0.0.1 port=5432 dbname=lead-mgmt-db user=gco-iam-svc-cicd-mbr-bc-np@gcp-prj-cicd-core.iam sslmode=disable" --no-password -c '\conninfo'

          echo "Cloud SQL Proxy started successfully"

      - name: "Setup Terraform"
        uses: hashicorp/setup-terraform@v3

      - name: "Terraform Init"
        working-directory: ./terraform/environments/${{ matrix.env }}/schema
        run: terraform init

      - name: "Terraform Plan"
        working-directory: ./terraform/environments/${{ matrix.env }}/schema
        run: terraform plan -out=plan.tfplan -input=false -lock-timeout=10m

      - name: "Terraform Apply"
        working-directory: ./terraform/environments/${{ matrix.env }}/schema
        run: terraform apply -input=false -lock-timeout=10m plan.tfplan