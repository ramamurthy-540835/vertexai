name: "create_checkpoint_state"

# Creates a Cloud Workflow checkpoint state file in GCS.
#
# PREFERRED: pass a manifest_path — the GHA reads it from GCS and uses ALL files
# in manifest.files as the successful_files list. This is bulletproof.
#
# FALLBACK: paste file paths directly (one per line, but GHA may truncate long
# inputs around 60KB). Only use for small lists.

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment'
        required: true
        default: 'spt'
        type: choice
        options:
          - 'adt'
          - 'qat'
          - 'spt'
          - 'prd'
      run_id:
        description: 'Run ID (e.g. run-20260606-202446) — state saved as state/<run_id>.json'
        required: true
        type: string
      manifest_path: 
        description: 'PREFERRED: Manifest path (e.g. manifests/run-20260606-202446.json). If set, successful_files = manifest.files. Leave empty to use direct_paste below.'
        required: false
        default: ''
        type: string
      stage:
        description: 'Checkpoint stage to set'
        required: true
        default: 'dataflow_done'
        type: choice
        options:
          - 'dataflow_done'
          - 'moved'
          - 'snow_sync_done'
      direct_paste_files:
        description: 'FALLBACK: paste gs:// paths, one per line (only if manifest_path is empty)'
        required: false
        default: ''
        type: string
      batch_id:
        description: 'Batch UUID from batch_audit table or workflow logs'
        required: true
        type: string
      dry_run:
        description: 'Dry run (preview only — no upload)'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  create_state:
    name: "Create checkpoint state — ${{ github.event.inputs.environment }}"
    runs-on: cw-gcp-us-west1-${{ inputs.environment == 'prd' && 'pd' || 'np' }}

    permissions:
      id-token: write
      contents: read

    steps:
      - name: "Set environment variables"
        run: |
          ENV="${{ github.event.inputs.environment }}"
          if [[ "$ENV" == "prd" ]]; then
            echo "PROJECT_ID=p-601-pd-bcleadsmgmt-prd" >> $GITHUB_ENV
            echo "BUCKET_NAME=gcp-gcs-lead-mgmt-us-prd-pos-raw" >> $GITHUB_ENV
          else
            echo "PROJECT_ID=p-601-np-bcleadsmgmt-${ENV}" >> $GITHUB_ENV
            echo "BUCKET_NAME=gcp-gcs-lead-mgmt-us-${ENV}-pos-raw" >> $GITHUB_ENV
          fi

      - name: "Auth to GCP"
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER_ID }}
          service_account: ${{ github.event.inputs.environment == 'prd' && secrets.GCP_WORKLOAD_IDENTITY_SA_EMAIL_PRD || secrets.GCP_WORKLOAD_IDENTITY_SA_EMAIL }}

      - name: "Set up gcloud"
        uses: google-github-actions/setup-gcloud@v2

      - name: "Determine source of successful_files"
        id: source
        run: |
          set -euo pipefail
          MANIFEST_PATH="${{ github.event.inputs.manifest_path }}"

          if [[ -n "$MANIFEST_PATH" ]]; then
            echo "✅ Using MANIFEST mode: reading files from $MANIFEST_PATH"
            echo "SOURCE_MODE=manifest" >> $GITHUB_ENV
          else
            echo "ℹ️  Using DIRECT_PASTE mode (manifest_path was empty)"
            echo "SOURCE_MODE=direct" >> $GITHUB_ENV
          fi

      # ── MANIFEST MODE: download the manifest from GCS and use manifest.files ──
      - name: "[MANIFEST MODE] Download and parse manifest"
        if: env.SOURCE_MODE == 'manifest'
        run: |
          set -euo pipefail
          MANIFEST_PATH="${{ github.event.inputs.manifest_path }}"
          FULL_URI="gs://${{ env.BUCKET_NAME }}/${MANIFEST_PATH}"

          echo "Downloading: $FULL_URI"
          gcloud storage cp "$FULL_URI" /tmp/manifest.json \
            --project="${{ env.PROJECT_ID }}"

          echo ""
          echo "Manifest contents:"
          cat /tmp/manifest.json | jq .

          # Extract files into a flat list — one per line — no shell escaping issues
          jq -r '.files[]' /tmp/manifest.json > /tmp/successful_raw.txt
          echo "" > /tmp/failed_raw.txt

          echo ""
          echo "Extracted $(wc -l < /tmp/successful_raw.txt) files from manifest"

      # ── DIRECT MODE: write pasted input to file ──
      - name: "[DIRECT MODE] Write pasted paths to file"
        if: env.SOURCE_MODE == 'direct'
        run: |
          cat > /tmp/successful_raw.txt <<'INPUT_EOF'
          ${{ github.event.inputs.direct_paste_files }}
          INPUT_EOF
          echo "" > /tmp/failed_raw.txt

          echo "Raw input ($(wc -c < /tmp/successful_raw.txt) chars, $(wc -l < /tmp/successful_raw.txt) lines):"
          cat /tmp/successful_raw.txt

      - name: "Build state file"
        env:
          RUN_ID: ${{ github.event.inputs.run_id }}
          STAGE: ${{ github.event.inputs.stage }}
          BATCH_ID: ${{ github.event.inputs.batch_id }}
        run: |
          set -euo pipefail

          python3 <<'PYEOF' > /tmp/state.json
          import json
          import os
          from datetime import datetime, timezone

          def parse_file(path):
              if not os.path.exists(path):
                  return []
              with open(path) as f:
                  raw = f.read()
              if not raw.strip():
                  return []

              # Primary: newline-separated
              lines = [line.strip() for line in raw.splitlines() if line.strip()]

              # Fallback: single line with multiple 'gs://' tokens → split on them
              if len(lines) == 1 and lines[0].count('gs://') > 1:
                  text = lines[0]
                  parts = text.split('gs://')
                  lines = ['gs://' + p.strip() for p in parts if p.strip()]
                  print(f"WARN: newlines were lost; recovered {len(lines)} entries by splitting on 'gs://'",
                        flush=True)

              return lines

          successful = parse_file('/tmp/successful_raw.txt')
          failed = parse_file('/tmp/failed_raw.txt')

          state = {
              "stage": os.environ["STAGE"],
              "successful_files": successful,
              "failed_files": failed,
              "batch_id": os.environ["BATCH_ID"],
              "updated_at": datetime.now(timezone.utc).isoformat(),
              "created_by": "github-actions-manual-checkpoint",
              "run_id": os.environ["RUN_ID"]
          }
          print(json.dumps(state, indent=2))
          PYEOF

          echo ""
          echo "============================================================"
          echo "Generated state file:"
          echo "============================================================"
          cat /tmp/state.json
          echo "============================================================"

          SUCCESS_COUNT=$(jq '.successful_files | length' /tmp/state.json)
          FAILED_COUNT=$(jq '.failed_files | length' /tmp/state.json)

          echo ""
          echo "Summary:"
          echo "  Stage:            ${STAGE}"
          echo "  Run ID:           ${RUN_ID}"
          echo "  Batch ID:         ${BATCH_ID}"
          echo "  Successful files: ${SUCCESS_COUNT}"
          echo "  Failed files:     ${FAILED_COUNT}"

          echo "SUCCESS_COUNT=${SUCCESS_COUNT}" >> $GITHUB_ENV
          echo "FAILED_COUNT=${FAILED_COUNT}" >> $GITHUB_ENV

      - name: "Validate state file"
        run: |
          set -euo pipefail

          jq empty /tmp/state.json
          echo "✅ JSON is valid"

          STAGE=$(jq -r '.stage' /tmp/state.json)
          BATCH_ID=$(jq -r '.batch_id' /tmp/state.json)
          SUCCESS_COUNT=$(jq '.successful_files | length' /tmp/state.json)
          SUCCESS_TYPE=$(jq -r '.successful_files | type' /tmp/state.json)

          if [[ "$SUCCESS_TYPE" != "array" ]]; then
            echo "❌ successful_files is type '${SUCCESS_TYPE}', expected 'array'"
            exit 1
          fi
          echo "✅ successful_files is array of length ${SUCCESS_COUNT}"

          INVALID=$(jq -r '.successful_files[] | select(startswith("gs://") | not)' /tmp/state.json | head -5)
          if [[ -n "$INVALID" ]]; then
            echo "❌ Some entries don't start with gs://"
            echo "$INVALID"
            exit 1
          fi
          echo "✅ All entries start with gs://"

          MAX_LEN=$(jq '[.successful_files[] | length] | max // 0' /tmp/state.json)
          if [[ "$MAX_LEN" -gt 500 ]]; then
            echo "❌ Suspiciously long entry (max length: ${MAX_LEN}) — newlines likely mangled"
            jq -r '.successful_files[] | select(length > 500)' /tmp/state.json | head -1
            exit 1
          fi
          echo "✅ All entries are reasonable length (max: ${MAX_LEN})"

          # Check for truncated paths (entry not ending in known extension)
          TRUNCATED=$(jq -r '.successful_files[] | select(test("\\.(csv|CSV|xlsx|XLSX|json|JSON)$") | not)' /tmp/state.json)
          if [[ -n "$TRUNCATED" ]]; then
            echo "❌ Some entries appear truncated (don't end in .csv/.xlsx/.json):"
            echo "$TRUNCATED"
            exit 1
          fi
          echo "✅ All entries end in valid extensions"

          echo ""
          echo "Files in successful_files:"
          jq -r '.successful_files[]' /tmp/state.json | nl

          echo ""
          echo "✅ State file passes all validation"

      - name: "Check if state file already exists"
        run: |
          set -euo pipefail
          STATE_PATH="gs://${{ env.BUCKET_NAME }}/state/${{ github.event.inputs.run_id }}.json"

          if gcloud storage ls "$STATE_PATH" --project="${{ env.PROJECT_ID }}" 2>/dev/null; then
            echo "⚠️  State file already exists at: $STATE_PATH"
            echo "    Will overwrite if dry_run=false."
            echo ""
            echo "Existing content:"
            gcloud storage cat "$STATE_PATH" --project="${{ env.PROJECT_ID }}" || true
            echo "STATE_EXISTS=true" >> $GITHUB_ENV
          else
            echo "✅ No existing state file — will create new"
            echo "STATE_EXISTS=false" >> $GITHUB_ENV
          fi

      - name: "Upload state file"
        if: github.event.inputs.dry_run == 'false'
        run: |
          set -euo pipefail
          STATE_PATH="gs://${{ env.BUCKET_NAME }}/state/${{ github.event.inputs.run_id }}.json"

          gcloud storage cp /tmp/state.json "$STATE_PATH" \
            --project="${{ env.PROJECT_ID }}"

          echo "✅ Uploaded to: $STATE_PATH"
          echo ""
          echo "Next steps:"
          echo "  1. Re-trigger pos_dataflow_workflow with the same manifest"
          echo "  2. Workflow will read this state and resume from stage='${{ github.event.inputs.stage }}'"

      - name: "Dry run notice"
        if: github.event.inputs.dry_run == 'true'
        run: |
          echo "⚠️  DRY RUN — state file was NOT uploaded."
          echo "    Re-run with dry_run=false to upload."

      - name: "Summary"
        if: always()
        run: |
          {
            echo "## Checkpoint State Creation — ${{ github.event.inputs.environment }}"
            echo ""
            echo "- **Environment:**       \`${{ github.event.inputs.environment }}\`"
            echo "- **Source mode:**       \`${{ env.SOURCE_MODE }}\`"
            if [ "${{ env.SOURCE_MODE }}" == "manifest" ]; then
              echo "- **Manifest path:**     \`${{ github.event.inputs.manifest_path }}\`"
            fi
            echo "- **Run ID:**            \`${{ github.event.inputs.run_id }}\`"
            echo "- **State path:**        \`gs://${{ env.BUCKET_NAME }}/state/${{ github.event.inputs.run_id }}.json\`"
            echo "- **Stage:**             \`${{ github.event.inputs.stage }}\`"
            echo "- **Batch ID:**          \`${{ github.event.inputs.batch_id }}\`"
            echo "- **Successful files:**  ${{ env.SUCCESS_COUNT }}"
            echo "- **Failed files:**      ${{ env.FAILED_COUNT }}"
            echo "- **Dry run:**           \`${{ github.event.inputs.dry_run }}\`"
            echo ""
            echo "### State file content"
            echo '```json'
            cat /tmp/state.json 2>/dev/null || echo "(state file not generated)"
            echo '```'
          } >> $GITHUB_STEP_SUMMARY