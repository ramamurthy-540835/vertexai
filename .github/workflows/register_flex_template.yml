name: register_flex_template

# ─────────────────────────────────────────────────────────────
# Registers a Dataflow Flex Template spec in the target env's
# bucket. All environments register their template against the
# SAME image (:latest) — environment-specific behavior comes from
# the template's runtime parameters (project, region, bucket, etc.),
# not from per-environment image tags.
# ─────────────────────────────────────────────────────────────

on:
  # Called by the parent workflow with explicit env
  workflow_call:
    inputs:
      environment:
        description: 'Environment to register template in'
        required: true
        type: string
    secrets:
      GCP_WORKLOAD_IDENTITY_PROVIDER_ID:
        required: true
      GCP_WORKLOAD_IDENTITY_SA_EMAIL:
        required: true
      GCP_WORKLOAD_IDENTITY_SA_EMAIL_PRD:
        required: false

  # Or triggered manually from the Actions tab
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to register template in'
        required: true
        default: 'adt'
        type: choice
        options: ['adt', 'qat', 'spt', 'prd']

jobs:
  register:
    name: Register Dataflow Flex Template (${{ inputs.environment }})
    runs-on: cw-gcp-us-west1-${{ inputs.environment == 'prd' && 'pd' || 'np' }}
    permissions:
      id-token: write
      contents: read

    env:
      ENVIRONMENT: ${{ inputs.environment }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set ENV early for auth
        run: |
          if [[ "${{ inputs.environment }}" == "prd" ]]; then
            echo "ENV=prd" >> $GITHUB_ENV
          else
            echo "ENV=non-prd" >> $GITHUB_ENV
          fi

      - id: auth
        name: Auth to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER_ID }}
          service_account: ${{ env.ENV == 'prd' && secrets.GCP_WORKLOAD_IDENTITY_SA_EMAIL_PRD || secrets.GCP_WORKLOAD_IDENTITY_SA_EMAIL }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Resolve env-specific config
        id: cfg
        run: |
          set -euo pipefail

          if [[ "${ENVIRONMENT}" == "prd" ]]; then
            PROJECT_ID="p-601-pd-bcleadsmgmt-prd"
          else
            PROJECT_ID="p-601-np-bcleadsmgmt-${ENVIRONMENT}"
          fi

          BUCKET_NAME="gcp-gcs-lead-mgmt-us-${ENVIRONMENT}-pos-raw"

          # Single shared image — all environments use :latest.
          # Environment-specific values come from runtime parameters,
          # not from a per-env image tag.
          IMAGE_URI="us-docker.pkg.dev/gcp-prj-images/gcp-gar-repo-mbrshp/pos-pipeline-flex:latest"

          # Per-env template spec lives in the env's own bucket
          TEMPLATE_GCS="gs://${BUCKET_NAME}/templates/pos-pipeline-flex-${ENVIRONMENT}.json"

          echo "PROJECT_ID=$PROJECT_ID"     >> $GITHUB_OUTPUT
          echo "BUCKET_NAME=$BUCKET_NAME"   >> $GITHUB_OUTPUT
          echo "IMAGE_URI=$IMAGE_URI"       >> $GITHUB_OUTPUT
          echo "TEMPLATE_GCS=$TEMPLATE_GCS" >> $GITHUB_OUTPUT

          echo "Environment: $ENVIRONMENT"
          echo "Project    : $PROJECT_ID"
          echo "Image      : $IMAGE_URI"
          echo "Template   : $TEMPLATE_GCS"

      - name: Verify image tag exists
        run: |
          unset CLOUDSDK_CORE_PROJECT CLOUDSDK_PROJECT GCLOUD_PROJECT GCP_PROJECT GOOGLE_CLOUD_PROJECT
          gcloud artifacts docker images describe \
            "${{ steps.cfg.outputs.IMAGE_URI }}" \
            --project=gcp-prj-images \
            --format="value(image_summary.digest)"

      - name: Verify metadata.json exists
        run: |
          if [ ! -f "./dataflow/metadata.json" ]; then
            echo "❌ dataflow/metadata.json not found"
            exit 1
          fi
          cat ./dataflow/metadata.json

      - name: Register Flex Template
        run: |
          unset CLOUDSDK_CORE_PROJECT CLOUDSDK_PROJECT GCLOUD_PROJECT GCP_PROJECT GOOGLE_CLOUD_PROJECT
          gcloud config set project ${{ steps.cfg.outputs.PROJECT_ID }}

          gcloud dataflow flex-template build "${{ steps.cfg.outputs.TEMPLATE_GCS }}" \
            --image="${{ steps.cfg.outputs.IMAGE_URI }}" \
            --sdk-language=PYTHON \
            --metadata-file=./dataflow/metadata.json \
            --project=${{ steps.cfg.outputs.PROJECT_ID }}

          echo "✅ Flex Template registered: ${{ steps.cfg.outputs.TEMPLATE_GCS }}"

      - name: Verify spec is readable
        run: |
          gcloud storage cat "${{ steps.cfg.outputs.TEMPLATE_GCS }}" \
            --project=${{ steps.cfg.outputs.PROJECT_ID }} | head -50

      - name: Summary
        if: always()
        run: |
          {
            echo "## Flex Template — ${ENVIRONMENT}"
            echo ""
            echo "- **Project:** \`${{ steps.cfg.outputs.PROJECT_ID }}\`"
            echo "- **Image:** \`${{ steps.cfg.outputs.IMAGE_URI }}\`"
            echo "- **Template:** \`${{ steps.cfg.outputs.TEMPLATE_GCS }}\`"
          } >> $GITHUB_STEP_SUMMARY