name: dataflow_image_creation

on:
  # Triggers on push to feature* branches when dataflow code changes
  push:
    branches:
      - 'feature*'
    paths:
      - .github/workflows/dataflow_image_creation.yml
      - dataflow/**

jobs:
  build-and-push-container:
    name: Build and Push Dataflow Container
    runs-on:
      - self-hosted
      - us-central1
    permissions:
      id-token: write
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build wheel setuptools

      - name: Debug directory structure
        run: |
          echo "=== Current working directory ==="
          pwd
          echo ""
          echo "=== Repository root contents ==="
          ls -la
          echo ""
          echo "=== dataflow/ contents ==="
          ls -la ./dataflow

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: auth
        name: Auth to GCP for GAR service account
        uses: google-github-actions/auth@v2
        with:
          token_format: access_token
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER_ID }}
          service_account: ${{ secrets.GCP_WORKLOAD_IDENTITY_SA_EMAIL }}

      - name: Login to Google Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: us-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository_owner }}/membership/lead-management/pos-pipeline-flex
            us-docker.pkg.dev/gcp-prj-images/gcp-gar-repo-mbrshp/pos-pipeline-flex

      - name: Build and push
        uses: docker/build-push-action@v6
        env:
          SOURCE_DATE_EPOCH: 0
        with:
          context: ./dataflow
          file: ./dataflow/Dockerfile
          push: true
          labels: ${{ steps.meta.outputs.labels }}
          tags: us-docker.pkg.dev/gcp-prj-images/gcp-gar-repo-mbrshp/pos-pipeline-flex:latest

  register-flex-template:
    name: Trigger Workflow to Register Flex Template
    needs: build-and-push-container
    uses: ./.github/workflows/register_flex_template.yml
    with:
      workflow_trigger_event: "True"
    secrets:
      GCP_WORKLOAD_IDENTITY_PROVIDER_ID: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER_ID }}
      GCP_WORKLOAD_IDENTITY_SA_EMAIL: ${{ secrets.GCP_WORKLOAD_IDENTITY_SA_EMAIL }}