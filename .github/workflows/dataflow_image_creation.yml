name: dataflow_image_creation

# ─────────────────────────────────────────────────────────────
# Strategy:
#   feature*       → BUILD image, tag :latest, register adt template
#   main           → register qat template (using same :latest image)
#   release-spt*   → register spt template (using same :latest image)
#   release-prd*   → register prd template (using same :latest image)
#
# All environments use the SAME image (:latest). Environment-specific
# values (project, bucket, db, etc.) come from Flex Template registration
# and runtime parameters — NOT from per-environment image tags.
# ─────────────────────────────────────────────────────────────

on:
  push:
    branches:
      - 'feature/**'
      - 'main'
    tags:
      - 'release-spt*'
      - 'release-prd*'
    paths:
      - .github/workflows/dataflow_image_creation.yml
      - .github/workflows/register_flex_template.yml
      - dataflow/**

concurrency:
  group: dataflow-deploy
  cancel-in-progress: false

jobs:
  # ─────────────────────────────────────────────────────────────
  # 1. Determine target env and whether to build
  # ─────────────────────────────────────────────────────────────
  determine-target:
    name: Determine target environment
    runs-on: ubuntu-latest
    outputs:
      target_env:   ${{ steps.targets.outputs.target_env }}
      should_build: ${{ steps.targets.outputs.should_build }}
    steps:
      - id: targets
        run: |
          REF_TYPE="${{ github.ref_type }}"
          REF_NAME="${{ github.ref_name }}"
          TARGET_ENV=""
          SHOULD_BUILD="false"

          if [[ "$REF_TYPE" == "branch" && "$REF_NAME" == feature* ]]; then
            TARGET_ENV="adt"
            SHOULD_BUILD="true"
          elif [[ "$REF_TYPE" == "branch" && "$REF_NAME" == "main" ]]; then
            TARGET_ENV="qat"
            SHOULD_BUILD="false"
          elif [[ "$REF_TYPE" == "tag" && "$REF_NAME" == release-spt* ]]; then
            TARGET_ENV="spt"
            SHOULD_BUILD="false"
          elif [[ "$REF_TYPE" == "tag" && "$REF_NAME" == release-prd* ]]; then
            TARGET_ENV="prd"
            SHOULD_BUILD="false"
          else
            echo "❌ Unrecognized trigger: ref_type=$REF_TYPE ref_name=$REF_NAME"
            exit 1
          fi

          echo "Target env  : $TARGET_ENV"
          echo "Should build: $SHOULD_BUILD"
          echo "target_env=$TARGET_ENV"     >> $GITHUB_OUTPUT
          echo "should_build=$SHOULD_BUILD" >> $GITHUB_OUTPUT

  # ─────────────────────────────────────────────────────────────
  # 2. Build image (feature pushes only). Tagged as :latest.
  #    Same image will be used by all environments.
  # ─────────────────────────────────────────────────────────────
  build-and-push-container:
    name: Build and push Dataflow image
    needs: determine-target
    if: needs.determine-target.outputs.should_build == 'true'
    runs-on: 
      - self-hosted
      - us-central1
    permissions:
      id-token: write
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Debug directory structure
        run: |
          echo "=== dataflow/ contents ==="
          ls -la ./dataflow
          echo ""
          echo "=== dataflow/pos_pipeline/ contents ==="
          ls -la ./dataflow/pos_pipeline

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: auth
        name: Auth to GCP for GAR
        uses: google-github-actions/auth@v2
        with:
          token_format: access_token
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER_ID }}
          service_account: ${{ secrets.GCP_WORKLOAD_IDENTITY_SA_EMAIL }}

      - name: Login to Google Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: us-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository_owner }}/membership/lead-management/pos-pipeline-flex
            us-docker.pkg.dev/gcp-prj-images/gcp-gar-repo-mbrshp/pos-pipeline-flex

      - name: Build and push (tag as :latest)
        uses: docker/build-push-action@v6
        env:
          SOURCE_DATE_EPOCH: 0
        with:
          context: ./dataflow
          file: ./dataflow/Dockerfile
          push: true
          labels: ${{ steps.meta.outputs.labels }}
          tags: |
            us-docker.pkg.dev/gcp-prj-images/gcp-gar-repo-mbrshp/pos-pipeline-flex:latest

  # ─────────────────────────────────────────────────────────────
  # 3. Register the env-specific Flex Template spec.
  #    Runs for every trigger. References :latest image for all envs.
  # ─────────────────────────────────────────────────────────────
  register-flex-template:
    name: Register Flex Template (${{ needs.determine-target.outputs.target_env }})
    needs: [determine-target, build-and-push-container]
    if: |
      always() &&
      needs.determine-target.result == 'success' &&
      (needs.build-and-push-container.result == 'success' ||
       needs.build-and-push-container.result == 'skipped')
    uses: ./.github/workflows/register_flex_template.yml
    with:
      environment: ${{ needs.determine-target.outputs.target_env }}
    secrets:
      GCP_WORKLOAD_IDENTITY_PROVIDER_ID: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER_ID }}
      GCP_WORKLOAD_IDENTITY_SA_EMAIL:    ${{ secrets.GCP_WORKLOAD_IDENTITY_SA_EMAIL }}
      GCP_WORKLOAD_IDENTITY_SA_EMAIL_PRD: ${{ secrets.GCP_WORKLOAD_IDENTITY_SA_EMAIL_PRD }}