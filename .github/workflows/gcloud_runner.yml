name: gcloud-adhoc-runner
on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - adt
          - qat
          - spt
          - prd
      gcloud_command:
        description: "gcloud command to run (without 'gcloud' prefix)"
        required: true
        type: string
        default: "run jobs list --region us-central1"
      dry_run:
        description: "Dry run — print command without executing"
        required: false
        type: boolean
        default: false
jobs:
  run-gcloud-command:
    runs-on: cw-gcp-us-west1-${{ inputs.environment == 'prd' && 'pd' || 'np' }}
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Resolve environment config
        id: config
        run: |
          case "${{ inputs.environment }}" in
            adt)
              echo "PROJECT_ID=p-601-np-bcleadsmgmt-adt" >> $GITHUB_ENV
              echo "SA_EMAIL=gco-iam-svc-lead-mgmt-bc-adt@p-601-np-bcleadsmgmt-adt.iam.gserviceaccount.com" >> $GITHUB_ENV
              echo "USE_PRD_SA=false" >> $GITHUB_ENV
              ;;
            qat)
              echo "PROJECT_ID=p-601-np-bcleadsmgmt-qat" >> $GITHUB_ENV
              echo "SA_EMAIL=gco-iam-svc-lead-mgmt-bc-qat@p-601-np-bcleadsmgmt-qat.iam.gserviceaccount.com" >> $GITHUB_ENV
              echo "USE_PRD_SA=false" >> $GITHUB_ENV
              ;;
            spt)
              echo "PROJECT_ID=p-601-np-bcleadsmgmt-spt" >> $GITHUB_ENV
              echo "SA_EMAIL=gco-iam-svc-lead-mgmt-bc-spt@p-601-np-bcleadsmgmt-spt.iam.gserviceaccount.com" >> $GITHUB_ENV
              echo "USE_PRD_SA=false" >> $GITHUB_ENV
              ;;
            prd)
              echo "PROJECT_ID=p-601-pd-bcleadsmgmt-prd" >> $GITHUB_ENV
              echo "SA_EMAIL=gco-iam-svc-lead-mgmt-bc-prd@p-601-pd-bcleadsmgmt-prd.iam.gserviceaccount.com" >> $GITHUB_ENV
              echo "USE_PRD_SA=true" >> $GITHUB_ENV
              ;;
          esac
      - name: Auth to GCP
        id: auth
        uses: google-github-actions/auth@v2
        with:
          token_format: access_token
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER_ID }}
          service_account: ${{ env.USE_PRD_SA == 'true' && secrets.GCP_WORKLOAD_IDENTITY_SA_EMAIL_PRD || secrets.GCP_WORKLOAD_IDENTITY_SA_EMAIL }}
      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      # The gcloud command is passed via env, NOT interpolated directly into the
      # script. ${{ inputs.gcloud_command }} pasted straight into `run:` is a raw
      # text substitution done before bash even runs — any quotes/parens typed
      # into the input become literal characters wherever they land in the
      # script, which is what caused the earlier syntax errors. Passing it as
      # $GCLOUD_COMMAND lets bash handle the value as one opaque string at
      # runtime, the same as typing it into a terminal. It also avoids splicing
      # untrusted input directly into the script source.
      - name: Print command info
        env:
          GCLOUD_COMMAND: ${{ inputs.gcloud_command }}
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Environment : ${{ inputs.environment }}"
          echo "  Project     : $PROJECT_ID"
          echo "  Command     : gcloud $GCLOUD_COMMAND --project=$PROJECT_ID"
          echo "  Dry Run     : ${{ inputs.dry_run }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: Run gcloud command
        if: ${{ inputs.dry_run == false }}
        env:
          GCLOUD_COMMAND: ${{ inputs.gcloud_command }}
        run: |
          gcloud $GCLOUD_COMMAND --project="$PROJECT_ID"

      - name: Dry run — skipped execution
        if: ${{ inputs.dry_run == true }}
        env:
          GCLOUD_COMMAND: ${{ inputs.gcloud_command }}
        run: |
          echo "DRY RUN — command not executed."
          echo "Would have run: gcloud $GCLOUD_COMMAND --project=$PROJECT_ID"