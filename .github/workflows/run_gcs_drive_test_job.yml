name: "run_gcs_drive_test_job"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to test'
        required: true
        default: 'adt'
        type: choice
        options:
          - 'adt'
          - 'qat'
          - 'spt'
          - 'prd'

jobs:
  run-test:
    name: "gcs-drive-test-${{ github.event.inputs.environment }}"
    runs-on: cw-gcp-us-west1-${{ inputs.environment == 'prd' && 'pd' || 'np' }}
    environment: ${{ github.event.inputs.environment }}

    permissions:
      id-token: write
      contents: read

    steps:
      - name: "Checkout code"
        uses: actions/checkout@v4

      - name: "Set environment variables"
        run: |
          ENV="${{ github.event.inputs.environment }}"
          if [[ "$ENV" == "prd" ]]; then
            echo "PROJECT_ID=p-601-pd-bcleadsmgmt-prd" >> $GITHUB_ENV
            echo "POS_BUCKET_NAME=gcp-gcs-lead-mgmt-us-prd-pos-raw" >> $GITHUB_ENV
            echo "DRIVE_FOLDER_ID=1L75MAmjczHCX54aAlf01PBP1qeBacEvc" >> $GITHUB_ENV
            echo "SERVICE_ACCOUNT=gco-iam-svc-lead-mgmt-bc-prd@p-601-pd-bcleadsmgmt-prd.iam.gserviceaccount.com" >> $GITHUB_ENV
          elif [[ "$ENV" == "spt" ]]; then
            echo "PROJECT_ID=p-601-np-bcleadsmgmt-spt" >> $GITHUB_ENV
            echo "POS_BUCKET_NAME=gcp-gcs-lead-mgmt-us-spt-pos-raw" >> $GITHUB_ENV
            echo "DRIVE_FOLDER_ID=1L75MAmjczHCX54aAlf01PBP1qeBacEvc" >> $GITHUB_ENV
            echo "SERVICE_ACCOUNT=gco-iam-svc-lead-mgmt-bc-spt@p-601-np-bcleadsmgmt-spt.iam.gserviceaccount.com" >> $GITHUB_ENV
          elif [[ "$ENV" == "qat" ]]; then
            echo "PROJECT_ID=p-601-np-bcleadsmgmt-qat" >> $GITHUB_ENV
            echo "POS_BUCKET_NAME=gcp-gcs-lead-mgmt-us-qat-pos-raw" >> $GITHUB_ENV
            echo "DRIVE_FOLDER_ID=1FdNywx_ReYaY530imMapzIVZoBV_ZnOJ" >> $GITHUB_ENV
            echo "SERVICE_ACCOUNT=gco-iam-svc-lead-mgmt-bc-qat@p-601-np-bcleadsmgmt-qat.iam.gserviceaccount.com" >> $GITHUB_ENV
          else
            echo "PROJECT_ID=p-601-np-bcleadsmgmt-adt" >> $GITHUB_ENV
            echo "POS_BUCKET_NAME=gcp-gcs-lead-mgmt-us-adt-pos-raw" >> $GITHUB_ENV
            echo "DRIVE_FOLDER_ID=1DNs3o1WxHMdZJXT0OibD3KLfeiAczWCi" >> $GITHUB_ENV
            echo "SERVICE_ACCOUNT=gco-iam-svc-lead-mgmt-bc-adt@p-601-np-bcleadsmgmt-adt.iam.gserviceaccount.com" >> $GITHUB_ENV
          fi
          echo "IMAGE=us-docker.pkg.dev/gcp-prj-images/gcp-gar-repo-mbrshp/gcs-drive-test:latest" >> $GITHUB_ENV
          echo "JOB_NAME=gcs-drive-test-job" >> $GITHUB_ENV
          echo "REGION=us-central1" >> $GITHUB_ENV

      - name: "Auth to GCP"
        id: auth
        uses: google-github-actions/auth@v2
        with:
          create_credentials_file: true
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER_ID }}
          service_account: ${{ inputs.environment == 'prd' && secrets.GCP_WORKLOAD_IDENTITY_SA_EMAIL_PRD || secrets.GCP_WORKLOAD_IDENTITY_SA_EMAIL }}

      - name: "Set project"
        run: gcloud config set project ${{ env.PROJECT_ID }}

      - name: "Login to Artifact Registry"
        uses: docker/login-action@v3
        with:
          registry: us-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: "Build and push test image"
        run: |
          docker build -t ${{ env.IMAGE }} testing_code/
          docker push ${{ env.IMAGE }}

      - name: "Create or update Cloud Run Job"
        run: |
          if gcloud run jobs describe ${{ env.JOB_NAME }} --region=${{ env.REGION }} --project=${{ env.PROJECT_ID }} &>/dev/null; then
            echo "Job exists — updating"
            gcloud run jobs update ${{ env.JOB_NAME }} \
              --image=${{ env.IMAGE }} \
              --region=${{ env.REGION }} \
              --project=${{ env.PROJECT_ID }} \
              --service-account=${{ env.SERVICE_ACCOUNT }} \
              --set-env-vars="GCP_PROJECT_ID=${{ env.PROJECT_ID }},POS_BUCKET_NAME=${{ env.POS_BUCKET_NAME }},DRIVE_FOLDER_ID=${{ env.DRIVE_FOLDER_ID }},SERVICE_ACCOUNT=${{ env.SERVICE_ACCOUNT }}"
          else
            echo "Creating new job"
            gcloud run jobs create ${{ env.JOB_NAME }} \
              --image=${{ env.IMAGE }} \
              --region=${{ env.REGION }} \
              --project=${{ env.PROJECT_ID }} \
              --service-account=${{ env.SERVICE_ACCOUNT }} \
              --network=gcp-vpc-np-host \
              --subnet=gcp-snt-np-usc1-601-cloudrunjobs-np \
              --vpc-egress=all-traffic \
              --set-env-vars="GCP_PROJECT_ID=${{ env.PROJECT_ID }},POS_BUCKET_NAME=${{ env.POS_BUCKET_NAME }},DRIVE_FOLDER_ID=${{ env.DRIVE_FOLDER_ID }},SERVICE_ACCOUNT=${{ env.SERVICE_ACCOUNT }}"
          fi

      - name: "Execute test job and wait"
        run: |
          gcloud run jobs execute ${{ env.JOB_NAME }} \
            --region=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }} \
            --wait

      - name: "Summary"
        if: always()
        run: |
          {
            echo "## GCS → Drive Test Job"
            echo ""
            echo "- **Environment:** \`${{ github.event.inputs.environment }}\`"
            echo "- **Project:** \`${{ env.PROJECT_ID }}\`"
            echo "- **GCS Bucket:** \`${{ env.POS_BUCKET_NAME }}\`"
            echo "- **Drive Folder:** \`${{ env.DRIVE_FOLDER_ID }}\`"
            echo "- **Job:** \`${{ env.JOB_NAME }}\`"
          } >> $GITHUB_STEP_SUMMARY
