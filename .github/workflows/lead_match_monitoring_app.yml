name: lead_match_monitoring_app.yml

on:
  workflow_dispatch:
    inputs:
      bucket:
        description: "GCS bucket containing monitoring snapshots"
        required: false
        default: "lead-match-ctoteam"
        type: string
      service_name:
        description: "Cloud Run service name for the monitoring app"
        required: false
        default: "lead-match-monitoring-app"
        type: string
      allow_unauthenticated:
        description: "Allow public unauthenticated access?"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  deploy-monitoring-app:
    name: "deploy-monitoring-app"
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    env:
      PROJECT_ID: ctoteam
      REGION: us-central1
      ARTIFACT_REPO: cloud-run-repo
      BUCKET_NAME: ${{ github.event.inputs.bucket || 'lead-match-ctoteam' }}
      SERVICE_NAME: ${{ github.event.inputs.service_name || 'lead-match-monitoring-app' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Auth to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER_ID }}
          service_account: ${{ secrets.GCP_WORKLOAD_IDENTITY_SA_EMAIL }}
          create_credentials_file: true
          export_environment_variables: true

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Validate monitoring app files
        run: |
          set -euo pipefail
          test -f lead_match_monitoring_app/package.json
          test -f lead_match_monitoring_app/Dockerfile
          test -f lead_match_monitoring_app/app/page.tsx
          test -f lead_match_monitoring_app/app/api/snapshot/route.ts

      - name: Verify GCS monitoring source
        run: |
          set -euo pipefail
          gcloud config set project "${PROJECT_ID}"
          gsutil ls -b "gs://${BUCKET_NAME}"
          gsutil stat "gs://${BUCKET_NAME}/monitoring/latest.json" >/dev/null 2>&1 \
            && echo "Monitoring snapshot exists" \
            || echo "Warning: No monitoring snapshot yet — run Lead Match Monitor workflow first"

      - name: Build monitoring image with Cloud Build
        run: |
          set -euo pipefail
          gcloud config set project "${PROJECT_ID}"
          gcloud builds submit \
            --project="${PROJECT_ID}" \
            --config=cloudbuild.lead-match-monitoring.yaml \
            --substitutions=SHORT_SHA="${GITHUB_SHA::7}" \
            --async \
            --format='value(id)' \
            .
          BUILD_ID="$(gcloud builds list \
            --project="${PROJECT_ID}" \
            --filter="substitutions.SHORT_SHA=${GITHUB_SHA::7}" \
            --sort-by='~createTime' \
            --limit=1 \
            --format='value(id)')"
          if [[ -z "${BUILD_ID}" ]]; then
            echo "Cloud Build ID was not found for SHORT_SHA=${GITHUB_SHA::7}" >&2
            exit 1
          fi
          echo "BUILD_ID=${BUILD_ID}" >> "$GITHUB_ENV"
          while true; do
            BUILD_STATUS="$(gcloud builds describe "${BUILD_ID}" \
              --project="${PROJECT_ID}" \
              --format='value(status)')"
            echo "Cloud Build ${BUILD_ID}: ${BUILD_STATUS}"
            case "${BUILD_STATUS}" in
              SUCCESS)
                break
                ;;
              FAILURE|INTERNAL_ERROR|TIMEOUT|CANCELLED|EXPIRED)
                exit 1
                ;;
              *)
                sleep 10
                ;;
            esac
          done
          IMAGE="${REGION}-docker.pkg.dev/${PROJECT_ID}/${ARTIFACT_REPO}/${SERVICE_NAME}:latest"
          echo "IMAGE=${IMAGE}" >> "$GITHUB_ENV"

      - name: Deploy Cloud Run monitoring service
        run: |
          set -euo pipefail
          AUTH_FLAG="--no-allow-unauthenticated"
          if [[ "${{ github.event.inputs.allow_unauthenticated }}" == "true" ]]; then
            AUTH_FLAG="--allow-unauthenticated"
          fi

          gcloud run deploy "${SERVICE_NAME}" \
            --project="${PROJECT_ID}" \
            --region="${REGION}" \
            --image="${IMAGE}" \
            --platform=managed \
            --set-env-vars="REPORT_BUCKET=${BUCKET_NAME},GOOGLE_CLOUD_PROJECT=${PROJECT_ID},REGION=${REGION},WORKFLOW_NAME=lead_match_workflow" \
            ${AUTH_FLAG}

          SERVICE_URL="$(gcloud run services describe "${SERVICE_NAME}" \
            --project="${PROJECT_ID}" \
            --region="${REGION}" \
            --format='value(status.url)')"
          echo "SERVICE_URL=${SERVICE_URL}" >> "$GITHUB_ENV"

      - name: Summary
        run: |
          {
            echo "## Lead Match Monitoring App"
            echo ""
            echo "- Service: \`${SERVICE_NAME}\`"
            echo "- Image: \`${IMAGE}\`"
            echo "- URL: ${SERVICE_URL}"
            echo "- Monitor: ${SERVICE_URL}/"
            echo "- API: ${SERVICE_URL}/api/snapshot"
            echo ""
            echo "- Data: live GCP API queries + GCS snapshots"
          } >> "$GITHUB_STEP_SUMMARY"
