name: lead_match_reporting_app.yml

on:
  workflow_dispatch:
    inputs:
      warehouse:
        description: "Warehouse number used for reporting links"
        required: false
        default: "115"
        type: string
      bucket:
        description: "GCS bucket containing lead-match reports"
        required: false
        default: "lead-match-ctoteam"
        type: string
      service_name:
        description: "Cloud Run service name for the Next.js reporting app"
        required: false
        default: "lead-match-reporting-app"
        type: string
      allow_unauthenticated:
        description: "Allow public unauthenticated access?"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  deploy-reporting-app:
    name: "deploy-reporting-app-${{ github.event.inputs.warehouse || '115' }}"
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    env:
      PROJECT_ID: ctoteam
      REGION: us-central1
      ARTIFACT_REPO: cloud-run-repo
      BUCKET_NAME: ${{ github.event.inputs.bucket || 'lead-match-ctoteam' }}
      SERVICE_NAME: ${{ github.event.inputs.service_name || 'lead-match-reporting-app' }}
      WAREHOUSE: ${{ github.event.inputs.warehouse || '115' }}
      REPORT_PREFIX: reports/lead_match
      VERTEX_LOCATION: us-central1
      GEMINI_MODEL: gemini-1.5-flash
      REPORTING_API_TOKEN: ${{ secrets.REPORTING_API_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Auth to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER_ID }}
          service_account: ${{ secrets.GCP_WORKLOAD_IDENTITY_SA_EMAIL }}
          create_credentials_file: true
          export_environment_variables: true

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Validate reporting app files
        run: |
          set -euo pipefail
          test -f lead_match_reporting_app/package.json
          test -f lead_match_reporting_app/Dockerfile
          test -f lead_match_reporting_app/app/api/results/latest/route.ts
          test -f lead_match_reporting_app/app/api/results/search/route.ts
          test -f lead_match_reporting_app/app/api/results/download/route.ts
          test -f lead_match_reporting_app/app/search/page.tsx

      - name: Verify GCS report source
        run: |
          set -euo pipefail
          gcloud config set project "${PROJECT_ID}"
          gsutil ls -b "gs://${BUCKET_NAME}"
          gsutil ls "gs://${BUCKET_NAME}/${REPORT_PREFIX}/${PROJECT_ID}/${WAREHOUSE}/" >/dev/null

      - name: Build reporting image with Cloud Build
        run: |
          set -euo pipefail
          gcloud config set project "${PROJECT_ID}"
          IMAGE="${REGION}-docker.pkg.dev/${PROJECT_ID}/${ARTIFACT_REPO}/${SERVICE_NAME}:${GITHUB_SHA::7}"
          gcloud builds submit \
            --project="${PROJECT_ID}" \
            --region="${REGION}" \
            --tag="${IMAGE}" \
            --file=lead_match_reporting_app/Dockerfile \
            .
          echo "IMAGE=${IMAGE}" >> "$GITHUB_ENV"

      - name: Deploy Cloud Run reporting API
        run: |
          set -euo pipefail
          AUTH_FLAG="--no-allow-unauthenticated"
          if [[ "${{ github.event.inputs.allow_unauthenticated }}" == "true" ]]; then
            AUTH_FLAG="--allow-unauthenticated"
          fi

          ENV_VARS="REPORT_BUCKET=${BUCKET_NAME},REPORT_PREFIX=${REPORT_PREFIX},GOOGLE_CLOUD_PROJECT=${PROJECT_ID},VERTEX_PROJECT_ID=${PROJECT_ID},VERTEX_LOCATION=${VERTEX_LOCATION},GEMINI_MODEL=${GEMINI_MODEL}"
          if [[ -n "${REPORTING_API_TOKEN}" ]]; then
            ENV_VARS="${ENV_VARS},REPORTING_API_TOKEN=${REPORTING_API_TOKEN}"
          fi

          gcloud run deploy "${SERVICE_NAME}" \
            --project="${PROJECT_ID}" \
            --region="${REGION}" \
            --image="${IMAGE}" \
            --platform=managed \
            --set-env-vars="${ENV_VARS}" \
            ${AUTH_FLAG}

          SERVICE_URL="$(gcloud run services describe "${SERVICE_NAME}" \
            --project="${PROJECT_ID}" \
            --region="${REGION}" \
            --format='value(status.url)')"
          echo "SERVICE_URL=${SERVICE_URL}" >> "$GITHUB_ENV"

      - name: Publish reporting URL manifest
        run: |
          set -euo pipefail
          MANIFEST="${RUNNER_TEMP}/lead_match_reporting_app.json"
          cat > "${MANIFEST}" <<EOF
          {
            "project": "${PROJECT_ID}",
            "region": "${REGION}",
            "service_name": "${SERVICE_NAME}",
            "warehouse": "${WAREHOUSE}",
            "bucket": "${BUCKET_NAME}",
            "service_url": "${SERVICE_URL}",
            "latest_url": "${SERVICE_URL}/api/results/latest?warehouse=${WAREHOUSE}",
            "search_url": "${SERVICE_URL}/search?warehouse=${WAREHOUSE}",
            "download_url_template": "${SERVICE_URL}/api/results/download?warehouse=${WAREHOUSE}&run_id=<run_id>&type=csv",
            "graph_url": "${SERVICE_URL}/graph?warehouse=${WAREHOUSE}",
            "deployed_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF
          gsutil cp "${MANIFEST}" "gs://${BUCKET_NAME}/post-match/reporting/${PROJECT_ID}/${WAREHOUSE}/lead_match_reporting_app.json"

      - name: Summary
        run: |
          {
            echo "## Lead Match Reporting App"
            echo ""
            echo "- Service: \`${SERVICE_NAME}\`"
            echo "- Image: \`${IMAGE}\`"
            echo "- URL: ${SERVICE_URL}"
            echo "- Latest API: ${SERVICE_URL}/api/results/latest?warehouse=${WAREHOUSE}"
            echo "- Search UI: ${SERVICE_URL}/search?warehouse=${WAREHOUSE}"
            echo "- Graph UI: ${SERVICE_URL}/graph?warehouse=${WAREHOUSE}"
            echo "- Manifest: \`gs://${BUCKET_NAME}/post-match/reporting/${PROJECT_ID}/${WAREHOUSE}/lead_match_reporting_app.json\`"
          } >> "$GITHUB_STEP_SUMMARY"
