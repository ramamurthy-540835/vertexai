name: lead_match_reporting_app.yml

on:
  workflow_dispatch:
    inputs:
      warehouse:
        description: "Optional manifest label — does NOT affect the deployed service or URL. The app serves all warehouses via ?warehouse=<id>."
        required: false
        default: ""
        type: string
      bucket:
        description: "GCS bucket containing lead-match reports"
        required: false
        default: "lead-match-ctoteam"
        type: string
      service_name:
        description: "Cloud Run service name for the Next.js reporting app"
        required: false
        default: "lead-match-reporting-app"
        type: string
      allow_unauthenticated:
        description: "Allow public unauthenticated access?"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  deploy-reporting-app:
    name: "deploy-reporting-app"
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    env:
      PROJECT_ID: ctoteam
      REGION: us-central1
      ARTIFACT_REPO: cloud-run-repo
      BUCKET_NAME: ${{ github.event.inputs.bucket || 'lead-match-ctoteam' }}
      SERVICE_NAME: ${{ github.event.inputs.service_name || 'lead-match-reporting-app' }}
      REPORT_PREFIX: reports/lead_match
      VERTEX_LOCATION: global
      GEMINI_MODEL: gemini-3.5-flash
      REPORTING_API_TOKEN: ${{ secrets.REPORTING_API_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Auth to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER_ID }}
          service_account: ${{ secrets.GCP_WORKLOAD_IDENTITY_SA_EMAIL }}
          create_credentials_file: true
          export_environment_variables: true

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Validate reporting app files
        run: |
          set -euo pipefail
          test -f lead_match_reporting_app/package.json
          test -f lead_match_reporting_app/Dockerfile
          test -f lead_match_reporting_app/app/api/results/latest/route.ts
          test -f lead_match_reporting_app/app/api/results/search/route.ts
          test -f lead_match_reporting_app/app/api/results/download/route.ts
          test -f lead_match_reporting_app/app/search/page.tsx

      - name: Verify GCS report source
        run: |
          set -euo pipefail
          gcloud config set project "${PROJECT_ID}"
          gsutil ls -b "gs://${BUCKET_NAME}"
          gsutil ls "gs://${BUCKET_NAME}/${REPORT_PREFIX}/${PROJECT_ID}/" >/dev/null

      - name: Build reporting image with Cloud Build
        run: |
          set -euo pipefail
          gcloud config set project "${PROJECT_ID}"
          gcloud builds submit \
            --project="${PROJECT_ID}" \
            --config=cloudbuild.lead-match-reporting.yaml \
            --substitutions=SHORT_SHA="${GITHUB_SHA::7}" \
            --async \
            --format='value(id)' \
            .
          BUILD_ID="$(gcloud builds list \
            --project="${PROJECT_ID}" \
            --filter="substitutions.SHORT_SHA=${GITHUB_SHA::7}" \
            --sort-by='~createTime' \
            --limit=1 \
            --format='value(id)')"
          if [[ -z "${BUILD_ID}" ]]; then
            echo "Cloud Build ID was not found for SHORT_SHA=${GITHUB_SHA::7}" >&2
            exit 1
          fi
          echo "BUILD_ID=${BUILD_ID}" >> "$GITHUB_ENV"
          while true; do
            BUILD_STATUS="$(gcloud builds describe "${BUILD_ID}" \
              --project="${PROJECT_ID}" \
              --format='value(status)')"
            echo "Cloud Build ${BUILD_ID}: ${BUILD_STATUS}"
            case "${BUILD_STATUS}" in
              SUCCESS)
                break
                ;;
              FAILURE|INTERNAL_ERROR|TIMEOUT|CANCELLED|EXPIRED)
                exit 1
                ;;
              *)
                sleep 10
                ;;
            esac
          done
          IMAGE="${REGION}-docker.pkg.dev/${PROJECT_ID}/${ARTIFACT_REPO}/${SERVICE_NAME}:latest"
          echo "IMAGE=${IMAGE}" >> "$GITHUB_ENV"

      - name: Deploy Cloud Run reporting API
        run: |
          set -euo pipefail
          AUTH_FLAG="--no-allow-unauthenticated"
          if [[ "${{ github.event.inputs.allow_unauthenticated }}" == "true" ]]; then
            AUTH_FLAG="--allow-unauthenticated"
          fi

          ENV_VARS="REPORT_BUCKET=${BUCKET_NAME},REPORT_PREFIX=${REPORT_PREFIX},GOOGLE_CLOUD_PROJECT=${PROJECT_ID},VERTEX_PROJECT_ID=${PROJECT_ID},VERTEX_LOCATION=${VERTEX_LOCATION},GEMINI_MODEL=${GEMINI_MODEL}"
          if [[ -n "${REPORTING_API_TOKEN}" ]]; then
            ENV_VARS="${ENV_VARS},REPORTING_API_TOKEN=${REPORTING_API_TOKEN}"
          fi

          gcloud run deploy "${SERVICE_NAME}" \
            --project="${PROJECT_ID}" \
            --region="${REGION}" \
            --image="${IMAGE}" \
            --platform=managed \
            --set-env-vars="${ENV_VARS}" \
            ${AUTH_FLAG}

          SERVICE_URL="$(gcloud run services describe "${SERVICE_NAME}" \
            --project="${PROJECT_ID}" \
            --region="${REGION}" \
            --format='value(status.url)')"
          echo "SERVICE_URL=${SERVICE_URL}" >> "$GITHUB_ENV"

      - name: Publish fleet manifest
        run: |
          set -euo pipefail
          MANIFEST="${RUNNER_TEMP}/lead_match_reporting_app.json"
          cat > "${MANIFEST}" <<EOF
          {
            "project": "${PROJECT_ID}",
            "region": "${REGION}",
            "service_name": "${SERVICE_NAME}",
            "bucket": "${BUCKET_NAME}",
            "service_url": "${SERVICE_URL}",
            "landing_url": "${SERVICE_URL}/",
            "url_templates": {
              "latest": "${SERVICE_URL}/?warehouse=<id>",
              "search": "${SERVICE_URL}/search?warehouse=<id>",
              "graph": "${SERVICE_URL}/graph?warehouse=<id>",
              "talk": "${SERVICE_URL}/talk-with-data?warehouse=<id>"
            },
            "deployed_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF
          gsutil cp "${MANIFEST}" "gs://${BUCKET_NAME}/post-match/reporting/${PROJECT_ID}/lead_match_reporting_app.json"

      - name: Summary
        run: |
          {
            echo "## Lead Match Reporting App"
            echo ""
            echo "- Service: \`${SERVICE_NAME}\`"
            echo "- Image: \`${IMAGE}\`"
            echo "- URL: ${SERVICE_URL}"
            echo "- Landing: ${SERVICE_URL}/"
            echo "- Manifest: \`gs://${BUCKET_NAME}/post-match/reporting/${PROJECT_ID}/lead_match_reporting_app.json\`"
            echo ""
            echo "All warehouses served from this single URL via \`?warehouse=<id>\`."
          } >> "$GITHUB_STEP_SUMMARY"
