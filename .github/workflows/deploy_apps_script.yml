name: Deploy Apps Script

on:
  push:
    branches:
      - feature**
    paths:
      - "apps-script/**"        # only deploy when Apps Script files change
      - ".clasp.json"
      - ".github/workflows/deploy_apps_script.yml"

  # Allow manual re-deploy from GitHub UI
  workflow_dispatch:

jobs:
  deploy:
    name: Push to Apps Script via clasp
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout code ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Node (clasp requires Node) ─────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # ── 3. Install clasp globally ─────────────────────────────────────────────
      - name: Install clasp
        run: npm install -g @google/clasp

      # ── 4. Authenticate clasp using stored credentials ───────────────────────
      # CLASP_CREDENTIALS is the JSON content of ~/.clasprc.json
      # obtained by running `clasp login` locally and copying the file.
      # Store it as a GitHub Secret named CLASP_CREDENTIALS.
      - name: Configure clasp credentials
        run: |
          echo '${{ secrets.CLASP_CREDENTIALS }}' > ~/.clasprc.json
          chmod 600 ~/.clasprc.json

      # ── 5. Validate the script ID is set ─────────────────────────────────────
      - name: Validate .clasp.json
        run: |
          SCRIPT_ID=$(jq -r '.scriptId' apps-script/.clasp.json)
          if [ "$SCRIPT_ID" = "YOUR_APPS_SCRIPT_SCRIPT_ID" ] || [ -z "$SCRIPT_ID" ]; then
            echo "❌ ERROR: .clasp.json still contains placeholder scriptId."
            echo "   Update scriptId to your real Apps Script project ID."
            exit 1
          fi
          echo "✅ Script ID: $SCRIPT_ID"

      # ── 6. Push to Apps Script ───────────────────────────────────────────────
      - name: Push Apps Script files
        run: |
          cd apps-script
          echo "📤 Pushing apps-script/ to Google Apps Script..."
          clasp push --force
          echo "✅ Apps Script deployed successfully."

      # ── 7. Summary ────────────────────────────────────────────────────────────
      - name: Deployment summary
        if: always()
        run: |
          SCRIPT_ID=$(jq -r '.scriptId' apps-script/.clasp.json)
          echo "## Apps Script Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Script ID | $SCRIPT_ID |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Deployed at | $(date -u) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> ⚠️ Remember to run \`installTrigger()\` manually if this is a fresh deploy." >> $GITHUB_STEP_SUMMARY