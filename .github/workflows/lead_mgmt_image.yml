name: lead_mgmt_image_creation
on:
  workflow_dispatch:
  # Build happens ONLY on feature branches (ADT). Higher envs never build.
  push:
    branches:
      - 'feature/**'
    paths:
      - .github/workflows/lead_mgmt_image.yml
      - lead_management_job/**
      - lead_match_codebase/**

jobs:
  build-and-push-container:
    name: Build and Push Container
    runs-on:
      - self-hosted
      - us-central1
    permissions:
      id-token: write
      contents: read
      packages: write
    # Expose the tag we built so the called deploy workflows can use the exact image.
    outputs:
      image_tag: ${{ steps.tag.outputs.image_tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Immutable, self-describing tag. Replaces :latest entirely.
      - name: Set image tag
        id: tag
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          echo "image_tag=sha-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "Building image tag: sha-${SHORT_SHA}"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10.16'
      - name: Install build dependencies
        run: |
            python -m pip install --upgrade pip
            pip install build wheel setuptools
      - name: Debug directory structure
        run: |
          echo "=== Current working directory ==="
          pwd
          echo ""
          echo "=== Repository root contents ==="
          ls -la
      - name: Build wheel and replace existing
        run: |
          rm -f ./lead_management_job/*.whl
          cd ./lead_match_codebase
          python -m build --wheel
          cp dist/*.whl ../lead_management_job/
          cd ..
          echo "Wheel files copied to base_image:"
          ls -la ./lead_management_job/*.whl
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: auth
        name: Auth to GCP for GAR service account
        uses: google-github-actions/auth@v2
        with:
          token_format: access_token
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER_ID }}
          service_account: ${{ secrets.GCP_WORKLOAD_IDENTITY_SA_EMAIL }}
      - name: Login to Google Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: us-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository_owner }}/membership/lead-management/lead-mgmt
            us-docker.pkg.dev/gcp-prj-images/gcp-gar-repo-mbrshp/lead-mgmt
      - name: Debug lead_management_job contents
        run: ls -la ./lead_management_job
      - name: Build and push
        uses: docker/build-push-action@v6
        env:
          SOURCE_DATE_EPOCH: 0
        with:
          context: ./lead_management_job
          file: ./lead_management_job/Dockerfile
          push: true
          labels: ${{ steps.meta.outputs.labels }}
          # SHA tag instead of :latest — never overwrites another build.
          tags: us-docker.pkg.dev/gcp-prj-images/gcp-gar-repo-mbrshp/lead-mgmt:${{ steps.tag.outputs.image_tag }}

      # Easy lookup for promotion — no commit-back needed.
      - name: Publish tag to job summary
        run: |
          echo "### Image built and pushed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tag:** \`${{ steps.tag.outputs.image_tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "To promote: set \`IMAGE_TAG=${{ steps.tag.outputs.image_tag }}\` in the target env's .properties file and merge / cut the release tag." >> $GITHUB_STEP_SUMMARY

  deploy-lead-match-job:
    name: Trigger Workflow to Deploy Lead Matching Job
    needs: build-and-push-container
    uses: ./.github/workflows/lead_match_job_deployment.yml
    with:
      workflow_trigger_event: "True"
      image_tag: ${{ needs.build-and-push-container.outputs.image_tag }}
    secrets:
      GCP_WORKLOAD_IDENTITY_PROVIDER_ID: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER_ID }}
      GCP_WORKLOAD_IDENTITY_SA_EMAIL: ${{ secrets.GCP_WORKLOAD_IDENTITY_SA_EMAIL }}
  deploy-snow-sync-job:
    name: Trigger Workflow to Deploy Snow Sync Job
    needs: build-and-push-container
    uses: ./.github/workflows/snow_sync_job_deployment.yml
    with:
      workflow_trigger_event: "True"
      image_tag: ${{ needs.build-and-push-container.outputs.image_tag }}
    secrets:
      GCP_WORKLOAD_IDENTITY_PROVIDER_ID: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER_ID }}
      GCP_WORKLOAD_IDENTITY_SA_EMAIL: ${{ secrets.GCP_WORKLOAD_IDENTITY_SA_EMAIL }}
  compile-match-job:
    name: Trigger Workflow to compile match job
    needs: build-and-push-container
    uses: ./.github/workflows/deploy_match_job.yml
    with:
      workflow_trigger_event: "True"
      image_tag: ${{ needs.build-and-push-container.outputs.image_tag }}
    secrets:
      GCP_WORKLOAD_IDENTITY_PROVIDER_ID: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER_ID }}
      GCP_WORKLOAD_IDENTITY_SA_EMAIL: ${{ secrets.GCP_WORKLOAD_IDENTITY_SA_EMAIL }}