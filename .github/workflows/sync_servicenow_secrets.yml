name: "sync_secrets_to_gcp"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment to sync secrets to'
        required: true
        default: 'adt'
        type: choice
        options:
          - adt
          - qat
          - spt
      reason:
        description: 'Reason for sync (e.g. secret rotation, new secret added)'
        required: true
        default: 'Secret rotation'

jobs:
  sync-secrets:
    name: "Sync Secrets → GCP Secret Manager"
    runs-on: "ubuntu-latest"
    environment: ${{ github.event.inputs.environment }}

    permissions:
      id-token: write
      contents: read

    env:
      PROJECT_ID: ${{ github.event.inputs.environment == 'adt' && 'p-601-np-bcleadsmgmt-adt' || github.event.inputs.environment == 'qat' && 'p-601-np-bcleadsmgmt-qat' || github.event.inputs.environment == 'spt' && 'p-601-np-bcleadsmgmt-spt' }}

    steps:
      - name: "Log sync details"
        run: |
          echo "================================================"
          echo "  Secret Sync Job Started"
          echo "================================================"
          echo "  Triggered by : ${{ github.actor }}"
          echo "  Environment  : ${{ github.event.inputs.environment }}"
          echo "  Project ID   : ${{ env.PROJECT_ID }}"
          echo "  Reason       : ${{ github.event.inputs.reason }}"
          echo "  Timestamp    : $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "================================================"

      - name: "Auth in GCP"
        id: "auth"
        uses: "google-github-actions/auth@v2"
        with:
          create_credentials_file: true
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER_ID }}
          service_account: ${{ secrets.GCP_WORKLOAD_IDENTITY_SA_EMAIL }}
          project_id: ${{ env.PROJECT_ID }}

      - name: "Set up Cloud SDK"
        uses: "google-github-actions/setup-gcloud@v2"

      - name: "Verify GCP auth"
        run: |
          gcloud auth list
          gcloud config set project "$PROJECT_ID"

      - name: "Sync secrets to GCP Secret Manager"
        # Secrets are loaded as env vars — avoids bash quoting issues
        # when secret values contain special characters like ' " \ $
        env:
          SECRET_SERVICE_NOW_CLIENT_ID: ${{ secrets.SERVICE_NOW_CLIENT_ID }}
          SECRET_SERVICE_NOW_CLIENT_SECRET: ${{ secrets.SERVICE_NOW_CLIENT_SECRET }}
          SECRET_SERVICE_NOW_USERNAME: ${{ secrets.SERVICE_NOW_USERNAME }}
          SECRET_SERVICE_NOW_PASSWORD: ${{ secrets.SERVICE_NOW_PASSWORD }}
        run: |
          # -------------------------------------------------------
          # Helper: creates secret if missing, then pushes new version
          # Always writes a new version — no diff check needed
          # -------------------------------------------------------
          sync_secret() {
            local secret_name=$1
            local secret_value=$2

            if [ -z "$secret_value" ]; then
              echo "⚠️  Skipping '$secret_name' — value is empty or not set in GitHub Secrets"
              return 0
            fi

            # Create the secret resource if it doesn't already exist
            if ! gcloud secrets describe "$secret_name" --project="$PROJECT_ID" &>/dev/null; then
              echo "🆕 Secret '$secret_name' not found — creating..."
              gcloud secrets create "$secret_name" \
                --project="$PROJECT_ID" \
                --replication-policy="automatic"
            fi

            # Always add a new version (unconditional — this is intentional)
            # printf used over echo -n for better portability and special char handling
            printf '%s' "$secret_value" | gcloud secrets versions add "$secret_name" \
              --project="$PROJECT_ID" \
              --data-file=-

            echo "✅ Synced: $secret_name"
          }

          echo ""
          echo "--- Starting secret sync ---"
          echo ""

          sync_secret "service_now_client_id"     "$SECRET_SERVICE_NOW_CLIENT_ID"
          sync_secret "service_now_client_secret" "$SECRET_SERVICE_NOW_CLIENT_SECRET"
          sync_secret "service_now_username"      "$SECRET_SERVICE_NOW_USERNAME"
          sync_secret "service_now_password"      "$SECRET_SERVICE_NOW_PASSWORD"

          echo ""
          echo "--- Secret sync complete ---"

      - name: "Verify synced secret versions"
        run: |
          echo ""
          echo "--- Verifying latest versions ---"
          echo ""

          for secret in \
            service_now_client_id \
            service_now_client_secret \
            service_now_username \
            service_now_password; do

            latest=$(gcloud secrets versions list "$secret" \
              --project="$PROJECT_ID" \
              --limit=1 \
              --sort-by="~createTime" \
              --format="value(name,state,createTime)" 2>/dev/null)

            if [ -n "$latest" ]; then
              echo "✅ $secret → $latest"
            else
              echo "❌ $secret → could not retrieve version info"
            fi
          done

      - name: "Summary"
        if: always()
        run: |
          echo ""
          echo "================================================"
          echo "  Sync Job Finished"
          echo "================================================"
          echo "  Status    : ${{ job.status }}"
          echo "  Actor     : ${{ github.actor }}"
          echo "  Env       : ${{ github.event.inputs.environment }}"
          echo "  Reason    : ${{ github.event.inputs.reason }}"
          echo "  Completed : $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "================================================"