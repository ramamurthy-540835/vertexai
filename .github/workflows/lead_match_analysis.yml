name: Lead Match Analysis and Reasoning

on:
  workflow_dispatch:
    inputs:
      warehouse:
        description: "Warehouse number (e.g., 115, or blank for all)"
        required: false
        type: string
      run_id:
        description: "Match run ID to analyze (auto-inferred if blank)"
        required: false
        type: string
      bucket:
        description: "GCS bucket containing match results"
        required: false
        default: "lead-match-ctoteam"
        type: string
      generate_report:
        description: "Generate detailed business report?"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      wait_for_ready:
        description: "Wait for analysis artifacts to appear before validating?"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      generate_analysis:
        description: "Write per-row reasoning to Cloud SQL and generate Gemini distribution analysis?"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      validate_cloudsql:
        description: "Validate Cloud SQL write-back after analysis?"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  analyze-match-distribution:
    name: "analysis-reasoning-writeback"
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    env:
      PROJECT_ID: ctoteam
      GOOGLE_CLOUD_PROJECT: ctoteam
      VERTEX_PROJECT_ID: ctoteam
      REGION: us-central1
      CLOUDSQL_CONNECTION_NAME: ctoteam:us-central1:lead-mgmt-db
      CLOUDSQL_DB_NAME: postgres
      CLOUDSQL_DB_USER: postgres
      CLOUDSQL_IAM_AUTH: "true"
      BUCKET_NAME: ${{ github.event.inputs.bucket || 'lead-match-ctoteam' }}
      WAREHOUSE: ${{ github.event.inputs.warehouse }}
      RUN_ID: ${{ github.event.inputs.run_id }}
      VERTEX_LOCATION: us-central1
      GEMINI_MODEL: gemini-3.5-flash
      PYTHON_VERSION: "3.11"
      GENERATE_REPORT: ${{ github.event.inputs.generate_report || 'true' }}
      GENERATE_ANALYSIS: ${{ github.event.inputs.generate_analysis || 'true' }}
      VALIDATE_CLOUDSQL: ${{ github.event.inputs.validate_cloudsql || 'true' }}
      WAIT_FOR_READY: ${{ github.event.inputs.wait_for_ready || 'true' }}
      MATCH_ANALYSIS_DB_SECRET: match-analysis-db-connection
      MATCH_ANALYSIS_DB_CONNECTION_FALLBACK: ${{ secrets.MATCH_ANALYSIS_DB_CONNECTION }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Auth to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER_ID }}
          service_account: ${{ secrets.GCP_WORKLOAD_IDENTITY_SA_EMAIL }}
          create_credentials_file: true
          export_environment_variables: true

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install pandas google-cloud-storage cloud-sql-python-connector[pg8000] sqlalchemy google-genai

      - name: Verify match run artifacts are ready
        run: |
          set -euo pipefail
          gcloud config set project "${PROJECT_ID}"
          if [[ -z "${WAREHOUSE}" || -z "${RUN_ID}" ]]; then
            echo "✗ warehouse and run_id inputs are required for deterministic analysis."
            exit 1
          fi

          REPORT_PREFIX="reports/lead_match/${PROJECT_ID}/${WAREHOUSE}/${RUN_ID}"
          READY_PATH="gs://${BUCKET_NAME}/${REPORT_PREFIX}/_READY.json"
          MATCHES_PATH="gs://${BUCKET_NAME}/${REPORT_PREFIX}/matches.csv"
          SUMMARY_PATH="gs://${BUCKET_NAME}/${REPORT_PREFIX}/summary.json"
          echo "REPORT_PREFIX=${REPORT_PREFIX}" >> "$GITHUB_ENV"

          ready=0
          checks=0
          max_checks=40
          while true; do
            checks=$((checks + 1))

            if gsutil ls "${READY_PATH}" &>/dev/null; then
              ready=1
              echo "✓ _READY.json found: ${READY_PATH}"
              break
            fi

            matches_exists=0
            summary_exists=0
            if gsutil ls "${MATCHES_PATH}" &>/dev/null; then
              matches_exists=1
            fi
            if gsutil ls "${SUMMARY_PATH}" &>/dev/null; then
              summary_exists=1
            fi

            if [[ "${matches_exists}" -eq 1 && "${summary_exists}" -eq 1 ]]; then
              echo "⚠ _READY.json not found, but matches.csv and summary.json are present."
              echo "  Proceeding with analysis artifacts as completion signal."
              break
            fi

            if [[ "${WAIT_FOR_READY}" != "true" || "${checks}" -ge "${max_checks}" ]]; then
              echo "✗ Match run artifacts not ready."
              echo "  Checked:"
              echo "  - READY: ${READY_PATH}"
              echo "  - matches: ${MATCHES_PATH}"
              echo "  - summary: ${SUMMARY_PATH}"
              exit 1
            fi

            echo "⏳ Waiting for run artifacts (attempt ${checks}/${max_checks})..."
            sleep 15
          done

      - name: Download report artifacts from GCS
        run: |
          set -euo pipefail
          gcloud config set project "${PROJECT_ID}"
          REPORT_DIR="reports/lead_match/${PROJECT_ID}/${WAREHOUSE}/${RUN_ID}"
          mkdir -p "${REPORT_DIR}"
          gsutil cp "gs://${BUCKET_NAME}/${REPORT_PREFIX}/summary.json" "${REPORT_DIR}/summary.json"
          gsutil cp "gs://${BUCKET_NAME}/${REPORT_PREFIX}/matches.csv" "${REPORT_DIR}/matches.csv"
          gsutil cp "gs://${BUCKET_NAME}/${REPORT_PREFIX}/report.md" "${REPORT_DIR}/report.md" || true
          cp "${REPORT_DIR}/matches.csv" matches.csv
          echo "Downloaded $(wc -l < matches.csv) rows"

      - name: Generate detailed business report
        if: env.GENERATE_REPORT == 'true'
        run: |
          set -euo pipefail
          gcloud config set project "${PROJECT_ID}"
          REPORT_DIR="reports/lead_match/${PROJECT_ID}/${WAREHOUSE}/${RUN_ID}"
          python3 scripts/generate_fuzzy_match_business_report.py \
            --report-dir "${REPORT_DIR}" \
            --cleanup-old-reports \
            --rules-path lead_match_runtime/lead_to_pos_match_rules.json
          gsutil cp "${REPORT_DIR}/fuzzy_match_business_report.md" "gs://${BUCKET_NAME}/${REPORT_PREFIX}/fuzzy_match_business_report.md"

      - name: Write per-row reasoning to Cloud SQL and generate Gemini analysis
        if: env.GENERATE_ANALYSIS == 'true'
        run: |
          set -euo pipefail
          run_analysis() {
            python scripts/analyze_match_distribution.py \
              --bucket "${BUCKET_NAME}" \
              --project "${PROJECT_ID}" \
              --warehouse "${WAREHOUSE}" \
              --run-id "${RUN_ID}" \
              --rules-json lead_match_runtime/lead_to_pos_match_rules.json \
              --analysis-run-id "${GITHUB_RUN_ID}" \
              --analysis-run-attempt "${GITHUB_RUN_ATTEMPT}" \
              --analysis-workflow "${GITHUB_WORKFLOW}" \
              "$@"
          }

          set +e
          run_analysis
          analysis_rc=$?
          set -e
          if [[ "${analysis_rc}" -eq 0 ]]; then
            exit 0
          fi

          echo "Cloud SQL connector route failed; retrying with PostgreSQL fallback connection."
          set +e
          MATCH_ANALYSIS_DB_CONNECTION="$(gcloud secrets versions access latest \
            --project="${PROJECT_ID}" \
            --secret="${MATCH_ANALYSIS_DB_SECRET}" 2>/dev/null)"
          secret_rc=$?
          set -e
          if [[ "${secret_rc}" -ne 0 || -z "${MATCH_ANALYSIS_DB_CONNECTION}" ]]; then
            MATCH_ANALYSIS_DB_CONNECTION="${MATCH_ANALYSIS_DB_CONNECTION_FALLBACK:-}"
          fi
          if [[ -z "${MATCH_ANALYSIS_DB_CONNECTION}" ]]; then
            echo "No fallback DB connection is available from GCP Secret Manager or GitHub Actions secrets."
            exit "${analysis_rc}"
          fi
          run_analysis --db-connection-string "${MATCH_ANALYSIS_DB_CONNECTION}"

      - name: Upload narrative to GCS
        if: env.GENERATE_ANALYSIS == 'true'
        run: |
          set -euo pipefail
          gcloud config set project "${PROJECT_ID}"
          NARRATIVE_SRC="comparative_analysis.md"
          NARRATIVE_DST="gs://${BUCKET_NAME}/reports/lead_match/${PROJECT_ID}/${WAREHOUSE}/${RUN_ID}/comparative_analysis.md"
          if [[ -f "${NARRATIVE_SRC}" ]]; then
            gsutil cp "${NARRATIVE_SRC}" "${NARRATIVE_DST}"
            echo "✓ Narrative uploaded to ${NARRATIVE_DST}"
          else
            echo "⚠ No narrative generated (Gemini may have failed)"
          fi

      - name: Validate analysis
        if: env.GENERATE_ANALYSIS == 'true'
        run: |
          set -euo pipefail
          gcloud config set project "${PROJECT_ID}"
          NARRATIVE_PATH="gs://${BUCKET_NAME}/reports/lead_match/${PROJECT_ID}/${WAREHOUSE}/${RUN_ID}/comparative_analysis.md"
          if gsutil ls "${NARRATIVE_PATH}" &>/dev/null; then
            echo "✓ Narrative exists"
            echo ""
            echo "## Narrative Preview"
            gsutil cat "${NARRATIVE_PATH}" | head -50
          else
            echo "⚠ Narrative not found"
            exit 1
          fi

      - name: Validate Cloud SQL write-back
        if: env.GENERATE_ANALYSIS == 'true' && env.VALIDATE_CLOUDSQL == 'true'
        run: |
          set -euo pipefail
          run_validation() {
            python scripts/validate_match_analysis.py \
              --warehouse "${WAREHOUSE}" \
              --run-id "${RUN_ID}" \
              --matches-csv matches.csv \
              --bucket "${BUCKET_NAME}" \
              --project "${PROJECT_ID}" \
              "$@"
          }

          set +e
          run_validation
          validation_rc=$?
          set -e
          if [[ "${validation_rc}" -eq 0 ]]; then
            exit 0
          fi

          echo "Cloud SQL connector validation failed; retrying with PostgreSQL fallback connection."
          set +e
          MATCH_ANALYSIS_DB_CONNECTION="$(gcloud secrets versions access latest \
            --project="${PROJECT_ID}" \
            --secret="${MATCH_ANALYSIS_DB_SECRET}" 2>/dev/null)"
          secret_rc=$?
          set -e
          if [[ "${secret_rc}" -ne 0 || -z "${MATCH_ANALYSIS_DB_CONNECTION}" ]]; then
            MATCH_ANALYSIS_DB_CONNECTION="${MATCH_ANALYSIS_DB_CONNECTION_FALLBACK:-}"
          fi
          if [[ -z "${MATCH_ANALYSIS_DB_CONNECTION}" ]]; then
            echo "No fallback DB connection is available from GCP Secret Manager or GitHub Actions secrets."
            exit "${validation_rc}"
          fi
          run_validation --db-connection-string "${MATCH_ANALYSIS_DB_CONNECTION}"

      - name: Summary
        run: |
          {
            echo "## Lead Match Analysis and Reasoning"
            echo ""
            echo "- Project: \`${PROJECT_ID}\`"
            echo "- Warehouse: \`${WAREHOUSE}\`"
            echo "- Run: \`${RUN_ID}\`"
            echo "- Bucket: \`${BUCKET_NAME}\`"
            echo ""
            if [[ "${GENERATE_REPORT}" == "true" ]]; then
              echo "### Business Report"
              echo "- \`gs://${BUCKET_NAME}/reports/lead_match/${PROJECT_ID}/${WAREHOUSE}/${RUN_ID}/report.md\`"
              echo "- \`gs://${BUCKET_NAME}/reports/lead_match/${PROJECT_ID}/${WAREHOUSE}/${RUN_ID}/summary.json\`"
              echo "- \`gs://${BUCKET_NAME}/reports/lead_match/${PROJECT_ID}/${WAREHOUSE}/${RUN_ID}/matches.csv\`"
              echo ""
            fi
            if [[ "${GENERATE_ANALYSIS}" == "true" ]]; then
              echo "### Cloud SQL Reasoning + Gemini Distribution Analysis"
              echo "- Narrative: \`gs://${BUCKET_NAME}/reports/lead_match/${PROJECT_ID}/${WAREHOUSE}/${RUN_ID}/comparative_analysis.md\`"
              echo "- Per-row reasoning written to Cloud SQL by \`scripts/analyze_match_distribution.py\`"
              echo ""
            fi
            echo "### Next"
            echo "- View in reporting app: \`/analysis?warehouse=${WAREHOUSE}&run_id=${RUN_ID}\`"
            echo "- Search matches: \`/search?warehouse=${WAREHOUSE}&run_id=${RUN_ID}\`"
          } >> "$GITHUB_STEP_SUMMARY"
