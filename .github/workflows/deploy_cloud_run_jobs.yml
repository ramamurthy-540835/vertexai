name: deploy_cloud_run_jobs
# One entry point for promotion. A push to main (QAT) or a release tag
# (SPT / PRD) fires this once, and it fans out to every child deploy workflow.
# You never run the children individually.
on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - release-spt*
      - release-prd-phase2-*
    paths:
      # Promotion is driven purely by .properties edits (tag/tunable changes)
      # and the release tags below — nothing else. Promotion deploys a pre-built
      # image, so neither source code nor workflow edits belong here.
      - lead_management_job/**

# Permissions on a reusable-workflow CALLER cap what the called workflows are
# allowed to use, regardless of what the children themselves declare. Both
# children auth to GCP (id-token) and snow-sync's image pull path touches GAR
# packages, so those must be granted here too, or the auth step in the
# children fails with "requesting X, but is only allowed none".
permissions:
  contents: read
  id-token: write
  packages: write

jobs:
  deploy-lead-match-job:
    name: Deploy Lead Matching Job
    uses: ./.github/workflows/lead_match_job_deployment.yml
    with:
      # Not a build trigger — children resolve the pinned tag from .properties.
      workflow_trigger_event: "False"
    secrets:
      GCP_WORKLOAD_IDENTITY_PROVIDER_ID: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER_ID }}
      GCP_WORKLOAD_IDENTITY_SA_EMAIL: ${{ secrets.GCP_WORKLOAD_IDENTITY_SA_EMAIL }}
      GCP_WORKLOAD_IDENTITY_SA_EMAIL_PRD: ${{ secrets.GCP_WORKLOAD_IDENTITY_SA_EMAIL_PRD }}
  deploy-snow-sync-job:
    name: Deploy Snow Sync Job
    uses: ./.github/workflows/snow_sync_job_deployment.yml
    with:
      workflow_trigger_event: "False"
    secrets:
      GCP_WORKLOAD_IDENTITY_PROVIDER_ID: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER_ID }}
      GCP_WORKLOAD_IDENTITY_SA_EMAIL: ${{ secrets.GCP_WORKLOAD_IDENTITY_SA_EMAIL }}
      GCP_WORKLOAD_IDENTITY_SA_EMAIL_PRD: ${{ secrets.GCP_WORKLOAD_IDENTITY_SA_EMAIL_PRD }}