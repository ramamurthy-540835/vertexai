name: "run_sql_query"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment'
        required: true
        default: 'spt'
        type: choice
        options:
          - 'adt'
          - 'qat'
          - 'spt'
          - 'prd'
      sql_query:
        description: 'SQL query to execute (use $SCHEMA_NAME placeholder for schema)'
        required: true
        type: string
      dry_run:
        description: 'Dry run (print SQL only, do not execute)'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  run:
    name: "Run SQL on ${{ github.event.inputs.environment }}"
    runs-on: cw-gcp-us-west1-${{ inputs.environment == 'prd' && 'pd' || 'np' }}

    permissions:
      id-token: write
      contents: read

    steps:
      - name: "Set environment variables"
        run: |
          ENV="${{ github.event.inputs.environment }}"
          if [[ "$ENV" == "prd" ]]; then
            echo "PROJECT_ID=p-601-pd-bcleadsmgmt-prd" >> $GITHUB_ENV
            echo "SCHEMA_NAME=lead_mgmt_prd" >> $GITHUB_ENV
            echo "INSTANCE_NAME=lead-mgmt-prd" >> $GITHUB_ENV
          else
            echo "PROJECT_ID=p-601-np-bcleadsmgmt-${ENV}" >> $GITHUB_ENV
            echo "SCHEMA_NAME=lead_mgmt_${ENV}" >> $GITHUB_ENV
            echo "INSTANCE_NAME=lead-mgmt-${ENV}" >> $GITHUB_ENV
          fi

      - name: "Auth in GCP"
        uses: "google-github-actions/auth@v2"
        with:
          create_credentials_file: true
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER_ID }}
          service_account: ${{ github.event.inputs.environment == 'prd' && secrets.GCP_WORKLOAD_IDENTITY_SA_EMAIL_PRD || secrets.GCP_WORKLOAD_IDENTITY_SA_EMAIL }}
          project_id: ${{ env.PROJECT_ID }}

      # ── psql installation, aligned with provision_prd_schema.yml ──────────
      - name: "Check for PostgreSQL client"
        id: check_psql
        run: |
          if command -v psql >/dev/null 2>&1; then
            echo "psql already installed"
            echo "psql_exists=true" >> $GITHUB_OUTPUT
          else
            echo "psql not found"
            echo "psql_exists=false" >> $GITHUB_OUTPUT
          fi

      - name: "Install PostgreSQL client"
        if: steps.check_psql.outputs.psql_exists == 'false'
        run: |
          set -e  # Exit on any error
          # Create local bin directory
          mkdir -p $HOME/bin

          # Check if Miniconda is already installed
          if [ -d "$HOME/miniconda" ] && [ -f "$HOME/miniconda/bin/conda" ]; then
            echo "Miniconda already exists, reusing installation..."
            # Check if psql exists in miniconda
            if [ -f "$HOME/miniconda/bin/psql" ]; then
              echo "PostgreSQL already installed in Miniconda, skipping installation..."
              ln -sf $HOME/miniconda/bin/psql $HOME/bin/psql
              ln -sf $HOME/miniconda/bin/pg_dump $HOME/bin/pg_dump
              ln -sf $HOME/miniconda/bin/pg_restore $HOME/bin/pg_restore
              echo "$HOME/bin" >> $GITHUB_PATH
              echo "$HOME/miniconda/bin" >> $GITHUB_PATH
              export PATH="$HOME/bin:$HOME/miniconda/bin:$PATH"
              psql --version
              echo "PostgreSQL client ready"
              exit 0
            fi
          else
            echo "Installing Miniconda (no sudo required)..."
            cd /tmp
            for i in {1..3}; do
              if wget -q --timeout=30 https://repo.anaconda.com/miniconda/Miniconda3-latest-Linux-x86_64.sh -O miniconda.sh; then
                echo "Miniconda downloaded successfully"
                break
              else
                echo "Download attempt $i failed, retrying..."
                sleep 5
              fi
              if [ $i -eq 3 ]; then
                echo "Failed to download Miniconda after 3 attempts"
                exit 1
              fi
            done
            # Remove existing directory if corrupted/incomplete
            rm -rf $HOME/miniconda
            bash miniconda.sh -b -p $HOME/miniconda
            rm -f /tmp/miniconda.sh
          fi

          eval "$($HOME/miniconda/bin/conda shell.bash hook)"
          echo "Installing PostgreSQL via conda-forge..."
          timeout 600 $HOME/miniconda/bin/conda install -y -c conda-forge postgresql=17.0 || {
            echo "Conda installation failed or timed out"
            exit 1
          }
          ln -sf $HOME/miniconda/bin/psql $HOME/bin/psql
          ln -sf $HOME/miniconda/bin/pg_dump $HOME/bin/pg_dump
          ln -sf $HOME/miniconda/bin/pg_restore $HOME/bin/pg_restore
          echo "$HOME/bin" >> $GITHUB_PATH
          echo "$HOME/miniconda/bin" >> $GITHUB_PATH
          export PATH="$HOME/bin:$HOME/miniconda/bin:$PATH"
          psql --version
          echo "PostgreSQL client installation completed successfully"
      # ───────────────────────────────────────────────────────────────────

      - name: "Setup Cloud SQL Proxy"
        run: |
          if ! command -v cloud-sql-proxy >/dev/null 2>&1; then
            wget -q https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.8.0/cloud-sql-proxy.linux.amd64 -O cloud-sql-proxy
            chmod +x cloud-sql-proxy
          fi

          ./cloud-sql-proxy ${{ env.PROJECT_ID }}:us-central1:${{ env.INSTANCE_NAME }} \
            --port 5432 \
            --private-ip \
            --auto-iam-authn &

          sleep 10
          echo "Cloud SQL Proxy started"

      - name: "Prepare SQL"
        env:
          SQL_INPUT: ${{ github.event.inputs.sql_query }}
        run: |
          # Write the query to a temp file (handles multi-line, special chars safely)
          echo "$SQL_INPUT" > /tmp/query_raw.sql

          # Substitute $SCHEMA_NAME placeholder
          export SCHEMA_NAME="${{ env.SCHEMA_NAME }}"
          envsubst < /tmp/query_raw.sql > /tmp/query.sql

          echo "─────────────────────────────────────────────"
          echo "Environment:  ${{ github.event.inputs.environment }}"
          echo "Project:      ${{ env.PROJECT_ID }}"
          echo "Database:     lead-mgmt-db"
          echo "Schema:       ${{ env.SCHEMA_NAME }}"
          echo "Dry run:      ${{ github.event.inputs.dry_run }}"
          echo "─────────────────────────────────────────────"
          echo "SQL to execute:"
          echo "─────────────────────────────────────────────"
          cat /tmp/query.sql
          echo "─────────────────────────────────────────────"

      - name: "Execute SQL"
        if: github.event.inputs.dry_run == 'false'
        run: |
          set -euo pipefail
          export PGPASSWORD=$(gcloud auth print-access-token)

          psql "host=127.0.0.1 \
                port=5432 \
                dbname=lead-mgmt-db \
                user=gco-iam-svc-cicd-mbr-bc-np@gcp-prj-cicd-core.iam \
                sslmode=disable" \
            -v ON_ERROR_STOP=1 \
            -f /tmp/query.sql

          echo ""
          echo "✅ SQL executed successfully"

      - name: "Dry run notice"
        if: github.event.inputs.dry_run == 'true'
        run: |
          echo "⚠️  Dry run mode — SQL was NOT executed."
          echo "    Re-run with dry_run=false to apply."

      - name: "Summary"
        if: always()
        run: |
          {
            echo "## SQL Execution — ${{ github.event.inputs.environment }}"
            echo ""
            echo "- **Environment:**  \`${{ github.event.inputs.environment }}\`"
            echo "- **Project:**      \`${{ env.PROJECT_ID }}\`"
            echo "- **Database:**     \`lead-mgmt-db\`"
            echo "- **Schema:**       \`${{ env.SCHEMA_NAME }}\`"
            echo "- **Dry Run:**      \`${{ github.event.inputs.dry_run }}\`"
            echo ""
            echo "### SQL Query"
            echo '```sql'
            cat /tmp/query.sql 2>/dev/null || echo "(SQL prep step did not run)"
            echo '```'
          } >> $GITHUB_STEP_SUMMARY