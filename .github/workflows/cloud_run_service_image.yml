name: cloud_run_service_image_creation
# ─────────────────────────────────────────────────────────────
# Build the Cloud Run service image on feature pushes and deploy to adt.
# main and release-spt pushes deploy directly (no rebuild) via
# cloud_run_service_deployment.yml's own push triggers.
# ─────────────────────────────────────────────────────────────
on:
  push:
    branches:
      - 'feature/**'
    paths:
      - .github/workflows/cloud_run_service_image.yml
      - cloud_run_service/**

jobs:
  build-and-push-container:
    name: Build and Push Cloud Run service image
    runs-on:
      - self-hosted
      - us-central1
    permissions:
      id-token: write
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.set-tag.outputs.image_tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag (short SHA)
        id: set-tag
        run: |
          TAG="${GITHUB_SHA::12}"
          echo "image_tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Resolved image tag: ${TAG}"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: auth
        name: Auth to GCP for GAR
        uses: google-github-actions/auth@v2
        with:
          token_format: access_token
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER_ID }}
          service_account: ${{ secrets.GCP_WORKLOAD_IDENTITY_SA_EMAIL }}

      - name: Login to Google Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: us-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository_owner }}/membership/lead-management/cloud-run-service
            us-docker.pkg.dev/gcp-prj-images/gcp-gar-repo-mbrshp/cloud-run-service

      - name: Build and push
        uses: docker/build-push-action@v6
        env:
          SOURCE_DATE_EPOCH: 0
        with:
          context: ./cloud_run_service
          file: ./cloud_run_service/Dockerfile
          push: true
          labels: ${{ steps.meta.outputs.labels }}
          tags: |
            us-docker.pkg.dev/gcp-prj-images/gcp-gar-repo-mbrshp/cloud-run-service:${{ steps.set-tag.outputs.image_tag }}
            us-docker.pkg.dev/gcp-prj-images/gcp-gar-repo-mbrshp/cloud-run-service:latest

      - name: Summary
        run: |
          {
            echo "## Image Build — cloud-run-service"
            echo ""
            echo "**Image tag (SHA-based):** \`${{ steps.set-tag.outputs.image_tag }}\`"
            echo "**Full image ref:** \`us-docker.pkg.dev/gcp-prj-images/gcp-gar-repo-mbrshp/cloud-run-service:${{ steps.set-tag.outputs.image_tag }}\`"
            echo "**Commit:** \`${{ github.sha }}\`"
            echo ""
            echo "Use this tag for \`TF_VAR_image_tag\` when running Terraform apply."
          } >> $GITHUB_STEP_SUMMARY