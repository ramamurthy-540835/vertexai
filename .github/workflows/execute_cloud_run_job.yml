name: "cloud_run_job_execution"

on:
  workflow_dispatch:  # Trigger manually

env:
  PROJECT_ID: 'p-601-np-bcleadsmgmt-adt' # TODO: update to your Google Cloud project ID
  REGION: 'us-central1' # TODO: update to your region

jobs:
  run:
    name: "auth"
    runs-on: "ubuntu-latest"
    environment: ${{ github.event.pull_request.head.ref }}
    strategy:
      matrix:
        env: ['adt'] #,['adt', 'qat', 'spt'] # Exclude prd from auto-plan
    
    permissions:
      id-token: write
      contents: read

    steps:
      - name: "Checkout code"
        uses: actions/checkout@v4

      - name: "Auth in GCP"
        id: "auth"
        uses: "google-github-actions/auth@v2"
        with:
          create_credentials_file: true
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER_ID }}
          service_account: ${{ secrets.GCP_WORKLOAD_IDENTITY_SA_EMAIL }}    
      # - name: "Cancel an execution"
      #   run: |
      #     unset CLOUDSDK_CORE_PROJECT
      #     gcloud config set project p-601-np-membership-adt
      #     gcloud run jobs executions delete snow-sync-job-mqdtz --region us-central1 --project p-601-np-membership-adt --quiet

      - name: "Run cloud run job in adt"
        run: | 
          unset CLOUDSDK_CORE_PROJECT
          gcloud config set project p-601-np-bcleadsmgmt-adt
          gcloud run jobs execute snow-sync-job --region=us-central1 \
          --project=p-601-np-bcleadsmgmt-adt

      - name: "Check address space"
        run: | 
          gcloud compute networks subnets describe gcp-snt-np-usc1-601-cloudruncloudsql-np \
          --project=gcp-prj-transit-hub \
          --region=us-central1 \
          --format="get(ipCidrRange)"

