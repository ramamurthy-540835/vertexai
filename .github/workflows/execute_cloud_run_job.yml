      #      --project=p-601-np-bcleadsmgmt-qat \
      #      --args="main.py,match_job"

      - name: "Run cloud run job through workflows"
        run: | 
           unset CLOUDSDK_CORE_PROJECT
           gcloud config set project p-601-np-bcleadsmgmt-qat
           gcloud workflows execute snow_sync_workflow --location=us-central1

