name: deploy-cloud-run-service

# ─────────────────────────────────────────────────────────────
# Deploys the Cloud Run HTTP service (lead-mgmt-service) that hosts
# the workflow-trigger endpoint and ServiceNow callbacks.
#
# Strategy:
#   feature*       → deploy to adt (via workflow_call from image_creation)
#   main           → deploy to qat (direct push trigger)
#   release-spt*   → deploy to spt (direct push trigger)
#
# Environment-specific config comes from cloud_run_service/service_<env>.properties.
# ─────────────────────────────────────────────────────────────

on:
  workflow_call:
    inputs:
      workflow_trigger_event:
        required: true
        type: string
    secrets:
      GCP_WORKLOAD_IDENTITY_PROVIDER_ID:
        required: true
      GCP_WORKLOAD_IDENTITY_SA_EMAIL:
        required: true

  push:
    branches:
      - feature/**
      - main
    tags:
      - release-spt*
      #- release-prod*
    paths:
      - .github/workflows/cloud_run_service_deployment.yml
      - cloud_run_service/**

jobs:
  build-and-deploy:
    runs-on: cw-gcp-us-west1-np
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: auth
        name: Auth to GCP
        uses: google-github-actions/auth@v2
        with:
          token_format: access_token
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER_ID }}
          service_account: ${{ secrets.GCP_WORKLOAD_IDENTITY_SA_EMAIL }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Determine environment and conditions
        id: config
        run: |
          REF="${GITHUB_REF}"

          if [[ -z "$WORKFLOW_TRIGGER" ]]; then
            WORKFLOW_TRIGGER="False"
          fi
          echo "WORKFLOW_TRIGGER=$WORKFLOW_TRIGGER"

          # adt: only via workflow_call from cloud_run_service_image_creation
          if [[ "$WORKFLOW_TRIGGER" == "True" ]]; then
            echo "ENV=adt" >> $GITHUB_ENV
            echo "DEPLOY=true" >> $GITHUB_ENV
            echo "PROJECT_ID=p-601-np-bcleadsmgmt-adt" >> $GITHUB_ENV
            echo "SERVICE_ACCOUNT=gco-iam-svc-lead-mgmt-bc-adt@p-601-np-bcleadsmgmt-adt.iam.gserviceaccount.com" >> $GITHUB_ENV
            echo "ENVIRONMENT_VARIABLES_PATH=./cloud_run_service/service_adt.properties" >> $GITHUB_ENV
            echo "NETWORK=projects/gcp-prj-transit-hub/global/networks/gcp-vpc-np-host" >> $GITHUB_ENV
            echo "SUBNET=projects/gcp-prj-transit-hub/regions/us-central1/subnetworks/gcp-snt-np-usc1-601-cloudrunjobs-np" >> $GITHUB_ENV

          elif [[ "$REF" == refs/heads/feature* ]]; then
            # Only deploy if this workflow file itself changed
            CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD)
            if echo "$CHANGED_FILES" | grep -q ".github/workflows/cloud_run_service_deployment.yml"; then
              echo "ENV=adt" >> $GITHUB_ENV
              echo "DEPLOY=true" >> $GITHUB_ENV
              echo "PROJECT_ID=p-601-np-bcleadsmgmt-adt" >> $GITHUB_ENV
              echo "SERVICE_ACCOUNT=gco-iam-svc-lead-mgmt-bc-adt@p-601-np-bcleadsmgmt-adt.iam.gserviceaccount.com" >> $GITHUB_ENV
              echo "ENVIRONMENT_VARIABLES_PATH=./cloud_run_service/service_adt.properties" >> $GITHUB_ENV
              echo "NETWORK=projects/gcp-prj-transit-hub/global/networks/gcp-vpc-np-host" >> $GITHUB_ENV
              echo "SUBNET=projects/gcp-prj-transit-hub/regions/us-central1/subnetworks/gcp-snt-np-usc1-601-cloudrunjobs-np" >> $GITHUB_ENV
            else
              echo "DEPLOY=false" >> $GITHUB_ENV
            fi

          elif [[ "$REF" == refs/heads/main ]]; then
            echo "ENV=qat" >> $GITHUB_ENV
            echo "DEPLOY=true" >> $GITHUB_ENV
            echo "PROJECT_ID=p-601-np-bcleadsmgmt-qat" >> $GITHUB_ENV
            echo "SERVICE_ACCOUNT=gco-iam-svc-lead-mgmt-bc-qat@p-601-np-bcleadsmgmt-qat.iam.gserviceaccount.com" >> $GITHUB_ENV
            echo "ENVIRONMENT_VARIABLES_PATH=./cloud_run_service/service_qat.properties" >> $GITHUB_ENV
            echo "NETWORK=projects/gcp-prj-transit-hub/global/networks/gcp-vpc-np-host" >> $GITHUB_ENV
            echo "SUBNET=projects/gcp-prj-transit-hub/regions/us-central1/subnetworks/gcp-snt-np-usc1-601-cloudrunjobs-np" >> $GITHUB_ENV

          elif [[ "$REF" == refs/tags/release-spt* ]]; then
            echo "ENV=spt" >> $GITHUB_ENV
            echo "DEPLOY=true" >> $GITHUB_ENV
            echo "PROJECT_ID=p-601-np-bcleadsmgmt-spt" >> $GITHUB_ENV
            echo "SERVICE_ACCOUNT=gco-iam-svc-lead-mgmt-bc-spt@p-601-np-bcleadsmgmt-spt.iam.gserviceaccount.com" >> $GITHUB_ENV
            echo "ENVIRONMENT_VARIABLES_PATH=./cloud_run_service/service_spt.properties" >> $GITHUB_ENV 

            echo "NETWORK=projects/gcp-prj-transit-hub/global/networks/gcp-vpc-np-host" >> $GITHUB_ENV
            echo "SUBNET=projects/gcp-prj-transit-hub/regions/us-central1/subnetworks/gcp-snt-np-usc1-601-cloudrunjobs-np2" >> $GITHUB_ENV

          else
            echo "DEPLOY=false" >> $GITHUB_ENV
          fi
        env:
          WORKFLOW_TRIGGER: ${{ inputs.workflow_trigger_event }}

      - name: "Prepare env vars for Cloud Run service"
        id: env
        if: env.DEPLOY == 'true'
        run: |
          # Filter out comments and blank lines, then join into a comma-separated string
          ENV_VARS=$(grep -v '^\s*#' ${{ env.ENVIRONMENT_VARIABLES_PATH }} | grep -v '^\s*$' | paste -sd, -)
          echo "env_vars=$ENV_VARS" >> "$GITHUB_OUTPUT"

      - name: Deploy Cloud Run service
        if: env.DEPLOY == 'true'
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: lead-mgmt-service
          image: 'us-docker.pkg.dev/gcp-prj-images/gcp-gar-repo-mbrshp/cloud-run-service:latest'
          project_id: ${{ env.PROJECT_ID }}
          region: us-central1
          flags: |
            --service-account=${{ env.SERVICE_ACCOUNT }}
            --vpc-egress=all-traffic
            --ingress=internal-and-cloud-load-balancing
            --network=${{ env.NETWORK }}
            --subnet=${{ env.SUBNET }}
            --set-env-vars=${{ steps.env.outputs.env_vars }}
            --memory=512Mi
            --cpu=1
            --min-instances=0
            --max-instances=2
            --timeout=60
      
      - name: Clean up old revisions
        if: env.DEPLOY == 'true'
        run: |
          LATEST=$(gcloud run services describe lead-mgmt-service \
            --region us-central1 \
            --project "$PROJECT_ID" \
            --format="value(status.latestReadyRevisionName)")

          # Get all revisions except the latest, sorted oldest first, skip last 2
          gcloud run revisions list \
            --service lead-mgmt-service \
            --region us-central1 \
            --project "$PROJECT_ID" \
            --sort-by="~metadata.creationTimestamp" \
            --format="value(metadata.name)" \
            | grep -v "$LATEST" \
            | tail -n +3 \
            | xargs -I {} gcloud run revisions delete {} \
                --region us-central1 \
                --project "$PROJECT_ID" \
                --quiet || true
      - name: Get Service URL
        if: env.DEPLOY == 'true'
        id: get-service-url
        run: |
          SERVICE_URL=$(gcloud run services describe lead-mgmt-service \
            --project "$PROJECT_ID" \
            --region us-central1 \
            --format 'value(status.address.url)')

          echo "SERVICE_URL=$SERVICE_URL"
          echo "service_url=$SERVICE_URL" >> $GITHUB_OUTPUT

      # ── CHANGED: added update branch so cron changes take effect on redeploy ──
      - name: Add schedule to Cloud Run service
        if: env.DEPLOY == 'true'
        run: |
          if gcloud scheduler jobs describe lead-mgmt-scheduler \
            --project "$PROJECT_ID" \
            --location us-central1 > /dev/null 2>&1; then
            echo "Scheduler job exists. Updating..."
            gcloud scheduler jobs update http lead-mgmt-scheduler \
              --project "$PROJECT_ID" \
              --location us-central1 \
              --schedule="0 0 * * *" \
              --uri=${{ steps.get-service-url.outputs.service_url }}/health \
              --http-method=GET \
              --oidc-service-account-email=${{ env.SERVICE_ACCOUNT }}
          else
            echo "Creating scheduler job..."
            gcloud scheduler jobs create http lead-mgmt-scheduler \
              --project "$PROJECT_ID" \
              --location us-central1 \
              --schedule="0 0 * * *" \
              --uri=${{ steps.get-service-url.outputs.service_url }}/health \
              --http-method=GET \
              --oidc-service-account-email=${{ env.SERVICE_ACCOUNT }}
          fi

      # ── CHANGED: update instead of skip if exists + every 10 minutes schedule ──
      # - name: Add schedule to Cloud Run service (for drive to gcs sync)
      #   if: env.DEPLOY == 'true'
      #   run: |
      #     if gcloud scheduler jobs describe drive-sync-scheduler \
      #       --project "$PROJECT_ID" \
      #       --location us-central1 > /dev/null 2>&1; then
      #       echo "Scheduler job exists. Updating..."
      #       gcloud scheduler jobs update http drive-sync-scheduler \
      #         --project "$PROJECT_ID" \
      #         --location us-central1 \
      #         --schedule="*/10 * * * *" \
      #         --uri=${{ steps.get-service-url.outputs.service_url }}/trigger-drive-sync \
      #         --http-method=GET \
      #         --oidc-service-account-email=${{ env.SERVICE_ACCOUNT }}
          # else
          #   echo "Creating scheduler job..."
          #   gcloud scheduler jobs create http drive-sync-scheduler \
          #     --project "$PROJECT_ID" \
          #     --location us-central1 \
          #     --schedule="*/10 * * * *" \
          #     --uri=${{ steps.get-service-url.outputs.service_url }}/trigger-drive-sync \
          #     --http-method=GET \
          #     --oidc-service-account-email=${{ env.SERVICE_ACCOUNT }}
          # fi

      - name: Describe deployed service
        if: env.DEPLOY == 'true'
        run: |
          gcloud run services describe lead-mgmt-service \
            --region=us-central1 \
            --project="${PROJECT_ID}" \
            --format="yaml"