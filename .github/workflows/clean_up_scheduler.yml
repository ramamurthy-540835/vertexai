name: cleanup_scheduler_jobs

# ─────────────────────────────────────────────────────────────
# One-time cleanup workflow to delete legacy scheduler jobs
# from all three environments (adt, qat, spt).
#
# Manual trigger only. Remove this workflow file after running
# successfully — it's not meant to be a recurring operation.
# ─────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
    inputs:
      scheduler_job_name:
        description: 'Cloud Scheduler job name to delete (leave blank to skip)'
        required: false
        default: 'drive-sync-scheduler'
        type: string
      cloud_run_service_name:
        description: 'Cloud Run service name to delete (leave blank to skip)'
        required: false
        default: 'cloud-scheduler-service'
        type: string
      region:
        description: 'Region where the resources live'
        required: true
        default: 'us-central1'
        type: string

jobs:
  cleanup:
    name: "Cleanup in ${{ matrix.environment }}"
    runs-on: cw-gcp-us-west1-np

    permissions:
      id-token: write
      contents: read

    strategy:
      fail-fast: false   # don't stop if one env fails — try all three
      matrix:
        environment: [adt, qat, spt]

    env:
      SCHEDULER_JOB_NAME:     ${{ github.event.inputs.scheduler_job_name }}
      CLOUD_RUN_SERVICE_NAME: ${{ github.event.inputs.cloud_run_service_name }}
      REGION:                 ${{ github.event.inputs.region }}
      PROJECT_ID:             'p-601-np-bcleadsmgmt-${{ matrix.environment }}'

    steps:
      - name: Auth to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER_ID }}
          service_account: ${{ secrets.GCP_WORKLOAD_IDENTITY_SA_EMAIL }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      # ─────────────────────────────────────────────────────────
      # Delete the Cloud Scheduler job (if name provided)
      # ─────────────────────────────────────────────────────────
      - name: Delete Cloud Scheduler job
        id: scheduler
        if: ${{ github.event.inputs.scheduler_job_name != '' }}
        run: |
          set +e
          unset CLOUDSDK_CORE_PROJECT CLOUDSDK_PROJECT GCLOUD_PROJECT GCP_PROJECT GOOGLE_CLOUD_PROJECT

          echo "─── Scheduler: ${PROJECT_ID} ───"
          echo "Checking if '${SCHEDULER_JOB_NAME}' exists..."

          if gcloud scheduler jobs describe "${SCHEDULER_JOB_NAME}" \
               --location="${REGION}" \
               --project="${PROJECT_ID}" >/dev/null 2>&1; then

            echo "Found. Deleting..."
            gcloud scheduler jobs delete "${SCHEDULER_JOB_NAME}" \
              --location="${REGION}" \
              --project="${PROJECT_ID}" \
              --quiet

            if [ $? -eq 0 ]; then
              echo "✅ Deleted scheduler job '${SCHEDULER_JOB_NAME}' from ${PROJECT_ID}"
              echo "result=deleted" >> $GITHUB_OUTPUT
            else
              echo "❌ Failed to delete scheduler job (likely permission issue)"
              echo "result=failed" >> $GITHUB_OUTPUT
            fi
          else
            echo "ℹ️  Scheduler job not found in ${PROJECT_ID} (already deleted or never existed)"
            echo "result=not_found" >> $GITHUB_OUTPUT
          fi

      # ─────────────────────────────────────────────────────────
      # Delete the Cloud Run service (if name provided)
      # ─────────────────────────────────────────────────────────
      - name: Delete Cloud Run service
        id: service
        if: ${{ github.event.inputs.cloud_run_service_name != '' }}
        run: |
          set +e
          unset CLOUDSDK_CORE_PROJECT CLOUDSDK_PROJECT GCLOUD_PROJECT GCP_PROJECT GOOGLE_CLOUD_PROJECT

          echo "─── Cloud Run service: ${PROJECT_ID} ───"
          echo "Checking if '${CLOUD_RUN_SERVICE_NAME}' exists..."

          # Capture URL before deletion for audit trail
          SERVICE_URL=$(gcloud run services describe "${CLOUD_RUN_SERVICE_NAME}" \
            --region="${REGION}" \
            --project="${PROJECT_ID}" \
            --format="value(status.url)" 2>/dev/null)

          if [ -z "$SERVICE_URL" ]; then
            echo "ℹ️  Cloud Run service not found in ${PROJECT_ID}"
            echo "result=not_found" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Found at: ${SERVICE_URL}"
          echo "Deleting..."

          gcloud run services delete "${CLOUD_RUN_SERVICE_NAME}" \
            --region="${REGION}" \
            --project="${PROJECT_ID}" \
            --quiet

          if [ $? -eq 0 ]; then
            echo "✅ Deleted service '${CLOUD_RUN_SERVICE_NAME}' from ${PROJECT_ID}"
            echo "result=deleted" >> $GITHUB_OUTPUT
            echo "url=${SERVICE_URL}" >> $GITHUB_OUTPUT
          else
            echo "❌ Failed to delete Cloud Run service (likely permission issue)"
            echo "result=failed" >> $GITHUB_OUTPUT
          fi

      # ─────────────────────────────────────────────────────────
      # Per-environment summary
      # ─────────────────────────────────────────────────────────
      - name: Summary
        if: always()
        run: |
          {
            echo "## Cleanup — ${{ matrix.environment }}"
            echo ""
            echo "**Project:** \`${PROJECT_ID}\`"
            echo "**Region:** \`${REGION}\`"
            echo ""
            echo "### Scheduler Job"
            if [ -n "${SCHEDULER_JOB_NAME}" ]; then
              echo "- Name: \`${SCHEDULER_JOB_NAME}\`"
              echo "- Result: \`${{ steps.scheduler.outputs.result || 'skipped' }}\`"
            else
              echo "- Skipped (no scheduler_job_name input)"
            fi
            echo ""
            echo "### Cloud Run Service"
            if [ -n "${CLOUD_RUN_SERVICE_NAME}" ]; then
              echo "- Name: \`${CLOUD_RUN_SERVICE_NAME}\`"
              echo "- Result: \`${{ steps.service.outputs.result || 'skipped' }}\`"
              if [ -n "${{ steps.service.outputs.url }}" ]; then
                echo "- Was deployed at: \`${{ steps.service.outputs.url }}\`"
              fi
            else
              echo "- Skipped (no cloud_run_service_name input)"
            fi
          } >> $GITHUB_STEP_SUMMARY