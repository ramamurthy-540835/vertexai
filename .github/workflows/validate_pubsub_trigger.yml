name: "validate_pubsub_trigger"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to validate'
        required: true
        default: 'adt'
        type: choice
        options:
          - 'adt'
          - 'qat'
          - 'spt'

env:
  PROJECT_ID: 'p-601-np-bcleadsmgmt-${{ github.event.inputs.environment }}'
  REGION: 'us-central1'
  BUCKET_NAME: 'gcp-gcs-lead-mgmt-us-${{ github.event.inputs.environment }}-pos-raw'
  FOLDER_PREFIX: 'pos-raw-data'
  TOPIC_NAME: 'gcs-file-events-${{ github.event.inputs.environment }}'

jobs:
  validate:
    name: "Diagnose GCS Notification"
    runs-on: "ubuntu-latest"
    environment: ${{ github.event.inputs.environment }}

    permissions:
      id-token: write
      contents: read

    steps:
      - name: "Checkout code"
        uses: actions/checkout@v4

      - name: "Auth in GCP"
        id: "auth"
        uses: "google-github-actions/auth@v2"
        with:
          create_credentials_file: true
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER_ID }}
          service_account: ${{ secrets.GCP_WORKLOAD_IDENTITY_SA_EMAIL }}

      - name: "1. Check GCS notification exists on bucket"
        run: |
          unset CLOUDSDK_CORE_PROJECT
          unset CLOUDSDK_PROJECT
          unset GCLOUD_PROJECT
          unset GCP_PROJECT
          unset GOOGLE_CLOUD_PROJECT
          gcloud config set project $PROJECT_ID

          echo "=========================================="
          echo "Raw notification config on bucket"
          echo "=========================================="

          # List all notifications on the bucket
          gcloud storage buckets notifications list gs://$BUCKET_NAME \
            --project=$PROJECT_ID 2>&1

          echo ""
          echo "=========================================="
          echo "Checking GCS service agent identity"
          echo "=========================================="
          # Get the GCS service agent email for this project
          GCS_SA=$(gcloud storage service-agent \
            --project=$PROJECT_ID 2>&1)
          echo "GCS Service Agent: $GCS_SA"

          echo ""
          echo "=========================================="
          echo "Checking GCS service agent IAM on topic"
          echo "=========================================="
          # Check if GCS SA has pubsub.publisher on the topic
          gcloud pubsub topics get-iam-policy $TOPIC_NAME \
            --project=$PROJECT_ID \
            --format=json 2>&1

      - name: "2. Manually publish a test message to topic"
        run: |
          unset CLOUDSDK_CORE_PROJECT
          unset CLOUDSDK_PROJECT
          unset GCLOUD_PROJECT
          unset GCP_PROJECT
          unset GOOGLE_CLOUD_PROJECT
          gcloud config set project $PROJECT_ID

          echo "=========================================="
          echo "Publishing test message directly to topic"
          echo "to verify topic → workflow chain works"
          echo "=========================================="

          # Simulate what GCS notification would publish (base64 encoded GCS event)
          GCS_EVENT=$(echo -n '{
            "bucket": "'"$BUCKET_NAME"'",
            "name": "pos-raw-data/manual-test.txt",
            "contentType": "text/plain",
            "size": "123",
            "timeCreated": "'"$(date -u +%Y-%m-%dT%H:%M:%SZ)"'"
          }' | base64 -w 0)

          MSG_ID=$(gcloud pubsub topics publish $TOPIC_NAME \
            --project=$PROJECT_ID \
            --message="$GCS_EVENT" \
            --format="value(messageIds[0])" 2>&1)

          echo "✅ Published message ID: $MSG_ID"
          echo "Waiting 20s for workflow to trigger..."
          sleep 20

      - name: "3. Check if manual publish triggered the workflow"
        run: |
          unset CLOUDSDK_CORE_PROJECT
          unset CLOUDSDK_PROJECT
          unset GCLOUD_PROJECT
          unset GCP_PROJECT
          unset GOOGLE_CLOUD_PROJECT
          gcloud config set project $PROJECT_ID

          echo "=========================================="
          echo "Latest workflow executions after manual publish"
          echo "=========================================="

          gcloud workflows executions list lead_match_workflow \
            --location=$REGION \
            --project=$PROJECT_ID \
            --limit=3 \
            --format="table(name.basename(),state,startTime)" 2>&1

          echo ""
          echo "--- Latest execution detail ---"
          LATEST=$(gcloud workflows executions list lead_match_workflow \
            --location=$REGION \
            --project=$PROJECT_ID \
            --limit=1 \
            --format="value(name)" 2>&1)

          if [ -n "$LATEST" ]; then
            gcloud workflows executions describe $LATEST \
              --location=$REGION \
              --project=$PROJECT_ID \
              --format=json 2>&1 | python3 -c "
import json, sys, base64
data = json.load(sys.stdin)
print('State    :', data.get('state'))
print('Start    :', data.get('startTime'))
print()
if 'argument' in data:
    print('Input argument (raw):')
    try:
        arg = json.loads(data['argument'])
        print(json.dumps(arg, indent=2))
        if 'message' in arg and 'data' in arg['message']:
            decoded = base64.b64decode(arg['message']['data']).decode('utf-8')
            print()
            print('Decoded GCS event:')
            print(json.dumps(json.loads(decoded), indent=2))
    except Exception as e:
        print(data.get('argument'))
        print('Parse error:', e)
print()
if 'error' in data:
    print('ERROR:', json.dumps(data['error'], indent=2))
"
          else
            echo "❌ No executions found — push subscription is not delivering to workflow"
          fi

      - name: "4. Upload real file and check topic message count"
        run: |
          unset CLOUDSDK_CORE_PROJECT
          unset CLOUDSDK_PROJECT
          unset GCLOUD_PROJECT
          unset GCP_PROJECT
          unset GOOGLE_CLOUD_PROJECT
          gcloud config set project $PROJECT_ID

          echo "=========================================="
          echo "Uploading file and watching topic for messages"
          echo "=========================================="

          # Upload file
          TEST_FILE="pos-raw-data/notification-test-$(date +%s).txt"
          echo "notification test" > /tmp/notif-test.txt
          gcloud storage cp /tmp/notif-test.txt gs://$BUCKET_NAME/$TEST_FILE \
            --project=$PROJECT_ID
          echo "✅ Uploaded: gs://$BUCKET_NAME/$TEST_FILE"

          echo "Waiting 10s then pulling from subscription to see if message arrived..."
          sleep 10

          # Try to pull directly from push sub to see if message arrived
          # (temporarily pull to check — won't ack so push still delivers)
          echo ""
          echo "--- Checking dead-letter for any failed messages ---"
          gcloud pubsub subscriptions pull "${TOPIC_NAME}-deadletter-sub" \
            --project=$PROJECT_ID \
            --limit=5 \
            --auto-ack 2>&1

          echo ""
          echo "--- Topic details ---"
          gcloud pubsub topics describe $TOPIC_NAME \
            --project=$PROJECT_ID \
            --format=json 2>&1


jobs:
  validate:
    name: "Validate Pub/Sub Trigger"
    runs-on: "ubuntu-latest"
    environment: ${{ github.event.inputs.environment }}

    permissions:
      id-token: write
      contents: read

    steps:
      - name: "Checkout code"
        uses: actions/checkout@v4

      - name: "Auth in GCP"
        id: "auth"
        uses: "google-github-actions/auth@v2"
        with:
          create_credentials_file: true
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER_ID }}
          service_account: ${{ secrets.GCP_WORKLOAD_IDENTITY_SA_EMAIL }}

      - name: "1. Point push subscription to test workflow"
        run: |
          unset CLOUDSDK_CORE_PROJECT
          unset CLOUDSDK_PROJECT
          unset GCLOUD_PROJECT
          unset GCP_PROJECT
          unset GOOGLE_CLOUD_PROJECT
          gcloud config set project $PROJECT_ID

          echo "=========================================="
          echo "Updating push subscription endpoint to test workflow"
          echo "=========================================="

          TEST_ENDPOINT="https://workflowexecutions.googleapis.com/v1/projects/${PROJECT_ID}/locations/${REGION}/workflows/${TEST_WORKFLOW_NAME}/executions"

          gcloud pubsub subscriptions modify-push-config \
            "${TOPIC_NAME}-push-sub" \
            --push-endpoint="$TEST_ENDPOINT" \
            --push-auth-service-account="gco-iam-svc-lead-mgmt-bc-adt@${PROJECT_ID}.iam.gserviceaccount.com" \
            --project=$PROJECT_ID

          echo "✅ Push subscription now points to: $TEST_ENDPOINT"

      - name: "2. Upload test file to trigger the chain"
        run: |
          unset CLOUDSDK_CORE_PROJECT
          unset CLOUDSDK_PROJECT
          unset GCLOUD_PROJECT
          unset GCP_PROJECT
          unset GOOGLE_CLOUD_PROJECT
          gcloud config set project $PROJECT_ID

          echo "=========================================="
          echo "Uploading test file to watched folder"
          echo "=========================================="

          TEST_FILE="pos-raw-data/e2e-trigger-test-$(date +%s).txt"
          echo "gcs pubsub trigger test - $(date)" > /tmp/test-trigger.txt

          gcloud storage cp /tmp/test-trigger.txt gs://$BUCKET_NAME/$TEST_FILE \
            --project=$PROJECT_ID

          echo "✅ Uploaded: gs://$BUCKET_NAME/$TEST_FILE"
          echo "TEST_FILE=$TEST_FILE" >> $GITHUB_ENV

          echo "Waiting 30s for Pub/Sub → Workflow chain..."
          sleep 30

      - name: "3. Check test workflow execution and log output"
        run: |
          unset CLOUDSDK_CORE_PROJECT
          unset CLOUDSDK_PROJECT
          unset GCLOUD_PROJECT
          unset GCP_PROJECT
          unset GOOGLE_CLOUD_PROJECT
          gcloud config set project $PROJECT_ID

          echo "=========================================="
          echo "Latest test workflow execution"
          echo "=========================================="

          LATEST=$(gcloud workflows executions list $TEST_WORKFLOW_NAME \
            --location=$REGION \
            --project=$PROJECT_ID \
            --limit=1 \
            --format="value(name)" 2>&1)

          echo "Execution: $LATEST"

          if [ -z "$LATEST" ]; then
            echo "❌ No executions found — chain is broken before reaching the workflow"
            exit 1
          fi

          echo ""
          echo "--- Execution detail ---"
          gcloud workflows executions describe $LATEST \
            --location=$REGION \
            --project=$PROJECT_ID \
            --format=json 2>&1 | python3 -c "
import json, sys
data = json.load(sys.stdin)
print('State     :', data.get('state'))
print('StartTime :', data.get('startTime'))
print('EndTime   :', data.get('endTime'))
print()
if 'argument' in data:
    print('Input (raw Pub/Sub payload):')
    try:
        arg = json.loads(data['argument'])
        print(json.dumps(arg, indent=2))
        # Decode the base64 GCS event if present
        if 'message' in arg and 'data' in arg['message']:
            import base64
            decoded = base64.b64decode(arg['message']['data']).decode('utf-8')
            print()
            print('Decoded GCS event:')
            print(json.dumps(json.loads(decoded), indent=2))
    except:
        print(data['argument'])
print()
if 'error' in data:
    print('ERROR:')
    print(json.dumps(data['error'], indent=2))
if 'result' in data:
    print('Result:')
    try:
        print(json.dumps(json.loads(data['result']), indent=2))
    except:
        print(data['result'])
"

      - name: "4. Restore push subscription to real workflow"
        if: always()
        run: |
          unset CLOUDSDK_CORE_PROJECT
          unset CLOUDSDK_PROJECT
          unset GCLOUD_PROJECT
          unset GCP_PROJECT
          unset GOOGLE_CLOUD_PROJECT
          gcloud config set project $PROJECT_ID

          echo "=========================================="
          echo "Restoring push subscription to lead_match_workflow"
          echo "=========================================="

          REAL_ENDPOINT="https://workflowexecutions.googleapis.com/v1/projects/${PROJECT_ID}/locations/${REGION}/workflows/lead_match_workflow/executions"

          gcloud pubsub subscriptions modify-push-config \
            "${TOPIC_NAME}-push-sub" \
            --push-endpoint="$REAL_ENDPOINT" \
            --push-auth-service-account="gco-iam-svc-lead-mgmt-bc-adt@${PROJECT_ID}.iam.gserviceaccount.com" \
            --project=$PROJECT_ID

          echo "✅ Restored push subscription to: $REAL_ENDPOINT"