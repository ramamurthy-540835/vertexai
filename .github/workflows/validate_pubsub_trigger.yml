name: "validate_pubsub_trigger"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to validate'
        required: true
        default: 'adt'
        type: choice
        options:
          - 'adt'
          - 'qat'
          - 'spt'

env:
  PROJECT_ID: 'p-601-np-bcleadsmgmt-${{ github.event.inputs.environment }}'
  REGION: 'us-central1'
  BUCKET_NAME: 'gcp-gcs-lead-mgmt-us-${{ github.event.inputs.environment }}-pos-raw'
  FOLDER_PREFIX: 'pos-raw-data'
  TOPIC_NAME: 'gcs-file-events-${{ github.event.inputs.environment }}'
  TEST_WORKFLOW_NAME: 'gcs-pubsub-trigger-test'

jobs:
  validate:
    name: "Validate Pub/Sub Trigger"
    runs-on: "ubuntu-latest"
    environment: ${{ github.event.inputs.environment }}

    permissions:
      id-token: write
      contents: read

    steps:
      - name: "Checkout code"
        uses: actions/checkout@v4

      - name: "Auth in GCP"
        id: "auth"
        uses: "google-github-actions/auth@v2"
        with:
          create_credentials_file: true
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER_ID }}
          service_account: ${{ secrets.GCP_WORKLOAD_IDENTITY_SA_EMAIL }}

      - name: "1. Point push subscription to test workflow"
        run: |
          unset CLOUDSDK_CORE_PROJECT
          unset CLOUDSDK_PROJECT
          unset GCLOUD_PROJECT
          unset GCP_PROJECT
          unset GOOGLE_CLOUD_PROJECT
          gcloud config set project $PROJECT_ID

          echo "=========================================="
          echo "Updating push subscription endpoint to test workflow"
          echo "=========================================="

          TEST_ENDPOINT="https://workflowexecutions.googleapis.com/v1/projects/${PROJECT_ID}/locations/${REGION}/workflows/${TEST_WORKFLOW_NAME}/executions"

          gcloud pubsub subscriptions modify-push-config \
            "${TOPIC_NAME}-push-sub" \
            --push-endpoint="$TEST_ENDPOINT" \
            --push-auth-service-account="gco-iam-svc-lead-mgmt-bc-adt@${PROJECT_ID}.iam.gserviceaccount.com" \
            --project=$PROJECT_ID

          echo "✅ Push subscription now points to: $TEST_ENDPOINT"

      - name: "2. Upload test file to trigger the chain"
        run: |
          unset CLOUDSDK_CORE_PROJECT
          unset CLOUDSDK_PROJECT
          unset GCLOUD_PROJECT
          unset GCP_PROJECT
          unset GOOGLE_CLOUD_PROJECT
          gcloud config set project $PROJECT_ID

          echo "=========================================="
          echo "Uploading test file to watched folder"
          echo "=========================================="

          TEST_FILE="pos-raw-data/e2e-trigger-test-$(date +%s).txt"
          echo "gcs pubsub trigger test - $(date)" > /tmp/test-trigger.txt

          gcloud storage cp /tmp/test-trigger.txt gs://$BUCKET_NAME/$TEST_FILE \
            --project=$PROJECT_ID

          echo "✅ Uploaded: gs://$BUCKET_NAME/$TEST_FILE"
          echo "TEST_FILE=$TEST_FILE" >> $GITHUB_ENV

          echo "Waiting 30s for Pub/Sub → Workflow chain..."
          sleep 30

      - name: "3. Check test workflow execution and log output"
        run: |
          unset CLOUDSDK_CORE_PROJECT
          unset CLOUDSDK_PROJECT
          unset GCLOUD_PROJECT
          unset GCP_PROJECT
          unset GOOGLE_CLOUD_PROJECT
          gcloud config set project $PROJECT_ID

          echo "=========================================="
          echo "Latest test workflow execution"
          echo "=========================================="

          LATEST=$(gcloud workflows executions list $TEST_WORKFLOW_NAME \
            --location=$REGION \
            --project=$PROJECT_ID \
            --limit=1 \
            --format="value(name)" 2>&1)

          echo "Execution: $LATEST"

          if [ -z "$LATEST" ]; then
            echo "❌ No executions found — chain is broken before reaching the workflow"
            exit 1
          fi

          echo ""
          echo "--- Execution detail ---"
          gcloud workflows executions describe $LATEST \
            --location=$REGION \
            --project=$PROJECT_ID \
            --format=json 2>&1 | python3 -c "
import json, sys
data = json.load(sys.stdin)
print('State     :', data.get('state'))
print('StartTime :', data.get('startTime'))
print('EndTime   :', data.get('endTime'))
print()
if 'argument' in data:
    print('Input (raw Pub/Sub payload):')
    try:
        arg = json.loads(data['argument'])
        print(json.dumps(arg, indent=2))
        # Decode the base64 GCS event if present
        if 'message' in arg and 'data' in arg['message']:
            import base64
            decoded = base64.b64decode(arg['message']['data']).decode('utf-8')
            print()
            print('Decoded GCS event:')
            print(json.dumps(json.loads(decoded), indent=2))
    except:
        print(data['argument'])
print()
if 'error' in data:
    print('ERROR:')
    print(json.dumps(data['error'], indent=2))
if 'result' in data:
    print('Result:')
    try:
        print(json.dumps(json.loads(data['result']), indent=2))
    except:
        print(data['result'])
"

      - name: "4. Restore push subscription to real workflow"
        if: always()
        run: |
          unset CLOUDSDK_CORE_PROJECT
          unset CLOUDSDK_PROJECT
          unset GCLOUD_PROJECT
          unset GCP_PROJECT
          unset GOOGLE_CLOUD_PROJECT
          gcloud config set project $PROJECT_ID

          echo "=========================================="
          echo "Restoring push subscription to snow_sync_workflow"
          echo "=========================================="

          REAL_ENDPOINT="https://workflowexecutions.googleapis.com/v1/projects/${PROJECT_ID}/locations/${REGION}/workflows/snow_sync_workflow/executions"

          gcloud pubsub subscriptions modify-push-config \
            "${TOPIC_NAME}-push-sub" \
            --push-endpoint="$REAL_ENDPOINT" \
            --push-auth-service-account="gco-iam-svc-lead-mgmt-bc-adt@${PROJECT_ID}.iam.gserviceaccount.com" \
            --project=$PROJECT_ID

          echo "✅ Restored push subscription to: $REAL_ENDPOINT"
