name: "validate_pubsub_trigger"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to validate'
        required: true
        default: 'adt'
        type: choice
        options:
          - 'adt'
          - 'qat'
          - 'spt'

env:
  PROJECT_ID: 'p-601-np-bcleadsmgmt-${{ github.event.inputs.environment }}'
  REGION: 'us-central1'
  BUCKET_NAME: 'gcp-gcs-lead-mgmt-us-${{ github.event.inputs.environment }}-pos-raw'
  TOPIC_NAME: 'gcs-file-events-${{ github.event.inputs.environment }}'
  WORKFLOW_NAME: 'lead_match_workflow'
  SA_EMAIL: 'gco-iam-svc-lead-mgmt-bc-adt@p-601-np-bcleadsmgmt-${{ github.event.inputs.environment }}.iam.gserviceaccount.com'

jobs:
  validate:
    name: "Diagnose GCS Pub/Sub Trigger"
    runs-on: "ubuntu-latest"
    environment: ${{ github.event.inputs.environment }}

    permissions:
      id-token: write
      contents: read

    steps:
      - name: "Checkout code"
        uses: actions/checkout@v4

      - name: "Auth in GCP"
        id: "auth"
        uses: "google-github-actions/auth@v2"
        with:
          create_credentials_file: true
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER_ID }}
          service_account: ${{ secrets.GCP_WORKLOAD_IDENTITY_SA_EMAIL }}

      - name: "1. Check GCS notification and service agent IAM"
        run: |
          unset CLOUDSDK_CORE_PROJECT CLOUDSDK_PROJECT GCLOUD_PROJECT GCP_PROJECT GOOGLE_CLOUD_PROJECT
          gcloud config set project $PROJECT_ID

          echo "=== GCS Notifications on bucket ==="
          gcloud storage buckets notifications list gs://$BUCKET_NAME --project=$PROJECT_ID 2>&1

          echo ""
          echo "=== GCS Service Agent ==="
          gcloud storage service-agent --project=$PROJECT_ID 2>&1

          echo ""
          echo "=== Topic IAM Policy ==="
          gcloud pubsub topics get-iam-policy $TOPIC_NAME --project=$PROJECT_ID 2>&1

      - name: "2. Manually publish to topic and check workflow triggers"
        run: |
          unset CLOUDSDK_CORE_PROJECT CLOUDSDK_PROJECT GCLOUD_PROJECT GCP_PROJECT GOOGLE_CLOUD_PROJECT
          gcloud config set project $PROJECT_ID

          echo "=== Publishing simulated GCS event to topic ==="
          GCS_EVENT=$(printf '{"bucket":"%s","name":"pos-raw-data/manual-test.txt","contentType":"text/plain","size":"5"}' "$BUCKET_NAME" | base64 -w 0)

          MSG_ID=$(gcloud pubsub topics publish $TOPIC_NAME \
            --project=$PROJECT_ID \
            --message="$GCS_EVENT" \
            --format="value(messageIds[0])" 2>&1)
          echo "Published message ID: $MSG_ID"

          echo "Waiting 20s for push delivery..."
          sleep 20

          echo ""
          echo "=== Workflow executions after manual publish ==="
          gcloud workflows executions list $WORKFLOW_NAME \
            --location=$REGION \
            --project=$PROJECT_ID \
            --limit=3 \
            --format="table(name.basename(),state,startTime)" 2>&1

      - name: "3. Get latest execution detail"
        run: |
          unset CLOUDSDK_CORE_PROJECT CLOUDSDK_PROJECT GCLOUD_PROJECT GCP_PROJECT GOOGLE_CLOUD_PROJECT
          gcloud config set project $PROJECT_ID

          LATEST=$(gcloud workflows executions list $WORKFLOW_NAME \
            --location=$REGION \
            --project=$PROJECT_ID \
            --limit=1 \
            --format="value(name)" 2>&1)

          if [ -z "$LATEST" ]; then
            echo "âťŚ No executions found â€” push subscription not reaching workflow"
            exit 0
          fi

          echo "=== Latest execution: $LATEST ==="
          gcloud workflows executions describe $LATEST \
            --location=$REGION \
            --project=$PROJECT_ID \
            --format="table(state,startTime,endTime,error)" 2>&1

          echo ""
          echo "=== Raw input argument ==="
          gcloud workflows executions describe $LATEST \
            --location=$REGION \
            --project=$PROJECT_ID \
            --format="value(argument)" 2>&1

          echo ""
          echo "=== Error detail (if any) ==="
          gcloud workflows executions describe $LATEST \
            --location=$REGION \
            --project=$PROJECT_ID \
            --format="value(error)" 2>&1

      - name: "4. Upload real file and check dead-letter"
        run: |
          unset CLOUDSDK_CORE_PROJECT CLOUDSDK_PROJECT GCLOUD_PROJECT GCP_PROJECT GOOGLE_CLOUD_PROJECT
          gcloud config set project $PROJECT_ID

          echo "=== Uploading file to watched folder ==="
          TEST_FILE="pos-raw-data/notification-test-$(date +%s).txt"
          echo "notification test" > /tmp/notif-test.txt
          gcloud storage cp /tmp/notif-test.txt gs://$BUCKET_NAME/$TEST_FILE --project=$PROJECT_ID
          echo "Uploaded: gs://$BUCKET_NAME/$TEST_FILE"

          echo "Waiting 15s..."
          sleep 15

          echo ""
          echo "=== Dead-letter messages (should be empty) ==="
          gcloud pubsub subscriptions pull "${TOPIC_NAME}-deadletter-sub" \
            --project=$PROJECT_ID \
            --limit=5 \
            --auto-ack 2>&1

      - name: "Summary"
        if: always()
        run: |
          echo "Project  : $PROJECT_ID"
          echo "Bucket   : $BUCKET_NAME"
          echo "Topic    : $TOPIC_NAME"
          echo "Workflow : $WORKFLOW_NAME"
      - name: "Pull dead-letter messages"
        run: |
          unset CLOUDSDK_CORE_PROJECT CLOUDSDK_PROJECT GCLOUD_PROJECT GCP_PROJECT GOOGLE_CLOUD_PROJECT
          gcloud config set project $PROJECT_ID

          gcloud pubsub subscriptions pull "${TOPIC_NAME}-deadletter-sub" \
            --project=$PROJECT_ID \
            --limit=1 \
            --format=json 2>&1

      - name: "Verify workflow exists"
        run: |
          unset CLOUDSDK_CORE_PROJECT CLOUDSDK_PROJECT GCLOUD_PROJECT GCP_PROJECT GOOGLE_CLOUD_PROJECT
          gcloud config set project p-601-np-bcleadsmgmt-adt

          echo "=== List all workflows ==="
          gcloud workflows list \
            --location=us-central1 \
            --project=p-601-np-bcleadsmgmt-adt \
            --format="table(name,state,updateTime)" 2>&1

          echo ""
          echo "=== Manually trigger workflow to confirm it works ==="
          gcloud workflows run lead_match_workflow \
            --location=us-central1 \
            --project=p-601-np-bcleadsmgmt-adt \
            --data='{"message":{"data":"eyJidWNrZXQiOiJ0ZXN0IiwibmFtZSI6InRlc3QudHh0In0=","messageId":"123","publishTime":"2026-05-08T00:00:00Z"},"subscription":"test"}' 2>&1