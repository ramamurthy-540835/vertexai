name: "validate_pubsub_trigger"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to validate'
        required: true
        default: 'adt'
        type: choice
        options:
          - 'adt'
          - 'qat'
          - 'spt'

env:
  PROJECT_ID: 'p-601-np-bcleadsmgmt-${{ github.event.inputs.environment }}'
  REGION: 'us-central1'
  BUCKET_NAME: 'gcp-gcs-lead-mgmt-us-${{ github.event.inputs.environment }}-pos-raw'
  FOLDER_PREFIX: 'manifests'
  TOPIC_NAME: 'gcs-file-events-${{ github.event.inputs.environment }}'
  WORKFLOW_NAME: 'snow_sync_workflow'

jobs:
  validate:
    name: "Validate Pub/Sub Trigger"
    runs-on: "ubuntu-latest"
    environment: ${{ github.event.inputs.environment }}

    permissions:
      id-token: write
      contents: read

    steps:
      - name: "Checkout code"
        uses: actions/checkout@v4

      - name: "Auth in GCP"
        id: "auth"
        uses: "google-github-actions/auth@v2"
        with:
          create_credentials_file: true
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER_ID }}
          service_account: ${{ secrets.GCP_WORKLOAD_IDENTITY_SA_EMAIL }}

      - name: "1. Validate Pub/Sub Topic exists"
        run: |
          unset CLOUDSDK_CORE_PROJECT
          gcloud config set project $PROJECT_ID

          echo "=========================================="
          echo "Checking topic: $TOPIC_NAME"
          echo "=========================================="

          TOPIC=$(gcloud pubsub topics describe $TOPIC_NAME \
            --project=$PROJECT_ID \
            --format="value(name)" 2>&1)

          if echo "$TOPIC" | grep -q "topics/$TOPIC_NAME"; then
            echo "✅ Topic exists: $TOPIC"
          else
            echo "❌ Topic NOT found: $TOPIC_NAME"
            exit 1
          fi

      - name: "2. Ensure GCS Notification exists with correct folder prefix"
        run: |
          unset CLOUDSDK_CORE_PROJECT
          gcloud config set project $PROJECT_ID

          echo "=========================================="
          echo "Checking GCS notification configuration"
          echo "=========================================="

          EXISTING_NOTIFICATION=$(gcloud storage buckets notifications list gs://$BUCKET_NAME \
            --format=json 2>/dev/null || echo "[]")

          echo "$EXISTING_NOTIFICATION"

          if echo "$EXISTING_NOTIFICATION" | grep -q "$TOPIC_NAME" && \
             echo "$EXISTING_NOTIFICATION" | grep -q "manifests/"; then

            echo "✅ Correct notification already exists. Skipping creation."

          else
            echo "⚠️ Correct notification not found. Creating new notification..."

            gcloud storage buckets notifications create gs://$BUCKET_NAME \
              --topic=$TOPIC_NAME \
              --payload-format=json \
              --event-types=OBJECT_FINALIZE \
              --object-prefix=manifests/

            echo "✅ Notification created successfully"
          fi

      - name: "2. Validate GCS Bucket Notification exists"
        run: |
          unset CLOUDSDK_CORE_PROJECT
          gcloud config set project $PROJECT_ID

          echo "=========================================="
          echo "Checking GCS notification on bucket: $BUCKET_NAME"
          echo "=========================================="

          NOTIFICATIONS=$(gsutil notification list gs://$BUCKET_NAME 2>&1)

          if echo "$NOTIFICATIONS" | grep -q "$TOPIC_NAME"; then
            echo "✅ GCS notification found pointing to topic: $TOPIC_NAME"
          else
            echo "❌ No notification found for topic: $TOPIC_NAME"
            echo "$NOTIFICATIONS"
            exit 1
          fi

          if echo "$NOTIFICATIONS" | grep -q "$FOLDER_PREFIX"; then
            echo "✅ Notification is scoped to folder prefix: $FOLDER_PREFIX"
          else
            echo "❌ Folder prefix not found in notification config: $FOLDER_PREFIX"
            echo "$NOTIFICATIONS"
            exit 1
          fi

          if echo "$NOTIFICATIONS" | grep -q "OBJECT_FINALIZE"; then
            echo "✅ Event type is OBJECT_FINALIZE"
          else
            echo "❌ OBJECT_FINALIZE event type not set"
            exit 1
          fi

      - name: "3. End-to-End Test — Upload JSON file and verify workflow triggered"
        run: |
          unset CLOUDSDK_CORE_PROJECT
          gcloud config set project $PROJECT_ID

          echo "=========================================="
          echo "Uploading test JSON file to manifests folder"
          echo "=========================================="

          TEST_FILE="manifests/e2e-trigger-test-$(date +%s).json"

          cat <<EOF > /tmp/test-trigger.json
          {
            "test": true,
            "environment": "${{ github.event.inputs.environment }}",
            "timestamp": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          }
          EOF

          gsutil cp /tmp/test-trigger.json gs://$BUCKET_NAME/$TEST_FILE

          if [ $? -eq 0 ]; then
            echo "✅ Test JSON file uploaded: gs://$BUCKET_NAME/$TEST_FILE"
          else
            echo "❌ Failed to upload test JSON file"
            exit 1
          fi

          echo "Waiting 15s for Pub/Sub → Eventarc → Workflow trigger..."
          sleep 15

      - name: "4. Validate Workflow Execution was triggered"
        run: |
          unset CLOUDSDK_CORE_PROJECT
          gcloud config set project $PROJECT_ID

          echo "=========================================="
          echo "Checking workflow executions: $WORKFLOW_NAME"
          echo "=========================================="

          LATEST_EXECUTION=$(gcloud workflows executions list $WORKFLOW_NAME \
            --location=$REGION \
            --project=$PROJECT_ID \
            --limit=1 \
            --format="value(name,state,startTime)" 2>&1)

          echo "Latest execution: $LATEST_EXECUTION"

          if echo "$LATEST_EXECUTION" | grep -qE "SUCCEEDED|ACTIVE|RUNNING"; then
            echo "✅ Workflow execution triggered successfully"
          else
            echo "⚠️ Latest execution state may need manual review:"
            echo "$LATEST_EXECUTION"
          fi

          echo "---"
          echo "Last 3 executions:"

          gcloud workflows executions list $WORKFLOW_NAME \
            --location=$REGION \
            --project=$PROJECT_ID \
            --limit=3 \
            --format="table(name.basename(),state,startTime,endTime)"

      - name: "Summary"
        if: always()
        run: |
          echo "=========================================="
          echo "VALIDATION SUMMARY"
          echo "Environment : ${{ github.event.inputs.environment }}"
          echo "Project     : $PROJECT_ID"
          echo "Bucket      : $BUCKET_NAME"
          echo "Folder      : $FOLDER_PREFIX/"
          echo "Topic       : $TOPIC_NAME"
          echo "Workflow    : $WORKFLOW_NAME"
          echo "=========================================="