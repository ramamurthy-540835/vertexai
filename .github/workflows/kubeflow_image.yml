name: container-test
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    paths:
      - .github/workflows/kubeflow_image.yml
      - base_image/**

jobs:
  build-and-push-container:
    name: Build and Push Container
    runs-on:
      - self-hosted
      - us-west1
    permissions:
      id-token: write
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10.16'
      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build wheel setuptools
      - name: Build wheel and replace existing
        run: |
          # Remove existing wheel files
          rm -f base_image/*.whl
          # Build new wheel
          python -m build --wheel
          # Copy the built wheel to base_image directory
          cp dist/*.whl ./base_image/
        working-directory: ./lead_match_codebase
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: auth
        name: Auth to GCP for GAR service account
        uses : google-github-actions/auth@v2
        with:
          token_format: access_token
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER_ID}}
          service_account: ${{ secrets.GCP_WORKLOAD_IDENTITY_SA_EMAIL}}
      - name: Login to Google Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: us-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository_owner }}/membership/lead-management/kubeflow
            us-docker.pkg.dev/gcp-prj-images/gcp-gar-repo-mbrshp/kubeflow
      - name: Build and push
        uses: docker/build-push-action@v6
        env:
          SOURCE_DATE_EPOCH: 0
        with:
          context: ./base_image
          file: ./base_image/Dockerfile
          push: true
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ steps.meta.outputs.tags }}
