name: gcloud-adhoc-runner

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - adt
          - qat
          - spt
          - prd
      gcloud_command:
        description: "gcloud command to run (without 'gcloud' prefix)"
        required: true
        type: string
        default: "run jobs list --region us-central1"
      dry_run:
        description: "Dry run — print command without executing"
        required: false
        type: boolean
        default: false

jobs:
  run-gcloud-command:
    runs-on:
      - self-hosted
      - us-central1
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Resolve environment config
        id: config
        run: |
          case "${{ inputs.environment }}" in
            adt)
              echo "PROJECT_ID=p-601-np-bcleadsmgmt-adt" >> $GITHUB_ENV
              echo "SA_EMAIL=gco-iam-svc-lead-mgmt-bc-adt@p-601-np-bcleadsmgmt-adt.iam.gserviceaccount.com" >> $GITHUB_ENV
              echo "USE_PRD_SA=false" >> $GITHUB_ENV
              ;;
            qat)
              echo "PROJECT_ID=p-601-np-bcleadsmgmt-qat" >> $GITHUB_ENV
              echo "SA_EMAIL=gco-iam-svc-lead-mgmt-bc-qat@p-601-np-bcleadsmgmt-qat.iam.gserviceaccount.com" >> $GITHUB_ENV
              echo "USE_PRD_SA=false" >> $GITHUB_ENV
              ;;
            spt)
              echo "PROJECT_ID=p-601-np-bcleadsmgmt-spt" >> $GITHUB_ENV
              echo "SA_EMAIL=gco-iam-svc-lead-mgmt-bc-spt@p-601-np-bcleadsmgmt-spt.iam.gserviceaccount.com" >> $GITHUB_ENV
              echo "USE_PRD_SA=false" >> $GITHUB_ENV
              ;;
            prd)
              echo "PROJECT_ID=p-601-pd-bcleadsmgmt-prd" >> $GITHUB_ENV
              echo "SA_EMAIL=gco-iam-svc-lead-mgmt-bc-prd@p-601-pd-bcleadsmgmt-prd.iam.gserviceaccount.com" >> $GITHUB_ENV
              echo "USE_PRD_SA=true" >> $GITHUB_ENV
              ;;
          esac

      - name: Auth to GCP
        id: auth
        uses: google-github-actions/auth@v2
        with:
          token_format: access_token
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER_ID }}
          service_account: ${{ env.USE_PRD_SA == 'true' && secrets.GCP_WORKLOAD_IDENTITY_SA_EMAIL_PRD || secrets.GCP_WORKLOAD_IDENTITY_SA_EMAIL }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Print command info
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Environment : ${{ inputs.environment }}"
          echo "  Project     : ${{ env.PROJECT_ID }}"
          echo "  Command     : gcloud ${{ inputs.gcloud_command }} --project=${{ env.PROJECT_ID }}"
          echo "  Dry Run     : ${{ inputs.dry_run }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: Run gcloud command
        if: ${{ inputs.dry_run == false }}
        run: |
          gcloud ${{ inputs.gcloud_command }} --project=${{ env.PROJECT_ID }}

      - name: Dry run — skipped execution
        if: ${{ inputs.dry_run == true }}
        run: |
          echo "DRY RUN — command not executed."
          echo "Would have run: gcloud ${{ inputs.gcloud_command }} --project=${{ env.PROJECT_ID }}"
          
      # ⚠️ ONE-TIME STEP — Remove after verification email is clicked
      - name: "Send Notification Channel Verification Email"
        run: |
          TOKEN=$(gcloud auth print-access-token)
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            "https://monitoring.googleapis.com/v3/projects/p-601-np-bcleadsmgmt-adt/notificationChannels/13865619225938118016:sendVerificationCode" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d '{}')
          echo "Response code: $RESPONSE"
          if [ "$RESPONSE" == "200" ]; then
            echo "✅ Verification email sent to membership_mit_team@costco.com"
          else
            echo "❌ Failed to send verification email. HTTP status: $RESPONSE"
            exit 1
          fi