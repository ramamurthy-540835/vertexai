name: deploy-snow-sync-job

on:
  workflow_call:
    inputs:
      workflow_trigger_event:
        required: true
        type: string
      image_tag:
        required: false
        type: string
        default: ''
    secrets:
      GCP_WORKLOAD_IDENTITY_PROVIDER_ID:
        required: true
      GCP_WORKLOAD_IDENTITY_SA_EMAIL:
        required: true
      GCP_WORKLOAD_IDENTITY_SA_EMAIL_PRD:
        required: false
  # workflow_call ONLY. No self-triggers — invoked by an orchestrator
  # (lead_mgmt_image_creation.yml for ADT, deploy_all_environments.yml for
  # QAT/SPT/PRD). Removing the push block is what kills the double-run.

jobs:
  build-and-deploy:
    runs-on: ${{ startsWith(github.ref, 'refs/tags/release-prd-phase2') && 'cw-gcp-us-west1-pd' || 'cw-gcp-us-west1-np' }}
    permissions:
      id-token: write
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set ENV early for auth
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/release-prd-phase2-* ]]; then
            echo "ENV=prd" >> $GITHUB_ENV
          else
            echo "ENV=non-prd" >> $GITHUB_ENV
          fi

      - id: auth
        name: Auth to GCP for GAR service account
        uses: google-github-actions/auth@v2
        with:
          token_format: access_token
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER_ID }}
          service_account: ${{ env.ENV == 'prd' && secrets.GCP_WORKLOAD_IDENTITY_SA_EMAIL_PRD || secrets.GCP_WORKLOAD_IDENTITY_SA_EMAIL }}

      - name: Determine environment and conditions
        id: config
        run: |
          REF_NAME="${GITHUB_REF_NAME}"
          REF="${GITHUB_REF}"

          if [[ -z "$WORKFLOW_TRIGGER" ]]; then
           WORKFLOW_TRIGGER="False"
          fi
          echo "WORKFLOW_TRIGGER=$WORKFLOW_TRIGGER"

          get_modified_files() {
            if [[ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]]; then
              git diff --name-only "${{ github.event.before }}" "${{ github.sha }}"
            else
              git show --pretty="" --name-only "${{ github.sha }}"
            fi
          }

          if [[ "$REF" == refs/heads/feature* ]]; then
            MODIFIED_FILES="$(get_modified_files)"
            echo "$MODIFIED_FILES"
          fi

          # DEPLOY_PARAMS_PATH = shared per-env file holding IMAGE_TAG + infra tunables
          # ENVIRONMENT_VARIABLES_PATH = this job's own runtime env vars
          if [[ "$WORKFLOW_TRIGGER" == "True" || ("$REF" == refs/heads/feature* && "$MODIFIED_FILES" == *".github/workflows/snow_sync_job_deployment.yml"* )]]; then
            echo "ENV=adt" >> $GITHUB_ENV
            echo "DEPLOY=true" >> $GITHUB_ENV
            echo "PROJECT_ID=p-601-np-bcleadsmgmt-adt" >> $GITHUB_ENV
            echo "SERVICE_ACCOUNT=gco-iam-svc-lead-mgmt-bc-adt@p-601-np-bcleadsmgmt-adt.iam.gserviceaccount.com" >> $GITHUB_ENV
            echo "DEPLOY_PARAMS_PATH=./lead_management_job/deploy_config/deploy_adt.properties" >> $GITHUB_ENV
            echo "ENVIRONMENT_VARIABLES_PATH=./lead_management_job/snow_sync_config/app_adt.properties" >> $GITHUB_ENV
            echo "NETWORK=projects/gcp-prj-transit-hub/global/networks/gcp-vpc-np-host" >> $GITHUB_ENV
            echo "SUBNET=projects/gcp-prj-transit-hub/regions/us-central1/subnetworks/gcp-snt-np-usc1-601-cloudrunjobs-np2" >> $GITHUB_ENV

          elif [[ "$REF" == refs/heads/main ]]; then
            echo "ENV=qat" >> $GITHUB_ENV
            echo "DEPLOY=true" >> $GITHUB_ENV
            echo "PROJECT_ID=p-601-np-bcleadsmgmt-qat" >> $GITHUB_ENV
            echo "SERVICE_ACCOUNT=gco-iam-svc-lead-mgmt-bc-qat@p-601-np-bcleadsmgmt-qat.iam.gserviceaccount.com" >> $GITHUB_ENV
            echo "DEPLOY_PARAMS_PATH=./lead_management_job/deploy_config/deploy_qat.properties" >> $GITHUB_ENV
            echo "ENVIRONMENT_VARIABLES_PATH=./lead_management_job/snow_sync_config/app_qat.properties" >> $GITHUB_ENV
            echo "NETWORK=projects/gcp-prj-transit-hub/global/networks/gcp-vpc-np-host" >> $GITHUB_ENV
            echo "SUBNET=projects/gcp-prj-transit-hub/regions/us-central1/subnetworks/gcp-snt-np-usc1-601-cloudrunjobs-np" >> $GITHUB_ENV

          elif [[ "$REF" == refs/tags/release-spt* ]]; then
            echo "ENV=spt" >> $GITHUB_ENV
            echo "DEPLOY=true" >> $GITHUB_ENV
            echo "PROJECT_ID=p-601-np-bcleadsmgmt-spt" >> $GITHUB_ENV
            echo "SERVICE_ACCOUNT=gco-iam-svc-lead-mgmt-bc-spt@p-601-np-bcleadsmgmt-spt.iam.gserviceaccount.com" >> $GITHUB_ENV
            echo "DEPLOY_PARAMS_PATH=./lead_management_job/deploy_config/deploy_spt.properties" >> $GITHUB_ENV
            echo "ENVIRONMENT_VARIABLES_PATH=./lead_management_job/snow_sync_config/app_spt.properties" >> $GITHUB_ENV
            echo "NETWORK=projects/gcp-prj-transit-hub/global/networks/gcp-vpc-np-host" >> $GITHUB_ENV
            echo "SUBNET=projects/gcp-prj-transit-hub/regions/us-central1/subnetworks/gcp-snt-np-usc1-601-cloudrunjobs-np" >> $GITHUB_ENV

          elif [[ "$REF" == refs/tags/release-prd-phase2-* ]]; then
            echo "ENV=prd" >> $GITHUB_ENV
            echo "DEPLOY=true" >> $GITHUB_ENV
            echo "PROJECT_ID=p-601-pd-bcleadsmgmt-prd" >> $GITHUB_ENV
            echo "SERVICE_ACCOUNT=gco-iam-svc-lead-mgmt-bc-prd@p-601-pd-bcleadsmgmt-prd.iam.gserviceaccount.com" >> $GITHUB_ENV
            echo "DEPLOY_PARAMS_PATH=./lead_management_job/deploy_config/deploy_prd.properties" >> $GITHUB_ENV
            echo "ENVIRONMENT_VARIABLES_PATH=./lead_management_job/snow_sync_config/app_prd.properties" >> $GITHUB_ENV
            echo "NETWORK=projects/gcp-prj-transit-hub/global/networks/gcp-vpc-pd-host" >> $GITHUB_ENV
            echo "SUBNET=projects/gcp-prj-transit-hub/regions/us-central1/subnetworks/gcp-snt-pd-usc1-601-cloudrunjobs" >> $GITHUB_ENV

          else
            echo "DEPLOY=false" >> $GITHUB_ENV
            echo "BUILD_IMAGE=false" >> $GITHUB_ENV
          fi
        env:
          WORKFLOW_TRIGGER: ${{ inputs.workflow_trigger_event }}

      # IMAGE_TAG + shared infra tunables come from the shared deploy file so this
      # job and lead-match always deploy the SAME image for a given env.
      # COMMAND/ARGS are job identity (snow-sync runs main.py snow_to_db), so they
      # stay defaulted here, overridable via the shared file if ever needed.
      - name: Resolve deploy parameters
        if: env.DEPLOY == 'true'
        run: |
          PROPS="${{ env.DEPLOY_PARAMS_PATH }}"

          read_prop () {
            local val
            val=$(grep "^${1}=" "$PROPS" | head -n1 | cut -d= -f2- | tr -d '[:space:]')
            echo "${val:-$2}"
          }

          if [[ "${{ env.ENV }}" == "adt" && -n "${{ inputs.image_tag }}" ]]; then
            IMAGE_TAG="${{ inputs.image_tag }}"
            echo "ADT: using image tag from build -> $IMAGE_TAG"
          else
            IMAGE_TAG=$(read_prop IMAGE_TAG "")
            if [[ -z "$IMAGE_TAG" ]]; then
              echo "ERROR: IMAGE_TAG not set in $PROPS"; exit 1
            fi
            echo "${{ env.ENV }}: using pinned image tag -> $IMAGE_TAG"
          fi

          {
            echo "IMAGE_TAG=$IMAGE_TAG"
            echo "PARALLELISM=$(read_prop PARALLELISM 10)"
            echo "TASK_TIMEOUT=$(read_prop TASK_TIMEOUT 40h)"
            echo "MAX_RETRIES=$(read_prop MAX_RETRIES 0)"
            echo "MEMORY=$(read_prop MEMORY 8Gi)"
            echo "CPU=$(read_prop CPU 2)"
            echo "JOB_COMMAND=$(read_prop SNOW_SYNC_COMMAND python)"
            echo "JOB_ARGS=$(read_prop SNOW_SYNC_ARGS main.py,snow_to_db)"
          } >> $GITHUB_ENV

      - name: "Prepare env vars for snow sync job"
        id: env
        if: env.DEPLOY == 'true'
        run: |
          # Runtime env vars come from this job's own file. No deploy keys live
          # here (they're in the shared deploy file), so nothing to strip.
          ENV_VARS=$(grep -v '^\s*#' ${{ env.ENVIRONMENT_VARIABLES_PATH }} | grep -v '^\s*$' | paste -sd, -)
          echo "env_vars=$ENV_VARS" >> "$GITHUB_OUTPUT"

      - name: Deploy snow sync job to Cloud Run
        if: env.DEPLOY == 'true'
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          job: 'snow-sync-job'
          image: 'us-docker.pkg.dev/gcp-prj-images/gcp-gar-repo-mbrshp/lead-mgmt:${{ env.IMAGE_TAG }}'
          project_id: ${{ env.PROJECT_ID }}
          region: us-central1
          flags: |
            --service-account=${{ env.SERVICE_ACCOUNT }}
            --vpc-egress=all-traffic
            --network=${{ env.NETWORK }}
            --subnet=${{ env.SUBNET }}
            --parallelism=${{ env.PARALLELISM }}
            --command="${{ env.JOB_COMMAND }}"
            --args="${{ env.JOB_ARGS }}"
            --task-timeout=${{ env.TASK_TIMEOUT }}
            --set-env-vars=${{ steps.env.outputs.env_vars }}
            --max-retries=${{ env.MAX_RETRIES }}
            --memory=${{ env.MEMORY }}
            --cpu=${{ env.CPU }}

      - name: Describe deployed job
        if: env.DEPLOY == 'true'
        run: |
          gcloud run jobs describe snow-sync-job \
            --region us-central1 \
            --project ${{ env.PROJECT_ID }} \
            --format="yaml"