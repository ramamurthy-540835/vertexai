name: Lead Match Monitor

on:
  schedule:
    - cron: "17,47 * * * *"
  workflow_dispatch:
    inputs:
      warehouse:
        description: "Filter to specific warehouse (blank = all)"
        required: false
        default: ""
        type: string
      lookback_hours:
        description: "How many hours of execution history to query"
        required: false
        default: "24"
        type: string

jobs:
  monitor:
    name: "monitor-${{ github.event.inputs.warehouse || 'all' }}"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      id-token: write
      contents: read

    env:
      PROJECT_ID: ctoteam
      WORKFLOW_NAME: lead_match_workflow
      REGION: us-central1
      BUCKET_NAME: lead-match-ctoteam
      REPORT_PREFIX: reports/lead_match
      LOOKBACK_HOURS: ${{ github.event.inputs.lookback_hours || '24' }}
      WAREHOUSE_FILTER: ${{ github.event.inputs.warehouse || '' }}
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Auth to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER_ID }}
          service_account: ${{ secrets.GCP_WORKLOAD_IDENTITY_SA_EMAIL }}
          create_credentials_file: true
          export_environment_variables: true

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Validate infrastructure exists
        run: |
          set -euo pipefail
          gcloud config set project "${PROJECT_ID}"

          echo "--- Checking Cloud Workflow ---"
          gcloud workflows describe "${WORKFLOW_NAME}" \
            --location="${REGION}" \
            --project="${PROJECT_ID}" \
            --format="value(name,revisionId,updateTime)" \
            || { echo "Cloud Workflow ${WORKFLOW_NAME} not found"; exit 1; }

          echo ""
          echo "--- Checking Cloud Run Jobs ---"
          for JOB in lead-match-ensure-indexes lead-match-exact-match lead-match-lead-embeddings lead-match-pos-embeddings lead-match-fuzzy-match lead-match-report; do
            gcloud run jobs describe "${JOB}" \
              --region="${REGION}" \
              --project="${PROJECT_ID}" \
              --format="value(name)" 2>/dev/null \
              && echo "  ${JOB}: exists" \
              || echo "  ${JOB}: NOT FOUND (warning)"
          done

      - name: Collect GitHub Actions runs
        run: |
          set -euo pipefail
          gh run list \
            --workflow=lead_match_semantic_workflow.yml \
            --limit=20 \
            --json databaseId,status,conclusion,startedAt,updatedAt,headBranch,displayTitle,name,url \
            > "${RUNNER_TEMP}/gh_runs_raw.json"
          # Extract warehouse from displayTitle (e.g. "Lead Match Semantic Workflow")
          # and name which contains the job name like "ctoteam-lead-match-529"
          python3 - <<'PY'
          import json, os, re, subprocess
          temp = os.environ["RUNNER_TEMP"]
          with open(f"{temp}/gh_runs_raw.json") as f:
              runs = json.load(f)
          for run in runs:
              warehouse = ""
              current_step = ""
              current_step_number = None
              completed_step_count = 0
              total_step_count = 0
              failed_step = ""
              last_completed_step = ""
              job_name = ""
              job_status = ""
              job_conclusion = ""
              # Try to get warehouse from the run's display title or name
              title = run.get("displayTitle", "") + " " + run.get("name", "")
              m = re.search(r"lead-match-(\S+)", title)
              if m:
                  warehouse = m.group(1)
              # Get job/step detail for active and recently failed runs.
              if run["status"] in {"in_progress", "queued", "completed"}:
                  try:
                      out = subprocess.run(
                          ["gh", "run", "view", str(run["databaseId"]),
                           "--json", "jobs"],
                          capture_output=True, text=True, check=True,
                      ).stdout
                      view = json.loads(out)
                      for job in view.get("jobs", []):
                          jname = job.get("name", "")
                          if not job_name:
                              job_name = jname
                              job_status = job.get("status", "")
                              job_conclusion = job.get("conclusion", "") or ""
                          jm = re.search(r"lead-match-(.+)$", jname)
                          if jm:
                              warehouse = jm.group(1)
                          steps = job.get("steps", [])
                          total_step_count += len(steps)
                          for step in steps:
                              if step.get("status") == "completed":
                                  completed_step_count += 1
                                  last_completed_step = step.get("name", "") or last_completed_step
                              if step.get("conclusion") in {"failure", "cancelled", "timed_out"}:
                                  failed_step = step.get("name", "") or failed_step
                              if step.get("status") == "in_progress":
                                  current_step = step.get("name", "")
                                  current_step_number = step.get("number")
                  except Exception:
                      pass
              run["warehouse"] = warehouse
              run["currentStep"] = current_step
              run["currentStepNumber"] = current_step_number
              run["completedStepCount"] = completed_step_count
              run["totalStepCount"] = total_step_count
              run["failedStep"] = failed_step
              run["lastCompletedStep"] = last_completed_step
              run["jobName"] = job_name
              run["jobStatus"] = job_status
              run["jobConclusion"] = job_conclusion
          with open(f"{temp}/gh_runs.json", "w") as f:
              json.dump(runs, f, indent=2)
          for r in runs:
              progress = f"{r.get('completedStepCount', 0)}/{r.get('totalStepCount', 0)}"
              print(f"{r['databaseId']} {r['status']} {r.get('conclusion') or '-'} wh={r['warehouse']} step={r['currentStep']} progress={progress}")
          PY

      - name: Collect GCP workflow executions
        run: |
          set -euo pipefail
          AFTER="$(date -u -d "${LOOKBACK_HOURS} hours ago" +%Y-%m-%dT%H:%M:%SZ)"
          # List gets names only; describe each to get argument with warehouse/matchRunId
          gcloud workflows executions list "${WORKFLOW_NAME}" \
            --location="${REGION}" \
            --project="${PROJECT_ID}" \
            --filter="createTime>='${AFTER}'" \
            --format="value(name)" \
            --limit=50 \
            > "${RUNNER_TEMP}/gcp_exec_names.txt"
          EXEC_COUNT="$(wc -l < "${RUNNER_TEMP}/gcp_exec_names.txt" | tr -d ' ')"
          echo "GCP workflow executions found: ${EXEC_COUNT}"
          echo "[]" > "${RUNNER_TEMP}/gcp_executions.json"
          python3 - <<'PY'
          import json, os, subprocess
          temp = os.environ["RUNNER_TEMP"]
          names_file = f"{temp}/gcp_exec_names.txt"
          with open(names_file) as f:
              names = [line.strip() for line in f if line.strip()]
          results = []
          for name in names:
              try:
                  out = subprocess.run(
                      ["gcloud", "workflows", "executions", "describe", name, "--format=json"],
                      capture_output=True, text=True, check=True,
                  ).stdout
                  results.append(json.loads(out))
              except (subprocess.CalledProcessError, json.JSONDecodeError) as e:
                  print(f"Warning: could not describe {name}: {e}")
          with open(f"{temp}/gcp_executions.json", "w") as f:
              json.dump(results, f, indent=2)
          print(f"Described {len(results)} executions with full argument data")
          PY

      - name: Collect Cloud Run Job executions
        run: |
          set -euo pipefail
          JOBS="lead-match-ensure-indexes lead-match-exact-match lead-match-lead-embeddings lead-match-pos-embeddings lead-match-fuzzy-match lead-match-report"
          for JOB in ${JOBS}; do
            gcloud run jobs executions list \
              --job="${JOB}" \
              --region="${REGION}" \
              --project="${PROJECT_ID}" \
              --limit=10 \
              --format=json \
              > "${RUNNER_TEMP}/crj_${JOB}.json" 2>/dev/null \
              || echo "[]" > "${RUNNER_TEMP}/crj_${JOB}.json"
            echo "${JOB}: $(jq length "${RUNNER_TEMP}/crj_${JOB}.json") executions"
          done

      - name: Collect warehouse stats from GCS report summaries
        run: |
          set -euo pipefail
          # Cloud SQL is accessed through GCP runtime connectivity only.
          # GitHub Actions does not connect to Cloud SQL directly.
          # Warehouse counts come from summary.json files written by the report Cloud Run Job.
          python3 - <<'PY'
          import json, os, subprocess, sys

          bucket = os.environ["BUCKET_NAME"]
          prefix = os.environ["REPORT_PREFIX"]
          project = os.environ["PROJECT_ID"]
          temp = os.environ["RUNNER_TEMP"]
          wh_filter = os.environ.get("WAREHOUSE_FILTER", "").strip()

          # Discover warehouses that have report folders in GCS
          base = f"gs://{bucket}/{prefix}/{project}/"
          try:
              ls_out = subprocess.run(
                  ["gsutil", "ls", base],
                  capture_output=True, text=True, check=True,
              ).stdout.strip()
          except subprocess.CalledProcessError:
              print(f"No report folders found under {base}")
              result = {"available": False, "warehouse_list": [], "warehouses": {}}
              with open(f"{temp}/warehouse_stats.json", "w") as f:
                  json.dump(result, f, indent=2)
              sys.exit(0)

          # Each line is gs://bucket/reports/lead_match/ctoteam/<warehouse>/
          warehouse_dirs = [
              line.rstrip("/").split("/")[-1]
              for line in ls_out.splitlines()
              if line.strip()
          ]

          if wh_filter:
              filter_set = {w.strip() for w in wh_filter.split(",") if w.strip()}
              warehouse_dirs = [w for w in warehouse_dirs if w in filter_set]

          stats = {}
          for wh in warehouse_dirs:
              wh_base = f"gs://{bucket}/{prefix}/{project}/{wh}/"
              # Find the most recent run folder (latest by name sort)
              try:
                  run_dirs = subprocess.run(
                      ["gsutil", "ls", wh_base],
                      capture_output=True, text=True, check=True,
                  ).stdout.strip().splitlines()
              except subprocess.CalledProcessError:
                  continue

              run_dirs = [d.rstrip("/") for d in run_dirs if d.strip()]
              if not run_dirs:
                  stats[wh] = {"has_reports": False, "latest_run_id": None}
                  continue

              latest_run_dir = sorted(run_dirs)[-1]
              latest_run_id = latest_run_dir.split("/")[-1]
              summary_uri = f"{latest_run_dir}/summary.json"

              local_summary = f"{temp}/summary_{wh}.json"
              try:
                  subprocess.run(
                      ["gsutil", "cp", summary_uri, local_summary],
                      capture_output=True, text=True, check=True,
                  )
                  with open(local_summary) as f:
                      summary = json.load(f)
                  stats[wh] = {
                      "has_reports": True,
                      "latest_run_id": latest_run_id,
                      "lead_count": summary.get("lead_rows", 0),
                      "lead_embedding_count": summary.get("lead_embedding_rows", 0),
                      "lead_embedding_pct": round(
                          summary.get("lead_embedding_rows", 0)
                          / max(summary.get("lead_rows", 1), 1)
                          * 100,
                          1,
                      ),
                      "pos_count": summary.get("pos_rows", 0),
                      "pos_embedding_count": summary.get("pos_embedding_rows", 0),
                      "pos_embedding_pct": round(
                          summary.get("pos_embedding_rows", 0)
                          / max(summary.get("pos_rows", 1), 1)
                          * 100,
                          1,
                      ),
                      "match_count": summary.get("match_rows", 0),
                      "match_types": summary.get("match_type_counts", {}),
                      "lifecycle_states": summary.get("lifecycle_state_counts", {}),
                      "primary_transactions": summary.get("primary_transaction_count", 0),
                      "embedding_model": summary.get("embedding_model", ""),
                      "generated_at": summary.get("generated_at", ""),
                  }
              except (subprocess.CalledProcessError, json.JSONDecodeError, FileNotFoundError):
                  stats[wh] = {
                      "has_reports": True,
                      "latest_run_id": latest_run_id,
                      "summary_missing": True,
                  }

          result = {
              "available": True,
              "source": "gcs_report_summaries",
              "warehouse_list": sorted(warehouse_dirs),
              "warehouses": stats,
          }
          with open(f"{temp}/warehouse_stats.json", "w") as f:
              json.dump(result, f, indent=2, default=str)
          print(json.dumps(result, indent=2, default=str))
          PY

      - name: Assemble monitoring snapshot
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json, os
          from datetime import datetime, timezone

          temp = os.environ["RUNNER_TEMP"]

          def parse_ts(value):
              if not value:
                  return None
              try:
                  return datetime.fromisoformat(value.replace("Z", "+00:00"))
              except ValueError:
                  return None

          def human_seconds(seconds):
              if seconds is None:
                  return ""
              seconds = int(seconds)
              hours, remainder = divmod(seconds, 3600)
              minutes, secs = divmod(remainder, 60)
              if hours:
                  return f"{hours}h {minutes}m {secs}s"
              if minutes:
                  return f"{minutes}m {secs}s"
              return f"{secs}s"

          with open(f"{temp}/gh_runs.json") as f:
              gh_runs = json.load(f)

          with open(f"{temp}/gcp_executions.json") as f:
              gcp_execs_raw = json.load(f)

          with open(f"{temp}/warehouse_stats.json") as f:
              warehouse_stats = json.load(f)

          wh_filter = os.environ.get("WAREHOUSE_FILTER", "").strip()

          gcp_executions = []
          now_dt = datetime.now(timezone.utc)
          for ex in gcp_execs_raw:
              argument = {}
              try:
                  argument = json.loads(ex.get("argument", "{}"))
              except (json.JSONDecodeError, TypeError):
                  pass
              start = parse_ts(ex.get("startTime", ""))
              end = parse_ts(ex.get("endTime", ""))
              elapsed_seconds = None
              if start:
                  elapsed_seconds = int(((end or now_dt) - start).total_seconds())
              current_steps = ex.get("status", {}).get("currentSteps", []) or []
              current = current_steps[0] if current_steps else {}
              report_prefix = argument.get("reportPrefix", "")
              report_bucket = argument.get("reportBucket", os.environ["BUCKET_NAME"])
              report_uri_prefix = (
                  f"gs://{report_bucket}/{report_prefix}" if report_prefix else ""
              )
              execution_name = ex.get("name", "")
              entry = {
                  "name": execution_name,
                  "executionId": execution_name.split("/")[-1] if execution_name else "",
                  "state": ex.get("state", "UNKNOWN"),
                  "startTime": ex.get("startTime", ""),
                  "endTime": ex.get("endTime", ""),
                  "duration": ex.get("duration", ""),
                  "elapsedSeconds": elapsed_seconds,
                  "elapsedHuman": human_seconds(elapsed_seconds),
                  "warehouse": argument.get("warehouse", "unknown"),
                  "matchRunId": argument.get("matchRunId", ""),
                  "reportBucket": report_bucket,
                  "reportPrefix": report_prefix,
                  "reportUriPrefix": report_uri_prefix,
                  "reportUris": {
                      "summary": f"{report_uri_prefix}/summary.json" if report_uri_prefix else "",
                      "matches": f"{report_uri_prefix}/matches.csv" if report_uri_prefix else "",
                      "report": f"{report_uri_prefix}/report.md" if report_uri_prefix else "",
                  },
                  "error": ex.get("error"),
                  "currentSteps": current_steps,
                  "currentStep": current.get("step", ""),
                  "currentRoutine": current.get("routine", ""),
              }
              if wh_filter:
                  filter_set = {w.strip() for w in wh_filter.split(",")}
                  if entry["warehouse"] not in filter_set and entry["warehouse"] != "all":
                      continue
              gcp_executions.append(entry)

          cloud_run_jobs = {}
          latest_cloud_run_jobs = {}
          for job_name in [
              "lead-match-ensure-indexes",
              "lead-match-exact-match",
              "lead-match-lead-embeddings",
              "lead-match-pos-embeddings",
              "lead-match-fuzzy-match",
              "lead-match-report",
          ]:
              path = f"{temp}/crj_{job_name}.json"
              if os.path.exists(path):
                  with open(path) as f:
                      raw = json.load(f)
                  parsed = []
                  for j in raw[:10]:
                      metadata = j.get("metadata", {})
                      status = j.get("status", {})
                      spec = j.get("spec", {})
                      conditions = status.get("conditions", []) or j.get("conditions", [])
                      terminal_condition = next(
                          (
                              c
                              for c in conditions
                              if c.get("type") in {"Completed", "Ready", "Succeeded"}
                          ),
                          {},
                      )
                      name = (
                          j.get("name")
                          or metadata.get("name")
                          or j.get("metadataName")
                          or ""
                      )
                      start_time = (
                          j.get("startTime")
                          or status.get("startTime")
                          or j.get("createTime")
                          or metadata.get("creationTimestamp")
                          or ""
                      )
                      completion_time = (
                          j.get("completionTime")
                          or status.get("completionTime")
                          or ""
                      )
                      succeeded = int(j.get("succeededCount") or status.get("succeededCount") or 0)
                      failed = int(j.get("failedCount") or status.get("failedCount") or 0)
                      running = int(j.get("runningCount") or status.get("runningCount") or 0)
                      state = "UNKNOWN"
                      if running > 0:
                          state = "RUNNING"
                      elif failed > 0:
                          state = "FAILED"
                      elif succeeded > 0 or terminal_condition.get("status") == "True":
                          state = "SUCCEEDED"
                      elif terminal_condition.get("status") == "False":
                          state = "FAILED"
                      parsed.append(
                          {
                              "name": name,
                              "job": job_name,
                              "state": state,
                              "createTime": j.get("createTime", "") or metadata.get("creationTimestamp", ""),
                              "startTime": start_time,
                              "completionTime": completion_time,
                              "succeededCount": succeeded,
                              "failedCount": failed,
                              "runningCount": running,
                              "taskCount": spec.get("taskCount") or j.get("taskCount") or "",
                              "parallelism": spec.get("parallelism") or j.get("parallelism") or "",
                              "conditionType": terminal_condition.get("type", ""),
                              "conditionReason": terminal_condition.get("reason", ""),
                              "conditionMessage": terminal_condition.get("message", ""),
                          }
                      )
                  cloud_run_jobs[job_name] = parsed
                  latest_cloud_run_jobs[job_name] = parsed[0] if parsed else None
              else:
                  cloud_run_jobs[job_name] = []
                  latest_cloud_run_jobs[job_name] = None

          warehouse_run_status = {}
          for ex in sorted(gcp_executions, key=lambda e: e.get("startTime", ""), reverse=True):
              wh = ex["warehouse"]
              if wh not in warehouse_run_status:
                  warehouse_run_status[wh] = {
                      "latest_state": ex["state"],
                      "latest_start": ex["startTime"],
                      "latest_end": ex.get("endTime", ""),
                      "latest_match_run_id": ex["matchRunId"],
                      "is_active": ex["state"] == "ACTIVE",
                      "current_step": ex.get("currentStep", ""),
                      "current_routine": ex.get("currentRoutine", ""),
                      "elapsed_human": ex.get("elapsedHuman", ""),
                      "report_uri_prefix": ex.get("reportUriPrefix", ""),
                  }

          now = datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")
          active_runs = [e for e in gcp_executions if e["state"] == "ACTIVE"]
          running_cloud_run_jobs = [
              j
              for j in latest_cloud_run_jobs.values()
              if j and j.get("state") == "RUNNING"
          ]
          failed_cloud_run_jobs = [
              j
              for j in latest_cloud_run_jobs.values()
              if j and j.get("state") == "FAILED"
          ]
          status_summary = {
              "active_gcp_workflow_count": len(active_runs),
              "running_cloud_run_job_count": len(running_cloud_run_jobs),
              "failed_cloud_run_job_count": len(failed_cloud_run_jobs),
              "github_in_progress_count": len(
                  [r for r in gh_runs if r.get("status") == "in_progress"]
              ),
              "github_failed_recent_count": len(
                  [
                      r
                      for r in gh_runs
                      if r.get("status") == "completed"
                      and r.get("conclusion") in {"failure", "cancelled", "timed_out"}
                  ]
              ),
          }
          snapshot = {
              "generated_at": now,
              "project": os.environ["PROJECT_ID"],
              "region": os.environ["REGION"],
              "workflow_name": os.environ["WORKFLOW_NAME"],
              "lookback_hours": int(os.environ["LOOKBACK_HOURS"]),
              "warehouse_filter": wh_filter or "all",
              "status_summary": status_summary,
              "github_actions_runs": gh_runs,
              "workflow_executions": gcp_executions,
              "active_runs": active_runs,
              "cloud_run_jobs": cloud_run_jobs,
              "latest_cloud_run_jobs": latest_cloud_run_jobs,
              "warehouse_run_status": warehouse_run_status,
              "warehouse_stats": warehouse_stats,
              "data_source_note": (
                  "warehouse_stats sourced from GCS report summary.json files "
                  "(written by report Cloud Run Job). "
                  "warehouse_run_status sourced from gcloud workflow executions. "
                  "GitHub Actions does not connect to Cloud SQL directly."
              ),
          }

          out = f"{temp}/monitor_snapshot.json"
          with open(out, "w") as f:
              json.dump(snapshot, f, indent=2, default=str)
          print(
              f"Snapshot assembled: {len(gcp_executions)} GCP executions, "
              f"{len(gh_runs)} GH runs, "
              f"{len(warehouse_stats.get('warehouses', {}))} warehouses with reports"
          )
          PY

      - name: Upload snapshot to GCS
        run: |
          set -euo pipefail
          TIMESTAMP="$(date -u +%Y%m%dT%H%M%SZ)"
          gsutil cp "${RUNNER_TEMP}/monitor_snapshot.json" \
            "gs://${BUCKET_NAME}/monitoring/snapshots/${TIMESTAMP}.json"
          gsutil cp "${RUNNER_TEMP}/monitor_snapshot.json" \
            "gs://${BUCKET_NAME}/monitoring/latest.json"
          echo "SNAPSHOT_URI=gs://${BUCKET_NAME}/monitoring/latest.json" >> "$GITHUB_ENV"
          echo "SNAPSHOT_TIMESTAMP=${TIMESTAMP}" >> "$GITHUB_ENV"
          echo "Uploaded: gs://${BUCKET_NAME}/monitoring/snapshots/${TIMESTAMP}.json"
          echo "Latest:   gs://${BUCKET_NAME}/monitoring/latest.json"

      - name: Summary
        if: always()
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json, os

          temp = os.environ["RUNNER_TEMP"]
          try:
              with open(f"{temp}/monitor_snapshot.json") as f:
                  snap = json.load(f)
          except FileNotFoundError:
              with open(os.environ.get("GITHUB_STEP_SUMMARY", "/dev/null"), "a") as s:
                  s.write("## Lead Match Monitor\n\nNo snapshot generated.\n")
              exit(0)

          lines = [
              "## Lead Match Monitor",
              "",
              f"- Generated: `{snap['generated_at']}`",
              f"- Project: `{snap['project']}`",
              f"- Lookback: `{snap['lookback_hours']}h`",
              f"- Filter: `{snap['warehouse_filter']}`",
              f"- Snapshot: `{os.environ.get('SNAPSHOT_URI', 'N/A')}`",
              "",
          ]

          active = snap.get("active_runs", [])
          if active:
              lines.append(f"### Active Runs ({len(active)})")
              lines.append("")
              lines.append("| Warehouse | Match Run ID | Current Step | Elapsed | Started |")
              lines.append("|-----------|-------------|--------------|---------|---------|")
              for r in active:
                  step = r.get("currentStep") or "?"
                  lines.append(
                      f"| {r['warehouse']} | `{r['matchRunId'][:40]}` | {step} | {r.get('elapsedHuman', '')} | {r['startTime'][:19]} |"
                  )
              lines.append("")
          else:
              lines.append("### No Active GCP Runs")
              lines.append("")

          recent = [e for e in snap.get("workflow_executions", []) if e["state"] != "ACTIVE"]
          if recent:
              lines.append(f"### Recent GCP Executions ({len(recent)})")
              lines.append("")
              lines.append("| Warehouse | State | Match Run ID | Duration |")
              lines.append("|-----------|-------|-------------|----------|")
              for r in recent[:10]:
                  dur = r.get("duration", "")
                  if dur and dur.endswith("s"):
                      try:
                          secs = float(dur.rstrip("s"))
                          m, s = divmod(int(secs), 60)
                          h, m = divmod(m, 60)
                          dur = f"{h}h {m}m {s}s" if h else f"{m}m {s}s"
                      except ValueError:
                          pass
                  lines.append(
                      f"| {r['warehouse']} | {r['state']} "
                      f"| `{r['matchRunId'][:40]}` | {dur} |"
                  )
              lines.append("")

          gh_runs = snap.get("github_actions_runs", [])
          if gh_runs:
              lines.append(f"### GitHub Actions Runs ({len(gh_runs)})")
              lines.append("")
              lines.append("| Run ID | Warehouse | Status | Conclusion | Step Progress | Active Step | Started |")
              lines.append("|--------|-----------|--------|------------|---------------|-------------|---------|")
              for r in gh_runs[:10]:
                  progress = f"{r.get('completedStepCount', 0)}/{r.get('totalStepCount', 0)}"
                  lines.append(
                      f"| {r['databaseId']} | {r.get('warehouse') or '-'} | {r['status']} "
                      f"| {r.get('conclusion') or '-'} | {progress} | {r.get('currentStep') or '-'} | {r['startedAt'][:19]} |"
                  )
              lines.append("")

          wh = snap.get("warehouse_stats", {})
          if wh.get("available"):
              wh_data = wh.get("warehouses", {})
              if wh_data:
                  lines.append("### Warehouse Stats (from GCS report summaries)")
                  lines.append("")
                  lines.append(
                      "| WH | Leads | Lead Embeds | POS | POS Embeds | Matches | Run Status |"
                  )
                  lines.append(
                      "|----|-------|-------------|-----|------------|---------|------------|"
                  )
                  run_status = snap.get("warehouse_run_status", {})
                  for w in sorted(wh_data, key=lambda x: int(x) if x.isdigit() else 0):
                      s = wh_data[w]
                      if s.get("summary_missing"):
                          state = run_status.get(w, {}).get("latest_state", "Never run")
                          lines.append(
                              f"| {w} | - | - | - | - | - | {state} (no summary) |"
                          )
                          continue
                      if not s.get("has_reports"):
                          lines.append(f"| {w} | - | - | - | - | - | No reports |")
                          continue
                      state = run_status.get(w, {}).get("latest_state", "Never run")
                      lines.append(
                          f"| {w} "
                          f"| {s.get('lead_count', 0):,} "
                          f"| {s.get('lead_embedding_count', 0):,} ({s.get('lead_embedding_pct', 0)}%) "
                          f"| {s.get('pos_count', 0):,} "
                          f"| {s.get('pos_embedding_count', 0):,} ({s.get('pos_embedding_pct', 0)}%) "
                          f"| {s.get('match_count', 0):,} "
                          f"| {state} |"
                      )
                  lines.append("")
          else:
              lines.append("### No warehouse reports found in GCS")
              lines.append("")

          lines.append("---")
          lines.append(
              "*Warehouse stats sourced from GCS report `summary.json` files. "
              "GitHub Actions does not connect to Cloud SQL directly.*"
          )

          summary = "\n".join(lines)
          with open(os.environ.get("GITHUB_STEP_SUMMARY", "/dev/null"), "a") as f:
              f.write(summary + "\n")
          print(summary)
          PY
