name: "provision_spt"

on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches:
      - main
    tags:
      - tag_spt
    paths:
      - 'terraform/environments/adt/infra/**.tf'
      - 'terraform/modules/**/**.tf'
      - '.github/workflows/provision_adt.yml'

  pull_request:
    branches:
      - main
    tags:
      - tag_spt
    paths:
      - 'terraform/environments/adt/infra/**'
      - 'terraform/modules/**/**.tf'
      - '.github/workflows/provision_adt.yml'


jobs:
  run:
    name: "Provision infra"
    runs-on: "ubuntu-latest"
    environment: ${{ github.event.pull_request.head.ref }}
    strategy:
      matrix:
        env: ['spt'] #,['adt', 'qat', 'spt'] # Exclude prd from auto-plan
    
    permissions:
      id-token: write
      contents: read

    steps:
      - name: "Checkout code"
        uses: actions/checkout@v4

      - name: "Auth in GCP"
        id: "auth"
        uses: "google-github-actions/auth@v2"
        with:
          create_credentials_file: true
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER_ID }}
          service_account: ${{ secrets.GCP_WORKLOAD_IDENTITY_SA_EMAIL }}
          project_id: 'p-601-np-bcleadsmgmt-spt'
          
      - name: "Setup Terraform"
        uses: hashicorp/setup-terraform@v3

      - name: "Terraform Init"
        working-directory: ./terraform/environments/${{ matrix.env }}/infra
        run: terraform init

      - name: "Terraform Plan"
        working-directory: ./terraform/environments/${{ matrix.env }}/infra
        run: terraform plan -out=plan.tfplan -input=false -lock-timeout=10m
      
      - name: "Terraform Apply"
        working-directory: ./terraform/environments/${{ matrix.env }}/infra
        run: terraform apply -input=false -lock-timeout=10m plan.tfplan
        env: 
            TF_VAR_gcp_workload_identity_sa_email: ${{ secrets.GCP_WORKLOAD_IDENTITY_SA_EMAIL }}
