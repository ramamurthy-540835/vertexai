name: Warehouse 115 Validation

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target Environment'
        required: true
        default: 'spt'
        type: choice
        options: ['adt', 'qat', 'spt', 'prd']

      warehouse:
        description: 'Warehouse number to validate'
        required: true
        default: '115'
        type: string

jobs:
  validate_warehouse:
    name: "Validate Warehouse ${{ github.event.inputs.warehouse }} (${{ github.event.inputs.environment }})"
    runs-on:
      - self-hosted
      - us-central1
    environment: ${{ github.event.inputs.environment }}

    permissions:
      id-token: write
      contents: read

    env:
      ENV_NAME:   ${{ github.event.inputs.environment }}
      WAREHOUSE:  ${{ github.event.inputs.warehouse }}
      PROJECT_ID: ${{ github.event.inputs.environment == 'prd' && 'p-601-pd-bcleadsmgmt-prd' || format('p-601-np-bcleadsmgmt-{0}', github.event.inputs.environment) }}
      CONFIG_DIR: 'lead_management_job'

    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'lead_management_job/requirements.txt'

      - name: Auth to GCP
        uses: google-github-actions/auth@v2
        with:
          token_format: 'access_token'
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER_ID }}
          service_account: gco-iam-svc-lead-mgmt-bc-${{ github.event.inputs.environment }}@${{ github.event.inputs.environment == 'prd' && 'p-601-pd-bcleadsmgmt-prd' || format('p-601-np-bcleadsmgmt-{0}', github.event.inputs.environment) }}.iam.gserviceaccount.com
          create_credentials_file: true
          export_environment_variables: true

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Show Active GCP Identity
        run: |
          echo "Active accounts:"
          gcloud auth list
          echo "Config:"
          gcloud config list

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r lead_management_job/requirements.txt

      - name: Run Gemini Embedding Smoke Test
        run: |
          python scripts/gemini_embedding_client_smoke_test.py \
            --project-id ${{ env.PROJECT_ID }}

      - name: Run Warehouse 115 Smoke Test
        run: |
          python scripts/warehouse_115_smoke_test.py \
            --config ${{ env.CONFIG_DIR }}/configuration_${ENV_NAME}.ini \
            --warehouse ${{ env.WAREHOUSE }} \
            --output warehouse_115_smoke_test_results.json

      - name: Upload Smoke Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: warehouse-115-validation-results-${{ github.event.inputs.environment }}
          path: |
            gemini_embedding_client_smoke_test_results.json
            warehouse_115_smoke_test_results.json
