name: Lead Match Semantic Workflow

on:
  workflow_dispatch:
    inputs:
      warehouse:
        description: "Warehouse number, comma-separated warehouses, or blank for all"
        required: false
        default: "115"
        type: string
      bucket:
        description: "GCS bucket used for lead-match reports"
        required: false
        default: "lead-match-ctoteam"
        type: string
      wait_for_completion:
        description: "Wait for workflow execution to complete?"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  trigger:
    name: "ctoteam-lead-match-${{ github.event.inputs.warehouse || 'all' }}"
    runs-on: ubuntu-latest
    timeout-minutes: 240

    permissions:
      id-token: write
      contents: read

    env:
      PROJECT_ID: ctoteam
      WORKFLOW_NAME: lead_match_workflow
      REGION: us-central1
      BUCKET_NAME: ${{ github.event.inputs.bucket }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Auth to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER_ID }}
          service_account: ${{ secrets.GCP_WORKLOAD_IDENTITY_SA_EMAIL }}
          create_credentials_file: true
          export_environment_variables: true

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Build workflow payload
        env:
          RAW_WAREHOUSE: ${{ github.event.inputs.warehouse }}
        run: |
          set -euo pipefail
          WAREHOUSE="$(printf '%s' "${RAW_WAREHOUSE}" | tr -d '[:space:]')"
          if [[ -z "${WAREHOUSE}" || "${WAREHOUSE,,}" == "all" ]]; then
            WAREHOUSE_LABEL="all"
          else
            if [[ ! "${WAREHOUSE}" =~ ^[0-9]+(,[0-9]+)*$ ]]; then
              echo "Invalid warehouse input: ${WAREHOUSE}"
              exit 1
            fi
            WAREHOUSE_LABEL="${WAREHOUSE}"
          fi
          MATCH_RUN_ID="github-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${WAREHOUSE_LABEL}"
          FINAL_REPORT_PREFIX="reports/lead_match/${PROJECT_ID}/${WAREHOUSE_LABEL}/${MATCH_RUN_ID}"
          PAYLOAD="{\"project\":\"${PROJECT_ID}\",\"region\":\"${REGION}\",\"warehouse\":\"${WAREHOUSE_LABEL}\",\"matchRunId\":\"${MATCH_RUN_ID}\",\"reportBucket\":\"${BUCKET_NAME}\",\"reportPrefix\":\"${FINAL_REPORT_PREFIX}\"}"
          HANDOFF_PREFIX="preflight/lead_match/${PROJECT_ID}/${WAREHOUSE_LABEL}"
          READY_URI="gs://${BUCKET_NAME}/${HANDOFF_PREFIX}/READY"
          PREFLIGHT_REPORT_URI="gs://${BUCKET_NAME}/${HANDOFF_PREFIX}/report.md"
          PREFLIGHT_RESULT_URI="gs://${BUCKET_NAME}/${HANDOFF_PREFIX}/result.json"
          FINAL_SUMMARY_URI="gs://${BUCKET_NAME}/${FINAL_REPORT_PREFIX}/summary.json"
          FINAL_MATCHES_URI="gs://${BUCKET_NAME}/${FINAL_REPORT_PREFIX}/matches.csv"
          FINAL_REPORT_URI="gs://${BUCKET_NAME}/${FINAL_REPORT_PREFIX}/report.md"
          echo "PAYLOAD=${PAYLOAD}" >> "$GITHUB_ENV"
          echo "MATCH_RUN_ID=${MATCH_RUN_ID}" >> "$GITHUB_ENV"
          echo "WAREHOUSE_LABEL=${WAREHOUSE_LABEL}" >> "$GITHUB_ENV"
          echo "HANDOFF_PREFIX=${HANDOFF_PREFIX}" >> "$GITHUB_ENV"
          echo "READY_URI=${READY_URI}" >> "$GITHUB_ENV"
          echo "PREFLIGHT_REPORT_URI=${PREFLIGHT_REPORT_URI}" >> "$GITHUB_ENV"
          echo "PREFLIGHT_RESULT_URI=${PREFLIGHT_RESULT_URI}" >> "$GITHUB_ENV"
          echo "FINAL_REPORT_PREFIX=${FINAL_REPORT_PREFIX}" >> "$GITHUB_ENV"
          echo "FINAL_SUMMARY_URI=${FINAL_SUMMARY_URI}" >> "$GITHUB_ENV"
          echo "FINAL_MATCHES_URI=${FINAL_MATCHES_URI}" >> "$GITHUB_ENV"
          echo "FINAL_REPORT_URI=${FINAL_REPORT_URI}" >> "$GITHUB_ENV"

      - name: Check readiness contract
        run: |
          set -euo pipefail
          if ! gsutil stat "${READY_URI}" >/dev/null 2>&1; then
            echo "Missing READY marker at ${READY_URI}"
            echo "Run Lead Match Preflight first."
            exit 1
          fi
          if ! gsutil stat "${PREFLIGHT_RESULT_URI}" >/dev/null 2>&1; then
            echo "Missing preflight result at ${PREFLIGHT_RESULT_URI}"
            echo "Run Lead Match Preflight first."
            exit 1
          fi
          PREFLIGHT_RESULT="${RUNNER_TEMP}/lead_match_preflight_result.json"
          export PREFLIGHT_RESULT
          gsutil cp "${PREFLIGHT_RESULT_URI}" "${PREFLIGHT_RESULT}"
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          path = Path(os.environ["PREFLIGHT_RESULT"])
          result = json.loads(path.read_text())
          if not result.get("ready"):
              raise SystemExit(f"Preflight result is not ready: {result}")
          if result.get("status") == "FAIL":
              raise SystemExit(f"Preflight result failed: {result}")
          expected_project = os.environ["PROJECT_ID"]
          expected_warehouse = os.environ["WAREHOUSE_LABEL"]
          if result.get("project") != expected_project:
              raise SystemExit(
                  f"Preflight project mismatch: {result.get('project')} != {expected_project}"
              )
          if result.get("warehouse") != expected_warehouse:
              raise SystemExit(
                  f"Preflight warehouse mismatch: {result.get('warehouse')} != {expected_warehouse}"
              )
          print(json.dumps(result, indent=2))
          PY
          echo "READY marker found at ${READY_URI}"

      - name: Trigger lead match workflow
        run: |
          set -euo pipefail
          gcloud config set project "${PROJECT_ID}"
          EXECUTION=$(gcloud workflows execute "${WORKFLOW_NAME}" \
            --location="${REGION}" \
            --project="${PROJECT_ID}" \
            --data="${PAYLOAD}" \
            --call-log-level=log-errors-only \
            --execution-history-level=execution-history-basic \
            --format="value(name)")
          echo "EXECUTION_NAME=${EXECUTION}" >> "$GITHUB_ENV"
          echo "Execution started: ${EXECUTION}"

      - name: Wait for completion
        if: github.event.inputs.wait_for_completion == 'true'
        run: |
          set -euo pipefail
          while true; do
            STATE=$(gcloud workflows executions describe "${EXECUTION_NAME}" \
              --project="${PROJECT_ID}" \
              --location="${REGION}" \
              --format="value(state)")
            echo "Current state: ${STATE}"
            case "${STATE}" in
              SUCCEEDED)
                break
                ;;
              FAILED|CANCELLED)
                gcloud workflows executions describe "${EXECUTION_NAME}" \
                  --project="${PROJECT_ID}" \
                  --location="${REGION}" \
                  --format="value(error)"
                exit 1
                ;;
              *)
                sleep 15
                ;;
            esac
          done

      - name: Summary
        if: always()
        run: |
          {
            echo "## Lead Match Semantic Workflow"
            echo ""
            echo "- Project: \`${PROJECT_ID}\`"
            echo "- Workflow: \`${WORKFLOW_NAME}\`"
            echo "- Region: \`${REGION}\`"
            echo "- Bucket: \`${BUCKET_NAME}\`"
            echo "- Warehouse: \`${WAREHOUSE_LABEL:-unknown}\`"
            echo "- READY URI: \`${READY_URI:-unknown}\`"
            echo "- Preflight report URI: \`${PREFLIGHT_REPORT_URI:-unknown}\`"
            echo "- Preflight result URI: \`${PREFLIGHT_RESULT_URI:-unknown}\`"
            echo "- Final summary URI: \`${FINAL_SUMMARY_URI:-unknown}\`"
            echo "- Final matches URI: \`${FINAL_MATCHES_URI:-unknown}\`"
            echo "- Final report URI: \`${FINAL_REPORT_URI:-unknown}\`"
            echo "- Payload: \`${PAYLOAD:-unknown}\`"
            echo "- Match run ID: \`${MATCH_RUN_ID:-unknown}\`"
            echo "- Execution: \`${EXECUTION_NAME:-not-started}\`"
            echo "- Wait: \`${{ github.event.inputs.wait_for_completion }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
