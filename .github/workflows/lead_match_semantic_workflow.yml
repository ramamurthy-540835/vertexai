name: Lead Match Semantic Workflow

on:
  workflow_dispatch:
    inputs:
      warehouse:
        description: "Warehouse number, comma-separated warehouses, or blank for all"
        required: false
        default: "115"
        type: string
      bucket:
        description: "GCS bucket used for lead-match reports"
        required: false
        default: "lead-match-ctoteam"
        type: string
      wait_for_completion:
        description: "Wait for workflow execution to complete?"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      deploy_runtime:
        description: "Build runtime image in Cloud Build before execution?"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      update_cloud_run_jobs:
        description: "Update semantic Cloud Run Jobs to the built runtime image?"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      deploy_workflow:
        description: "Deploy deploy/lead_match_workflow.yaml before execution?"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      prepare_readiness:
        description: "Create/update lightweight preflight READY contract?"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      dry_run:
        description: "No-write mode? true = do NOT write decisions; false = write decisions. For low-volume writes, keep false and use run_limits."
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      run_limits:
        description: "Low-volume run limits while still writing decisions when no-write mode=false. Example: lead=50,pos=500,match=25; blank/all means no cap"
        required: false
        default: ""
        type: string

jobs:
  trigger:
    name: "ctoteam-lead-match-${{ github.event.inputs.warehouse || 'all' }}"
    runs-on: ubuntu-latest
    timeout-minutes: 240

    permissions:
      id-token: write
      contents: read

    env:
      PROJECT_ID: ctoteam
      WORKFLOW_NAME: lead_match_workflow
      REGION: us-central1
      ARTIFACT_REPO: cloud-run-repo
      BUCKET_NAME: ${{ github.event.inputs.bucket }}
      CLOUDSQL_CONNECTION_NAME: ctoteam:us-central1:lead-mgmt-db

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Auth to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER_ID }}
          service_account: ${{ secrets.GCP_WORKLOAD_IDENTITY_SA_EMAIL }}
          create_credentials_file: true
          export_environment_variables: true

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Resolve deployment image
        run: |
          set -euo pipefail
          SHORT_SHA="${GITHUB_SHA::7}"
          RUNTIME_IMAGE="${REGION}-docker.pkg.dev/${PROJECT_ID}/${ARTIFACT_REPO}/lead-match-runtime:${SHORT_SHA}"
          echo "SHORT_SHA=${SHORT_SHA}" >> "$GITHUB_ENV"
          echo "RUNTIME_IMAGE=${RUNTIME_IMAGE}" >> "$GITHUB_ENV"

      - name: Build runtime image
        if: github.event.inputs.deploy_runtime == 'true'
        run: |
          set -euo pipefail
          gcloud config set project "${PROJECT_ID}"
          BUILD_ID="$(gcloud builds submit \
            --project="${PROJECT_ID}" \
            --config=cloudbuild.lead-match.yaml \
            --substitutions=SHORT_SHA="${SHORT_SHA}" \
            --async \
            --format='value(id)' \
            .)"
          if [[ -z "${BUILD_ID}" ]]; then
            echo "Cloud Build ID was not returned" >&2
            exit 1
          fi
          echo "Runtime Cloud Build ID: ${BUILD_ID}"
          echo "RUNTIME_BUILD_ID=${BUILD_ID}" >> "$GITHUB_ENV"
          BUILD_STARTED_AT="$(date +%s)"
          BUILD_MAX_WAIT_SECONDS=3600
          while true; do
            NOW="$(date +%s)"
            if (( NOW - BUILD_STARTED_AT > BUILD_MAX_WAIT_SECONDS )); then
              echo "Timed out waiting for Cloud Build ${BUILD_ID} after ${BUILD_MAX_WAIT_SECONDS}s" >&2
              exit 1
            fi
            BUILD_STATUS="$(gcloud builds describe "${BUILD_ID}" \
              --project="${PROJECT_ID}" \
              --format='value(status)' 2>/dev/null)" || {
              echo "Transient error polling Cloud Build ${BUILD_ID}; retrying..."
              sleep 10
              continue
            }
            echo "Cloud Build ${BUILD_ID}: ${BUILD_STATUS}"
            case "${BUILD_STATUS}" in
              SUCCESS)
                break
                ;;
              FAILURE|INTERNAL_ERROR|TIMEOUT|CANCELLED|EXPIRED)
                exit 1
                ;;
              *)
                sleep 10
                ;;
            esac
          done

      - name: Update semantic Cloud Run jobs
        if: github.event.inputs.update_cloud_run_jobs == 'true'
        run: |
          set -euo pipefail
          gcloud config set project "${PROJECT_ID}"
          BASE_ENV_VARS="DB_NAME=postgres,DB_SCHEMA=leadmgmt,DB_USER=postgres,VERTEX_PROJECT_ID=${PROJECT_ID},GOOGLE_CLOUD_PROJECT=${PROJECT_ID},VERTEX_LOCATION=${REGION},DEFAULT_FISCAL_YEAR=2026,DEFAULT_FISCAL_PERIOD=10,MATCH_MIN_SCORE=70,CLOUDSQL_CONNECTION_NAME=${CLOUDSQL_CONNECTION_NAME},CLOUDSQL_SOCKET_DIR=/cloudsql,ALLOW_CLIENT_GCP=false,ALLOW_PRODUCTION=false,EXPECTED_PROJECT_ID=${PROJECT_ID},WAREHOUSE_SCOPE=ALL"
          PERF_ENV_VARS="EMBEDDING_BATCH_SIZE=25,EMBEDDING_MAX_TEXTS_PER_REQUEST=25,EMBEDDING_MAX_WORKERS=1,EMBEDDING_BATCH_WORKERS=1,EMBEDDING_MAX_RETRIES=6,EMBEDDING_RETRY_BASE_DELAY=5.0,EMBEDDING_RETRY_MAX_DELAY=180,EMBEDDING_REQUEST_LOG_EVERY=100,VERTEX_TIMEOUT_SECONDS=300,MATCH_BATCH_SIZE=100,MATCH_STATEMENT_TIMEOUT_MS=900000,HNSW_M=32,HNSW_EF_CONSTRUCTION=128,HNSW_EF_SEARCH=100,HNSW_MAINTENANCE_WORK_MEM=512MB"
          ENV_VARS="${BASE_ENV_VARS},${PERF_ENV_VARS}"
          for JOB in \
            lead-match-ensure-indexes \
            lead-match-exact-match \
            lead-match-lead-embeddings \
            lead-match-pos-embeddings \
            lead-match-fuzzy-match; do
            if ! gcloud run jobs describe "${JOB}" --project="${PROJECT_ID}" --region="${REGION}" >/dev/null 2>&1; then
              echo "Cloud Run Job ${JOB} is missing; creating it with DB connector and secrets."
              gcloud run jobs create "${JOB}" \
                --project="${PROJECT_ID}" \
                --region="${REGION}" \
                --image="${RUNTIME_IMAGE}" \
                --set-cloudsql-instances="${CLOUDSQL_CONNECTION_NAME}" \
                --set-env-vars="${ENV_VARS}" \
                --set-secrets="DB_PASSWORD=lead-match-db-password:latest" \
                --task-timeout=3600 \
                --max-retries=0 \
                --cpu=2 \
                --memory=4Gi
              continue
            fi
            gcloud run jobs update "${JOB}" \
              --project="${PROJECT_ID}" \
              --region="${REGION}" \
              --image="${RUNTIME_IMAGE}" \
              --add-cloudsql-instances="${CLOUDSQL_CONNECTION_NAME}" \
              --update-env-vars="${ENV_VARS}" \
              --update-secrets="DB_PASSWORD=lead-match-db-password:latest"
          done

      - name: Deploy Cloud Workflow definition
        if: github.event.inputs.deploy_workflow == 'true'
        run: |
          set -euo pipefail
          gcloud config set project "${PROJECT_ID}"
          gcloud workflows deploy "${WORKFLOW_NAME}" \
            --project="${PROJECT_ID}" \
            --location="${REGION}" \
            --source=deploy/lead_match_workflow.yaml

      - name: Build workflow payload
        env:
          RAW_WAREHOUSE: ${{ github.event.inputs.warehouse }}
          RAW_DRY_RUN: ${{ github.event.inputs.dry_run }}
          RAW_RUN_LIMITS: ${{ github.event.inputs.run_limits }}
        run: |
          set -euo pipefail
          WAREHOUSE="$(printf '%s' "${RAW_WAREHOUSE}" | tr -d '[:space:]')"
          if [[ -z "${WAREHOUSE}" || "${WAREHOUSE,,}" == "all" ]]; then
            WAREHOUSE_LABEL="all"
          else
            if [[ ! "${WAREHOUSE}" =~ ^[0-9]+(,[0-9]+)*$ ]]; then
              echo "Invalid warehouse input: ${WAREHOUSE}"
              exit 1
            fi
            WAREHOUSE_LABEL="${WAREHOUSE}"
          fi
          normalize_limit() {
            local raw="$1"
            raw="$(printf '%s' "${raw}" | tr -d '[:space:]')"
            if [[ -z "${raw}" || "${raw,,}" == "all" ]]; then
              printf ''
              return
            fi
            if [[ ! "${raw}" =~ ^[0-9]+$ || "${raw}" == "0" ]]; then
              echo "Invalid limit input: ${raw}" >&2
              exit 1
            fi
            printf '%s' "${raw}"
          }
          DRY_RUN="${RAW_DRY_RUN:-false}"
          if [[ "${DRY_RUN}" != "true" && "${DRY_RUN}" != "false" ]]; then
            echo "Invalid dry_run input: ${DRY_RUN}" >&2
            exit 1
          fi
          LEAD_EMBEDDING_LIMIT=""
          POS_EMBEDDING_LIMIT=""
          MATCH_LEAD_LIMIT=""
          RUN_LIMITS="$(printf '%s' "${RAW_RUN_LIMITS:-}" | tr -d '[:space:]')"
          if [[ -n "${RUN_LIMITS}" && "${RUN_LIMITS,,}" != "all" ]]; then
            IFS=',' read -ra LIMIT_PARTS <<< "${RUN_LIMITS}"
            for part in "${LIMIT_PARTS[@]}"; do
              key="${part%%=*}"
              value="${part#*=}"
              if [[ "${part}" != *"="* ]]; then
                echo "Invalid run_limits segment: ${part}. Use lead=50,pos=500,match=25" >&2
                exit 1
              fi
              case "${key,,}" in
                lead|leads|lead_embedding|lead_embedding_limit)
                  LEAD_EMBEDDING_LIMIT="$(normalize_limit "${value}")"
                  ;;
                pos|transaction|transactions|pos_embedding|pos_embedding_limit)
                  POS_EMBEDDING_LIMIT="$(normalize_limit "${value}")"
                  ;;
                match|fuzzy|match_lead|match_lead_limit)
                  MATCH_LEAD_LIMIT="$(normalize_limit "${value}")"
                  ;;
                *)
                  echo "Invalid run_limits key: ${key}. Use lead, pos, or match" >&2
                  exit 1
                  ;;
              esac
            done
          fi
          MATCH_RUN_ID="github-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${WAREHOUSE_LABEL}"
          PAYLOAD="{\"project\":\"${PROJECT_ID}\",\"region\":\"${REGION}\",\"warehouse\":\"${WAREHOUSE_LABEL}\",\"matchRunId\":\"${MATCH_RUN_ID}\",\"dryRun\":\"${DRY_RUN}\",\"leadEmbeddingLimit\":\"${LEAD_EMBEDDING_LIMIT}\",\"posEmbeddingLimit\":\"${POS_EMBEDDING_LIMIT}\",\"matchLeadLimit\":\"${MATCH_LEAD_LIMIT}\"}"
          HANDOFF_PREFIX="preflight/lead_match/${PROJECT_ID}/${WAREHOUSE_LABEL}"
          READY_URI="gs://${BUCKET_NAME}/${HANDOFF_PREFIX}/READY"
          PREFLIGHT_REPORT_URI="gs://${BUCKET_NAME}/${HANDOFF_PREFIX}/report.md"
          PREFLIGHT_RESULT_URI="gs://${BUCKET_NAME}/${HANDOFF_PREFIX}/result.json"
          echo "PAYLOAD=${PAYLOAD}" >> "$GITHUB_ENV"
          echo "MATCH_RUN_ID=${MATCH_RUN_ID}" >> "$GITHUB_ENV"
          echo "WAREHOUSE_LABEL=${WAREHOUSE_LABEL}" >> "$GITHUB_ENV"
          echo "HANDOFF_PREFIX=${HANDOFF_PREFIX}" >> "$GITHUB_ENV"
          echo "READY_URI=${READY_URI}" >> "$GITHUB_ENV"
          echo "PREFLIGHT_REPORT_URI=${PREFLIGHT_REPORT_URI}" >> "$GITHUB_ENV"
          echo "PREFLIGHT_RESULT_URI=${PREFLIGHT_RESULT_URI}" >> "$GITHUB_ENV"
          echo "DRY_RUN=${DRY_RUN}" >> "$GITHUB_ENV"
          echo "LEAD_EMBEDDING_LIMIT=${LEAD_EMBEDDING_LIMIT}" >> "$GITHUB_ENV"
          echo "POS_EMBEDDING_LIMIT=${POS_EMBEDDING_LIMIT}" >> "$GITHUB_ENV"
          echo "MATCH_LEAD_LIMIT=${MATCH_LEAD_LIMIT}" >> "$GITHUB_ENV"

      - name: Prepare lightweight readiness contract
        if: github.event.inputs.prepare_readiness == 'true'
        run: |
          set -euo pipefail
          gcloud config set project "${PROJECT_ID}"
          if ! gsutil ls -b "gs://${BUCKET_NAME}" >/dev/null 2>&1; then
            gsutil mb -p "${PROJECT_ID}" -l "${REGION}" "gs://${BUCKET_NAME}"
          fi

          READY_FILE="${RUNNER_TEMP}/READY"
          RESULT_FILE="${RUNNER_TEMP}/lead_match_preflight_result.json"
          REPORT_FILE="${RUNNER_TEMP}/lead_match_preflight_report.md"
          printf 'ready\n' > "${READY_FILE}"

          {
            echo "# Lead Match Lightweight Preflight"
            echo ""
            echo "- Project: \`${PROJECT_ID}\`"
            echo "- Region: \`${REGION}\`"
            echo "- Warehouse: \`${WAREHOUSE_LABEL}\`"
            echo "- Workflow: \`${WORKFLOW_NAME}\`"
            echo "- Runtime image: \`${RUNTIME_IMAGE}\`"
            echo "- Commit: \`${GITHUB_SHA}\`"
            echo "- Generated UTC: \`$(date -u +%Y-%m-%dT%H:%M:%SZ)\`"
            echo ""
            echo "This readiness contract was created by the semantic workflow because \`prepare_readiness=true\`."
          } > "${REPORT_FILE}"

          export RESULT_FILE
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          result = {
              "project": os.environ["PROJECT_ID"],
              "warehouse": os.environ["WAREHOUSE_LABEL"],
              "status": "PASS",
              "ready": True,
              "required_checks": {
                  "workflow_yaml": "PASS",
                  "github_actions_gcp_auth": "PASS",
                  "deployment_source": "github_actions",
              },
              "optional_checks": {
                  "cloud_sql_smoke": "SKIPPED",
              },
              "workflow": os.environ["WORKFLOW_NAME"],
              "runtime_image": os.environ["RUNTIME_IMAGE"],
              "commit": os.environ["GITHUB_SHA"],
              "report_uri": os.environ["PREFLIGHT_REPORT_URI"],
              "ready_uri": os.environ["READY_URI"],
          }
          Path(os.environ["RESULT_FILE"]).write_text(json.dumps(result, indent=2) + "\n")
          PY

          gsutil cp "${REPORT_FILE}" "${PREFLIGHT_REPORT_URI}"
          gsutil cp "${RESULT_FILE}" "${PREFLIGHT_RESULT_URI}"
          gsutil cp "${READY_FILE}" "${READY_URI}"

      - name: Check readiness contract
        run: |
          set -euo pipefail
          if ! gsutil stat "${READY_URI}" >/dev/null 2>&1; then
            echo "Missing READY marker at ${READY_URI}"
            echo "Run Lead Match Preflight first."
            exit 1
          fi
          if ! gsutil stat "${PREFLIGHT_RESULT_URI}" >/dev/null 2>&1; then
            echo "Missing preflight result at ${PREFLIGHT_RESULT_URI}"
            echo "Run Lead Match Preflight first."
            exit 1
          fi
          PREFLIGHT_RESULT="${RUNNER_TEMP}/lead_match_preflight_result.json"
          export PREFLIGHT_RESULT
          gsutil cp "${PREFLIGHT_RESULT_URI}" "${PREFLIGHT_RESULT}"
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          path = Path(os.environ["PREFLIGHT_RESULT"])
          result = json.loads(path.read_text())
          if not result.get("ready"):
              raise SystemExit(f"Preflight result is not ready: {result}")
          if result.get("status") == "FAIL":
              raise SystemExit(f"Preflight result failed: {result}")
          expected_project = os.environ["PROJECT_ID"]
          expected_warehouse = os.environ["WAREHOUSE_LABEL"]
          if result.get("project") != expected_project:
              raise SystemExit(
                  f"Preflight project mismatch: {result.get('project')} != {expected_project}"
              )
          if result.get("warehouse") != expected_warehouse:
              raise SystemExit(
                  f"Preflight warehouse mismatch: {result.get('warehouse')} != {expected_warehouse}"
              )
          print(json.dumps(result, indent=2))
          PY
          echo "READY marker found at ${READY_URI}"

      - name: Trigger lead match workflow
        run: |
          set -euo pipefail
          gcloud config set project "${PROJECT_ID}"
          EXECUTION=$(gcloud workflows execute "${WORKFLOW_NAME}" \
            --location="${REGION}" \
            --project="${PROJECT_ID}" \
            --data="${PAYLOAD}" \
            --call-log-level=log-errors-only \
            --execution-history-level=execution-history-basic \
            --format="value(name)")
          echo "EXECUTION_NAME=${EXECUTION}" >> "$GITHUB_ENV"
          echo "Execution started: ${EXECUTION}"

      - name: Wait for completion
        if: github.event.inputs.wait_for_completion == 'true'
        run: |
          set -euo pipefail
          while true; do
            STATE="$(gcloud workflows executions describe "${EXECUTION_NAME}" \
              --project="${PROJECT_ID}" \
              --location="${REGION}" \
              --format="value(state)" 2>/dev/null)" || {
              echo "Transient error polling workflow execution; retrying..."
              sleep 5
              continue
            }
            echo "Current state: ${STATE}"
            case "${STATE}" in
              SUCCEEDED)
                break
                ;;
              FAILED|CANCELLED)
                gcloud workflows executions describe "${EXECUTION_NAME}" \
                  --project="${PROJECT_ID}" \
                  --location="${REGION}" \
                  --format="value(error)" || true
                exit 1
                ;;
              *)
                sleep 15
                ;;
            esac
          done

      - name: Summary
        if: always()
        run: |
          {
            echo "## Lead Match Semantic Workflow"
            echo ""
            echo "- Project: \`${PROJECT_ID}\`"
            echo "- Workflow: \`${WORKFLOW_NAME}\`"
            echo "- Region: \`${REGION}\`"
            echo "- Bucket: \`${BUCKET_NAME}\`"
            echo "- Runtime image: \`${RUNTIME_IMAGE:-unknown}\`"
            echo "- Runtime Cloud Build ID: \`${RUNTIME_BUILD_ID:-not-run}\`"
            echo "- Warehouse: \`${WAREHOUSE_LABEL:-unknown}\`"
            echo "- Dry run: \`${DRY_RUN:-unknown}\`"
            echo "- Lead embedding limit: \`${LEAD_EMBEDDING_LIMIT:-all}\`"
            echo "- POS embedding limit: \`${POS_EMBEDDING_LIMIT:-all}\`"
            echo "- Match lead limit: \`${MATCH_LEAD_LIMIT:-all}\`"
            echo "- READY URI: \`${READY_URI:-unknown}\`"
            echo "- Preflight report URI: \`${PREFLIGHT_REPORT_URI:-unknown}\`"
            echo "- Preflight result URI: \`${PREFLIGHT_RESULT_URI:-unknown}\`"
            echo "- Match run ID: \`${MATCH_RUN_ID:-unknown}\`"
            echo "- Execution: \`${EXECUTION_NAME:-not-started}\`"
            echo "- Payload: \`${PAYLOAD:-unknown}\`"
            echo ""
            echo "**Next**: Run lead_match_analysis.yml to generate reports and analysis."
            echo ""
            echo "- Wait: \`${{ github.event.inputs.wait_for_completion }}\`"
            echo "- Deploy runtime: \`${{ github.event.inputs.deploy_runtime }}\`"
            echo "- Update Cloud Run jobs: \`${{ github.event.inputs.update_cloud_run_jobs }}\`"
            echo "- Deploy workflow: \`${{ github.event.inputs.deploy_workflow }}\`"
            echo "- Prepare readiness: \`${{ github.event.inputs.prepare_readiness }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
