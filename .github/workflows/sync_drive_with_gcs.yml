name: drive_to_gcs_sync

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'adt'
        type: choice
        options: ['adt', 'qat', 'spt']

      drive_folder_id:
        description: 'Google Drive folder ID (optional — leave blank to use the value already configured on the job)'
        required: false
        default: ''
        type: string

      create_manifest_after:
        description: 'Automatically create manifest after sync completes'
        required: true
        default: true
        type: boolean

jobs:
  trigger_sync:
    name: "Drive → GCS sync (${{ github.event.inputs.environment }})"
    runs-on:
      - self-hosted
      - us-central1
    environment: ${{ github.event.inputs.environment }}

    permissions:
      id-token: write
      contents: read

    env:
      ENV_NAME:        ${{ github.event.inputs.environment }}
      DRIVE_FOLDER_ID: ${{ github.event.inputs.drive_folder_id }}
      PROJECT_ID:      'p-601-np-bcleadsmgmt-${{ github.event.inputs.environment }}'
      JOB_NAME:        'snow-sync-job'
      REGION:          'us-central1'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Auth to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER_ID }}
          service_account: ${{ secrets.GCP_WORKLOAD_IDENTITY_SA_EMAIL }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Trigger Drive → GCS Cloud Run job
        run: |
          set -euo pipefail
          unset CLOUDSDK_CORE_PROJECT CLOUDSDK_PROJECT GCLOUD_PROJECT GCP_PROJECT GOOGLE_CLOUD_PROJECT
          gcloud config set project "${PROJECT_ID}"

          echo "Triggering job: ${JOB_NAME}"
          echo "  Environment: ${ENV_NAME}"

          if [ -n "${DRIVE_FOLDER_ID}" ]; then
            echo "  Drive folder ID (override): ${DRIVE_FOLDER_ID}"
            gcloud run jobs execute "${JOB_NAME}" \
              --region="${REGION}" \
              --project="${PROJECT_ID}" \
              --args="main.py,drive_to_gcs" \
              --update-env-vars="DRIVE_FOLDER_ID=${DRIVE_FOLDER_ID}" \
              --wait
          else
            echo "  Drive folder ID: (using value already configured on the job)"
            gcloud run jobs execute "${JOB_NAME}" \
              --region="${REGION}" \
              --project="${PROJECT_ID}" \
              --args="main.py,drive_to_gcs" \
              --wait
          fi

          echo ""
          echo "✅ Drive sync complete"

      - name: Summary
        if: always()
        run: |
          {
            echo "## Drive → GCS Sync — ${ENV_NAME}"
            echo ""
            echo "- **Environment:** \`${ENV_NAME}\`"
            if [ -n "${DRIVE_FOLDER_ID}" ]; then
              echo "- **Drive folder ID:** \`${DRIVE_FOLDER_ID}\` (overridden)"
            else
              echo "- **Drive folder ID:** (used job's configured value)"
            fi
            echo "- **Create manifest after:** ${{ github.event.inputs.create_manifest_after }}"
          } >> $GITHUB_STEP_SUMMARY

