name: deploy_workflow_config

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy config to'
        required: true
        type: choice
        options: ['adt', 'qat', 'spt']
      include_field_map:
        description: 'Also upload field_map.json (manual dispatch only)'
        required: true
        default: false
        type: boolean

  push:
    branches:
      - 'feature*'
      - 'main'
    tags:
      - 'release-spt*'
    paths:
      - 'dataflow_config/**'
      - 'dataflow/field_map.json'            
      - '.github/workflows/deploy_workflow_config.yml' 

concurrency:
  group: deploy-config
  cancel-in-progress: false

jobs:
  determine-target:
    name: Determine target environment
    runs-on: ubuntu-latest
    outputs:
      target_env: ${{ steps.targets.outputs.target_env }}
    steps:
      - id: targets
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TARGET="${{ github.event.inputs.environment }}"
          elif [[ "${{ github.ref_type }}" == "branch" && "${{ github.ref_name }}" == feature* ]]; then
            TARGET="adt"
          elif [[ "${{ github.ref_type }}" == "branch" && "${{ github.ref_name }}" == "main" ]]; then
            TARGET="qat"
          elif [[ "${{ github.ref_type }}" == "tag" && "${{ github.ref_name }}" == release-spt* ]]; then
            TARGET="spt"
          else
            exit 1
          fi
          echo "target_env=$TARGET" >> $GITHUB_OUTPUT

  # ────────────────────────────────────────────────
  # Detect which files actually changed in this push
  # ────────────────────────────────────────────────
  detect-changes:
    name: Detect changed files
    runs-on: ubuntu-latest
    outputs:
      config_changed:    ${{ steps.changes.outputs.config }}
      field_map_changed: ${{ steps.changes.outputs.field_map }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2     # need previous commit to diff against

      - id: changes
        run: |
          # On manual dispatch, treat both as changed (the user explicitly chose)
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "config=true"   >> $GITHUB_OUTPUT
            echo "field_map=${{ github.event.inputs.include_field_map }}" >> $GITHUB_OUTPUT
            exit 0
          fi

          # On push, diff against the previous commit
          # github.event.before is the SHA before this push
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"

          # Tag pushes don't have a meaningful 'before', use HEAD~1
          if [[ "$BEFORE" == "0000000000000000000000000000000000000000" ]] || [[ -z "$BEFORE" ]]; then
            BEFORE="HEAD~1"
          fi

          CHANGED_FILES=$(git diff --name-only "$BEFORE" "$AFTER" 2>/dev/null || git diff --name-only HEAD~1)

          echo "Changed files in this push:"
          echo "$CHANGED_FILES" | sed 's/^/  /'

          CONFIG_CHANGED=false
          FIELD_MAP_CHANGED=false

          if echo "$CHANGED_FILES" | grep -q '^dataflow_config/'; then
            CONFIG_CHANGED=true
          fi
          if echo "$CHANGED_FILES" | grep -q '^dataflow/field_map.json$'; then
            FIELD_MAP_CHANGED=true
          fi

          echo ""
          echo "config_changed:    $CONFIG_CHANGED"
          echo "field_map_changed: $FIELD_MAP_CHANGED"

          echo "config=$CONFIG_CHANGED"       >> $GITHUB_OUTPUT
          echo "field_map=$FIELD_MAP_CHANGED" >> $GITHUB_OUTPUT

  deploy:
    name: "Deploy to ${{ needs.determine-target.outputs.target_env }}"
    needs: [determine-target, detect-changes]
    # Skip the job entirely if nothing relevant changed
    if: needs.detect-changes.outputs.config_changed == 'true' || needs.detect-changes.outputs.field_map_changed == 'true'
    runs-on:
      - self-hosted
      - us-central1
    permissions:
      id-token: write
      contents: read

    env:
      ENV_NAME:    ${{ needs.determine-target.outputs.target_env }}
      PROJECT_ID:  'p-601-np-bcleadsmgmt-${{ needs.determine-target.outputs.target_env }}'
      BUCKET_NAME: 'gcp-gcs-lead-mgmt-us-${{ needs.determine-target.outputs.target_env }}-pos-raw'

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER_ID }}
          service_account: ${{ secrets.GCP_WORKLOAD_IDENTITY_SA_EMAIL }}

      - uses: google-github-actions/setup-gcloud@v2

      # ── Upload config (only if config changed) ──
      - name: Upload workflow-config.json
        if: needs.detect-changes.outputs.config_changed == 'true'
        run: |
          set -euo pipefail
          unset CLOUDSDK_CORE_PROJECT CLOUDSDK_PROJECT GCLOUD_PROJECT GCP_PROJECT GOOGLE_CLOUD_PROJECT

          if [ ! -f "dataflow_config/${ENV_NAME}.json" ]; then
            echo "❌ dataflow_config/${ENV_NAME}.json not found"
            exit 1
          fi
          if ! jq empty "dataflow_config/${ENV_NAME}.json"; then
            echo "❌ Invalid JSON"
            exit 1
          fi
          DECLARED=$(jq -r .environment "dataflow_config/${ENV_NAME}.json")
          if [ "$DECLARED" != "${ENV_NAME}" ]; then
            echo "❌ env field mismatch"
            exit 1
          fi

          DEST="gs://${BUCKET_NAME}/config/workflow-config.json"
          gcloud storage cp "dataflow_config/${ENV_NAME}.json" "${DEST}" --project="${PROJECT_ID}"
          echo "✅ workflow-config.json uploaded"

      # ── Upload field_map (only if field_map changed) ──
      - name: Upload field_map.json
        if: needs.detect-changes.outputs.field_map_changed == 'true'
        run: |
          set -euo pipefail
          unset CLOUDSDK_CORE_PROJECT CLOUDSDK_PROJECT GCLOUD_PROJECT GCP_PROJECT GOOGLE_CLOUD_PROJECT

          if [ ! -f "dataflow/field_map.json" ]; then
            echo "❌ dataflow/field_map.json not found"
            exit 1
          fi
          if ! jq empty "dataflow/field_map.json"; then
            echo "❌ Invalid JSON in field_map.json"
            exit 1
          fi

          DEST="gs://${BUCKET_NAME}/config/field_map.json"
          gcloud storage cp "dataflow/field_map.json" "${DEST}" --project="${PROJECT_ID}"
          echo "✅ field_map.json uploaded"

      - name: Summary
        if: always()
        run: |
          {
            echo "## Deployment to ${ENV_NAME}"
            echo "- Config uploaded:    ${{ needs.detect-changes.outputs.config_changed }}"
            echo "- field_map uploaded: ${{ needs.detect-changes.outputs.field_map_changed }}"
          } >> $GITHUB_STEP_SUMMARY