name: deploy_workflow_config

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy config to'
        required: true
        type: choice
        options: ['adt', 'qat', 'spt', 'prd']
      include_field_map:
        description: 'Also upload field_map.json (manual dispatch only)'
        required: true
        default: false
        type: boolean

  push:
    branches:
      - 'feature/**'
      - 'main'
    tags:
      - 'release-spt*'
      - 'release-prd-phase2-*'
    paths:
      - 'dataflow_config/**'
      - 'dataflow/field_map.json'

concurrency:
  group: deploy-config
  cancel-in-progress: false

jobs:
  determine-target:
    name: Determine target environment
    runs-on: ubuntu-latest
    outputs:
      target_env: ${{ steps.targets.outputs.target_env }}
    steps:
      - id: targets
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TARGET="${{ github.event.inputs.environment }}"
          elif [[ "${{ github.ref_type }}" == "branch" && "${{ github.ref_name }}" == feature* ]]; then
            TARGET="adt"
          elif [[ "${{ github.ref_type }}" == "branch" && "${{ github.ref_name }}" == "main" ]]; then
            TARGET="qat"
          elif [[ "${{ github.ref_type }}" == "tag" && "${{ github.ref_name }}" == release-spt* ]]; then
            TARGET="spt"
          elif [[ "${{ github.ref_type }}" == "tag" && "${{ github.ref_name }}" == release-prd-phase2-* ]]; then
            TARGET="prd"
          else
            exit 1
          fi
          echo "target_env=$TARGET" >> $GITHUB_OUTPUT

  # ────────────────────────────────────────────────────────────────────
  # This job authenticates and compares LOCAL files against what's
  # CURRENTLY in GCS for the resolved target_env — not git diff. That
  # makes it correct regardless of commit history depth, whether this is
  # a tag push, or a first-ever deploy to an environment (missing remote
  # object = automatically "changed" = upload).
  # ────────────────────────────────────────────────────────────────────
  detect-changes:
    name: "Detect changes for ${{ needs.determine-target.outputs.target_env }}"
    needs: determine-target
    runs-on: ${{ needs.determine-target.outputs.target_env == 'prd' && 'cw-gcp-us-west1-pd' || 'cw-gcp-us-west1-np' }}
    permissions:
      id-token: write
      contents: read
    env:
      ENV_NAME: ${{ needs.determine-target.outputs.target_env }}
    outputs:
      config_changed:    ${{ steps.diff.outputs.config }}
      field_map_changed: ${{ steps.diff.outputs.field_map }}
      project_id:         ${{ steps.resolve.outputs.project_id }}
      bucket_name:        ${{ steps.resolve.outputs.bucket_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve project/bucket for target env
        id: resolve
        run: |
          if [[ "${ENV_NAME}" == "prd" ]]; then
            echo "PROJECT_ID=p-601-pd-bcleadsmgmt-prd" >> $GITHUB_ENV
            echo "BUCKET_NAME=gcp-gcs-lead-mgmt-us-prd-pos-raw" >> $GITHUB_ENV
            echo "project_id=p-601-pd-bcleadsmgmt-prd" >> $GITHUB_OUTPUT
            echo "bucket_name=gcp-gcs-lead-mgmt-us-prd-pos-raw" >> $GITHUB_OUTPUT
          else
            echo "PROJECT_ID=p-601-np-bcleadsmgmt-${ENV_NAME}" >> $GITHUB_ENV
            echo "BUCKET_NAME=gcp-gcs-lead-mgmt-us-${ENV_NAME}-pos-raw" >> $GITHUB_ENV
            echo "project_id=p-601-np-bcleadsmgmt-${ENV_NAME}" >> $GITHUB_OUTPUT
            echo "bucket_name=gcp-gcs-lead-mgmt-us-${ENV_NAME}-pos-raw" >> $GITHUB_OUTPUT
          fi

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER_ID }}
          service_account: ${{ env.ENV_NAME == 'prd' && secrets.GCP_WORKLOAD_IDENTITY_SA_EMAIL_PRD || secrets.GCP_WORKLOAD_IDENTITY_SA_EMAIL }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Compare local vs GCS content
        id: diff
        run: |
          set -uo pipefail
          unset CLOUDSDK_CORE_PROJECT CLOUDSDK_PROJECT GCLOUD_PROJECT GCP_PROJECT GOOGLE_CLOUD_PROJECT

          CONFIG_CHANGED=false
          FIELD_MAP_CHANGED=false

          # --- config: only this env's specific file, never another env's ---
          LOCAL_CONFIG="dataflow_config/${ENV_NAME}.json"
          if [[ -f "$LOCAL_CONFIG" ]]; then
            gcloud storage cat "gs://${BUCKET_NAME}/config/workflow-config.json" \
              --project="${PROJECT_ID}" > /tmp/remote-config.json 2>/dev/null || true
            if ! diff -q "$LOCAL_CONFIG" /tmp/remote-config.json >/dev/null 2>&1; then
              CONFIG_CHANGED=true
              echo "Config differs (or remote missing) for ${ENV_NAME} -> will upload"
            else
              echo "Config unchanged for ${ENV_NAME} -> skipping"
            fi
          else
            echo "::warning::dataflow_config/${ENV_NAME}.json not found locally — skipping config upload"
          fi

          # --- field_map: shared across envs, same content-diff approach ---
          # On manual dispatch, honor include_field_map as an explicit override.
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ github.event.inputs.include_field_map }}" == "false" ]]; then
            echo "field_map upload explicitly disabled for this manual run"
          elif [[ -f "dataflow/field_map.json" ]]; then
            gcloud storage cat "gs://${BUCKET_NAME}/config/field_map.json" \
              --project="${PROJECT_ID}" > /tmp/remote-field-map.json 2>/dev/null || true
            if ! diff -q "dataflow/field_map.json" /tmp/remote-field-map.json >/dev/null 2>&1; then
              FIELD_MAP_CHANGED=true
              echo "field_map differs (or remote missing) -> will upload"
            else
              echo "field_map unchanged -> skipping"
            fi
          else
            echo "::warning::dataflow/field_map.json not found locally — skipping field_map upload"
          fi

          echo "config=$CONFIG_CHANGED"       >> $GITHUB_OUTPUT
          echo "field_map=$FIELD_MAP_CHANGED" >> $GITHUB_OUTPUT

  deploy:
    name: "Deploy to ${{ needs.determine-target.outputs.target_env }}"
    needs: [determine-target, detect-changes]
    if: needs.detect-changes.outputs.config_changed == 'true' || needs.detect-changes.outputs.field_map_changed == 'true'
    runs-on: ${{ needs.determine-target.outputs.target_env == 'prd' && 'cw-gcp-us-west1-pd' || 'cw-gcp-us-west1-np' }}
    permissions:
      id-token: write
      contents: read
    env:
      ENV_NAME:    ${{ needs.determine-target.outputs.target_env }}
      PROJECT_ID:  ${{ needs.detect-changes.outputs.project_id }}
      BUCKET_NAME: ${{ needs.detect-changes.outputs.bucket_name }}
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER_ID }}
          service_account: ${{ env.ENV_NAME == 'prd' && secrets.GCP_WORKLOAD_IDENTITY_SA_EMAIL_PRD || secrets.GCP_WORKLOAD_IDENTITY_SA_EMAIL }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Upload workflow-config.json
        if: needs.detect-changes.outputs.config_changed == 'true'
        run: |
          set -euo pipefail
          unset CLOUDSDK_CORE_PROJECT CLOUDSDK_PROJECT GCLOUD_PROJECT GCP_PROJECT GOOGLE_CLOUD_PROJECT
          if [ ! -f "dataflow_config/${ENV_NAME}.json" ]; then
            echo "❌ dataflow_config/${ENV_NAME}.json not found"
            exit 1
          fi
          if ! jq empty "dataflow_config/${ENV_NAME}.json"; then
            echo "❌ Invalid JSON"
            exit 1
          fi
          DECLARED=$(jq -r .environment "dataflow_config/${ENV_NAME}.json")
          if [ "$DECLARED" != "${ENV_NAME}" ]; then
            echo "❌ env field mismatch: file says '${DECLARED}', target is '${ENV_NAME}'"
            exit 1
          fi
          DEST="gs://${BUCKET_NAME}/config/workflow-config.json"
          gcloud storage cp "dataflow_config/${ENV_NAME}.json" "${DEST}" --project="${PROJECT_ID}"
          echo "✅ workflow-config.json uploaded to ${ENV_NAME}"

      - name: Upload field_map.json
        if: needs.detect-changes.outputs.field_map_changed == 'true'
        run: |
          set -euo pipefail
          unset CLOUDSDK_CORE_PROJECT CLOUDSDK_PROJECT GCLOUD_PROJECT GCP_PROJECT GOOGLE_CLOUD_PROJECT
          if [ ! -f "dataflow/field_map.json" ]; then
            echo "❌ dataflow/field_map.json not found"
            exit 1
          fi
          if ! jq empty "dataflow/field_map.json"; then
            echo "❌ Invalid JSON in field_map.json"
            exit 1
          fi
          DEST="gs://${BUCKET_NAME}/config/field_map.json"
          gcloud storage cp "dataflow/field_map.json" "${DEST}" --project="${PROJECT_ID}"
          echo "✅ field_map.json uploaded to ${ENV_NAME}"

      - name: Summary
        if: always()
        run: |
          {
            echo "## Deployment to ${ENV_NAME}"
            echo "- **Project:**        \`${PROJECT_ID}\`"
            echo "- **Bucket:**         \`${BUCKET_NAME}\`"
            echo "- Config uploaded:    ${{ needs.detect-changes.outputs.config_changed }}"
            echo "- field_map uploaded: ${{ needs.detect-changes.outputs.field_map_changed }}"
          } >> $GITHUB_STEP_SUMMARY