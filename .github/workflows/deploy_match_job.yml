name: deploy_match_job
on:
  workflow_call:
    inputs:
      workflow_trigger_event:
        required: true
        type: string
      # Accepted for a consistent call contract with the orchestrators.
      # NOTE: this job EXECUTES an already-deployed Cloud Run job (it doesn't
      # deploy an image), so the tag isn't used directly here.
      image_tag:
        required: false
        type: string
        default: ''
    secrets:
      GCP_WORKLOAD_IDENTITY_PROVIDER_ID:
        required: true
      GCP_WORKLOAD_IDENTITY_SA_EMAIL:
        required: true
  # workflow_call ONLY — self-trigger removed to stop the double-run.

env:
  PROJECT_ID: 'p-601-np-bcleadsmgmt-adt'
  REGION: 'us-central1'

jobs:
  run:
    name: "compile-match-job"
    runs-on: cw-gcp-us-west1-np
    permissions:
      id-token: write
      contents: read
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v4

      - name: "Auth in GCP"
        id: "auth"
        uses: "google-github-actions/auth@v2"
        with:
          create_credentials_file: true
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER_ID }}
          service_account: ${{ secrets.GCP_WORKLOAD_IDENTITY_SA_EMAIL }}

      - name: "Compile match job (ADT only)"
        run: |
          unset CLOUDSDK_CORE_PROJECT
          gcloud config set project ${{ env.PROJECT_ID }}
          gcloud run jobs execute lead-match-job \
            --region ${{ env.REGION }} \
            --args="run.py,compile_pipeline"