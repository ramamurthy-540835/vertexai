name: pos_validation_image_creation

on:
  push:
    branches:
      - 'qa/servicenow-gcp-QA'
    paths:
      - '.github/workflows/pos_validation_image.yml'
      - 'pos_match_validation/**'

jobs:

  build-and-push-container:

    name: Build and Push POS Validation Container

    runs-on:
      - self-hosted
      - us-central1

    permissions:
      id-token: write
      contents: read
      packages: write

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Auth to GCP
        id: auth
        uses: google-github-actions/auth@v2
        with:
          token_format: access_token
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER_ID }}
          service_account: ${{ secrets.GCP_WORKLOAD_IDENTITY_SA_EMAIL }}

      - name: Login to Google Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: us-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: ./pos_match_validation
          file: ./pos_match_validation/Dockerfile
          push: true
          tags: |
            us-docker.pkg.dev/gcp-prj-images/gcp-gar-repo-mbrshp/pos-validation:latest
            us-docker.pkg.dev/gcp-prj-images/gcp-gar-repo-mbrshp/pos-validation:${{ github.sha }}