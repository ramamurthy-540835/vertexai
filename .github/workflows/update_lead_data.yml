name: "update_lead_week_from_csv"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to run UPDATE against'
        required: true
        default: 'spt'
        type: choice
        options:
          - 'adt'
          - 'qat'
          - 'spt'
          - 'prd'
      csv_file:
        description: 'Path to CSV file (relative to repo root). Must have columns: lead_id, week'
        required: true
        default: 'postgres_resources/lead_week_update.csv'
        type: string
      batch_size:
        description: 'Number of rows per UPDATE batch (recommended: 1000–5000)'
        required: true
        default: '2000'
        type: string
      dry_run:
        description: 'Dry run — generate SQL and show row count, but do NOT execute UPDATE'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  update_lead_week:
    name: "Update lead.week on ${{ github.event.inputs.environment }}"
    runs-on:
      - self-hosted
      - us-central1

    permissions:
      id-token: write
      contents: read

    steps:
      - name: "Checkout code"
        uses: actions/checkout@v4

      - name: "Set environment variables"
        run: |
          ENV="${{ github.event.inputs.environment }}"
          if [[ "$ENV" == "prd" ]]; then
            echo "PROJECT_ID=p-601-pd-bcleadsmgmt-prd"   >> $GITHUB_ENV
            echo "SCHEMA_NAME=lead_mgmt_prd"              >> $GITHUB_ENV
            echo "INSTANCE_NAME=lead-mgmt-prd"            >> $GITHUB_ENV
          else
            echo "PROJECT_ID=p-601-np-bcleadsmgmt-${ENV}" >> $GITHUB_ENV
            echo "SCHEMA_NAME=lead_mgmt_${ENV}"           >> $GITHUB_ENV
            echo "INSTANCE_NAME=lead-mgmt-${ENV}"         >> $GITHUB_ENV
          fi

      - name: "Auth in GCP"
        id: "auth"
        uses: "google-github-actions/auth@v2"
        with:
          create_credentials_file: true
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER_ID }}
          service_account: ${{ github.event.inputs.environment == 'prd' && secrets.GCP_WORKLOAD_IDENTITY_SA_EMAIL_PRD || secrets.GCP_WORKLOAD_IDENTITY_SA_EMAIL }}
          project_id: ${{ env.PROJECT_ID }}

      - name: "Download psql and Cloud SQL Proxy from GCS"
        run: |
          gcloud storage cp gs://p-601-np-bcleadsmgmt-adt-cicd-tools/psql "$HOME/psql"
          chmod +x "$HOME/psql"
          echo "$HOME" >> "$GITHUB_PATH"
          echo "psql ready: $("$HOME/psql" --version)"

          wget -q https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.8.0/cloud-sql-proxy.linux.amd64 \
            -O "$HOME/cloud-sql-proxy"
          chmod +x "$HOME/cloud-sql-proxy"

      - name: "Start Cloud SQL Proxy"
        run: |
          "$HOME/cloud-sql-proxy" "${{ env.PROJECT_ID }}:us-central1:${{ env.INSTANCE_NAME }}" \
            --port 5432 \
            --private-ip \
            --auto-iam-authn &

          echo "Waiting for proxy on port 5432..."
          for i in $(seq 1 15); do
            bash -c "echo > /dev/tcp/127.0.0.1/5432" 2>/dev/null && echo "✅ Proxy ready after ${i}s" && break
            sleep 1
          done

          PGPASSWORD="$(gcloud auth print-access-token)" "$HOME/psql" "hostaddr=127.0.0.1 port=5432 dbname=lead-mgmt-db user=gco-iam-svc-cicd-mbr-bc-np@gcp-prj-cicd-core.iam sslmode=disable" --no-password -c '\conninfo'

      - name: "Validate CSV"
        run: |
          CSV="${{ github.event.inputs.csv_file }}"
          if [[ ! -f "$CSV" ]]; then
            echo "❌ CSV not found: $CSV"
            exit 1
          fi
          HEADER=$(head -1 "$CSV")
          echo "Header: $HEADER"
          if ! echo "$HEADER" | grep -qi "lead_id" || ! echo "$HEADER" | grep -qi "week"; then
            echo "❌ CSV must have 'lead_id' and 'week' columns. Found: $HEADER"
            exit 1
          fi
          TOTAL=$(( $(wc -l < "$CSV") - 1 ))
          echo "✅ $TOTAL data rows found"
          echo "TOTAL_ROWS=$TOTAL" >> $GITHUB_ENV

      - name: "Generate batched UPDATE SQL"
        run: |
          # Write the Python script to a file — avoids heredoc env variable scoping issues
          cat > /tmp/gen_update.py << 'PYEOF'
import csv, os, sys

csv_path   = os.environ["CSV_FILE"]
batch_size = int(os.environ["BATCH_SIZE"])
schema     = os.environ["SCHEMA_NAME"]
out_path   = os.environ["OUTPUT_SQL"]

with open(csv_path, newline="") as f:
    reader = csv.DictReader(f)
    reader.fieldnames = [h.strip().lower() for h in reader.fieldnames]
    rows = [(r["lead_id"].strip(), r["week"].strip()) for r in reader]

if not rows:
    sys.exit("CSV contains no data rows")

batches = [rows[i : i + batch_size] for i in range(0, len(rows), batch_size)]

with open(out_path, "w") as sql:
    sql.write("-- Auto-generated batched UPDATE for {schema}.lead\n".format(schema=schema))
    sql.write("-- Total rows: {total:,}  Batch size: {batch_size:,}  Batches: {n}\n\n".format(
        total=len(rows), batch_size=batch_size, n=len(batches)))
    sql.write("BEGIN;\n\n")

    for i, batch in enumerate(batches, 1):
        sql.write("-- Batch {i}/{n} ({count} rows)\n".format(i=i, n=len(batches), count=len(batch)))
        sql.write("UPDATE {schema}.lead AS t\n   SET week = v.week\n  FROM (\n    VALUES\n".format(schema=schema))
        values = []
        for lead_id, week in batch:
            values.append("      ({lead_id}::bigint, {week!r})".format(lead_id=int(lead_id), week=week))
        sql.write(",\n".join(values))
        sql.write("\n  ) AS v(lead_id, week)\n WHERE t.lead_id = v.lead_id;\n\n")

    sql.write("COMMIT;\n")

print("✅ SQL written to", out_path)
print("   Rows: {:,}  |  Batches: {:,}".format(len(rows), len(batches)))
PYEOF

          # Run with explicit env vars — no heredoc scoping issues
          CSV_FILE="${{ github.event.inputs.csv_file }}" \
          BATCH_SIZE="${{ github.event.inputs.batch_size }}" \
          SCHEMA_NAME="${{ env.SCHEMA_NAME }}" \
          OUTPUT_SQL="/tmp/lead_week_update.sql" \
          python3 /tmp/gen_update.py

          echo "OUTPUT_SQL=/tmp/lead_week_update.sql" >> $GITHUB_ENV

          echo "── SQL preview (first 60 lines) ──"
          head -60 /tmp/lead_week_update.sql

      - name: "Dry run — count matched rows"
        if: github.event.inputs.dry_run == 'true'
        run: |
          echo "ℹ️ Dry run — no rows will be modified"
          echo "Generated SQL is ready at /tmp/lead_week_update.sql"
          echo "Total rows in CSV: ${{ env.TOTAL_ROWS }}"
          echo "Re-run with dry_run=false to apply."

      - name: "Execute batched UPDATE"
        if: github.event.inputs.dry_run == 'false'
        run: |
          echo "🚀 Executing UPDATE on ${{ env.SCHEMA_NAME }}.lead ..."
          PGPASSWORD="$(gcloud auth print-access-token)" "$HOME/psql" \
            "hostaddr=127.0.0.1 port=5432 dbname=lead-mgmt-db user=gco-iam-svc-cicd-mbr-bc-np@gcp-prj-cicd-core.iam sslmode=disable" \
            --no-password \
            --echo-errors \
            -v ON_ERROR_STOP=1 \
            -f "/tmp/lead_week_update.sql"
          echo "✅ UPDATE complete"

      - name: "Verify updated rows (spot-check)"
        if: github.event.inputs.dry_run == 'false'
        run: |
          PGPASSWORD="$(gcloud auth print-access-token)" "$HOME/psql" \
            "hostaddr=127.0.0.1 port=5432 dbname=lead-mgmt-db user=gco-iam-svc-cicd-mbr-bc-np@gcp-prj-cicd-core.iam sslmode=disable" \
            --no-password -c \
            "SELECT lead_id, week FROM ${{ env.SCHEMA_NAME }}.lead ORDER BY updated_at DESC LIMIT 10;"

      - name: "Summary"
        if: always()
        run: |
          {
            echo "## Bulk Lead Week Update — ${{ github.event.inputs.environment }}"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| **Environment** | \`${{ github.event.inputs.environment }}\` |"
            echo "| **Project**     | \`${{ env.PROJECT_ID }}\` |"
            echo "| **Schema**      | \`${{ env.SCHEMA_NAME }}\` |"
            echo "| **CSV File**    | \`${{ github.event.inputs.csv_file }}\` |"
            echo "| **CSV Rows**    | \`${{ env.TOTAL_ROWS }}\` |"
            echo "| **Batch Size**  | \`${{ github.event.inputs.batch_size }}\` |"
            echo "| **Dry Run**     | \`${{ github.event.inputs.dry_run }}\` |"
            echo ""
            if [[ "${{ github.event.inputs.dry_run }}" == "true" ]]; then
              echo "> ⚠️ Dry run — no rows modified. Re-run with \`dry_run=false\` to apply."
            else
              echo "> ✅ UPDATE applied to \`${{ env.SCHEMA_NAME }}.lead\`."
            fi
          } >> $GITHUB_STEP_SUMMARY