name: Terraform View Remote State Without Code

on:
  workflow_dispatch:  # run manually

jobs:
  view-state:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
    - name: Checkout (empty repo)
      uses: actions/checkout@v4

    - name: "Auth in GCP"
      id: "auth"
      uses: "google-github-actions/auth@v2"
      with:
        create_credentials_file: true
        workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER_ID }}
        service_account: ${{ secrets.GCP_WORKLOAD_IDENTITY_SA_EMAIL }}
        project_id: 'p-601-np-membership-qat'

    - name: Install Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Create minimal Terraform backend config
      run: |
        cat > main.tf <<EOF
        terraform {
          backend "gcs" {
            bucket = "gcp-gcs-cicd-core-mbr-bc-lead"
            prefix = "qat/bc"
          }
        }
        EOF

    - name: Initialize Terraform backend
      run: terraform init -input=false

    # - name: Disable deletion protection via gcloud
    #   run: |
    #     gcloud sql instances patch lead-mgmt-qat \
    #       --no-deletion-protection \
    #       --project=p-601-np-membership-qat

    # - name: Delete instance via gcloud
    #   run: |
    #     gcloud sql instances delete lead-mgmt-qat \
    #       --quiet \
    #       --project=p-601-np-membership-qat

    # - name: Remove resource from Terraform state
    #   run: terraform state rm module.cloud_sql_instance.google_sql_database_instance.this

    - name: Refresh Terraform state
      run: terraform refresh -input=false

    - name: List resources in remote state
      run: terraform state list

    # - name: Remove deletion protection and destroy instance
    #   run: |
    #     cat > main.tf <<EOF
    #     terraform {
    #       backend "gcs" {
    #         bucket = "gcp-gcs-cicd-core-mbr-bc-lead"
    #         prefix = "adt/bc"
    #       }
    #     }

    #     resource "google_sql_database_instance" "this" {
    #       name                 = "lead-mgmt-adt"
    #       deletion_protection  = false
    #       project              = "p-601-np-membership-adt"
    #       region               = "us-central1"
    #       database_version = "POSTGRES_15"
    #       settings {
    #         tier = "db-f1-micro"
    #       }
    #     }
    #     EOF

    #     terraform init -input=false

    #     terraform apply -auto-approve

    #     terraform destroy -auto-approve -target=google_sql_database_instance.this

    - name: Destroy resources one by one
      run: |
        resources=(
          'google_project_service.required_apis_recreate["artifactregistry.googleapis.com"]'
          'google_project_service.required_apis_recreate["cloudfunctions.googleapis.com"]'
          'google_project_service.required_apis_recreate["cloudresourcemanager.googleapis.com"]'
          'google_project_service.required_apis_recreate["cloudscheduler.googleapis.com"]'
          'google_project_service.required_apis_recreate["monitoring.googleapis.com"]'
          'google_project_service.required_apis_recreate["pubsub.googleapis.com"]'
          'google_project_service.required_apis_recreate["secretmanager.googleapis.com"]'
          'google_project_service.required_apis_recreate["servicenetworking.googleapis.com"]'
          'google_project_service.required_apis_recreate["sqladmin.googleapis.com"]'
          'google_project_service.required_apis_recreate["storage.googleapis.com"]'
          google_service_account.my_service_account
          google_storage_bucket.this
          module.cloud_sql_instance.data.google_compute_network.shared_vpc
          module.cloud_sql_instance.data.google_compute_subnetwork.my-subnetwork
          module.cloud_sql_instance.google_sql_database.app_database
          module.cloud_sql_instance.google_sql_database_instance.this
          module.cloud_sql_instance.google_sql_user.iam_service_account_user
          module.cloud_sql_instance.google_sql_user.postgres_admin
          module.cloud_sql_instance.null_resource.postgresql_ready
          module.kubeflow_registry.google_artifact_registry_repository.this
          module.monitoring_alert.google_monitoring_alert_policy.cloud_run_job_failure
          module.monitoring_alert.google_monitoring_notification_channel.lead_mgmt_email
          module.service_now_password.google_secret_manager_secret.this
          module.service_now_password.google_secret_manager_secret_version.this
          module.service_now_username.google_secret_manager_secret.this
          module.service_now_username.google_secret_manager_secret_version.this
          module.snow_sync_scheduler.google_cloud_scheduler_job.snow_sync_scheduler
          module.snow_sync_scheduler.google_pubsub_topic.snow_sync_trigger
        )

        for res in "${resources[@]}"; do
          echo "Destroying resource: $res"
          terraform destroy -auto-approve -target="$res" || echo "Failed to destroy $res, continuing..."
        done
    - name: Destroy resources one by one
      run: |
        gcloud run jobs delete lead-match-job --region=us-central1 --quiet
        gcloud run jobs delete snow-sync-job --region=us-central1 --quiet