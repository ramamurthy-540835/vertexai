name: Terraform View Remote State Without Code

on:
  workflow_dispatch:  # run manually

jobs:
  view-state:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
    - name: Checkout (empty repo)
      uses: actions/checkout@v4

    - name: "Auth in GCP"
      id: "auth"
      uses: "google-github-actions/auth@v2"
      with:
        create_credentials_file: true
        workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER_ID }}
        service_account: ${{ secrets.GCP_WORKLOAD_IDENTITY_SA_EMAIL }}
        project_id: 'p-601-np-membership-adt'

    - name: Install Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Create minimal Terraform backend config
      run: |
        cat > main.tf <<EOF
        terraform {
          backend "gcs" {
            bucket = "gcp-gcs-cicd-core-mbr-bc-lead"
            prefix = "adt/bc"
          }
        }
        EOF

    - name: Initialize Terraform backend
      run: terraform init -input=false

    - name: Disable deletion protection via gcloud
      run: |
        gcloud sql instances patch lead-mgmt-adt \
          --no-deletion-protection \
          --project=p-601-np-membership-adt

    - name: List resources in remote state
      run: terraform state list

    - name: Refresh Terraform state
      run: terraform refresh -input=false

    - name: Destroy Cloud SQL instance
      run: terraform destroy -auto-approve -target=module.cloud_sql_instance.google_sql_database_instance.this