name: move_files_by_keyword

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment'
        required: true
        default: 'spt'
        type: choice
        options:
          - 'adt'
          - 'qat'
          - 'spt'
          - 'prd'
      keyword:
        description: 'Filename keyword to match (e.g. "Whse 1487"). Files containing this string move from processed/ → incoming-files/'
        required: true
        default: 'Whse 1487'
        type: string
      dry_run:
        description: 'Dry run (preview only — no actual move)?'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  move:
    name: "move-matching-files-${{ github.event.inputs.environment }}"
    runs-on:
      - self-hosted
      - us-central1

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Set ENV early for auth
        run: |
          if [[ "${{ github.event.inputs.environment }}" == "prd" ]]; then
            echo "ENV=prd" >> $GITHUB_ENV
            echo "PROJECT_ID=p-601-pd-bcleadsmgmt-prd" >> $GITHUB_ENV
            echo "BUCKET_NAME=gcp-gcs-lead-mgmt-us-prd-pos-raw" >> $GITHUB_ENV
          else
            echo "ENV=non-prd" >> $GITHUB_ENV
            echo "PROJECT_ID=p-601-np-bcleadsmgmt-${{ github.event.inputs.environment }}" >> $GITHUB_ENV
            echo "BUCKET_NAME=gcp-gcs-lead-mgmt-us-${{ github.event.inputs.environment }}-pos-raw" >> $GITHUB_ENV
          fi

      - name: Auth to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER_ID }}
          service_account: ${{ env.ENV == 'prd' && secrets.GCP_WORKLOAD_IDENTITY_SA_EMAIL_PRD || secrets.GCP_WORKLOAD_IDENTITY_SA_EMAIL }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Move matching files from processed to incoming
        env:
          KEYWORD: ${{ github.event.inputs.keyword }}
        run: |
          set -euo pipefail
          unset CLOUDSDK_CORE_PROJECT CLOUDSDK_PROJECT GCLOUD_PROJECT GCP_PROJECT GOOGLE_CLOUD_PROJECT
          gcloud config set project "${{ env.PROJECT_ID }}"

          SOURCE_PREFIX="pos-raw-data/processed"
          DEST_PREFIX="pos-raw-data/incoming-files"
          DRY_RUN="${{ github.event.inputs.dry_run }}"

          echo "============================================================"
          echo "Bucket:       ${BUCKET_NAME}"
          echo "Source:       gs://${BUCKET_NAME}/${SOURCE_PREFIX}/"
          echo "Destination:  gs://${BUCKET_NAME}/${DEST_PREFIX}/"
          echo "Dry run:      ${DRY_RUN}"
          echo "Match rule:   filename contains '${KEYWORD}'"
          echo "============================================================"

          echo ""
          echo "Listing files in processed folder..."
          ALL_FILES=$(gcloud storage ls "gs://${BUCKET_NAME}/${SOURCE_PREFIX}/" \
            --project="${PROJECT_ID}" 2>/dev/null || echo "")

          if [ -z "$ALL_FILES" ]; then
            echo "❌ No files found in source folder"
            exit 1
          fi

          MOVED=0
          SKIPPED=0
          FAILED=0
          MOVED_LIST=()

          while IFS= read -r FILE_PATH; do
            # Skip empty lines and directory placeholders
            if [ -z "$FILE_PATH" ] || [[ "$FILE_PATH" == */ ]]; then
              continue
            fi

            FILENAME=$(basename "$FILE_PATH")
            DEST_PATH="gs://${BUCKET_NAME}/${DEST_PREFIX}/${FILENAME}"

            # Match check — does filename contain the keyword?
            if [[ "$FILENAME" != *"${KEYWORD}"* ]]; then
              SKIPPED=$((SKIPPED + 1))
              continue
            fi

            if [ "$DRY_RUN" == "true" ]; then
              echo "📋 [DRY RUN] Would move: $FILENAME"
              echo "    From: $FILE_PATH"
              echo "    To:   $DEST_PATH"
              MOVED=$((MOVED + 1))
              MOVED_LIST+=("$FILENAME")
            else
              echo "📦 Moving: $FILENAME"
              if gcloud storage mv "$FILE_PATH" "$DEST_PATH" \
                --project="${PROJECT_ID}" 2>&1; then
                echo "   ✅ Moved to: $DEST_PATH"
                MOVED=$((MOVED + 1))
                MOVED_LIST+=("$FILENAME")
              else
                echo "   ❌ Failed to move: $FILENAME"
                FAILED=$((FAILED + 1))
              fi
            fi
          done <<< "$ALL_FILES"

          echo ""
          echo "============================================================"
          echo "Summary"
          echo "============================================================"
          if [ "$DRY_RUN" == "true" ]; then
            echo "Dry run mode — no files were actually moved"
            echo "Would move:    $MOVED file(s) matching '${KEYWORD}'"
          else
            echo "Moved:         $MOVED file(s) matching '${KEYWORD}'"
            echo "Failed:        $FAILED file(s)"
          fi
          echo "Skipped:       $SKIPPED file(s) (no match)"
          echo "============================================================"

          if [ "$MOVED" -eq 0 ]; then
            echo "⚠️  WARNING: No files matched the keyword '${KEYWORD}'"
          fi

          {
            echo "MOVED_COUNT=$MOVED"
            echo "SKIPPED_COUNT=$SKIPPED"
            echo "FAILED_COUNT=$FAILED"
          } >> $GITHUB_ENV

          printf '%s\n' "${MOVED_LIST[@]}" > /tmp/moved_files.txt

          if [ "$FAILED" -gt 0 ]; then
            exit 1
          fi

      - name: Summary
        if: always()
        run: |
          {
            echo "## Move Files by Keyword — ${{ github.event.inputs.environment }}"
            echo ""
            echo "- **Environment:**  \`${{ github.event.inputs.environment }}\`"
            echo "- **Project:**      \`${{ env.PROJECT_ID }}\`"
            echo "- **Bucket:**       \`${{ env.BUCKET_NAME }}\`"
            echo "- **Source:**       \`gs://${{ env.BUCKET_NAME }}/pos-raw-data/processed/\`"
            echo "- **Destination:**  \`gs://${{ env.BUCKET_NAME }}/pos-raw-data/incoming-files/\`"
            echo "- **Keyword:**      \`${{ github.event.inputs.keyword }}\`"
            echo "- **Dry Run:**      \`${{ github.event.inputs.dry_run }}\`"
            echo ""
            echo "### Counts"
            echo "- Moved:    ${{ env.MOVED_COUNT }}"
            echo "- Skipped:  ${{ env.SKIPPED_COUNT }} (no match)"
            echo "- Failed:   ${{ env.FAILED_COUNT }}"
            echo ""
            if [ -f /tmp/moved_files.txt ] && [ "${{ env.MOVED_COUNT }}" -gt 0 ]; then
              echo "### Moved Files"
              echo '```'
              cat /tmp/moved_files.txt
              echo '```'
            fi
          } >> $GITHUB_STEP_SUMMARY