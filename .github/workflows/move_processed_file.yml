name: move_files_to_incoming

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment'
        required: true
        default: 'spt'
        type: choice
        options:
          - 'adt'
          - 'qat'
          - 'spt'
          - 'prd'
      dry_run:
        description: 'Dry run (preview only — no actual move)?'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  move:
    name: "move-processed-to-incoming-${{ github.event.inputs.environment }}"
    runs-on:
      - self-hosted
      - us-central1

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Set ENV early for auth
        run: |
          if [[ "${{ github.event.inputs.environment }}" == "prd" ]]; then
            echo "ENV=prd" >> $GITHUB_ENV
            echo "PROJECT_ID=p-601-pd-bcleadsmgmt-prd" >> $GITHUB_ENV
            echo "BUCKET_NAME=gcp-gcs-lead-mgmt-us-prd-pos-raw" >> $GITHUB_ENV
          else
            echo "ENV=non-prd" >> $GITHUB_ENV
            echo "PROJECT_ID=p-601-np-bcleadsmgmt-${{ github.event.inputs.environment }}" >> $GITHUB_ENV
            echo "BUCKET_NAME=gcp-gcs-lead-mgmt-us-${{ github.event.inputs.environment }}-pos-raw" >> $GITHUB_ENV
          fi

      - name: Auth to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER_ID }}
          service_account: ${{ env.ENV == 'prd' && secrets.GCP_WORKLOAD_IDENTITY_SA_EMAIL_PRD || secrets.GCP_WORKLOAD_IDENTITY_SA_EMAIL }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Move files back to incoming, keep CSV and Whse 115 only
        run: |
          set -euo pipefail
          unset CLOUDSDK_CORE_PROJECT CLOUDSDK_PROJECT GCLOUD_PROJECT GCP_PROJECT GOOGLE_CLOUD_PROJECT
          gcloud config set project "${{ env.PROJECT_ID }}"

          SOURCE_PREFIX="pos-raw-data/processed"
          DEST_PREFIX="pos-raw-data/incoming-files"
          DRY_RUN="${{ github.event.inputs.dry_run }}"

          echo "============================================================"
          echo "Bucket:       ${BUCKET_NAME}"
          echo "Source:       gs://${BUCKET_NAME}/${SOURCE_PREFIX}/"
          echo "Destination:  gs://${BUCKET_NAME}/${DEST_PREFIX}/"
          echo "Dry run:      ${DRY_RUN}"
          echo "Keep rule:    CSV files OR Whse 115 files"
          echo "============================================================"

          echo ""
          echo "Listing files in processed folder..."
          ALL_FILES=$(gcloud storage ls "gs://${BUCKET_NAME}/${SOURCE_PREFIX}/" \
            --project="${PROJECT_ID}" 2>/dev/null || echo "")

          if [ -z "$ALL_FILES" ]; then
            echo "❌ No files found in source folder"
            exit 1
          fi

          MOVED=0
          KEPT=0
          MOVED_BACK=0
          FAILED=0
          KEPT_LIST=()
          MOVED_BACK_LIST=()

          while IFS= read -r FILE_PATH; do
            # Skip empty lines and directory placeholders
            if [ -z "$FILE_PATH" ] || [[ "$FILE_PATH" == */ ]]; then
              continue
            fi

            FILENAME=$(basename "$FILE_PATH")
            DEST_PATH="gs://${BUCKET_NAME}/${DEST_PREFIX}/${FILENAME}"
            BACK_PATH="gs://${BUCKET_NAME}/${SOURCE_PREFIX}/${FILENAME}"

            # Keep if: CSV, OR filename contains "Whse 115"
            SHOULD_KEEP=false
            if [[ "${FILENAME,,}" == *.csv ]]; then
              SHOULD_KEEP=true
              KEEP_REASON="CSV file"
            elif [[ "$FILENAME" == *"Whse 115"* ]]; then
              SHOULD_KEEP=true
              KEEP_REASON="Whse 115"
            fi

            if [ "$DRY_RUN" == "true" ]; then
              if [ "$SHOULD_KEEP" == "true" ]; then
                echo "📋 [DRY RUN] Would move & KEEP in incoming: $FILENAME ($KEEP_REASON)"
                KEPT=$((KEPT + 1))
                KEPT_LIST+=("$FILENAME")
              else
                echo "📋 [DRY RUN] Would move to incoming, then move back to processed: $FILENAME"
                MOVED_BACK=$((MOVED_BACK + 1))
                MOVED_BACK_LIST+=("$FILENAME")
              fi
              MOVED=$((MOVED + 1))
            else
              # Step 1: Move everything processed → incoming
              echo "📦 Moving to incoming: $FILENAME"
              if gcloud storage mv "$FILE_PATH" "$DEST_PATH" \
                --project="${PROJECT_ID}" 2>&1; then
                MOVED=$((MOVED + 1))

                if [ "$SHOULD_KEEP" == "true" ]; then
                  echo "   ✅ Kept in incoming ($KEEP_REASON)"
                  KEPT=$((KEPT + 1))
                  KEPT_LIST+=("$FILENAME")
                else
                  # Step 2: Move non-keepers back to processed
                  echo "   🔄  Moving back to processed (not CSV or Whse 115): $FILENAME"
                  if gcloud storage mv "$DEST_PATH" "$BACK_PATH" \
                    --project="${PROJECT_ID}" 2>&1; then
                    echo "   ✅ Moved back to processed"
                    MOVED_BACK=$((MOVED_BACK + 1))
                    MOVED_BACK_LIST+=("$FILENAME")
                  else
                    echo "   ❌ Failed to move back to processed: $FILENAME"
                    FAILED=$((FAILED + 1))
                  fi
                fi
              else
                echo "   ❌ Failed to move to incoming: $FILENAME"
                FAILED=$((FAILED + 1))
              fi
            fi
          done <<< "$ALL_FILES"

          echo ""
          echo "============================================================"
          echo "Summary"
          echo "============================================================"
          if [ "$DRY_RUN" == "true" ]; then
            echo "Dry run mode — no files were actually moved"
            echo "Would keep in incoming:        $KEPT file(s) (CSV or Whse 115)"
            echo "Would move back to processed:  $MOVED_BACK file(s)"
          else
            echo "Kept in incoming:              $KEPT file(s) (CSV or Whse 115)"
            echo "Moved back to processed:       $MOVED_BACK file(s)"
            echo "Failed:                        $FAILED file(s)"
          fi
          echo "============================================================"

          {
            echo "KEPT_COUNT=$KEPT"
            echo "MOVED_BACK_COUNT=$MOVED_BACK"
            echo "FAILED_COUNT=$FAILED"
          } >> $GITHUB_ENV

          printf '%s\n' "${KEPT_LIST[@]}" > /tmp/kept_files.txt
          printf '%s\n' "${MOVED_BACK_LIST[@]}" > /tmp/moved_back_files.txt

          if [ "$FAILED" -gt 0 ]; then
            exit 1
          fi

      - name: Summary
        if: always()
        run: |
          {
            echo "## Move Processed → Incoming — ${{ github.event.inputs.environment }}"
            echo ""
            echo "- **Environment:**  \`${{ github.event.inputs.environment }}\`"
            echo "- **Project:**      \`${{ env.PROJECT_ID }}\`"
            echo "- **Bucket:**       \`${{ env.BUCKET_NAME }}\`"
            echo "- **Source:**       \`gs://${{ env.BUCKET_NAME }}/pos-raw-data/processed/\`"
            echo "- **Destination:**  \`gs://${{ env.BUCKET_NAME }}/pos-raw-data/incoming-files/\`"
            echo "- **Dry Run:**      \`${{ github.event.inputs.dry_run }}\`"
            echo "- **Keep rule:**    CSV files OR Whse 115 files"
            echo ""
            echo "### Counts"
            echo "- Kept in incoming:            ${{ env.KEPT_COUNT }} (CSV or Whse 115)"
            echo "- Moved back to processed:     ${{ env.MOVED_BACK_COUNT }}"
            echo "- Failed:                      ${{ env.FAILED_COUNT }}"
            echo ""
            if [ -f /tmp/kept_files.txt ] && [ "${{ env.KEPT_COUNT }}" -gt 0 ]; then
              echo "### Kept in Incoming (CSV or Whse 115)"
              echo '```'
              cat /tmp/kept_files.txt
              echo '```'
            fi
            if [ -f /tmp/moved_back_files.txt ] && [ "${{ env.MOVED_BACK_COUNT }}" -gt 0 ]; then
              echo ""
              echo "### Moved Back to Processed (xlsx non-Whse-115)"
              echo '```'
              cat /tmp/moved_back_files.txt
              echo '```'
            fi
          } >> $GITHUB_STEP_SUMMARY