name: Lead Match Preflight Ops

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'spt'
        type: choice
        options:
          - 'adt'
          - 'qat'
          - 'spt'
          - 'prd'
      warehouse:
        description: 'Warehouse number, comma-separated warehouses, blank, or all'
        required: false
        default: '115'
        type: string
      include_cloud_sql:
        description: 'Add Cloud SQL health/query checklist to the report?'
        required: true
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
      prepare_resources:
        description: 'Create preflight GCS folders if missing?'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  preflight:
    name: "preflight-${{ github.event.inputs.environment }}-${{ github.event.inputs.warehouse || 'all' }}"
    runs-on: cw-gcp-us-west1-${{ inputs.environment == 'prd' && 'pd' || 'np' }}
    environment: ${{ github.event.inputs.environment }}

    permissions:
      id-token: write
      contents: read

    env:
      ENV_NAME: ${{ github.event.inputs.environment }}
      REGION: us-central1
      JOB_NAME: lead-match-job

    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4

      - name: Resolve environment
        env:
          RAW_WAREHOUSE: ${{ github.event.inputs.warehouse }}
        run: |
          set -euo pipefail

          if [[ "${ENV_NAME}" == "prd" ]]; then
            PROJECT_ID="p-601-pd-bcleadsmgmt-prd"
            SCHEMA_NAME="lead_mgmt_prd"
            INSTANCE_NAME="lead-mgmt-prd"
            BUCKET_NAME="gcp-gcs-lead-mgmt-us-prd"
            ENV_CLASS="prd"
          else
            PROJECT_ID="p-601-np-bcleadsmgmt-${ENV_NAME}"
            SCHEMA_NAME="lead_mgmt_${ENV_NAME}"
            INSTANCE_NAME="lead-mgmt-${ENV_NAME}"
            BUCKET_NAME="gcp-gcs-lead-mgmt-us-${ENV_NAME}"
            ENV_CLASS="non-prd"
          fi

          WAREHOUSE="$(printf '%s' "${RAW_WAREHOUSE}" | tr -d '[:space:]')"
          if [[ -z "${WAREHOUSE}" || "${WAREHOUSE,,}" == "all" ]]; then
            WAREHOUSE=""
            WAREHOUSE_LABEL="all"
            WAREHOUSE_SQL_FILTER=""
          else
            if [[ ! "${WAREHOUSE}" =~ ^[0-9]+(,[0-9]+)*$ ]]; then
              echo "Invalid warehouse input: ${WAREHOUSE}"
              echo "Use a single number like 115, comma-separated numbers like 115,1663, or blank/all."
              exit 1
            fi
            WAREHOUSE_LABEL="${WAREHOUSE}"
            WAREHOUSE_SQL_FILTER="AND warehouse_number IN (${WAREHOUSE})"
          fi

          REPORT_TS="$(date -u +%Y%m%d_%H%M%S)"
          REPORT_OBJECT="preflight/lead_match/${ENV_NAME}/${WAREHOUSE_LABEL}/lead_match_preflight_${ENV_NAME}_${WAREHOUSE_LABEL}_${REPORT_TS}.md"
          REPORT_URI="gs://${BUCKET_NAME}/${REPORT_OBJECT}"

          {
            echo "PROJECT_ID=${PROJECT_ID}"
            echo "SCHEMA_NAME=${SCHEMA_NAME}"
            echo "INSTANCE_NAME=${INSTANCE_NAME}"
            echo "BUCKET_NAME=${BUCKET_NAME}"
            echo "ENV_CLASS=${ENV_CLASS}"
            echo "WAREHOUSE=${WAREHOUSE}"
            echo "WAREHOUSE_LABEL=${WAREHOUSE_LABEL}"
            echo "WAREHOUSE_SQL_FILTER=${WAREHOUSE_SQL_FILTER}"
            echo "REPORT_OBJECT=${REPORT_OBJECT}"
            echo "REPORT_URI=${REPORT_URI}"
            echo "REPORT_FILE=${RUNNER_TEMP}/lead_match_preflight_report.md"
          } >> "$GITHUB_ENV"

      - name: Auth to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER_ID }}
          service_account: ${{ github.event.inputs.environment == 'prd' && secrets.GCP_WORKLOAD_IDENTITY_SA_EMAIL_PRD || secrets.GCP_WORKLOAD_IDENTITY_SA_EMAIL }}
          create_credentials_file: true
          export_environment_variables: true

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Initialize report
        run: |
          set -euo pipefail
          {
            echo "# Lead Match Preflight"
            echo ""
            echo "- Environment: \`${ENV_NAME}\`"
            echo "- Project: \`${PROJECT_ID}\`"
            echo "- Schema: \`${SCHEMA_NAME}\`"
            echo "- Bucket: \`${BUCKET_NAME}\`"
            echo "- Warehouse: \`${WAREHOUSE_LABEL}\`"
            echo "- Region: \`${REGION}\`"
            echo "- Cloud SQL checks: \`${{ github.event.inputs.include_cloud_sql }}\`"
            echo "- Prepare resources: \`${{ github.event.inputs.prepare_resources }}\`"
            echo "- Generated UTC: \`$(date -u +%Y-%m-%dT%H:%M:%SZ)\`"
            echo ""
          } > "${REPORT_FILE}"

      - name: Prepare GCS folders
        if: github.event.inputs.prepare_resources == 'true'
        run: |
          set -euo pipefail
          unset CLOUDSDK_CORE_PROJECT CLOUDSDK_PROJECT GCLOUD_PROJECT GCP_PROJECT GOOGLE_CLOUD_PROJECT
          gcloud config set project "${PROJECT_ID}"

          MARKER_FILE="${RUNNER_TEMP}/.keep"
          printf 'created by lead_match_preflight_ops at %s\n' "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > "${MARKER_FILE}"

          create_marker() {
            local uri="$1"
            gsutil cp "${MARKER_FILE}" "${uri}.keep" >/dev/null
          }

          create_marker "gs://${BUCKET_NAME}/match/exact/final_match_result/"
          create_marker "gs://${BUCKET_NAME}/archive/match/exact/final_match_result/"
          create_marker "gs://${BUCKET_NAME}/match/vertex/final_match_result/"
          create_marker "gs://${BUCKET_NAME}/archive/match/vertex/final_match_result/"
          create_marker "gs://${BUCKET_NAME}/preflight/lead_match/${ENV_NAME}/${WAREHOUSE_LABEL}/"

          {
            echo "## Prepared GCS Folders"
            echo ""
            echo "- \`gs://${BUCKET_NAME}/match/exact/final_match_result/\`"
            echo "- \`gs://${BUCKET_NAME}/archive/match/exact/final_match_result/\`"
            echo "- \`gs://${BUCKET_NAME}/match/vertex/final_match_result/\`"
            echo "- \`gs://${BUCKET_NAME}/archive/match/vertex/final_match_result/\`"
            echo "- \`gs://${BUCKET_NAME}/preflight/lead_match/${ENV_NAME}/${WAREHOUSE_LABEL}/\`"
            echo ""
          } >> "${REPORT_FILE}"

      - name: Inspect GCS folders
        run: |
          set -euo pipefail
          unset CLOUDSDK_CORE_PROJECT CLOUDSDK_PROJECT GCLOUD_PROJECT GCP_PROJECT GOOGLE_CLOUD_PROJECT
          gcloud config set project "${PROJECT_ID}"

          append_listing() {
            local title="$1"
            local uri="$2"
            echo "## ${title}" >> "${REPORT_FILE}"
            echo "" >> "${REPORT_FILE}"
            echo "\`${uri}\`" >> "${REPORT_FILE}"
            echo "" >> "${REPORT_FILE}"
            echo '```text' >> "${REPORT_FILE}"
            gsutil ls -l "${uri}" >> "${REPORT_FILE}" 2>&1 || true
            echo '```' >> "${REPORT_FILE}"
            echo "" >> "${REPORT_FILE}"
          }

          append_listing "Final match output folder" "gs://${BUCKET_NAME}/match/final_match_result/"
          append_listing "Final match archive folder" "gs://${BUCKET_NAME}/archive/match/final_match_result/"
          append_listing "Exact final output folder" "gs://${BUCKET_NAME}/match/exact/final_match_result/"
          append_listing "Exact final archive folder" "gs://${BUCKET_NAME}/archive/match/exact/final_match_result/"
          append_listing "Vertex final output folder" "gs://${BUCKET_NAME}/match/vertex/final_match_result/"
          append_listing "Vertex final archive folder" "gs://${BUCKET_NAME}/archive/match/vertex/final_match_result/"
          append_listing "Temporary folder" "gs://${BUCKET_NAME}/temporary_folder/"
          append_listing "Match spill folder" "gs://${BUCKET_NAME}/temporary_folder/match_spill/"

      - name: Inspect Cloud Run job
        run: |
          set -euo pipefail
          {
            echo "## Cloud Run Job"
            echo ""
            echo "### Job Description"
            echo '```yaml'
            gcloud run jobs describe "${JOB_NAME}" \
              --region="${REGION}" \
              --project="${PROJECT_ID}" \
              --format="yaml(metadata.labels,spec.template.spec.containers[0].image,spec.template.spec.containers[0].resources,spec.template.spec.containers[0].env,spec.template.spec.timeoutSeconds,spec.template.spec.serviceAccountName)" \
              2>&1 || true
            echo '```'
            echo ""
            echo "### Recent Executions"
            echo '```text'
            gcloud run jobs executions list \
              --job="${JOB_NAME}" \
              --region="${REGION}" \
              --project="${PROJECT_ID}" \
              --limit=10 \
              --format="table(name,status.conditions[0].type,status.conditions[0].status,metadata.creationTimestamp,status.startTime,status.completionTime)" \
              2>&1 || true
            echo '```'
            echo ""
          } >> "${REPORT_FILE}"

      - name: Add semantic output contract
        run: |
          set -euo pipefail
          {
            echo "## Semantic Output Contract"
            echo ""
            echo "### GCS Folders"
            echo ""
            echo "- Exact-only classified output: \`gs://${BUCKET_NAME}/match/exact/final_match_result/\`"
            echo "- Vertex/Fuzzy final output: \`gs://${BUCKET_NAME}/match/vertex/final_match_result/\`"
            echo "- Update-stage compatibility output: \`gs://${BUCKET_NAME}/match/final_match_result/\`"
            echo "- Vertex/Fuzzy archive: \`gs://${BUCKET_NAME}/archive/match/vertex/final_match_result/\`"
            echo ""
            echo "### File Naming"
            echo ""
            echo "- Vertex/Fuzzy output uses \`final_update_dataframe_<MATCH_ID>_<warehouse>_<YYYYMMDD_HHMMSS>.csv\`."
            echo "- Timestamped names prevent collisions across reruns."
            echo "- \`MATCH_ID\` is the preferred selector for update jobs; if it is absent, update jobs fall back to latest CSV."
            echo ""
            echo "### Match Decision Fields"
            echo ""
            echo "- Exact rows keep \`match_type = Exact\`."
            echo "- Vertex-overridden rows use \`match_type = Fuzzy\`."
            echo "- Final score formula: \`(combined_field_score + 4 * full_address_score + 3 * business_name_score) / 8\`."
            echo "- Fuzzy candidates must have final \`similarity_score >= 80\` and must beat the primary exact score before they override the exact result."
            echo ""
          } >> "${REPORT_FILE}"

      - name: Add Cloud SQL preflight checklist
        if: github.event.inputs.include_cloud_sql == 'true'
        run: |
          set -euo pipefail
          {
            echo "## Cloud SQL Preflight Checklist"
            echo ""
            echo "- Live Cloud SQL queries are not executed from this GitHub runner."
            echo "- The runner cannot rely on package installs or private Cloud SQL network reachability."
            echo "- Run these queries from Cloud SQL Query Studio, an approved bastion, or a future Cloud Run diagnostic stage."
            echo ""
            echo "### Health SQL"
            echo '```sql'
            echo "SHOW max_connections;"
            echo ""
            echo "SELECT count(*) AS active_connections"
            echo "FROM pg_stat_activity;"
            echo ""
            echo "SELECT usename, application_name, state, count(*)"
            echo "FROM pg_stat_activity"
            echo "GROUP BY usename, application_name, state"
            echo "ORDER BY count(*) DESC;"
            echo ""
            echo "SELECT pid, state, wait_event_type, wait_event, now() - query_start AS runtime, left(query, 500) AS query"
            echo "FROM pg_stat_activity"
            echo "WHERE state <> 'idle'"
            echo "ORDER BY runtime DESC;"
            echo '```'
            echo ""
            echo "### Warehouse Readiness SQL"
            echo '```sql'
            echo "SELECT count(*) AS lead_count"
            echo "FROM ${SCHEMA_NAME}.lead"
            echo "WHERE 1=1 ${WAREHOUSE_SQL_FILTER};"
            echo ""
            echo "SELECT count(*) AS transaction_count"
            echo "FROM ${SCHEMA_NAME}.transaction"
            echo "WHERE 1=1 ${WAREHOUSE_SQL_FILTER};"
            echo ""
            echo "SELECT count(*) AS lead_embedding_count"
            echo "FROM ${SCHEMA_NAME}.leads_embeddings"
            echo "WHERE 1=1 ${WAREHOUSE_SQL_FILTER};"
            echo ""
            echo "SELECT count(*) AS pos_embedding_count"
            echo "FROM ${SCHEMA_NAME}.pos_embeddings"
            echo "WHERE 1=1 ${WAREHOUSE_SQL_FILTER};"
            echo ""
            echo "SELECT"
            echo "  (SELECT count(*) FROM ${SCHEMA_NAME}.transaction WHERE 1=1 ${WAREHOUSE_SQL_FILTER}) AS pos_total,"
            echo "  (SELECT count(*) FROM ${SCHEMA_NAME}.pos_embeddings WHERE 1=1 ${WAREHOUSE_SQL_FILTER}) AS pos_embedded,"
            echo "  (SELECT count(*) FROM ${SCHEMA_NAME}.lead WHERE 1=1 ${WAREHOUSE_SQL_FILTER}) AS lead_total,"
            echo "  (SELECT count(*) FROM ${SCHEMA_NAME}.leads_embeddings WHERE 1=1 ${WAREHOUSE_SQL_FILTER}) AS lead_embedded;"
            echo ""
            echo "SELECT COALESCE(match_type, 'NULL') AS match_type, count(*)"
            echo "FROM ${SCHEMA_NAME}.transaction"
            echo "WHERE 1=1 ${WAREHOUSE_SQL_FILTER}"
            echo "GROUP BY COALESCE(match_type, 'NULL')"
            echo "ORDER BY count(*) DESC;"
            echo ""
            echo "CREATE TABLE IF NOT EXISTS ${SCHEMA_NAME}.match_decision_detail ("
            echo "  match_run_id varchar(100),"
            echo "  lead_id varchar(150),"
            echo "  pos_id varchar(150),"
            echo "  warehouse_number int,"
            echo "  match_type varchar(100),"
            echo "  final_score double precision,"
            echo "  combined_field_score double precision,"
            echo "  full_address_score double precision,"
            echo "  business_name_score double precision,"
            echo "  weight_formula varchar(100),"
            echo "  embedding_model varchar(100),"
            echo "  created_date timestamp DEFAULT current_timestamp"
            echo ");"
            echo ""
            echo "SELECT column_name, data_type"
            echo "FROM information_schema.columns"
            echo "WHERE table_schema = '${SCHEMA_NAME}'"
            echo "  AND table_name = 'match_decision_detail'"
            echo "ORDER BY ordinal_position;"
            echo ""
            echo "SELECT count(*) AS match_decision_detail_rows"
            echo "FROM ${SCHEMA_NAME}.match_decision_detail"
            echo "WHERE 1=1 ${WAREHOUSE_SQL_FILTER};"
            echo ""
            echo "SELECT column_name, data_type"
            echo "FROM information_schema.columns"
            echo "WHERE table_schema = '${SCHEMA_NAME}'"
            echo "  AND table_name = 'transaction'"
            echo "  AND column_name IN ("
            echo "    'match_type',"
            echo "    'match_score',"
            echo "    'matching_comments',"
            echo "    'primary_transaction',"
            echo "    'vertex_combined_score',"
            echo "    'vertex_address_score',"
            echo "    'vertex_name_score',"
            echo "    'vertex_weight_formula',"
            echo "    'vertex_model',"
            echo "    'match_run_id'"
            echo "  )"
            echo "ORDER BY column_name;"
            echo '```'
            echo ""
          } >> "${REPORT_FILE}"

      - name: Add readiness notes
        if: always()
        run: |
          {
            echo "## Readiness Notes"
            echo ""
            echo "- If prepare_resources=true, it also creates GCS marker files."
            echo "- It does not execute \`lead_match_workflow\`."
            echo "- It does not execute \`lead-match-job\`."
            echo "- Exact vs Vertex/Fuzzy is tracked by \`transaction.match_type\`."
            echo "- \`${SCHEMA_NAME}.match_decision_detail\` is created by this preflight when enabled."
            echo "- The Cloud SQL checklist includes readiness and validation SQL."
            echo ""
            echo "Report GCS URI: \`${REPORT_URI}\`"
          } >> "${REPORT_FILE}"

      - name: Upload report to GCS
        if: always()
        run: |
          set -euo pipefail
          gsutil cp "${REPORT_FILE}" "${REPORT_URI}"

      - name: Summary
        if: always()
        run: |
          cat "${REPORT_FILE}" >> "$GITHUB_STEP_SUMMARY"
