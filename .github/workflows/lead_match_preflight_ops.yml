name: lead_match_preflight_ops.yml

on:
  workflow_dispatch:
    inputs:
      project_id:
        description: "GCP project ID"
        required: false
        default: "ctoteam"
        type: string
      region:
        description: "GCP region"
        required: false
        default: "us-central1"
        type: string
      instance_name:
        description: "Cloud SQL instance name"
        required: false
        default: "lead-mgmt-db"
        type: string
      schema_name:
        description: "Cloud SQL schema containing lead match tables"
        required: false
        default: "leadmgmt"
        type: string
      db_name_secret:
        description: "Optional Secret Manager secret for DB name; falls back to GitHub secret DB_NAME or postgres"
        required: false
        default: ""
        type: string
      db_user_secret:
        description: "Optional Secret Manager secret for DB user; falls back to GitHub secret DB_USER or postgres"
        required: false
        default: ""
        type: string
      db_password_secret:
        description: "Optional Secret Manager secret for DB password; falls back to GitHub secret DB_PASSWORD"
        required: false
        default: ""
        type: string
      warehouse:
        description: "Warehouse number, comma-separated warehouses, blank, or all"
        required: false
        default: "115"
        type: string
      bucket:
        description: "GCS bucket used for lead-match reports"
        required: false
        default: "lead-match-ctoteam"
        type: string
      prepare_resources:
        description: "Create preflight GCS folders if missing?"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      run_smoke_tests:
        description: "Run Vertex AI and Cloud SQL smoke-test scripts?"
        required: true
        default: "false"
        type: choice
        options:
          - "true"
          - "false"
      run_cloud_sql_index_maintenance:
        description: "Create/check embedding vector indexes in Cloud SQL?"
        required: true
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  preflight:
    name: "ctoteam-preflight-${{ github.event.inputs.warehouse || 'all' }}"
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    env:
      PROJECT_ID: ${{ github.event.inputs.project_id }}
      REGION: ${{ github.event.inputs.region }}
      SCHEMA_NAME: ${{ github.event.inputs.schema_name }}
      INSTANCE_NAME: ${{ github.event.inputs.instance_name }}
      WORKFLOW_NAME: lead_match_workflow
      LEAD_JOB: lead-match-lead-embeddings
      POS_JOB: lead-match-pos-embeddings
      MATCH_JOB: lead-match-fuzzy-match
      SMOKE_JOB: lead-match-warehouse-smoke
      BUCKET_NAME: ${{ github.event.inputs.bucket }}
      DB_NAME: ${{ secrets.DB_NAME }}
      DB_USER: ${{ secrets.DB_USER }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      DB_NAME_SECRET: ${{ github.event.inputs.db_name_secret }}
      DB_USER_SECRET: ${{ github.event.inputs.db_user_secret }}
      DB_PASSWORD_SECRET: ${{ github.event.inputs.db_password_secret }}
      EMBEDDING_DIMENSION: "768"
      WORKFLOW_YAML_STATUS: FAIL
      VERTEX_PATH_STATUS: FAIL
      CLOUD_SQL_SMOKE_STATUS: SKIPPED
      CLOUD_SQL_INDEX_STATUS: SKIPPED
      OPTIONAL_CHECKS_JSON: '{}'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Auth to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER_ID }}
          service_account: ${{ secrets.GCP_WORKLOAD_IDENTITY_SA_EMAIL }}
          create_credentials_file: true
          export_environment_variables: true

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Set up Python
        if: github.event.inputs.run_smoke_tests == 'true' || github.event.inputs.run_cloud_sql_index_maintenance == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install smoke-test dependencies
        if: github.event.inputs.run_smoke_tests == 'true' || github.event.inputs.run_cloud_sql_index_maintenance == 'true'
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install \
            "cloud-sql-python-connector[pg8000]" \
            google-genai \
            google-auth \
            pg8000

      - name: Resolve inputs
        env:
          RAW_WAREHOUSE: ${{ github.event.inputs.warehouse }}
        run: |
          set -euo pipefail
          WAREHOUSE="$(printf '%s' "${RAW_WAREHOUSE}" | tr -d '[:space:]')"
          if [[ -z "${WAREHOUSE}" || "${WAREHOUSE,,}" == "all" ]]; then
            WAREHOUSE=""
            WAREHOUSE_LABEL="all"
            WAREHOUSE_SQL_FILTER=""
          else
            if [[ ! "${WAREHOUSE}" =~ ^[0-9]+(,[0-9]+)*$ ]]; then
              echo "Invalid warehouse input: ${WAREHOUSE}"
              exit 1
            fi
            WAREHOUSE_LABEL="${WAREHOUSE}"
            WAREHOUSE_SQL_FILTER="AND warehouse_number IN (${WAREHOUSE})"
          fi

          HANDOFF_PREFIX="preflight/lead_match/${PROJECT_ID}/${WAREHOUSE_LABEL}"
          {
            echo "WAREHOUSE=${WAREHOUSE}"
            echo "WAREHOUSE_LABEL=${WAREHOUSE_LABEL}"
            echo "WAREHOUSE_SQL_FILTER=${WAREHOUSE_SQL_FILTER}"
            echo "HANDOFF_PREFIX=${HANDOFF_PREFIX}"
            echo "REPORT_FILE=${RUNNER_TEMP}/lead_match_preflight_report.md"
            echo "RESULT_FILE=${RUNNER_TEMP}/lead_match_preflight_result.json"
            echo "READY_FILE=${RUNNER_TEMP}/READY"
            echo "REPORT_URI=gs://${BUCKET_NAME}/${HANDOFF_PREFIX}/report.md"
            echo "RESULT_URI=gs://${BUCKET_NAME}/${HANDOFF_PREFIX}/result.json"
            echo "READY_URI=gs://${BUCKET_NAME}/${HANDOFF_PREFIX}/READY"
          } >> "$GITHUB_ENV"
          gsutil rm -f "gs://${BUCKET_NAME}/${HANDOFF_PREFIX}/READY" >/dev/null 2>&1 || true

      - name: Initialize report
        run: |
          set -euo pipefail
          {
            echo "# Lead Match Preflight"
            echo ""
            echo "- Project: \`${PROJECT_ID}\`"
            echo "- Region: \`${REGION}\`"
            echo "- Cloud SQL instance: \`${INSTANCE_NAME}\`"
            echo "- Schema: \`${SCHEMA_NAME}\`"
            echo "- Workflow: \`${WORKFLOW_NAME}\`"
            echo "- Cloud Run Jobs: \`${LEAD_JOB}\`, \`${POS_JOB}\`, \`${MATCH_JOB}\`"
            echo "- Warehouse: \`${WAREHOUSE_LABEL}\`"
            echo "- Smoke tests: \`${{ github.event.inputs.run_smoke_tests }}\`"
            echo "- Cloud SQL index maintenance: \`${{ github.event.inputs.run_cloud_sql_index_maintenance }}\`"
            echo "- READY URI: \`${READY_URI}\`"
            echo "- Report URI: \`${REPORT_URI}\`"
            echo "- Result URI: \`${RESULT_URI}\`"
            echo "- Generated UTC: \`$(date -u +%Y-%m-%dT%H:%M:%SZ)\`"
            echo ""
          } > "${REPORT_FILE}"

      - name: Validate contract files
        run: |
          set -euo pipefail
          test -f .github/workflows/lead_match_preflight_ops.yml
          test -f deploy/lead_match_workflow.yaml
          test -f scripts/gemini_embedding_client_smoke_test.py
          {
            echo "WORKFLOW_YAML_STATUS=PASS"
            echo "VERTEX_PATH_STATUS=PASS"
          } >> "$GITHUB_ENV"

      - name: Prepare GCS folders
        if: github.event.inputs.prepare_resources == 'true'
        run: |
          set -euo pipefail
          gcloud config set project "${PROJECT_ID}"
          if ! gsutil ls -b "gs://${BUCKET_NAME}" >/dev/null 2>&1; then
            gsutil mb -p "${PROJECT_ID}" -l "${REGION}" "gs://${BUCKET_NAME}"
          fi
          MARKER_FILE="${RUNNER_TEMP}/.keep"
          printf 'created by lead_match_preflight_ops at %s\n' "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > "${MARKER_FILE}"
          for folder in \
            "preflight/lead_match/${PROJECT_ID}/${WAREHOUSE_LABEL}/" \
            "match/vertex/final_match_result/" \
            "archive/match/vertex/final_match_result/"; do
            gsutil cp "${MARKER_FILE}" "gs://${BUCKET_NAME}/${folder}.keep" >/dev/null
          done

      - name: Inspect resources
        run: |
          set -euo pipefail
          gcloud config set project "${PROJECT_ID}"
          {
            echo "## Enabled Services"
            echo ""
            echo "Required services for this workflow:"
            echo ""
            echo "- \`aiplatform.googleapis.com\`"
            echo "- \`artifactregistry.googleapis.com\`"
            echo "- \`cloudbuild.googleapis.com\`"
            echo "- \`run.googleapis.com\`"
            echo "- \`secretmanager.googleapis.com\`"
            echo "- \`sqladmin.googleapis.com\`"
            echo "- \`storage.googleapis.com\`"
            echo "- \`workflows.googleapis.com\`"
            echo ""
            echo '```text'
            gcloud services list --enabled \
              --filter='config.name:(run.googleapis.com OR sqladmin.googleapis.com OR aiplatform.googleapis.com OR workflows.googleapis.com OR cloudbuild.googleapis.com OR artifactregistry.googleapis.com OR secretmanager.googleapis.com OR storage.googleapis.com)' \
              --format='value(config.name)' || true
            echo '```'
            echo ""
            echo "## Cloud SQL"
            echo '```text'
            gcloud sql instances describe "${INSTANCE_NAME}" \
              --format='table(name,databaseVersion,region,settings.tier,state)' || true
            echo '```'
            echo ""
            echo "## Cloud Run Jobs"
            echo '```text'
            gcloud run jobs list --region="${REGION}" \
              --format='table(metadata.name,status.conditions[0].type,status.conditions[0].status)' || true
            echo '```'
            echo ""
            echo "## Workflow"
            echo '```text'
            gcloud workflows describe "${WORKFLOW_NAME}" --location="${REGION}" || true
            echo '```'
            echo ""
            echo "## GCS"
            echo '```text'
            gsutil ls -l "gs://${BUCKET_NAME}/preflight/lead_match/${PROJECT_ID}/${WAREHOUSE_LABEL}/" || true
            echo '```'
            echo ""
          } >> "${REPORT_FILE}"

      - name: Ensure Cloud SQL embedding indexes
        if: github.event.inputs.run_cloud_sql_index_maintenance == 'true'
        timeout-minutes: 45
        run: |
          set -euo pipefail
          gcloud config set project "${PROJECT_ID}"

          read_secret() {
            local secret_name="$1"
            if [[ -z "${secret_name}" ]]; then
              return 1
            fi
            gcloud secrets versions access latest \
              --project="${PROJECT_ID}" \
              --secret="${secret_name}"
          }

          if [[ -z "${DB_NAME:-}" && -n "${DB_NAME_SECRET:-}" ]]; then
            DB_NAME="$(read_secret "${DB_NAME_SECRET}")"
          fi
          if [[ -z "${DB_USER:-}" && -n "${DB_USER_SECRET:-}" ]]; then
            DB_USER="$(read_secret "${DB_USER_SECRET}")"
          fi
          if [[ -z "${DB_PASSWORD:-}" && -n "${DB_PASSWORD_SECRET:-}" ]]; then
            DB_PASSWORD="$(read_secret "${DB_PASSWORD_SECRET}")"
          fi

          if [[ -z "${DB_NAME:-}" ]]; then
            DB_NAME="postgres"
          fi
          if [[ -z "${DB_USER:-}" ]]; then
            DB_USER="postgres"
          fi
          if [[ -z "${DB_PASSWORD:-}" ]]; then
            echo "DB_PASSWORD secret is required for Cloud SQL index maintenance" >&2
            echo "CLOUD_SQL_INDEX_STATUS=FAIL" >> "$GITHUB_ENV"
            exit 1
          fi

          CONNECTION_NAME="$(gcloud sql instances describe "${INSTANCE_NAME}" \
            --project="${PROJECT_ID}" \
            --format='value(connectionName)')"
          if [[ -z "${CONNECTION_NAME}" ]]; then
            echo "Could not resolve Cloud SQL connection name for ${INSTANCE_NAME}" >&2
            echo "CLOUD_SQL_INDEX_STATUS=FAIL" >> "$GITHUB_ENV"
            exit 1
          fi

          export CONNECTION_NAME DB_NAME DB_USER DB_PASSWORD
          export INDEX_RESULT_FILE="${RUNNER_TEMP}/cloud_sql_index_maintenance.json"

          set +e
          python - <<'PY'
          import json
          import os
          import re
          import time
          from pathlib import Path

          from google.cloud.sql.connector import Connector

          IDENT_RE = re.compile(r"^[A-Za-z_][A-Za-z0-9_]*$")

          schema = os.environ["SCHEMA_NAME"]
          dimension = int(os.environ.get("EMBEDDING_DIMENSION", "768"))
          result_path = Path(os.environ["INDEX_RESULT_FILE"])

          def quote_ident(identifier: str) -> str:
              if not IDENT_RE.match(identifier):
                  raise RuntimeError(f"Unsafe SQL identifier: {identifier!r}")
              return '"' + identifier.replace('"', '""') + '"'

          def qualified_index(index_name: str) -> str:
              return f"{quote_ident(schema)}.{quote_ident(index_name)}"

          def qualified_table(table_name: str) -> str:
              return f"{quote_ident(schema)}.{quote_ident(table_name)}"

          def execute_step(cursor, label: str, sql: str, params=None, steps=None):
              started = time.monotonic()
              print(f"start: {label}")
              cursor.execute(sql, params or ())
              duration = round(time.monotonic() - started, 2)
              print(f"done: {label}; seconds={duration}")
              if steps is not None:
                  steps.append({"step": label, "seconds": duration})

          def fetchall(cursor, sql: str, params=None):
              cursor.execute(sql, params or ())
              return cursor.fetchall()

          connector = Connector()
          conn = None
          steps = []
          try:
              conn = connector.connect(
                  os.environ["CONNECTION_NAME"],
                  "pg8000",
                  user=os.environ["DB_USER"],
                  password=os.environ["DB_PASSWORD"],
                  db=os.environ["DB_NAME"],
              )
              conn.autocommit = True
              cursor = conn.cursor()

              execute_step(cursor, "create pgvector extension", "CREATE EXTENSION IF NOT EXISTS vector", steps=steps)

              required_tables = ("leads_embeddings", "pos_embeddings")
              missing_tables = [
                  table
                  for table in required_tables
                  if not fetchall(
                      cursor,
                      """
                      SELECT 1
                      FROM information_schema.tables
                      WHERE table_schema = %s AND table_name = %s
                      """,
                      (schema, table),
                  )
              ]
              if missing_tables:
                  raise RuntimeError(f"Missing required embedding tables: {missing_tables}")

              vector_columns = ("combined_embedding", "address_embedding", "name_embedding")
              for table in required_tables:
                  for column in vector_columns:
                      rows = fetchall(
                          cursor,
                          f"""
                          SELECT vector_dims({quote_ident(column)}), count(*)
                          FROM {qualified_table(table)}
                          WHERE {quote_ident(column)} IS NOT NULL
                          GROUP BY vector_dims({quote_ident(column)})
                          """,
                      )
                      bad_dims = [row for row in rows if int(row[0]) != dimension]
                      if bad_dims:
                          raise RuntimeError(
                              f"{schema}.{table}.{column} has non-{dimension} vectors: {bad_dims}"
                          )

              invalid_indexes = fetchall(
                  cursor,
                  """
                  SELECT c.relname
                  FROM pg_index i
                  JOIN pg_class c ON c.oid = i.indexrelid
                  JOIN pg_namespace n ON n.oid = c.relnamespace
                  WHERE n.nspname = %s
                    AND c.relname IN (
                      'idx_leads_embeddings_combined_hnsw',
                      'idx_pos_embeddings_combined_hnsw',
                      'idx_leads_embeddings_lead_id_unique',
                      'idx_pos_embeddings_pos_id_unique'
                    )
                    AND (NOT i.indisvalid OR NOT i.indisready)
                  """,
                  (schema,),
              )
              for (index_name,) in invalid_indexes:
                  execute_step(
                      cursor,
                      f"drop invalid index {index_name}",
                      f"DROP INDEX CONCURRENTLY IF EXISTS {qualified_index(index_name)}",
                      steps=steps,
                  )

              for table in required_tables:
                  current_types = {
                      row[0]: row[1]
                      for row in fetchall(
                          cursor,
                          """
                          SELECT a.attname, format_type(a.atttypid, a.atttypmod)
                          FROM pg_attribute a
                          JOIN pg_class c ON c.oid = a.attrelid
                          JOIN pg_namespace n ON n.oid = c.relnamespace
                          WHERE n.nspname = %s
                            AND c.relname = %s
                            AND a.attname IN ('combined_embedding', 'address_embedding', 'name_embedding')
                          """,
                          (schema, table),
                      )
                  }
                  if any(current_types.get(column) != f"vector({dimension})" for column in vector_columns):
                      execute_step(
                          cursor,
                          f"dimension {table} vector columns",
                          f"""
                          ALTER TABLE {qualified_table(table)}
                              ALTER COLUMN combined_embedding TYPE vector({dimension}) USING combined_embedding::vector({dimension}),
                              ALTER COLUMN address_embedding TYPE vector({dimension}) USING address_embedding::vector({dimension}),
                              ALTER COLUMN name_embedding TYPE vector({dimension}) USING name_embedding::vector({dimension})
                          """,
                          steps=steps,
                      )

              duplicate_checks = (
                  ("leads_embeddings", "lead_id"),
                  ("pos_embeddings", "pos_id"),
              )
              for table, key_column in duplicate_checks:
                  duplicates = fetchall(
                      cursor,
                      f"""
                      SELECT {quote_ident(key_column)}, count(*)
                      FROM {qualified_table(table)}
                      WHERE {quote_ident(key_column)} IS NOT NULL
                      GROUP BY {quote_ident(key_column)}
                      HAVING count(*) > 1
                      LIMIT 10
                      """,
                  )
                  if duplicates:
                      raise RuntimeError(
                          f"Cannot create unique index on {schema}.{table}.{key_column}; duplicates={duplicates}"
                      )

              execute_step(
                  cursor,
                  "create lead embedding unique index",
                  f"""
                  CREATE UNIQUE INDEX CONCURRENTLY IF NOT EXISTS idx_leads_embeddings_lead_id_unique
                  ON {qualified_table("leads_embeddings")} (lead_id)
                  """,
                  steps=steps,
              )
              execute_step(
                  cursor,
                  "create POS embedding unique index",
                  f"""
                  CREATE UNIQUE INDEX CONCURRENTLY IF NOT EXISTS idx_pos_embeddings_pos_id_unique
                  ON {qualified_table("pos_embeddings")} (pos_id)
                  """,
                  steps=steps,
              )
              execute_step(
                  cursor,
                  "create lead combined HNSW index",
                  f"""
                  CREATE INDEX CONCURRENTLY IF NOT EXISTS idx_leads_embeddings_combined_hnsw
                  ON {qualified_table("leads_embeddings")}
                  USING hnsw (combined_embedding vector_cosine_ops)
                  WITH (m = 16, ef_construction = 128)
                  """,
                  steps=steps,
              )
              execute_step(
                  cursor,
                  "create POS combined HNSW index",
                  f"""
                  CREATE INDEX CONCURRENTLY IF NOT EXISTS idx_pos_embeddings_combined_hnsw
                  ON {qualified_table("pos_embeddings")}
                  USING hnsw (combined_embedding vector_cosine_ops)
                  WITH (m = 16, ef_construction = 128)
                  """,
                  steps=steps,
              )
              execute_step(cursor, "analyze leads_embeddings", f"ANALYZE {qualified_table('leads_embeddings')}", steps=steps)
              execute_step(cursor, "analyze pos_embeddings", f"ANALYZE {qualified_table('pos_embeddings')}", steps=steps)

              index_states = [
                  {
                      "index_name": row[0],
                      "unique": bool(row[1]),
                      "valid": bool(row[2]),
                      "ready": bool(row[3]),
                      "definition": row[4],
                  }
                  for row in fetchall(
                      cursor,
                      """
                      SELECT c.relname, i.indisunique, i.indisvalid, i.indisready, pg_get_indexdef(i.indexrelid)
                      FROM pg_index i
                      JOIN pg_class c ON c.oid = i.indexrelid
                      JOIN pg_namespace n ON n.oid = c.relnamespace
                      WHERE n.nspname = %s
                        AND c.relname IN (
                          'idx_leads_embeddings_combined_hnsw',
                          'idx_pos_embeddings_combined_hnsw',
                          'idx_leads_embeddings_lead_id_unique',
                          'idx_pos_embeddings_pos_id_unique'
                        )
                      ORDER BY c.relname
                      """,
                      (schema,),
                  )
              ]
              if len(index_states) != 4 or not all(row["valid"] and row["ready"] for row in index_states):
                  raise RuntimeError(f"Index verification failed: {index_states}")

              column_types = [
                  {"table": row[0], "column": row[1], "type": row[2]}
                  for row in fetchall(
                      cursor,
                      """
                      SELECT c.relname, a.attname, format_type(a.atttypid, a.atttypmod)
                      FROM pg_attribute a
                      JOIN pg_class c ON c.oid = a.attrelid
                      JOIN pg_namespace n ON n.oid = c.relnamespace
                      WHERE n.nspname = %s
                        AND c.relname IN ('leads_embeddings', 'pos_embeddings')
                        AND a.attname IN ('combined_embedding', 'address_embedding', 'name_embedding')
                      ORDER BY c.relname, a.attname
                      """,
                      (schema,),
                  )
              ]
              result = {
                  "status": "PASS",
                  "project": os.environ["PROJECT_ID"],
                  "connection_name": os.environ["CONNECTION_NAME"],
                  "database": os.environ["DB_NAME"],
                  "schema": schema,
                  "embedding_dimension": dimension,
                  "steps": steps,
                  "column_types": column_types,
                  "index_states": index_states,
              }
              result_path.write_text(json.dumps(result, indent=2) + "\n")
              print(json.dumps(result, indent=2))
          except Exception as exc:
              result = {
                  "status": "FAIL",
                  "project": os.environ.get("PROJECT_ID"),
                  "connection_name": os.environ.get("CONNECTION_NAME"),
                  "database": os.environ.get("DB_NAME"),
                  "schema": schema,
                  "embedding_dimension": dimension,
                  "steps": steps,
                  "error": str(exc),
              }
              result_path.write_text(json.dumps(result, indent=2) + "\n")
              print(json.dumps(result, indent=2))
              raise
          finally:
              if conn is not None:
                  conn.close()
              connector.close()
          PY
          INDEX_RC=$?
          set -e

          if [[ ${INDEX_RC} -eq 0 ]]; then
            echo "CLOUD_SQL_INDEX_STATUS=PASS" >> "$GITHUB_ENV"
          else
            echo "CLOUD_SQL_INDEX_STATUS=FAIL" >> "$GITHUB_ENV"
          fi

          {
            echo "## Cloud SQL Embedding Index Maintenance"
            echo ""
            echo "- Instance: \`${INSTANCE_NAME}\`"
            echo "- Connection: \`${CONNECTION_NAME}\`"
            echo "- Database: \`${DB_NAME}\`"
            echo "- Schema: \`${SCHEMA_NAME}\`"
            echo "- Status: \`$(python -c 'import json,os; print(json.load(open(os.environ["INDEX_RESULT_FILE"]))["status"])')\`"
            echo ""
            echo '```json'
            cat "${INDEX_RESULT_FILE}"
            echo '```'
            echo ""
          } >> "${REPORT_FILE}"

          exit "${INDEX_RC}"

      - name: Run Vertex AI embedding smoke test
        if: github.event.inputs.run_smoke_tests == 'true'
        run: |
          set -euo pipefail
          python scripts/gemini_embedding_client_smoke_test.py \
            --project-id "${PROJECT_ID}" \
            --location "${REGION}" \
            --model "gemini-embedding-001" \
            --output "${RUNNER_TEMP}/gemini_embedding_client_smoke_test_results.json"

          {
            echo "VERTEX_SMOKE_STATUS=PASS"
          } >> "$GITHUB_ENV"

          {
            echo "## Vertex AI Embedding Smoke Test"
            echo '```json'
            cat "${RUNNER_TEMP}/gemini_embedding_client_smoke_test_results.json"
            echo '```'
            echo ""
          } >> "${REPORT_FILE}"

      - name: Check Cloud SQL smoke job contract
        if: github.event.inputs.run_smoke_tests == 'true'
        timeout-minutes: 5
        run: |
          set -euo pipefail
          {
            echo "CLOUD_SQL_SMOKE_STATUS=SKIPPED"
          } >> "$GITHUB_ENV"

          # Warehouse smoke test must run inside Cloud Run Job, not GitHub runner, because Cloud SQL is accessed through GCP runtime connectivity.
          # Direct DB access from the GitHub runner is intentionally NOT allowed.
          # Cloud SQL validation must run inside GCP via a Cloud Run Job.
          if [[ "${WAREHOUSE_LABEL}" == "all" ]]; then
            {
              echo "## Cloud SQL Warehouse Smoke Test"
              echo ""
              echo "Skipped: warehouse smoke test requires one numeric warehouse, but input was \`all\`."
              echo ""
            } >> "${REPORT_FILE}"
            exit 0
          fi

          if ! gcloud run jobs describe "${SMOKE_JOB}" --region="${REGION}" >/dev/null 2>&1; then
            {
              echo "## Cloud SQL Warehouse Smoke Test"
              echo ""
              echo "Skipped: Cloud Run Job \`${SMOKE_JOB}\` is not deployed in \`${REGION}\`."
              echo "GitHub Actions does not connect to Cloud SQL directly; deploy the job first."
              echo ""
            } >> "${REPORT_FILE}"
            exit 0
          fi

          set +e
          EXECUTION_NAME="$(gcloud run jobs execute "${SMOKE_JOB}" \
            --region="${REGION}" \
            --update-env-vars="WAREHOUSE=${WAREHOUSE_LABEL},WAREHOUSE_SCOPE=${WAREHOUSE_LABEL}" \
            --wait \
            --format='value(metadata.name)')"
          EXECUTION_RC=$?
          set -e

          if [[ ${EXECUTION_RC} -eq 0 ]]; then
            CLOUD_SQL_SMOKE_STATUS="PASS"
            {
              echo "CLOUD_SQL_SMOKE_STATUS=PASS"
            } >> "$GITHUB_ENV"
          else
            CLOUD_SQL_SMOKE_STATUS="FAIL"
            {
              echo "CLOUD_SQL_SMOKE_STATUS=FAIL"
            } >> "$GITHUB_ENV"
          fi

          {
            echo "## Cloud SQL Warehouse Smoke Test"
            echo ""
            echo "Triggered Cloud Run Job: \`${SMOKE_JOB}\`"
            echo "Execution: \`${EXECUTION_NAME}\`"
            echo "Status: \`${CLOUD_SQL_SMOKE_STATUS}\`"
            echo ""
            echo "Inspect logs with:"
            echo '```bash'
            echo "gcloud run jobs executions describe ${EXECUTION_NAME} --region=${REGION}"
            echo '```'
            echo ""
          } >> "${REPORT_FILE}"

      - name: Add SQL checklist
        run: |
          set -euo pipefail
          {
            echo "## Manual Cloud SQL Readiness SQL"
            echo '```sql'
            echo "SELECT count(*) FROM ${SCHEMA_NAME}.lead WHERE 1=1 ${WAREHOUSE_SQL_FILTER};"
            echo "SELECT count(*) FROM ${SCHEMA_NAME}.transaction WHERE 1=1 ${WAREHOUSE_SQL_FILTER};"
            echo "SELECT count(*) FROM ${SCHEMA_NAME}.leads_embeddings WHERE 1=1 ${WAREHOUSE_SQL_FILTER};"
            echo "SELECT count(*) FROM ${SCHEMA_NAME}.pos_embeddings WHERE 1=1 ${WAREHOUSE_SQL_FILTER};"
            echo "SELECT count(*) FROM ${SCHEMA_NAME}.match_decision_detail;"
            echo '```'
          } >> "${REPORT_FILE}"

      - name: Finalize readiness contract
        if: always()
        run: |
          set -euo pipefail
          REQUIRED_STATUS="PASS"
          if [[ "${WORKFLOW_YAML_STATUS}" != "PASS" || "${VERTEX_PATH_STATUS}" != "PASS" ]]; then
            REQUIRED_STATUS="FAIL"
          fi

          READY="false"
          if [[ "${REQUIRED_STATUS}" == "PASS" ]]; then
            READY="true"
          fi

          OVERALL_STATUS="${REQUIRED_STATUS}"
          if [[ "${CLOUD_SQL_SMOKE_STATUS}" == "FAIL" ]]; then
            OVERALL_STATUS="FAIL"
          fi
          if [[ "${CLOUD_SQL_INDEX_STATUS}" == "FAIL" ]]; then
            OVERALL_STATUS="FAIL"
          fi
          if [[ "${OVERALL_STATUS}" != "PASS" ]]; then
            READY="false"
          fi
          export REQUIRED_STATUS READY OVERALL_STATUS

          rm -f "${READY_FILE}"
          if [[ "${READY}" == "true" ]]; then
            printf 'ready\n' > "${READY_FILE}"
          fi

          python - <<'PY'
          import json
          import os
          from pathlib import Path

          result = {
              "project": os.environ["PROJECT_ID"],
              "warehouse": os.environ.get("WAREHOUSE_LABEL", ""),
              "status": os.environ.get("OVERALL_STATUS", "FAIL"),
              "ready": os.environ.get("READY", "false").lower() == "true",
              "required_checks": {
                  "workflow_yaml": os.environ.get("WORKFLOW_YAML_STATUS", "FAIL"),
                  "vertex_path": os.environ.get("VERTEX_PATH_STATUS", "FAIL"),
                  "cloud_sql_smoke": os.environ.get("CLOUD_SQL_SMOKE_STATUS", "SKIPPED"),
                  "cloud_sql_indexes": os.environ.get("CLOUD_SQL_INDEX_STATUS", "SKIPPED"),
              },
              "optional_checks": {
                  "cloud_sql_smoke": os.environ.get("CLOUD_SQL_SMOKE_STATUS", "SKIPPED"),
                  "cloud_sql_indexes": os.environ.get("CLOUD_SQL_INDEX_STATUS", "SKIPPED"),
              },
              "report_uri": os.environ["REPORT_URI"],
              "ready_uri": os.environ["READY_URI"],
          }
          Path(os.environ["RESULT_FILE"]).write_text(json.dumps(result, indent=2) + "\n")
          PY

          {
            echo "## Readiness Contract"
            echo ""
            echo "- Required checks status: \`${REQUIRED_STATUS}\`"
            echo "- Cloud SQL index status: \`${CLOUD_SQL_INDEX_STATUS}\`"
            echo "- Overall status: \`${OVERALL_STATUS}\`"
            echo "- Ready: \`${READY}\`"
            echo "- Result URI: \`${RESULT_URI}\`"
            echo "- READY URI: \`${READY_URI}\`"
            echo ""
          } >> "${REPORT_FILE}"

      - name: Upload report
        if: always()
        run: |
          set -euo pipefail
          if gsutil ls -b "gs://${BUCKET_NAME}" >/dev/null 2>&1; then
            gsutil cp "${REPORT_FILE}" "${REPORT_URI}"
            gsutil cp "${RESULT_FILE}" "${RESULT_URI}"
            if [[ -f "${READY_FILE}" ]]; then
              gsutil cp "${READY_FILE}" "${READY_URI}"
            fi
          fi
          cat "${REPORT_FILE}" >> "$GITHUB_STEP_SUMMARY"
