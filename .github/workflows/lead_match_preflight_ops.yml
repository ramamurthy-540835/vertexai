name: lead_match_preflight_ops.yml

on:
  workflow_dispatch:
    inputs:
      project_id:
        description: "GCP project ID"
        required: false
        default: "ctoteam"
        type: string
      region:
        description: "GCP region"
        required: false
        default: "us-central1"
        type: string
      instance_name:
        description: "Cloud SQL instance name"
        required: false
        default: "lead-mgmt-db"
        type: string
      schema_name:
        description: "Cloud SQL schema containing lead match tables"
        required: false
        default: "leadmgmt"
        type: string
      warehouse:
        description: "Warehouse number, comma-separated warehouses, blank, or all"
        required: false
        default: "115"
        type: string
      bucket:
        description: "GCS bucket used for lead-match reports"
        required: false
        default: "lead-match-ctoteam"
        type: string
      prepare_resources:
        description: "Create preflight GCS folders if missing?"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      run_smoke_tests:
        description: "Run Vertex AI and Cloud SQL smoke-test scripts?"
        required: true
        default: "false"
        type: choice
        options:
          - "true"
          - "false"
      run_cloud_sql_index_maintenance:
        description: "Create/check embedding vector indexes in Cloud SQL?"
        required: true
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  preflight:
    name: "ctoteam-preflight-${{ github.event.inputs.warehouse || 'all' }}"
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    env:
      PROJECT_ID: ${{ github.event.inputs.project_id }}
      REGION: ${{ github.event.inputs.region }}
      SCHEMA_NAME: ${{ github.event.inputs.schema_name }}
      INSTANCE_NAME: ${{ github.event.inputs.instance_name }}
      WORKFLOW_NAME: lead_match_workflow
      LEAD_JOB: lead-match-lead-embeddings
      POS_JOB: lead-match-pos-embeddings
      MATCH_JOB: lead-match-fuzzy-match
      # Reuse the DB-wired fuzzy job and override args to run index maintenance.
      INDEX_JOB: lead-match-fuzzy-match
      SMOKE_JOB: lead-match-warehouse-smoke
      BUCKET_NAME: ${{ github.event.inputs.bucket }}
      EMBEDDING_DIMENSION: "768"
      WORKFLOW_YAML_STATUS: FAIL
      VERTEX_PATH_STATUS: FAIL
      CLOUD_SQL_SMOKE_STATUS: SKIPPED
      CLOUD_SQL_INDEX_STATUS: SKIPPED
      OPTIONAL_CHECKS_JSON: '{}'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Auth to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER_ID }}
          service_account: ${{ secrets.GCP_WORKLOAD_IDENTITY_SA_EMAIL }}
          create_credentials_file: true
          export_environment_variables: true

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Set up Python
        if: github.event.inputs.run_smoke_tests == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install smoke-test dependencies
        if: github.event.inputs.run_smoke_tests == 'true'
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install \
            google-genai \
            google-auth

      - name: Resolve inputs
        env:
          RAW_WAREHOUSE: ${{ github.event.inputs.warehouse }}
        run: |
          set -euo pipefail
          WAREHOUSE="$(printf '%s' "${RAW_WAREHOUSE}" | tr -d '[:space:]')"
          if [[ -z "${WAREHOUSE}" || "${WAREHOUSE,,}" == "all" ]]; then
            WAREHOUSE=""
            WAREHOUSE_LABEL="all"
            WAREHOUSE_SQL_FILTER=""
          else
            if [[ ! "${WAREHOUSE}" =~ ^[0-9]+(,[0-9]+)*$ ]]; then
              echo "Invalid warehouse input: ${WAREHOUSE}"
              exit 1
            fi
            WAREHOUSE_LABEL="${WAREHOUSE}"
            WAREHOUSE_SQL_FILTER="AND warehouse_number IN (${WAREHOUSE})"
          fi

          HANDOFF_PREFIX="preflight/lead_match/${PROJECT_ID}/${WAREHOUSE_LABEL}"
          {
            echo "WAREHOUSE=${WAREHOUSE}"
            echo "WAREHOUSE_LABEL=${WAREHOUSE_LABEL}"
            echo "WAREHOUSE_SQL_FILTER=${WAREHOUSE_SQL_FILTER}"
            echo "HANDOFF_PREFIX=${HANDOFF_PREFIX}"
            echo "REPORT_FILE=${RUNNER_TEMP}/lead_match_preflight_report.md"
            echo "RESULT_FILE=${RUNNER_TEMP}/lead_match_preflight_result.json"
            echo "READY_FILE=${RUNNER_TEMP}/READY"
            echo "REPORT_URI=gs://${BUCKET_NAME}/${HANDOFF_PREFIX}/report.md"
            echo "RESULT_URI=gs://${BUCKET_NAME}/${HANDOFF_PREFIX}/result.json"
            echo "READY_URI=gs://${BUCKET_NAME}/${HANDOFF_PREFIX}/READY"
          } >> "$GITHUB_ENV"
          gsutil rm -f "gs://${BUCKET_NAME}/${HANDOFF_PREFIX}/READY" >/dev/null 2>&1 || true

      - name: Initialize report
        run: |
          set -euo pipefail
          {
            echo "# Lead Match Preflight"
            echo ""
            echo "- Project: \`${PROJECT_ID}\`"
            echo "- Region: \`${REGION}\`"
            echo "- Cloud SQL instance: \`${INSTANCE_NAME}\`"
            echo "- Schema: \`${SCHEMA_NAME}\`"
            echo "- Workflow: \`${WORKFLOW_NAME}\`"
            echo "- Cloud Run Jobs: \`${LEAD_JOB}\`, \`${POS_JOB}\`, \`${INDEX_JOB}\`, \`${MATCH_JOB}\`"
            echo "- Warehouse: \`${WAREHOUSE_LABEL}\`"
            echo "- Smoke tests: \`${{ github.event.inputs.run_smoke_tests }}\`"
            echo "- Cloud SQL index maintenance: \`${{ github.event.inputs.run_cloud_sql_index_maintenance }}\`"
            echo "- READY URI: \`${READY_URI}\`"
            echo "- Report URI: \`${REPORT_URI}\`"
            echo "- Result URI: \`${RESULT_URI}\`"
            echo "- Generated UTC: \`$(date -u +%Y-%m-%dT%H:%M:%SZ)\`"
            echo ""
          } > "${REPORT_FILE}"

      - name: Validate contract files
        run: |
          set -euo pipefail
          test -f .github/workflows/lead_match_preflight_ops.yml
          test -f deploy/lead_match_workflow.yaml
          test -f scripts/gemini_embedding_client_smoke_test.py
          {
            echo "WORKFLOW_YAML_STATUS=PASS"
            echo "VERTEX_PATH_STATUS=PASS"
          } >> "$GITHUB_ENV"

      - name: Prepare GCS folders
        if: github.event.inputs.prepare_resources == 'true'
        run: |
          set -euo pipefail
          gcloud config set project "${PROJECT_ID}"
          if ! gsutil ls -b "gs://${BUCKET_NAME}" >/dev/null 2>&1; then
            gsutil mb -p "${PROJECT_ID}" -l "${REGION}" "gs://${BUCKET_NAME}"
          fi
          MARKER_FILE="${RUNNER_TEMP}/.keep"
          printf 'created by lead_match_preflight_ops at %s\n' "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > "${MARKER_FILE}"
          for folder in \
            "preflight/lead_match/${PROJECT_ID}/${WAREHOUSE_LABEL}/" \
            "match/vertex/final_match_result/" \
            "archive/match/vertex/final_match_result/"; do
            gsutil cp "${MARKER_FILE}" "gs://${BUCKET_NAME}/${folder}.keep" >/dev/null
          done

      - name: Inspect resources
        run: |
          set -euo pipefail
          gcloud config set project "${PROJECT_ID}"
          {
            echo "## Enabled Services"
            echo ""
            echo "Required services for this workflow:"
            echo ""
            echo "- \`aiplatform.googleapis.com\`"
            echo "- \`artifactregistry.googleapis.com\`"
            echo "- \`cloudbuild.googleapis.com\`"
            echo "- \`run.googleapis.com\`"
            echo "- \`secretmanager.googleapis.com\`"
            echo "- \`sqladmin.googleapis.com\`"
            echo "- \`storage.googleapis.com\`"
            echo "- \`workflows.googleapis.com\`"
            echo ""
            echo '```text'
            gcloud services list --enabled \
              --filter='config.name:(run.googleapis.com OR sqladmin.googleapis.com OR aiplatform.googleapis.com OR workflows.googleapis.com OR cloudbuild.googleapis.com OR artifactregistry.googleapis.com OR secretmanager.googleapis.com OR storage.googleapis.com)' \
              --format='value(config.name)' || true
            echo '```'
            echo ""
            echo "## Cloud SQL"
            echo '```text'
            gcloud sql instances describe "${INSTANCE_NAME}" \
              --format='table(name,databaseVersion,region,settings.tier,state)' || true
            echo '```'
            echo ""
            echo "## Cloud Run Jobs"
            echo '```text'
            gcloud run jobs list --region="${REGION}" \
              --format='table(metadata.name,status.conditions[0].type,status.conditions[0].status)' || true
            echo '```'
            echo ""
            echo "## Workflow"
            echo '```text'
            gcloud workflows describe "${WORKFLOW_NAME}" --location="${REGION}" || true
            echo '```'
            echo ""
            echo "## GCS"
            echo '```text'
            gsutil ls -l "gs://${BUCKET_NAME}/preflight/lead_match/${PROJECT_ID}/${WAREHOUSE_LABEL}/" || true
            echo '```'
            echo ""
          } >> "${REPORT_FILE}"

      - name: Ensure Cloud SQL embedding indexes
        if: github.event.inputs.run_cloud_sql_index_maintenance == 'true'
        timeout-minutes: 45
        run: |
          set -euo pipefail
          gcloud config set project "${PROJECT_ID}"

          CONNECTION_NAME="$(gcloud sql instances describe "${INSTANCE_NAME}" \
            --project="${PROJECT_ID}" \
            --format='value(connectionName)')"
          if [[ -z "${CONNECTION_NAME}" ]]; then
            echo "Could not resolve Cloud SQL connection name for ${INSTANCE_NAME}" >&2
            echo "CLOUD_SQL_INDEX_STATUS=FAIL" >> "$GITHUB_ENV"
            exit 1
          fi

          if ! gcloud run jobs describe "${INDEX_JOB}" \
            --project="${PROJECT_ID}" \
            --region="${REGION}" >/dev/null 2>&1; then
            {
              echo "## Cloud SQL Embedding Index Maintenance"
              echo ""
              echo "Failed: Cloud Run Job \`${INDEX_JOB}\` is not deployed in \`${REGION}\`."
              echo "GitHub Actions does not connect to Cloud SQL directly; deploy/update the semantic runtime job first."
              echo ""
            } >> "${REPORT_FILE}"
            echo "CLOUD_SQL_INDEX_STATUS=FAIL" >> "$GITHUB_ENV"
            exit 1
          fi

          set +e
          EXECUTION_NAME="$(gcloud run jobs execute "${INDEX_JOB}" \
            --project="${PROJECT_ID}" \
            --region="${REGION}" \
            --args=ensure-indexes \
            --update-env-vars="WAREHOUSE=${WAREHOUSE_LABEL},WAREHOUSE_SCOPE=${WAREHOUSE_LABEL},DB_SCHEMA=${SCHEMA_NAME},GOOGLE_CLOUD_PROJECT=${PROJECT_ID},EXPECTED_PROJECT_ID=${PROJECT_ID},CLOUDSQL_CONNECTION_NAME=${CONNECTION_NAME},EXPECTED_CLOUDSQL_CONNECTION_NAME=${CONNECTION_NAME},ALLOW_CLIENT_GCP=false,ALLOW_PRODUCTION=false,EMBEDDING_DIMENSION=${EMBEDDING_DIMENSION}" \
            --wait \
            --format='value(metadata.name)')"
          INDEX_RC=$?
          set -e

          if [[ ${INDEX_RC} -eq 0 ]]; then
            CLOUD_SQL_INDEX_STATUS="PASS"
            echo "CLOUD_SQL_INDEX_STATUS=PASS" >> "$GITHUB_ENV"
          else
            CLOUD_SQL_INDEX_STATUS="FAIL"
            echo "CLOUD_SQL_INDEX_STATUS=FAIL" >> "$GITHUB_ENV"
          fi

          {
            echo "## Cloud SQL Embedding Index Maintenance"
            echo ""
            echo "Triggered Cloud Run Job: \`${INDEX_JOB}\`"
            echo "Execution: \`${EXECUTION_NAME}\`"
            echo "- Instance: \`${INSTANCE_NAME}\`"
            echo "- Connection: \`${CONNECTION_NAME}\`"
            echo "- Schema: \`${SCHEMA_NAME}\`"
            echo "- Status: \`${CLOUD_SQL_INDEX_STATUS}\`"
            echo ""
            echo "Cloud SQL maintenance ran inside the Cloud Run job runtime. GitHub Actions did not open a database connection."
            echo ""
            echo "Inspect logs with:"
            echo '```bash'
            echo "gcloud run jobs executions describe ${EXECUTION_NAME} --region=${REGION}"
            echo '```'
            echo ""
          } >> "${REPORT_FILE}"

          exit "${INDEX_RC}"

      - name: Run Vertex AI embedding smoke test
        if: github.event.inputs.run_smoke_tests == 'true'
        run: |
          set -euo pipefail
          python scripts/gemini_embedding_client_smoke_test.py \
            --project-id "${PROJECT_ID}" \
            --location "${REGION}" \
            --model "gemini-embedding-001" \
            --output "${RUNNER_TEMP}/gemini_embedding_client_smoke_test_results.json"

          {
            echo "VERTEX_SMOKE_STATUS=PASS"
          } >> "$GITHUB_ENV"

          {
            echo "## Vertex AI Embedding Smoke Test"
            echo '```json'
            cat "${RUNNER_TEMP}/gemini_embedding_client_smoke_test_results.json"
            echo '```'
            echo ""
          } >> "${REPORT_FILE}"

      - name: Check Cloud SQL smoke job contract
        if: github.event.inputs.run_smoke_tests == 'true'
        timeout-minutes: 5
        run: |
          set -euo pipefail
          {
            echo "CLOUD_SQL_SMOKE_STATUS=SKIPPED"
          } >> "$GITHUB_ENV"

          # Warehouse smoke test must run inside Cloud Run Job, not GitHub runner, because Cloud SQL is accessed through GCP runtime connectivity.
          # Direct DB access from the GitHub runner is intentionally NOT allowed.
          # Cloud SQL validation must run inside GCP via a Cloud Run Job.
          if [[ "${WAREHOUSE_LABEL}" == "all" ]]; then
            {
              echo "## Cloud SQL Warehouse Smoke Test"
              echo ""
              echo "Skipped: warehouse smoke test requires one numeric warehouse, but input was \`all\`."
              echo ""
            } >> "${REPORT_FILE}"
            exit 0
          fi

          if ! gcloud run jobs describe "${SMOKE_JOB}" --region="${REGION}" >/dev/null 2>&1; then
            {
              echo "## Cloud SQL Warehouse Smoke Test"
              echo ""
              echo "Skipped: Cloud Run Job \`${SMOKE_JOB}\` is not deployed in \`${REGION}\`."
              echo "GitHub Actions does not connect to Cloud SQL directly; deploy the job first."
              echo ""
            } >> "${REPORT_FILE}"
            exit 0
          fi

          set +e
          EXECUTION_NAME="$(gcloud run jobs execute "${SMOKE_JOB}" \
            --region="${REGION}" \
            --update-env-vars="WAREHOUSE=${WAREHOUSE_LABEL},WAREHOUSE_SCOPE=${WAREHOUSE_LABEL}" \
            --wait \
            --format='value(metadata.name)')"
          EXECUTION_RC=$?
          set -e

          if [[ ${EXECUTION_RC} -eq 0 ]]; then
            CLOUD_SQL_SMOKE_STATUS="PASS"
            {
              echo "CLOUD_SQL_SMOKE_STATUS=PASS"
            } >> "$GITHUB_ENV"
          else
            CLOUD_SQL_SMOKE_STATUS="FAIL"
            {
              echo "CLOUD_SQL_SMOKE_STATUS=FAIL"
            } >> "$GITHUB_ENV"
          fi

          {
            echo "## Cloud SQL Warehouse Smoke Test"
            echo ""
            echo "Triggered Cloud Run Job: \`${SMOKE_JOB}\`"
            echo "Execution: \`${EXECUTION_NAME}\`"
            echo "Status: \`${CLOUD_SQL_SMOKE_STATUS}\`"
            echo ""
            echo "Inspect logs with:"
            echo '```bash'
            echo "gcloud run jobs executions describe ${EXECUTION_NAME} --region=${REGION}"
            echo '```'
            echo ""
          } >> "${REPORT_FILE}"

      - name: Add SQL checklist
        run: |
          set -euo pipefail
          {
            echo "## Manual Cloud SQL Readiness SQL"
            echo '```sql'
            echo "SELECT count(*) FROM ${SCHEMA_NAME}.lead WHERE 1=1 ${WAREHOUSE_SQL_FILTER};"
            echo "SELECT count(*) FROM ${SCHEMA_NAME}.transaction WHERE 1=1 ${WAREHOUSE_SQL_FILTER};"
            echo "SELECT count(*) FROM ${SCHEMA_NAME}.leads_embeddings WHERE 1=1 ${WAREHOUSE_SQL_FILTER};"
            echo "SELECT count(*) FROM ${SCHEMA_NAME}.pos_embeddings WHERE 1=1 ${WAREHOUSE_SQL_FILTER};"
            echo "SELECT count(*) FROM ${SCHEMA_NAME}.match_decision_detail;"
            echo '```'
          } >> "${REPORT_FILE}"

      - name: Finalize readiness contract
        if: always()
        run: |
          set -euo pipefail
          REQUIRED_STATUS="PASS"
          if [[ "${WORKFLOW_YAML_STATUS}" != "PASS" || "${VERTEX_PATH_STATUS}" != "PASS" ]]; then
            REQUIRED_STATUS="FAIL"
          fi

          READY="false"
          if [[ "${REQUIRED_STATUS}" == "PASS" ]]; then
            READY="true"
          fi

          OVERALL_STATUS="${REQUIRED_STATUS}"
          if [[ "${CLOUD_SQL_SMOKE_STATUS}" == "FAIL" ]]; then
            OVERALL_STATUS="FAIL"
          fi
          if [[ "${CLOUD_SQL_INDEX_STATUS}" == "FAIL" ]]; then
            OVERALL_STATUS="FAIL"
          fi
          if [[ "${OVERALL_STATUS}" != "PASS" ]]; then
            READY="false"
          fi
          export REQUIRED_STATUS READY OVERALL_STATUS

          rm -f "${READY_FILE}"
          if [[ "${READY}" == "true" ]]; then
            printf 'ready\n' > "${READY_FILE}"
          fi

          python - <<'PY'
          import json
          import os
          from pathlib import Path

          result = {
              "project": os.environ["PROJECT_ID"],
              "warehouse": os.environ.get("WAREHOUSE_LABEL", ""),
              "status": os.environ.get("OVERALL_STATUS", "FAIL"),
              "ready": os.environ.get("READY", "false").lower() == "true",
              "required_checks": {
                  "workflow_yaml": os.environ.get("WORKFLOW_YAML_STATUS", "FAIL"),
                  "vertex_path": os.environ.get("VERTEX_PATH_STATUS", "FAIL"),
                  "cloud_sql_smoke": os.environ.get("CLOUD_SQL_SMOKE_STATUS", "SKIPPED"),
                  "cloud_sql_indexes": os.environ.get("CLOUD_SQL_INDEX_STATUS", "SKIPPED"),
              },
              "optional_checks": {
                  "cloud_sql_smoke": os.environ.get("CLOUD_SQL_SMOKE_STATUS", "SKIPPED"),
                  "cloud_sql_indexes": os.environ.get("CLOUD_SQL_INDEX_STATUS", "SKIPPED"),
              },
              "report_uri": os.environ["REPORT_URI"],
              "ready_uri": os.environ["READY_URI"],
          }
          Path(os.environ["RESULT_FILE"]).write_text(json.dumps(result, indent=2) + "\n")
          PY

          {
            echo "## Readiness Contract"
            echo ""
            echo "- Required checks status: \`${REQUIRED_STATUS}\`"
            echo "- Cloud SQL index status: \`${CLOUD_SQL_INDEX_STATUS}\`"
            echo "- Overall status: \`${OVERALL_STATUS}\`"
            echo "- Ready: \`${READY}\`"
            echo "- Result URI: \`${RESULT_URI}\`"
            echo "- READY URI: \`${READY_URI}\`"
            echo ""
          } >> "${REPORT_FILE}"

      - name: Upload report
        if: always()
        run: |
          set -euo pipefail
          if gsutil ls -b "gs://${BUCKET_NAME}" >/dev/null 2>&1; then
            gsutil cp "${REPORT_FILE}" "${REPORT_URI}"
            gsutil cp "${RESULT_FILE}" "${RESULT_URI}"
            if [[ -f "${READY_FILE}" ]]; then
              gsutil cp "${READY_FILE}" "${READY_URI}"
            fi
          fi
          cat "${REPORT_FILE}" >> "$GITHUB_STEP_SUMMARY"
